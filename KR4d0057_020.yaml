body:
  text: 忠肅集巻二十宋劉摰撰七言律詩孫少卿鹿頭山詩并畫圖二首誅茅搜險旋尋眞聞説山巖一日新佳境留連應有待先時登覽豈無人披榛好石來如召隨手清泉應若神不獨山中興勝事幾多風愛在邦民使君鎮爱鹿頭山圖畫歌吟去為傳塵世那知武陵事時人爭誦永嘉篇行春遊醉常勞夢按部登臨又隔年有客平生志林壑坐憐雙眼隔雲煙次韻蔡景繁紅梅三首故人江驛寄瑶華紫玉枝頭㪚嫩霞日暗露桃春尚淺醉餘收靣粉難遮緑溪地静東風遇雕檻香寒曉月斜水滿琉璃聊自喜不堪塵眼秖空花蕭疏仙梗擢芳華巧刻圓瓊傅淡霞素質本非桃杏質酡顔聊避雪霜遮香含暮雨欄邊散豔倚春風鬢上斜聞説樽前偏屬黨青黄朱粉更無花仙圃瑶林冠物華靚英明媚洗晴霞醉装卻費臙脂暈紈扇應煩絳粉遮天上念奴春睡足風前飛燕舞容斜後房宜勸歌聲小惜愛今年第一花再次紅梅兼簡李質夫色不夭穠始是華仙家林觀倚雲霞春酣白玉醅香入日射紅鸞扇影遮攅蕚亂鬚能淡佇抱枝寒蓓更疏斜為寄瑶林主人語爭妍應有曲房花庭前有古槐一株枝葉扶疏廣䕃一畆每當月夕風晨輒為婆娑其下空翠滴衣心神清越感秋寄興情見乎詞綠玉交柯蔽鬱深碧蘿寒幄静沈沈最宜初旭晞晴靄時有珍禽宅翠隂終日對為佳客伴幾年相慰故谿心主人已有秋風興更聼疏蟬抱葉吟盆中移白菊九秋風露下星榆玉刻圓錢散曉株人住水涯多白髪地應花谷近清都按香清酒登新譜原注君倚以菊釀酒益氣輕身載舊圖移取黄堂朝夕見北洲亭遠故臺蕪原注郡中舊有白菊臺今荒廢次南陽錢紫㣲白菊清根靈氣本仙通白玉葩華綠玉叢山遠莫尋幽谷水洲香聊近百花叢神寒縹緲梅同格英出繁多雪媿工原注菊英二十一出籬下區區醉金蘂酈卿應笑鹿皮翁次韻傅推官宏月菊應憐陶令爱東籬分付黄花特地遲百卉浪隨秋色盡孤芳自與嵗寒期冷香直欲梅相鬭金蘂懸知雪更宜空使詩人詠重九天公造物本無時輓慈聖光獻皇后二首翼子詒孫廟社功憂勞嘉祐治平中澤流自配皇圖遠仙去誰期壽劫空三獻奄違長信殿萬靈神㑹永昭宫母儀五十年間事愁入西郊鼓吹風孝孫皇帝念終天毁慕難留王座遷廟諡易名尊四字宸闈行服自三年寳衣鸞鳯藏華殿哀仗星辰下洛川從此都人想遊幸無因重見九龍軿輓資政殿學士吏部尚書曽公二首懐詔歸來望九霄伾山纔隔渡河橋履聲未徹君王聼車左俄悲道路招韋氏詩書傳秘閣石家孝謹冠中朝靈輀聞說都門過愁徹西風鼓吹簫百嵗悲歡俯仰間訃驚疇昔涕汍瀾玉堂天聖傳先契蘭省元豐事長官寂寂塵音華屋閉蕭蕭雲木故山寒深心令徳今何愧付與無窮後世看原注禮諸候行而死于道則升其乘車左轂以其綏復先子出宣靖公榜下元豐乙丑之政前為吏部尚書時某其郎中也輓宋次道二首橐筆周旋侍漢宫慱知前載問無窮朝廷人物儒林丈家世文章太史公俯仰頓驚華屋換聲容徒望繐帷空寝門一哭何嗟及付與悲哀挽鐸風平生襟尚苦清通白首耽心翰墨中萬卷囊書推沈氏一時碑字貴顔公塵栖村館稀賓至山抱佳城與祖同已矣善人那復見蕭蕭溱洧秖秋風哀吕西臺行父四首大夫門户斗魁旁落落南宫舊望郎収歛壮心書萬巻沈浮高興酒千觴乘驄始欲新年去藏壑俄驚半夜亡索我贈言曽未暇哀懐今變紼塵章仙骨蕭疏古栢秋合于塵世獨悠悠人間未熟黄粱飯天上新成白玉樓隱几不聞遺治命飛旌何日向西州識君惟有崔夫子原注伯益預説衣冠一蜕留前月南河欲放船壺觴一夕暫盤桓吐霏珠玉音猶在風折篔簹墨未乾皎皎不應隨物轉滔滔從此締交難孤懐幽調誰知者寂寞金徽不復弹呉興空望使君車道厄陳州亦命歟歸路自為兠率去遺忠誰訪茂陵書粃糠世俗心無累蘭玉階庭善有餘一束生芻猶未至春風洒涙滿襟裾五言絶句次韻唐誦植椶櫚三絶句亭亭員榦直翦翦翠輪齊葉散夜叉様惡名誰品題榮悴逐時序紛紛紅翠多誰同嵗寒操旁有羽林戈種蘭不當户李以苦見容珍重主人意東亭非要沖次長守長歴兩孫自汶寄讀詩韻阿守似其父丰姿仍秀疎别翁猶數月書驛且渠渠歴也駒千里新詩慰遠思霜秋魚酒羙來趁壽觴時七言絶句戲簡許敎授雖有董鹽甘寂寞如聞顔粥更艱辛莫将秉釡論多少聊為君家拂甑塵馬融絳帳臺漢守曽為絳帳師升堂高弟許摳衣傳經無復當時事只有沙禽自在飛國風亭地靈眞合有清辭正在中和樂職時誰道諸詩吟不盡試看亭上國風詩復古亭功大文雄嵗月深巍然高碣字生金臺池得與吾民共誰識邦家復古心穿楊亭華構翬飛一望中顔間篆墨颺秋風休矜百歩穿楊巧未及當年射虎功迎春亭亭接東風近曉霞幾多和氣到萌芽也知當日迎春意不為松筠只為花朝宗亭亭下長江走浪花朝宗東委去無涯何時銀漢風濤稳待泛仙人八月槎澂心閣危欄倒影下千尋空水無聲萬象沉試問登臨來徃客幾人澄得利名心七瑞堂草木生成亦偶然誰将枝榦驗祥編如何併作當時瑞寂寞如今五十年水舫天水相将遠欲無扁舟雙槳似飛鳧此身未是逃名客且學䲭夷泛五湖雙橋雙橋十里跨虚明波面無風兩足輕雨歇烟収人不見路岐依約是蓬瀛十月六日與客游金山乾明宣塔戒壇彌勒舍利廣教七山寺三首水落溪橋霜未寒岡林平淺是西山路穿峭蒨青蔥㡳寺在﨑嶇屈曲間排門金碧七禪關松閣相望石徑連不為勤求善知識可能一日徧諸天行徹雲烟到上方青林深壑對重岡山中底處饒風月要著江州一草堂偶作春氣未强寒惨惨羇人多病興寥寥閒愁付與毫端遣長日期于局上銷次韻張供備逹夫觀囘鴈峯二首圖志分明傳者謬峯名元在嶽山隈邦人試看春巖上豈有燕鴻到此囘林麓坡陀湘水側煙嵐朝暮楚城隈峯前遷客翻堪笑不及飛鴻一歳囘樊山口二絶洲觜嶄嶄亂石排濯風寒浪踏蒼苔長江萬里從西北㵼向幽人兩足來無數江鷗似雪霜暫來還去俯滄泿幽人已自忘機乆卻恐窺魚意未忘九日依唐生韻五絶句三嵗重陽負玉觴悲歡不定客途長元光節物眞虚擲頼有新詩付錦囊白醪趁節醅已發黄菊候霜花未開獨上荒城拱雙䄂風雲惨惨鴈聲來無處登臨百尺樓若為銷散仲宣憂拒霜寒菊常煙雨愁滿江城冷澹秋悄悄登山臨水興紛紛泛菊佩茰人不須吹落簪花㡌但願常存漉酒巾長松老桂風霜足細草幽花雨露霑天寒日下音書少鴈自高飛魚自潛次韻燕中舍若水苦雨五絶句湖水漫漫日夜添芡芒蒲鍔鬭尖銛不須更問雨多少且喜西牕青入簾風欺炊竈晨煙重泥隔賓車午枕高誰記幽人張仲蔚都将三徑付蓬蒿池蛙聯絡聲方旺逕草縱横勢未鋤不厭㣲涼生枕簟只憂新蠧入圖書聲入高梧翠竹邊故攜枕簟北牕前無端喚起江南夢記得扁舟夜不眠嘉榖連空指嵗豐幽潛無復有乖龍何時浩蕩風吹日照徹隂雲幾萬重泛舟南湖二絶句寄公秉二首路轉芳洲面面風囘環慙媿刺船翁畫橋東北桃花塢時有飄紅落酒中不知芳物過春風傲兀扁舟怯浪翁得似王猷剡溪上何須范蠡五湖中木芙蓉誰染輕紅皺萬囊靚如妆面照寒塘蜀葵千葉仍陪菊芍藥重臺更耐霜湖上口號三首綠荷深不見湖光萬柄清風動曉涼莫恨紅葩猶未爛葉香元自勝花香湖上清懐各自知涼風吹我獨依依吏曹姑去母催我待得臨流弄月歸柳色映花春岸北人家臨水畫橋南囘舟欲向東城望恰似清溪玉鏡潭六月二十日湖上四絶句蓮的紛紛玉手來欲攀蓮葉巻狂盃氷漿未見菱腰折珠實何時芡觜開紅蕖白藕滿平湖曽爱新梢玉不如今日水深那可得野人盤上欠香蔬氣候淒炎傾刻中晚來宜此一樽同乍収荷葉蕭騷雨便得蘋花細碎風濃雲忽忽遍天圍四靣涼風弄客衣霹靂一聲湖雨白魚皃驚没鷺狂飛雪中次韻王鞏廷平四絶句此時遙憶子猷家幽興應思剡水涯未向東風見瓊樹且傳春色贈梅花漸飛大片紛如靴更撲驚風亂似麻為謝妻孥衣但典莫愁米貴酒難賖簷邊騷屑竹聲乾爐畔龍鍾病骨寒坐想蘭歌傾桂酒清虚堂上有餘歡原注君之西齋袁安秖有高眠興謝眺空傷後㑹難十萬健兒春瘴近飛花宜過海南山平原君徒稱舘舍三千客豈捄長平百萬軍焉在平原多得士功名翻屬信陵君信陵君客趙忘梁久不歸先王宗社若巢危歸來未乆秦人入魏國存亡亦可悲甘羅甘羅徒挟虎狼威入趙安能策是非大扺諸侯畏秦爾一言輕得五城歸汲黯汲黯剛純社稷臣張湯巧詆更平津賢人所貴忠邪異惜對君王論未伸次韻龔諌議輔之同遊靈岩寺琳宫仙老鬢雖霜不厭山頭石徑長杖履更為他日約姓名聊記舊碑旁戲李質夫曽醉江梅爛漫時北郷寒冷見花遲知君獨倚瑶林賞不向春風贈一枝再贈李質夫贈春須記折花時坐恨江南信息遲還向瑶林主人問東風應傍去年枝絶句日日新詩出錦囊清言飄洒句琅琅幕中病客疲酬報走馬真難伴放羊東郊次韻噐資子開六絶句幾年空有憶梅詩常恐江南驛使迷慙媿一枝償病眼春風須勸笛聲低刻玉沾酥三兩枝霜空林杪早春時蕭疏仙骨閒相並緲縹幽香冷自知江南詩客兩仙才㩦手東原賦早梅瓊樹令人常願見還家何事更徘徊右見早梅五日重來躡馬塵此君時節已殘春吹衣拂靣寒猶峭誰道春風似故人悄悄輕冰斷水涯欣欣羣木蔭人家春風巧思無尋處紅白青黄各自花昔年花卉爛春林今日重來老病侵歳月漫為流俗歎行藏誰見古人心右謾成九月十八日離魏都寄内二首南鴻無計與同飛鴻翼翩翩我馬遲若過平臺寄家信為言今日是歸期肅肅霜風吹客衣客懐多少寄金徽到家細説淹留事應笑蘇秦困始歸寄倩近時頗少飛鴻信幾日應占喜鵲聲相見便須持寳鑷為翁衰鬢摘霜莖題齊已草堂一曲流泉對草堂何人與續帳前香清詩自共秋風老依舊鍾聲送夕陽忠肅集巻二十
