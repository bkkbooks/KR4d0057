body:
  text: 忠肅集巻十宋劉摯撰序荆南府圖序江陵府于禹貢為荆州于分野為鶉首于辰為巳于春秋屬楚為郢都文王自丹陽徙之于秦為昭王所拔徙置南郡于漢為荆州武帝置刺史治于此于魏其地為呉蜀所分而荆州之名南北兩立魏治南陽呉治江陵晉以荆州治南郡梁湘東王繹承號建都尋為元魏所陷隋大業為南郡唐平蕭銑為荆乾元元年置節度使上元中為南都天復中以髙季興為留後梁祖授以節鉞尋通呉蜀築城壘為僭竊計後唐荘宗封南平王季興卒子從誨嗣誨卒傳子保融融卒傳弟保勗勗傳融子繼沖五世通五十七年而皇朝一天下建隆四年沖納土趨覲闕下移鎭徐州府境東西五百五十里南北七百五十里領江陵公安監利建寧石首松滋枝江潛江八縣主客戸總五萬四千夏秋賦租通四十二萬三千貫斤石束匹兩府縣官六十四員牙吏若干屯兵三十五指揮外城周十八里二百一十六歩濠深一丈二尺闊二十五丈子城周四里三百一十五歩倉庫場務内外五十八左右廂八坊巷五十四橋梁内外六十六江湖四十七祠廟七十一宮觀二十七寺院五百五十漢地志曰楚有江漢川澤山林之饒民食魚稻以漁獵山水為業隋志稱荆人勁悍決烈蓋天性也然地據上流故三國爭之而民苦于兵自唐至徳以後中原多故鄧襄之民與兩都衣冠多趨荆楚故人物始盛乾符以來遂為戰巢高氏于兵火瘡痍之餘招徠撫集數十年間逮為王民歴太平者又逾百年教化涵養安佚而富庶凡浮江下于黔蜀與夫陸驛自二廣湖湘以往來京師者此為咽喉又兩蜀之人出而宦游者多家于此是以今最盛為西南一都㑹其游觀獨龍山渚宮號稱勝地民間不務畜聚不幸小遇乾溢往往轉徙而瘠其人尚鬼病者先巫後藥其亦習俗所安歟暇日繪府為圖因題其槪治平甲辰觀察推官劉某序文瑩師集序文瑩喜讀書才思清拔博知世故久以詩聞于人而不知其始何為落于方袍中也夫萬物受材分于天者必皆有職若瑩者失其職矣予以嘉祐三年識瑩于荆州後八年治平之丙午也予入荆州幕而瑩亦在旣别去又三年熙寧之壬子予南竄復遇于長沙是歲遂訪予于衡陽蓋相與周旋二十年之間其詩每見而每精嗟夫瑩老矣以其平生之所學與其高明之才旣皆無所用于世而一措于詩宜其所得如此豈所謂詩待窮而後工者歟雖然其辭氣象巧尤不覺其為窮人老夫之所作是可喜也自翰林鄭毅夫為其集敘而其後至于訪余也又出若干篇以為後集曰為我題之而其作猶未已也昔滄浪蘇子美嘗稱其作曰篇篇清雄有古作者氣態而鄭公之叙曰不類浮屠師所作以為往往似杜紫微二公之言如此為天下取信余尚何辭哉獨書其所以與之離合之故致余意焉癸丑夏五月題雜著興龍節疏律旋大呂氣應二陽聖運超期適契千年之命梵筵申頌庶憑諸佛之慈恭惟皇帝陛下合徳乾坤紹休祖考聖孝能饗昭格三靈之歡璣衡當天光符七政之敘㑹開祥于虹渚度修㑹于祇園旅集淨徒繹宣密義憑大覺能仁之果效華封獻祝之心伏願衆聖儲休諸天融祉明堂之受神筴長佑寳圖天保之歌南山永綏壽厯壽聖節疏元春首祚靈月生明天地開陽肇發流虹之命聖祥膺運光符繞電之期紀是慶辰著為甲令書文所底動植交歡躬詣祗園前陳梵席香花惟潔鐘唄以時演龍藏之祕言極人天之幽贊庻憑妙果恭協聖期伏願睿算無疆常保天行之健炎符煒耀更同地久之昌坤成節疏歳徳在金長躔逾望篤生元聖符五鹿之開祥尊御東朝協千秋之紀節湛恩下逮歡頌舉同爰集祕章恭陳告祝伏願太皇太后陛下憑無邉之力建不拔之基益隆文母之尊永垂聖孫之養徳無前比非徒嗣太任之音治與古侔庶幾享三皇之壽春賽諸廟文諸侯祭其境内古之制也惟神以聰明正直庇佑一方所謂有功于民而應禮之祀春陽仲序歲事有祈祗承舊章以承貺施秋賽文稼穡之事民力固勤乃此有成實神之賜春祈秋報祭有舊章粢醴潔豐敬用昭告滑洲祀神文國家以正月某甲子推恩四方凡載祀典俾所在致禮焉惟神降依此方應是詔享粢盛牢醴旣潔旣豐庻幾欽承降福王室尚有報祀神惟歆哉祀諸廟文惟神盛徳在人休功及物並應典祀廟食此邦國家寅天愛民霈宥區宇俾秩時祀奉承靈休謹以詔書從事肆儀備物伏惟尚饗荆州祈雨文荆州田品居下而人不務畜聚使常得善嵗猶汲汲不能裕公私之充矧天不雨至于五月陂澤磽赤一種未入比者榖價已翔民駭然以相顧守土者愓然自省以為憂心雖憂之而雨不可以力致也雨神之所能為也今油然屢雲而膏屯不施或者重其徳待其有請而後與之耶豈特民一歲之望至于為牲牢粢酒所以承事于神者亦有繫焉應詔祈雨文謹以清酌之奠奉宣天子之意而致之于高山聖賢之神曰京師畿輔天下根本乃去年冬迨今暮春不雨不雪民心焦然天子仁聖咨顧憫惻並走羣望日徯罔應尚念神之主山川者有山川之守食其境内者有境内之責疑其有此分職而不可以奪之故又詔天下求神之未秩于祀典出處可以自得靈施休應民所依信如人抱道徳畜膏澤不在其位需時見求然後一紓非常之功以為國家補者俾以禮祀之今府吏民于是咸以神為言若夫驅移風雲飄忽變化朝夕萬里而轉災為祥此神之所以不測而震靈乗㑹以赴功之時也謝雨文比以旱熯為災有禱靈宇㑹未終日神意顧歆油然興雲霈然霔雨苗將稿而茂遂物旣瘁而昭蘇敢言克誠能速休應實神之徳相佑斯民謹涓剛辰躬具菲禮有祈有報祭之義也惟尚終始以厎有年祈雨文年榖旣粒螽孽未殄實由秋陽沴氣之所容養也又八月藝麥之候而行澤失時如炎如焚民駭相顧惟神食于此土不能聽其吁嗟為興雲雨灑濯之則吏與民敢怠昭事之報青州祈雨文維青丘帶山為地氣深土渴藝植之事天澤是賴者視他方為亟歲春將窮而時雨未霈宿麥旣苗將厄其長盛陽驕燥疾沴且興守土之吏不能率衆戚以籲于神吏則失職惟神操縱陰陽用贊化育降食此土休戚與同若乃時其雨暘相厥歲事則神之職又何失歟建壇祈雨文旱熯為災至于此極羣祀徧走膏澤尚屯今將求龍啓壇此地惟神矜惻農事鑒此至誠毋或阨龍不俾顧享苟獲多應神預有功請龍神文伏以元陽之沴粤自仲夏至于九月歲旱不免而此太甚夙夜以懼咎不勝執謹稽用古法以詔書從事繪圖靈象封牲奠酒祇伏壇次傾吐至誠蓋行天召雲飄忽變化一振甘潤以捄焦灼此龍之一戲足以不勞而神者其幸賜之敢忘昭報祈睛文二首春夏旱乾歲已無麥民恃為命惟指有秋稼榖芃芃度越常歲迺復滛雨將害其成率籲羣咨潔誠有請神食此土可無意乎曰雨曰暘萬物之命苟不適節沴其生成今澤氣乗春滛雨降雪害我穡事以及粢盛養民事神一歲何賴率呼衆慼乞靈于神謝晴文二首屬以雨溢害于農功即神以祈䝉被靈應天清日潤隂闢陽舒揫斂順成物得其性耘登播種人遂厥功惟神之庇佑此邦而愛是守土者其徳可謂終始厚矣敢忘恭報以侈神休比以春霖為害並走靈祠神意顧歆闢除隂沴陽功紓發日以烜之粒我來牟以及禾麥深惟長民守土何力其間猶能以粢酒牲牢仰答神貺有祈有報祭之義也祈雪文二首惟州之土壤白墳廣瀉水泉易消今歲日窮矣潤澤不至風霾書𠖇積燥所乘濫炎屢起守土者惟夕惕負咎然歲惡民病祭祀不能修則神亦將預受其辱敢固有請惟轉禍為福呼吸致功神實能之亦惟時哉方冬盛隂用事而寒氣不至時雪不降宿麥在野既無潤澤之養春氣相乘將有疾癘之變長人守土惕然憂心心既憂傷何所致力念民休戚惟神是賴爰走靈宇瀝懇有祈羣心嗷嗷日徯嘉應祭土牛文粤若自古為國事莫重于農耕有功于民禮具存于祀典土膏奮動天駟南躔爰攷舊章用祈純嘏惟神祐此耘穫屏其札瘥俾迓有年之祥以永事神之報忠肅集巻十
