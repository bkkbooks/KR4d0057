body:
  text: 忠肅集卷五宋劉摯撰奏議論役法疏臣竊以聖人之治雖一道無敝而道之寓于刑名法數者必有偏而不起眊而不行者聖人因時而變之變則通通則久以盡天下之利此五帝所以異制而三王之所以不同禮也國家承唐末五代熟爛之後祖宗創制造法趨時之宜順事之變雖聖聖相繼而其法令日增嵗損或舉或廢未嘗同也至于寧民適治所謂道之無敝者則未嘗異也神宗以仁智之慮達因革之數凡政令制度急絃慢軫大解而更張之故天下蒙其利然至于今殆二十年所謂偏而不起眊而不行者蓋復有之矣其事則非一而其大者則役法是也于役法之敝相為首尾而牽連當更者則坊場吏祿是也始者以繇役不得其平農民勞費故命有司議所以均弛之有司不深惟其故乃一剗祖宗差役舊敕為官自雇人之法率户賦錢以充雇直曰助役又曰免役自上戶至于下戶等從來無預差役之家一槩斂之蓋于賦稅科調百色買納求取之外又生此重斂嵗嵗輸納無有窮期古人有言平地無銅礦農家無錢爐今所輸必用錢而土所出惟是絲帛榖粟幸嵗豐收成而州縣逼迫不免賤價售之無以養其私若嵗凶則破易資産或以倍稱之息舉債于兼並以應期限更無減放之法州縣上戶常少中下之戶常多自法行以來簿籍不正務欲敷配錢數故所在臨時肆意升補下戶入中中戶入上今天下往往中上戶多而下等戶少富縣大鄉上戶所納役錢歲有至數百緡者又有至千緡者每歲輸納無己至貧竭而後有裁減之期舊來鄉縣差役循環相代上等大役至速者十餘年而一及之若下役則動役三二十年乃復一差雖有勞費比之今日歲被重斂之害孰為多少也今天下錢日益重貨日益輕民日益困矣若之何坐視而不恤也哉然則前日有司立法非有意于寬役利民正在聚斂刻剝損下益上為國取謗大失朝廷惠綏生靈本意臣竊見繇役昔者有至于破産而民憚為之者惟衙前一役爾今天下坊場官司收入自行出賣歲得緡錢無慮數百萬以為衙前雇募支酬之直計一歲之入為一嵗之出蓋優有餘裕則衙前一重役無所事于農民農民既除此一重役外惟有散從承符弓手手力耆戶長壯丁之類此役無大勞費宜並用祖宗差法自第一等而下通任之比于舊制繇役輕矣治于人者事人古今之通義則安用給錢為哉坊場之法舊制朴戶相承皆有定額不許增擡價數輒有剗奪祖宗非不知增價之為公家之利也所以不許者知其悅目前之利必有後日之害故也新法乃使實封投狀許價髙者射取之于是小人徼一時之幸爭越舊額至有三兩倍者舊百緡今有至千緡者交相囊橐虛自抵本課額既大理難敷辦于是百弊隨起決至虧欠州縣勞于督責患及保任監錮係纍終無償納官司護惜課額不為減價則誰人復肯承買今天下坊場如此者十五六矣故實封增價之所得與敗闕之所失殆不相補也蓋財利可以通之而己不可盡也少捐分數與民共之則公私相濟其利長久臣欲乞罷實封投狀之法應天下坊場委逐路轉運提舉司將現今買名淨利額數與新法以前舊額相對比量及地望緊慢取酌中之數立為永額一用舊法召人承應庶朴者無破敗之患而官入之利有常而無失也吏祿之法天下吏人舊制諸路及州縣法各不同有鄉戶差充者有投名者有鄉差投名雜用者入仕之後既以案司之優重迭相出入以為酬折又積纍歲月有出職之望行之久逺人自以為便此時有司見禮經有庶人在官之祿遂假其説資以掊民殊不知三代已逺其事不可行于今日者多矣夫庶人在官之祿雖有其文而其法與數不可見其詳乃鑿空造端槩斂民錢給為吏祿不重之則不足以募不輕之則不足以給今內外之吏除重法人外其他每月所給無幾于吏固未足以有濟而官給所積天下蓋已不資無故竭民財而為此費誠何為哉至于所謂重祿以行賕法尤非義理夫一錢以上以徒坐之謂之嚴刑可也遂以謂吏懼而不受賕則臣不敢知也今主議者曰禁既嚴則吏必畏故令下以來犯者少臣以謂非犯者少敗者少也非敗者少正其罪者少也網之密則與者取者藏聲匿迹亦將避之去也故曰敗者少也一錢坐徒誰則忍之誰敢易之故苟有敗者若稍涉疑晦及自非有告人當賞則官司往往遷就平反釋重入輕若外路則雖使者亦或諭意州縣使之如此亦人之情也故曰正其罪者少也借使犯者皆敗敗者皆正其罪固先王制刑之所無而聖人所當矜慎之也吏受賄于律自有刑名而曲法者一匹以上至徒則刑亦不為輕矣今變先王之刑而重之又多賦吏祿以買法之行無謂也臣愚欲乞除熙寧以前舊法有祿公人並依舊外應新法所創及增給吏祿並行減罷臣愚誠不知忌諱今衙前之役則待之以坊場價錢弓手等役則均之以祖宗差法吏祿非舊法所給則皆罷去應役人糜費私役之類則禁之以熙寧新法苟如是也則所謂免役錢者于是可以一切蠲除矣或謂免役錢籍于常平固非獨以待募役也縣官他費多有賴乎此則未可以利害論也臣以謂役錢領于司農非有特敕未嘗以給常費今罷去無損于國用況祖宗以來至于役法未改役錢未斂以前百餘年間不知何以為國也亦曰用之有節則取之有道矣今天下百姓疲筋骨忍飢寒冒鞭笞終歲急急為公家納錢爾不幸有連年災荒之變實恐窮苦之人流亡轉徙為溝中瘠而強梁者賒死忍命不淂為陛下之良民矣然則役錢乃生民性命天下安危之所繫奈何欲以為不刊之令哉古者富藏于民誠令百姓賦稅之外有以自養則其贏餘乃國之外府緩急取之而已無事之時坐困竭之非計也臣故以謂役錢宜一切罷之役錢罷則提舉常平官司亦可罷去以現存職事付之轉運司足矣天下既減罷監司數十人則州縣稍得從容上下省事非小補也雖然此大法也顧臣之言蓋其略耳至于法之纖悉或參差抵牾宜有畫一之論欲乞于兩制臣僚選差明于治體深于民事者三兩員置局講議裁立條格于三省執政官預領之以待聖斷施行乞置局議役法疏臣伏覩今月七日敕節文天下免役錢一切並罷諸色役人依熙寧元年以前舊制委州縣定差者命令既下中外人情鼓舞歡喜皆謂此一事為害最大從來百姓日夕延望今陛下一旦行之救其困苦天下幸甚臣竊聞令下之後姧邪之人論説紛紛造作浮言意欲搖動其事不知陛下察其然乎蓋今日廟堂之上侍從之間其人多以新法而進至于外之監司亦皆由新法而選今法既更改則其心皆非所欲故誹議熒惑欲幸其失而不能成爾敕命內固有小節與舊法異同及措置未盡之事緣已命下指揮許州縣監司申明利害擘畫自可候到日修正立法今來改免役為差役乃是大體也大害已革譬如疾患之人病根已去其他氣體未和當徐徐調養之而已臣恐上下觀望之人指小小未圓事件張皇鼓扇伏望皇帝陛下太皇太后陛下堅持此意力行無疑勿為異論所動候臣僚及諸路論列到未盡未便事理乞付三省類聚參詳為法內如有合先次施行者即乞隨事先賜處分乞罷百姓實封言役法疏伏覩今月四日敕節文在京差官詳定役法奉聖旨諸路且依二月六日敕定差仍俟近來指揮到日縣與州及提舉轉運司各遽限兩月體訪役法的確利害保明聞奏仍令逐州縣出榜許舊納免役錢今來差役人戶各具利害實封自陳縣申州州繳奏臣竊以免役錢之為天下害也久矣陛下一旦罷去復用祖宗差法中外罔不欣快臣曾奏乞堅守差法大意力行毋疑勿為異論所動其有條目未完措置未盡之事外則己于前敕許州縣監司申明內則已蒙選官置局詳定今來敕命若止于展限則可也而其間命令有未安者臣于是疑陛下于此法之意似已為異論所搖矣且命令之出要在必行豈可卻云且行則天下奉承者豈不疑惑懷私之人豈不觀望又令舊納錢今被差者皆具論列緣四海百姓向來無不納錢則是竭天下之人使之實封議法則求言無乃太廣乎實封之狀州縣必須疲于遞送其達于朝廷者計須山積則考閲何時可遍而所謂差役之法何年可見其成也不知誰建此論者蓋欲為遷延之謀動搖之術不意朝廷從而行之甚哉邪説之可以移主聽也改免役為差役利害明若觀火易見也參差不齊在所修立者其大不過十餘條目而已今己選建官局但宜趣具畫一宣布行下夫法既先定如州縣奉行委有未便方聽依限申請然後隨事修完則豈不簡直易行而何用此紛紛以遂沮害之計召天下之疑哉伏望速賜契勘如已頒行即乞于敕內自仍令逐州縣出榜以下三十三字更不施行貼黃先王順人情以立政故政令之行自合于人情今設官建局以議大法但思所以便安于人可也何至遍問天下使人為之説此古今所無也天下百姓實封之議雜然而至將如何去取哉此止欲稽滯以生變不可不察請定役法條制疏臣伏見天下役人已復差法自置局以來未見修立畫一條制昨者雖有指揮令依熙寧元年以前舊法施行緣熙寧以前敕條其間亦有不可行者兼近降二月四日敕命自有與熙寧以前條貫抵牾相妨如役人正身不願者今來兼許雇人而嘉祐舊制耆戶長弓手之類並須正身充役臣不知現今州縣如何施行且繇役大者無如衙前始者改法一槩鄉差既而復以坊場等錢雇募未幾又改雇募為招募三兩月間命令屢變臣恐天下循用或有疑誤而異意之人有以窺伺臣竊料朝廷欲候諸路申請然後立法如此止是一路事件臣欲乞指揮先立通用役法條貫將近降纍次敕命大意為主畫一立法先次頒行若諸路有未盡未便方聽申明隨事别降指揮所貴天下先有大法可守不至乖戾取進止乞令蘇軾依舊詳定役法奏臣聞中書舍人蘇軾辭免詳定役法有旨不許又具辭免者竊以差役之法最合重事陛下欲使利害曲盡置局講求此甚盛德然自置局以來為日寖久未見就緒而議法之官頗已屢易今聞軾以議有異同力欲辭避人人如此則法度之成何時可冀乎臣聞五味不同而適于口者味相足也五聲不同而悅于耳者聲相備也一可一否一是一非雜然並作此議之所以同歸于盡一人曰可皆曰可一人是曰皆曰是信如此又何以議為哉議有異同正宜反復曲折相足相備以趨至當而遽為避就非獨議法難成使姧人乘之投隙伺釁搖撼法意非國之計也臣願深詔執事者毋矜能毋愎衆毋以小利妨大體使利害曲盡以稱朝廷之意所有蘇軾且令依舊詳定仍乞催促成就以時布宣取進止貼黃呂大防范純仁韓維皆為執政事無不領雖離去本局其責尚存軾若陳乞獲免則不復干預非大防等比論陜西河東儲糴奏臣竊見陜西河東昨以軍興之際調發猝遽所在倉廩支用耗竭今邉隙始開未為無事其所以備守之計食為先務兩路今年夏麥度越常時經畫儲峙時不可失伏乞速降指揮逐路轉運司廣作計置乘時貯糴然諸州軍昨經煩費帑藏蕭然若俟移用轉易恐成稽緩欲令除交鈔及本司調度應副外將諸色封樁錢物並聽逐急支用漸令收簇撥還其逐路轉運使副近日數有遷意往往未到本任兼又瘡痍之後經制事務不少可以權時添差提舉糴便官一兩員使專其事庶幾可以辦集緩急不誤邉計取進止乞體量成都漕司折科稅米奏臣準去年十月十八日聖旨指揮節文詔令屢下寬均民力近聞官吏不切奉行如尚有違戾委御史臺覺察聞奏臣風聞成都路轉運司將百姓稅米科折絹帛折之者輕取之者重每米一石二斗折納絹一匹民間米每斗六七十文而絹價每匹一貫七八百文當壅併限逼之際有至二貫文者又有送納退揀諸色糜費以此一路倍有傷困逺方之人無所赴訴甚非仁政惠綏萬方意伏乞指揮下别司體量指實施行論川蜀茶法疏臣伏覩陛下即位聽政以來嘉與天下休息于安治凡法令之弗便于民者疏通損益之官吏之弗良于政者罷免放黜之中外欣戴人人如被大賚然事猶有在逺方重地為害尤甚者則河北江湖之鹽法福建川蜀之茶禁是也數路之害同而河北江湖福建已蒙朝廷遣使亷治獨蜀之茶害未聞詔旨臣竊嘗博訪于知其事者槩得其説曰蜀地陋而茶之所出不過十數州而已始時人賴以為生今茶司盡榷而市之大約園戶有茶一本而官市之額己至數十斤矣官所給錢及以糜耗于公者名色不一如預借息錢驗引錢頭子錢村角錢稅錢之類費去常己過半每歲春官司預以劵給借錢糧必以牙儈保任之及輸入之日引驗交稱又牙儈主之故其費于牙儈者又不知幾何則是官于園戶名為平市而實奪之也園戶有逃以免者有殺死以免者已而其害猶及鄰伍欲伐茶則有禁欲增植則如市故其俗謂地非生茶也地實生禍也茶場司以茶為息始者息一出于茶也其後市之價愈下取之息愈多園戶不勝為之也故作茶日少裁足以應官額而己于是主茶息者議不獨賴茶而又為博易以充之也博易之事他貨百物貿販苛刻錐刀瑣屑無不為者依茶為名通曰茶息啇稅務坐視漏失歲課而不敢有所論也至于啇賈請算者平時便私散之州郡茶地今則一集于成都之都場髙其估以與之又總計平時所之州郡逺近道里之費入之故都場之取息又如此此啇旅之所以難行也官吏以息為功以功第賞既進官減年矣又以息額之餘錢使與胥吏牙儈分取入己日用市易法也市易賞之固非法也然其取息猶曰與民和市而茶之取息一用嚴刑重禁網羅致之亦為暴矣奈何均用一法賞之也今一任有分錢少者不數千緡而減年磨勘至有三十餘年者此何理哉法亦可謂敝矣而朝廷遣使未之及者豈非以蜀之茶法與熙河蘭會之經制相為用者歟蜀茶之利以給熙河蘭會者天下十之三熙河蘭會之費不止而蜀茶之害未可息也然熙河蘭會之費今昔宜有不同昔者事邉之外前有王韶後有李憲提兵革財用之大權朝廷捐金帛市租莫知紀極聽其自用不領于有司無所會計非徒私二家也于是依倚苟合之人罔功興事以利相市之徒公取公豫莫見其迹則熙河蘭會大費外又有以泄之者如此也今既制之于有司無二人者之橫蠧若又于邉計外凡冗名濫費一切大為之節約則蜀之茶可以弛其禁而所謂十之三者殆必可損矣伏望聖慈選使指考茶法之弊欺者會計緣茶公家所費與實息之數大減嵗市之額稍增斤直之價削納茶無引之錢以完養園戶裁官吏之員牙儈之數以省冗給罷息賞之濫分錢之弊以革欺幸而以其事與轉運司通治之如此則蜀民之困苦庶乎可以蘇也臣待罪言路既有得于人之言敢不亟請也苟以謂有助于用而不廢則何事不可為哉亦有道而已矣宋用臣未建此䇿以前不聞國用闕此二十萬緡也譬夫為人之子曰攘竊于人取財以養其親為之親者知其如此也顧利以奉飬而聽其為盜則可乎伏望聖慈早賜出自睿斷罷水磨茶場以通啇賈以飬細民以完州縣稅額以免農民永害而上以副仁聖惠綏天下之意取進止乞復錢禁疏先王之制錢幣也所以御萬物通有無而調虛盈人主之所操天下之利勢也鼓鑄之權一制于公上而下不得私之其發散交易流布運用雖積于公或藏于民轉徙出入之不常而要皆為縣官之物使不出于中國用爾是以銷毁之姧散泄之弊不可以無禁也天下諸路監冶所鑄入于王府歲亡憂數十百萬緡自國朝以來積而至此其數幾何謂宜公私沛然有餘裕矣然今都內之藏既不聞于貫朽而民間乏匱時或謂之錢荒此何謂也其故大者在泄之于四夷而已曩時著令銅錢出中國界者數及一貫其罪抵死立重賞以告捕而居停資給與夫官吏之失檢察者皆罪有差今熙寧制刪去此條而徒聞沿邉有每貫稅之之令利之所在民不憚于犯法前日殺之猶莫能制況遂弛其令哉使四夷不勞而獲中國之利以為利三邉之所漏海舶之所運日積一日臣恐竭吾貨財窮吾工力不足以給之而區區之算稅權其得失何啻相萬哉夫錢以銅為本銅之必禁前世固已有禍福之論今朝廷方增置錢冶而刪去銅令官之所積日益發散民間得以買賣肆為器用以牟厚利蓋非獨失銅而已也而又至于銷毁法錢蓋緣錢者私煉之己精其工費尤簡變而成器又有數倍之利然則既泄之又壞之欲錢之充溢不可校如古之盛理宜無有也故臣愚乞欲申嚴邉制以塞流散之路復立銅禁以蕃鼓鑄之本而息銷毁之患取進止忠肅集卷五
