body:
  text: 忠肅集巻十七宋劉摰撰五言長律縣齋歲晚寄萊蕪田同年原注數字直儒西北東南邑相望歎索居音塵路千里契闊歲三除薄宦隨羣衆平生媿拙疎茂陵將謝病中散不便書燕澤歸鴻盡東山晚雪餘江湖勞夢寐風土汚簪裾塵卷吾成癖囊詩子富儲孤懷吟劍鍔舊跡夢崑墟今古看毫髪功名賸贅疽何時拂衣去相與醉鱸魚渚宫坤腹疏靈境蓬宫抱故城清風百年内芳草幾番平樹色埋危屋湖光泛彩楹真游三島近仙界一壺清外慮隨塵隔虚懷敵水明松筠烟翠老臺榭緑苔生攲枕巫雲近披襟楚吹輕舟横疎柳靜橋卧晚波晴事徃空歌嘯人閒自醉醒我來真漫興魚鳥莫多情梁宣明二帝陵原注宣明二帝蕭詧蕭巋也初湘東王繹平侯景之亂即位江陵改元承聖三年兄之子岳陽王詧引西魏兵攻繹害之尋臣于魏而稱帝于江陵傳子巋巋傳子琮通三十年為隋所滅侯景淪江左湘東復有梁經綸鍾厄會禍亂發諸王忍死瞻姑熟尋戈起岳陽車書千里蹙符數百洲亡二主非神武開基挾北强中興乖晉睿慙徳肖吳光歴閏天餘氣蛙鳴井底鄉快心真噬腊覆手已牽羊臣妾隨三紀圭裘隘一方故都終契闊宗祀各悲凉雙塜留衰楚遺孫盛有唐神靈依古刹雲木抱回岡野火穹碑斷秋風蔓草黄樵童雍門歎繐帳魏臺荒天地雙車轂興亡一酒觴冥然無足弔幽思漫徜徉送李祕監代還天聖旁求盛明公射策賢三朝推國器一節到華顛卵翼千餘士冰霜四十年至誠忘畛域端已笑韋絃政愛偏東土民謳戴兩川旄飄外臺節貫朽大農錢松柏風霜後蓍龜禍福前求開建封幕又泛馬融船士望儒林丈官儀祕府仙仁能化鴞泮明不浚魚淵蔽芾人人頌京坻歲歲田吟春西渚殿醉月北樓天卓馬周侯覲三公漢守遷蜀江飛大斾魏闕望非煙賤子何為者名途秖偶然世高劉表幕才媿杲之蓮願借今難及遺恩久自傳鄰哉拱堯舜天下俟陶甄秋雨用唐誦韻大雨餘炎洗清秋爽氣回人情醒委頓物象救低徊牕岫滋乾翠田禾起旱栽雲空明復晦風縷密還開草合門三徑蛩緣壁四隈藥奩烘潤幞書几拂陰霾蓑底漁情樂沙邊客意催簾幃晨氣濕蕉竹夜聲來想見天開月行期菊滿杯端居聊可喜不用拂莓苔六月六日避暑山寺次蹈韻楚國元卑濕炎天更鬱蒸風吟同倦虎霄望劇愁鷹渴肺塵將岔流膚汗不勝噆肌紛暗蟆遶鬢閙飛蠅六月常難雨三湘不識冰爐烘一天地火藥萬川陵氣候金初伏襟懷水未澄高明尋偶得林麓遠同登此地聊幽遁危亭更上層泉聲懸嵽嵲松影轉觚稜汲井沈圓李緣池摘翠菱涼清生洞壑秀綠動溝塍佳氣西頻望鄉欄北屢憑有期羣野鹿無法問山僧雲石逢如舊巾裾見若憎聊堪優卒歲不愧俯捫膺和路秋懷三十韻天地炎氛退江湖顥氣凉西風來沆碭久客興徜徉夜匝鳥南樹心驚鴈北方乍因鱸感慨肯為鵩憂傷縱歩青笻杖投詩古錦囊精熒籬下蓓狼籍沼中香妙理晞莊逹衰歌笑楚狂是非來衮衮光景去堂堂别浦丹楓老閒園碧草芳林顛蟬嘒急霄路鳥飛長曉露清饒月晴雲暖䕶霜琴中知水意樓上得山光桂長金波外槎沿玉漢傍江天晚搖落澤國少凶荒竭作趨川壟歡言治圃場神祠鼓逓響社甕酒初嘗自昔悲時節閒愁滿肺腸宋生辭辨屈甯子意歌啇代謝惟寒暑平均彼昊蒼放情羣鹿豕度徳負簪裳致主深慙尹汪陂又愧黄無功可銘鼎有學不鍼肓賦興須潘子詩懷勗謝郎雖欣去酷吏更憶舞商羊不解葵傾日寧忘鶴返鄉錦封西澤鯉珠剖北山梁塞馬難前慮江鷗肯下翔無為澤邊悴更賣橐中裝朝野多閒暇洪纖遂樂康何時放歸櫓大艑水中央次韻跂蹈登䕶法院澄心亭昔泊銅陵縣重來跡可尋洞巖一指顧花谷記登臨歲月回秋棹江湖入醉襟魚籃腥邑市俚語雜山禽紫笋抽薑圃朱丸綴柿林長官誇樂歲游子足悲吟眺望春思曩疎慵老嘆今篷牕把書卧空此望澄心題和州雲蔭軒古木無年歲新亭托隱棲交涂寒纛整埀蔭亂雲低明暗蒼烟合深沈緑幄齊雨回陰徑外日隔畫簷西涼露緣虚滴珍禽占密啼仙家青桂洞隱士碧蘿谿覆冐均松葢妖穠笑李蹊坐疑秋色早境與世塵暌地惜開軒晚名因寓意題還當推大蔭天下一民黎城北庭邊草連沙白燕雲擁漢青將軍眠塞壘使者拜王庭金帛三千乗和親七十齡豺狼甘血肉騏驥老林坰秋色榆將落書生涕但零邊塵何日靖願一震皇靈次韻輅氏東亭書事四首寄隱無懷土為文倦解嘲地閒從草徧門靜絶人敲螳伏尋蟬捕鶯斜趁蝶捎楚冠誰問事越鳥自知巢罇酒欣常滿鄰書得借鈔援琴意流水彈劍恨空庖蘭徑深添菊蔬畦淨拔茅殷勤謝老圃善惡不相殽幽懷樂所遇且任北山嘲世事棊秤變年光石火敲松筠陰自冷蘿葛蔓相捎草密蛇横徑簷低燕露巢楚醪無再設蘄紙不重鈔旋買秔留客親科筍付庖靈山瞻二祖歸路近三茅塞上藏憂喜人心浪自殽朝夕此疎傲東亭無我嘲並城田鼓作鄰寺食魚敲樹密日先暝竹長雲可捎逺書惟鴈足小隱是鳩巢茶憶新團碾琴繙舊譜鈔懟時常笑屈投間實慙庖霜雪期松柏風雲富草茅周郎晚菘近有以代嘉殽自有逃虚樂徒興尚白嘲晚槐嘶意急蠧木啄聲敲犬傍青籬卧童尋赤棗捎微茫枕間夢安穩睫邊巢困憶石泉弄渴思冰蜜鈔襲香蘭入佩益氣芑充庖疏洗王家竹誅鉏宋宅茅東亭真可樂萬事付紛殽寄長蘆福禪師境與人相得長鯨宅海宫香花六時會心跡萬緣空地恐諸天接江從九澤通潮噴寺門冷霞拂殿簷紅暮鴈來淮北朝帆下浙東千重蒼桂霧萬頃碧蘆風衲擁山雲暖缾函水月融當年約蓮社何日謝塵籠七言律詩離冀州馬上示趙湜馬蹄輕滑背城闉廣陌朝暉健醉魂暑氣泛清憐小雨木陰環翠羨名園宦遊淹薄風塵熟時事侵凌耳目昬獨有空愁慵病客肯來吟嘯伴南轅紀南道中望荆渚地經三國鬭龍蛇江勢天形控蜀巴藏雨鳥歸荒冢樹採金人聚淺壕沙子囊城廢今秋草高氏宫遺昔井蛙倦客詩情真劫刼得于鞌馬似曹家雙橋危橋相向翼高堂歩歩行空跨石矼漢外夜驚靈鵲度雨中秋臥綵虹雙烟開從此瞻瀛島路逺何時過楚江記得扁舟緑楊岸畫欄朱柱對篷牕將至監利先寄王令屈指中秋六曉昬大堤叢竹見霜筠原注夏中奉有堤竹成叢之句未乾醉月題牋墨隨躡還家走馬塵撫景敢嗟經歴倦軒眉頻喜笑言親明年各是東歸客羊酪蓴羮萬里人監利泛化丘湖遂至北洲寺淼淼平湖闊楚江方舟兩槳破秋光罾風釣月嘉魚國飛雨翹煙白鷺鄉故老昔能悲岸谷騷人今但愛滄浪北州更有忘歸處寺壓蘋花千里香馬上和王監利見寄兼簡鄒澤民憶昨西歸春未窮重來堤竹已成叢川塍足水稻齊揷霖雨漲江河欲通一馬久期均物理雙鳧安得快仙風故人況有瀟湘約應喜樽前笑語同原注二君江南故人而澤民亦見約會于邑中高唐孟延年明府見招公幹方吟簿領迷浩然詩句慰相思壯懷已有潘毛歎陳迹猶懷漢佩竒塞下書音稀鴈足江南秋味憶蓴絲祝君多種官田秫欲趁淵明釀酒期原注來詩有鬂絲之句及道昔年金明勝遊招鄒澤民日借西園放客愁忘機魚鳥分相投水深碧沼前時雨風滿高臺六月秋蟬嘒已驚移節物鷗羣何事亦沈浮煩君試拔塵埃足來伴元生漫浪遊次韻鄒澤民感事河湟蟣虱玩天恩餉饋驅馳不足論陛下至神收廟算諸公何術偃戎軒凱歌計日登宗祀歸將驚秋望故園賤士江湖真碌碌狂吟無以謝乾坤清明日至潛江馬上先寄王炳之陳子正桃花飄泊萬紅英獨佩詩囊傍水行二月東風撩霰雪峭寒天氣作清明病懷敢有賢勞嘆壯志徒因節物驚罇酒喜親陶靖節經幃仍近董先生原注子正説春秋五月十日發俞潭先寄王潛江雨過長風吹野塘水深川路白泱泱人如澤畔窮吟客天似江南八月涼陂下臥輪車乍歇田間鳴鼓稻齊秧長官應為斯民喜准備新詩賦萬箱戲呈詩會諸友郢樓吟倡近蕭疎椽筆貪抄未見書原注澤民近多傳書拙客懶同嵇叔夜原注謂也少年文愛馬相如原注彦修直夫頗聞㑹賦夜涼燈火心親古秋老江湖興起予欲整羸師尋戰地清風無使舊壇虚月夜即席次韻天帳空虚碧玉寒露華應滿漢宫􅌉十分月上星光掩四坐詩成醉語闌楚渚鴈歸驚客恨庾樓風靜足清懽一年惟有中秋賞銀闕鼇山夜未殘次韻直夫喜與炳之㑹莫悲人事轉秋蓬但使樽中酒不空尺蠖屈身今我倦南鵬飛化昔君同原注炳之余同年天晞殘雨偏宜晚堂壓寒溪賸占風合繼回源書讌籍楚山堅石盡堪礱次韻炳之河亭風拂藍溪舞翠綃庾郎池樹旋誅茅春蘋初見香生葉夏果重來子滿梢淥酒不空期霰雪清談為樂敵絃匏塵埃久負江湖志徙倚朱欄祇自嘲寄鄒澤民祕校去年樽酒共論文一别西園跡已陳終日城頭憶王粲清吟澤畔似靈均懶書已負交朋責滿秩初湔耳目塵萬里江風秋思近歸心聊復借鱸蓴送楊祕校大檣雙櫓換巴船美滿西風水接天蘇子意飛黃鵠外梁公心在白雲邊蟹肥采石秋霜足酒滑湓江夜月圓綵服拜親無限樂幾多幽思入新篇别田延年王潛江才非王粲入荆州淹簿三年已倦游疎世自甘時不與論交有得子相求學知所樂輕文繡言至無瑕絶悔尢大舜簫韶方九奏佇看靈鳳出丹丘次李秬新秋韻二首雨晴涼意日相親物物秋容絶㸃塵滄海誰期泛槎客西風先傍憶鱸人收還志業圍棋局分付光陰漉酒巾欲約一罇清夜話月中涼露滿松筠風驚梧葉覺秋還萬丈歸心到北山已許生平江海上坐求功業簿書間頗聞都䕶刊銅柱更喜將軍入玉闗朝野清明無一事相從那使酒罇閒次韻李中舍秬秋雨三伏方中火欲流陰霖匝月氣爭秋坐愁屋底須持葢聞説田間可漾舟狂草滿庭泛戢戢濕蟲侵戸聽啾啾獨于水部添詩思坐滴空堦興未休次韻酬李秬公幹長迷簿領書渥言那似阮元瑜闇投子有夜光璧次報吾無明月珠急景壯懷悲劍鍔西風高興夢蓬壺勉强豈使今慙古元白鄒枚亦此都出都二首兩槳東飛下大梁樽罍漂泊過重陽江湖常恨連年隔羇旅寜為萬里傷淮寺月寒蘆颺白楚林霜早菊迎黄篋中諫紙餘多少盡寫新詩入錦囊重入修門甫歲餘又攜琴劍反江湖乾坤浩浩何由報犬馬區區正自愚緣熟且為蓮社客伻來喜對草堂圖西箱屋了吾真足高枕看雲一事無初發梁澤蒲側荷翻小雨收鱸蓴高興滿扁舟雲稀樹色偏宜晚天借湖光賸占秋孤鶩落霞閒上下紅蓮白鷺各風流此行説與同樽酒南國江山盡舊遊金陵月滿扁舟久客懷石頭城下暮潮迴霸王基業從吳始人物風流自晉來大抵險深輸道德于今榛莾蔽樓臺吟毫千百年間事賸寫江南庾信哀南喜寺天監禪僧此結廬石頭高士有遺居樓飛縹緲巖腰峻庵靜崢嶸閣道虚雪後桂花香澗谷春寒松霧滴巾裾山中物色吟雖苦盡是詩翁掇拾餘靈巖寺先望巖端金碧明久穿葱蒨踏崢嶸山疑圖畫曽經見地喜生平所未行隨處石泉春渇解上方雲屋夜寒生主人著意開佳境無負千年四絶名連年徃返水陸萬餘里今自鄉中挈家南來已至江州行徹險阻喜而作詩寄之亥宫驛馬歲翩翩又作離鄉路數千拔宅今為大去國出災休算小行年訪尋前日停舟地催迫窮陰舞雪天屈指還家已無事便應調拂武城絃舟次再寄小孤風順水安流湓浦欣聞已繫舟幾日亭中折竒樹從今江上解離憂客心歲晚驚催櫓雪意天寒入倚樓東圃梅開酒更美團圓無復越鄉愁岸次見梅花不果折武昌江口見江梅紫蕚瑤芳取次開窮臘雪寒新霽後滿枝春色為誰來坐嗟隴首無人寄莫使城樓有角哀猶喜東風慰岑寂暗香時許度蒿萊自衡嶽至福嚴寺二首曉指禪闗入翠屏烟嵐金碧旋疎明旁看陰壑溟濛失斗上雲梯傴僂行漫興獨于元子愜詩懷容與謝公評區區出處勞分别朝市山林各有情俯仰巖谿萬仞臨恨輸飛鳥極高深青雲平地人難到流水殘花路可尋稍覺衣裾侵小雨漸聞鐘磬下遙岑丈人不厭頻來徃欲作香山得二林福嚴寺呈貫之少卿并諸禪老眼熟林巒認舊緣耆闗峯北入霏煙雲房直上三千尺蠟屐重來十五年山奥坐能朝萬象地靈深自接諸天暫游久住均如夢社客何須約白蓮至福嚴寺得鄒耒陽書因寄盡室攀蘿入五峰峰前金碧寺飛空山當星鳥離方鎮地闢天龍海上宫喜我徜徉泉石外憶君辛苦簿書中登臨樽酒無因共半夜題詩寄北風欲登祝融峰阻雨呈少卿霧雨陰冥萬壑蒸五峰當面失雲層愁如藥使迷蓬島路似仙溪隔武陵已認神靈憎俗客欲將魔障問巖僧勞公為我祈昭聖暫借扶桑白日升贈南嶽董少卿二首原注師道貫之管南嶽廟再任身在南山非隱淪閒中官貴異風塵清泉白日預何事華髪綵衣今幾人虚室圖書忘歲月壽筵香火祝君親朝廷不以忠移孝又説恩函拜命新世人行止兩怱怱公獨榮親禄隱中清職正同香案吏曠懷都似漆園翁南陵蘭茂晨羞潔内鼎丹靈老頰紅雖喜論心慰遷客區區安足識冥鴻贈黄少卿二首仙翁來自太常班再乞林泉捧詔還養志秖為華髪戲無心宜共白雲閒一樽未厭塵中客雙屐同躋雨後山為寄東宫舍人語五峰新句兩難攀攜笻得得訪雲闗恰值東湖賀監還泉石主人元好事塵埃游子暫偷閒心輕齊組知靈運文滿浯溪服次山秖恐東風喚歸棹江頭楊柳已堪攀少卿送酒肴至山中十里傳書厚意將珍肴醇酹寄山房定知僧舍饜疏食更欲雲巖有酒鄉一飯常聞淮上報獨醒徒使楚人傷攜持明日到峯頂試揖浮丘共此觴次韻貫之見勉冐雨至後洞狂電驚雷曉未收春雲能䕶洞天游徘徊已盡剡溪興祕怪難探禹穴幽彊勉更須勞屐齒龍鍾何憚過山頭從今功德應圓滿厚意成人豈易酬又次韻已踏雲梯上翠岑洞中聞説更幽深夜驚寒雨生瀟洒愁起孤猿助嘯吟白日昔傳仙可學青天今笑夢難尋故應清興無時盡肯為淹留折此心登祝融峰題上封寺二首磴險梯危路忽窮勝遊須到祝融峰九千丈外雲間寺一萬年餘石上松引手莫高疑觸斗臨池毋久恐興龍此山惜與中都遠未得君王檢玉封寒風吹腦赤霄邊飛鳥猶難到絶巔下見人間又成海恍驚身世此何天巖腰半白春留雪僧面多黔日冐煙我亦淮南宗姓後舉家應合到神仙貫之自嶽先還衡陽示詩見别次韻奉和雲壑登臨杖屨隨狂歌清醉樂忘疲拍肩正賦遊仙曲回首還吟陟屺詩春草便驚南浦别壽觴應慰北堂慈區區流水高山意常有孤音託子期忠肅集巻十七
