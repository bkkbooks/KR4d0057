body:
  text: 忠肅集卷一宋劉摰撰制敕元祐三年御試進士制䇿朕肇膺駿命涉道寡昧懼無以奉承太母之慈訓而彰先帝之休德夙夜以思樂得天下之忠言嘉謀庶以濟兹今子大夫羣至在廷朕甚嘉之蓋聞天之災祥以類而至古之善言天者能推斯變以應斯事若合符節粵自去冬大雨雪至於春二月不止人大失職廣罹凍飢殍死者衆夫恆寒之罰久隂之異必有以召之其故安在朕為政於兹四年蠲天下逋負輕征而散利苟可以足下無不為者而民力猶未裕也捐金幣之厚廓信義之庶以安邊柔逺而戎心猶未革也豈所謂至恩者未可崇本務歟特施設之序或失其當歟官之流至多門也舉天下之闕不足以居其人財之費至無藝也量天下之入不足以為之出將革之乎或疑於傷恩將因之乎懼無以善後必有至道未燭厥中先王之時上之隂陽和風雨時下之稼穡茂衣食足官簡而士貴財通而禮行四夷欵附邊場安堵又何修而至於斯歟夫切而不迫緩而不迂朕非求空於言也蓋將考而行焉矣其悉心茂明之元祐三年御試特奏名制䇿朕觀先王之時道德一於上風俗同於下家有孝悌鄉有忠信人人知禮義之守廉恥之行其進退斯有制取舍斯有分雖虞人也招之非其物則不往雖乞人也豫之不以禮則不受習俗既成施於後世雖世衰道喪勢利出其前禍患臨其後而終不以易節故其姧雄或為之屈寇盜或為之避彼上之所以養之與士之所以自養者何道而至於此國家昭德塞違示人以不爭信賞必罰示人以好惡學士大夫莫盛於斯世然所謂道義重則輕王公志道修而驕富貴風之所被使貪夫則亷薄夫則敦者其亦有是人乎朕欲使仕者不獨為貪學者皆知為已所以厲其節與其志蓋有道子大夫必其考古之所宜施於今者著於篇元祐六年御試進士前䇿朕聞六藝之教同適於治而禮樂為急制中以節民情導和以養民性政行斯二者刑防斯二者四達而不悖然後上下輯睦之一乎中和兹二帝三王所以昌也先皇帝悼道之鬱滯建官設屬以討禮文足雅樂必自郊廟行之朝廷以風天下規模宏逺矣而美意未終澤不下䆒朕奉承遺烈夙夜興寐嘉與宇內臻於斯路今夫下之俗分守不明僭侈相勝家自為禮人不知樂自學士大夫齊人編户率以其意從事故是非生於貴賤隆殺繫其富貧風俗流溢和氣弗兆昔者聖人雖未制作必因先王之禮樂宜於世者用以教化是禮樂之於天下不可一日緩也今頗欲考古今之宜剖經史之義立為昏姻喪祭之文器服宫室之制隆雅頌之聲斥優侏之音使習俗知節謬戾不作建中和之極以述成先皇帝鴻業而其損益先後之序朕不敢知固以待周詢而博訪焉子大夫以為如之何而可或謂解今之法而更張之民將駭而難從姑因循其舊而徒加厲禁又終不足以合乎先王之法度然考古便今必有中制焉昔漢修三雍行大射調八音聽樂均號稱永平唐損益曲臺制度亦盛於貞觀開元之間采其遺意概之先王之法其亦有合於今乎不然史家所載前代之跡粲然具存要必有可言者至於賈誼劉向其論深美而不見施用房遷林如晦達於為政而不知禮樂其失安在乃若節文度數其詳則有司能言之非所問子大夫也其推古今之所以廢興與施於當世而宜者著於篇奉敕擬上皇太妃冊文並繳進劄子臣准敕撰皇太妃冊文臣詞學鄙陋不能鋪紀皇太妃休德盛美上稱詔㫖勉强以成冒塵聖覽臣不任惶懼愧汗之至謹具繳進以聞謹進維元祐二年嵗次丁卯某月某日皇帝某謹再拜言曰昔我神考迪祖宗休德孝以事親正以御家而天下化之方是時皇太妃實左右內治以柔順誠敬奉事兩宫以仁淑勤儉綏帥九御受祉上帝篤生沖眇以顧以復以濟及兹俾獲紹統序欲報之德物無以稱竊惟人君之行莫加於孝而孝雖四海九州之責莫大於顯其親之名矧我神考厥有訓命豫末小子敢不敬之兹用稽合犀志恩與義稱不勝至願謹奉玉冊金寶上懿號曰皇太妃恭惟皇太妃於詩書所載輔佐之道施於家邦者備矣宜膺典禮丕顯徽懿上焉寧承崇慶隆祐之尊下焉保安持盈守成之子永懷多福光照無窮某誠歡誠忭冉拜謹言表賀英宗皇帝即位表祗膺先志昭履慶基凡在覆臨舉深欣戴伏以皇帝陛下睿智天縱聰明日躋迪靈源之休祥抱五聖之仁孝昊穹眷命主祀鬯以承祧正統傳歸大帝華而協德離重明而繼照乾六龍以御天化政光華三靈泰定舜盡循於堯道武能廣於文聲宅后膺符協謳歌之所載守成保極與天地以無窮賀神宗皇帝即位表順承顧命寅踐丕圖大號四孚萬方一慶恭惟皇帝陛下幾神明哲性德靖淵佑民作君宅天衷之所相守道繼體一神器於有歸璿璣察而七政齊聖人立而萬物覩光符厯數之在丕協人神之依亶矣紹堯蒸哉下武潤色大業作者謂聖而述者謂明守成太平傳之無窮而施之罔極元豐八年賀即阼表祗若遺訓嗣膺太厯詔命所逮罔不慰幸伏以皇帝陛下聖質天授同符祖宗帝統有歸萬世永賴正位之始四海欣歡賀立皇后表椒房懿德寶冊降𠂻慶溢宫闈歡騰宇宙竊以握乾垂統必資助於坤儀理外宣風示光成於內治母儀斯備婦順以明稽合舊章懋隆新制恭惟皇帝陛下纘承丕緒紹復洪圖踵遐武之重光措函生於纍洽先乎民物明王者之至公及於閥門著天下之大義惟皇立配體國承家載嗣徽音將以正心而逮下不加崇號無以示民之有尊誕賜洪名榮褒淑德然家人利正講聞羲易之辭而君子好逑載美關雎之義自古所重於今足稱位定壼中化成天下賀安南捷奏表威靈所被萬里收功凱捷布聞兆民賴慶臣聞聖人之於征伐也用非得已先王之於寇敵也威然後懷物萃聚而除戎時豐亨而致法蓋方飭治之既備故苟犯順而必誅虞帝所以事有苖之征宣王所以有淮夷之伐監此前載率於盛時恭惟皇帝陛下剛健體天休明超古萬方順以無侮三靈和而允懷曽爾交蠻於我天討跳齧肆於南土䖍劉及於數州不示大刑曷懲不軌軍聲振疊肅如金鼓之下天皇澤漸濡澤若雲霓之救旱俄㷀然而請命因示之以好生惟盛德所以成無戰之征惟至誠為能有不殺之武出車薄伐既奮蠻荆之威徯后來蘇行奪西夏之氣海隅大定氛䘲一清赫然盛勳若無前古謝監衡州鹽倉表議令獻言知典刑之無赦原心觀過荷仁聖之有容貸其餘生處以善地伏念臣禀生艱拙遭世盛明學不能窮理而知幾材不足趣時而適變晞名途以孤進濫文館之末遊和鉛何功索米逾嵗間承人乏偶攝掾於中堂旋誤聖知使備員於憲府仍職書林之舊就行御史之中始自愚臣前無故事方陛下繼承於五聖而國朝平治者百年力勤肯穫之田大解不調之瑟搜拔羣材而審以器變使化百度而曠然日新臣於此時職在言路誓殫忠義敢避勢權寧以孤暌訏切咈衆而身危不忍從容倡和負恩而速進狂愚自矢裨益無功故宿官之日幾何而瞽言之罪非一至如均民而弛役因之率户而出泉雖慮始樂成者愚人之不知然損下益上者先王之大戒輒條十害冀補萬分議臣見疑以為敗謀而亂化清衷獨見知其有責而盡忠特徇以誠止容其去褫臺閣之二職置瀟湘之一隅有祿食使之存全有職事可以報效銜恩載幸揣分增憂此蓋伏遇皇帝陛下察臣孤忠全國大體不惜骫一夫之法庶幾留衆正之門謹當上體恩仁期於必報下堅節義死而不渝謝滑州到仕表去職逾年法初得調賜符出守恩賁過優內省叨踰竊深震懼伏念臣之所領地實近畿自昔漢唐之要津為今趙魏之孔道中間一廢新造未完河流方洪騁傳將至萑蒲之嘯間發輿梁之繕始興謂宜得王尊之獲民叔圉之治客消盜之術有如龔遂濟人之政賢如國僑乃如愚臣學藴昧陋資材濶疏幸遭睿明每備任使愚有餘故專於盡瘁智不足故無以自休所向多艱豈堪治劇單車䖍命使道疾馳視人郡章猶或驚異諭上恩㫖罔不歡欣此蓋伏遇皇帝陛下明道德以建太平修法度以熙庶政謂孤臣之多所慮取拙者之或能勤敢不祗力夙宵疾心事職况詔令明具止於奉宣德澤汪洋易於䆒達庶慮覆幬之祉小效涓塵之勞謝御史中丞表無非常之才被不次之命叨榮自省震悸靡遑伏念臣學誼朴疏禀資中下不佞薄聞乎大道竊思少補於斯民念事君者先立身故不為枉尺然守義而弗知變故未可與權孤負清時侵尋白首比者不遺於墜履使之冉冠於惠文無所建明謂宜澄汰忽起從於橫榻俾遂正於中司此蓋伏遇皇帝陛下迪德聖神紹休祖考仁心惠澤昭百姓而協萬邦大公至明開衆正而杜羣枉主張孤蹇付畀紀綱仲山不吐剛而茹柔汲黯願拾遺而補過期殫此節上報誤知上太皇太后謝御史中丞表粵自臺端起專憲席雖有故事曽無幾人何意孱愚遽兹叨冒伏念臣奮跡寒陋逢辰盛熙多厯嵗年每叨任使竊慕古人之所立不知直道之難行無補事功動罹罪悔朝錯之為逺慮或謂之愚潘嶽之冉免官皆由於拙復塵風憲滋觸怨仇方俟曠官之誅顧䝉越次之寵此蓋伏遇太皇太后陛下乾坤為德日月並明知臣至孤譽無聞於左右察臣所論意不出於阿諛全付耳目之司使冠紀綱之地任之隆則責亦重恩之厚則報敢輕誓竭一心無辭九隕辭免尚書右丞表疊上囊封願收恩檢誠言可信本期十百之見從天聽彌髙敢避冉三之有瀆伏念臣承學淺陋禀生拙艱難久玷於名途無可稱之官閥紀綱執憲愧古人直清之風帷幄行經乏名儒道義之益坐糜稍廪動畏譏訶已煩善貸之仁敢意非常之擢負且乘足以致冦名與器敢謂假人方陛下明道德以建太平修法度以康四海所與共此宜得何人自非廊廟謨明之才曷副廉陛都俞之託今顧及於至陋是將强其不能伏望皇帝陛下思國體之重輕在柄臣之賢否追選綸綍之命以釋氷淵之危上不纍知人之明下以息徼幸之望上太皇太后辭免尚書右丞表橫被殊恩擢居重任竭愚衷而引避邈宸鑒之未回疊降訓詞彌深隕越竊以進有德則朝廷為之尊任惟人故公輔不必備此古今之所同慎蓋治忽之所由生臣以一介之微遇四朝之盛比從末路驟玷中司志少戅而不渝言多迂而難用莫逃臨照日俟譴訶豈期尚屈於聖知更使參承於國論永惟綿薄敢犯是非身之傴而升髙將有笑者器既盈而必溢固其理然詎自愛於捐軀蓋深憂於纍國伏望太皇太后陛下慎重名器無以假人眷求審明與之共政庶各安賢愚之常分不至召中外之煩言特鑒至誠收還成命誓堅犬馬之志仰報天地之仁謝尚書右丞表傴僂至於循牆空稽授命號令難於反汗竟致叨逾撫心兢慙無地局蹐竊以國家建夫三省政事行於中臺稽古以董正厥官置丞以左右其長進陪四輔退率六聨若網在綱如車有轄苟任人之非稱欲興治以何由臣出於諸生藐然孤進外之更州縣管庫之任內之遍臺閣省府之游譽不足以償毁功不足以補罪為邦司直晚備中執法之員正色指邪慙無古君子之節方俟瘝官之黜敢期共政之圖幸有非常進驚不次比蓋皇帝陛下孝於述事以丕承祖宗哲於知人以允蹈堯舜物有可用菲下體而不遺積非以功薪後來而或上曽是孱瑣冒滋寵榮臣敢不以道事君以身徇國義之所在知無不為庶收銖髮之勞仰報乾坤之造上太皇太后謝尚書右丞表愚款既殫睿恩滋寵終奪匹夫之志遂塵四輔之班揆分遇涯當榮為懼恭惟太皇太后陛下以上聖之德撫多難之時聲氣不動而邪正分堂幃不下而華夷治所與同邦家之休戚豈不在股肱之二三宜擢異才以副公望臣學不造於道義智不研於變通惟是朴直愚魯之資安於所禀至於得失利害之際初不自謀謬長憲綱無禆經幄方且憂虞於大譴豈期超預於近司力小難勝器盈將覆此蓋伏遇太皇太后陛下宅俊以翼嗣聖至公以馭萬方謂孤臣之慮常深或能有達謂一人之材不備無求其全特出聖明之知不緣左右之譽矧由言路久輔政機昔之常所敷陳人將責其施設知之亦允蹈豈非甚艱言之必可行敢不自勉惟矢心於忠義以報德於生成辭免尚書左丞表竊以國之爵祿以待賢能士之進退必循名義有或異此何以示民伏念臣綿力薄材至愚極陋比䝉誤寵擢備近司乏宏逺之規模空銷疲於精鋭未嘗小補方俟天訶敢期恩憐更進位序考其嵗月則既非久次課其職業則又無顯勞倘輒冒居實干清議伏望皇帝陛下慎名器以厲在位明是非以正有功深察誠言許伸愚分無難反汗之命庶拯臨淵之憂上太皇太后辭免尚書左丞表寵厚恩深已憂於未報力小任重不可以有加敢過量以貪榮輒叩閽而䖍請臣誤遭識拔超置顒嚴慷慨大忠初不自量其孤拙低徊寡術今皆不出於尋常竊祿可慙黜幽是俟敢意包荒之度更推進位之恩况在官之日幾何而宿業之勞未著懼人言之一起纍國體之非輕伏望太皇太后陛下於輔弼必觀其心於爵祿必慎所與矜臣非矯僞之志免臣於顛仆之危特徇忱辭收遷成命謝尚書左丞表朝有虛位宜名賢是求名無假人乃次第而進危於據蒺愧若負芒伏念臣學不足與有明道未至於無固事君之義惟有愚忠涉世之疏真同强䀨安能謀王體定國論何以塞厚望稱明恩不狩獵而有貆久慙尸素譬江湖之集雁無繫少多未謫曠官更叨進秩隨增封戶之數並益氷淵之憂此蓋伏遇皇帝陛下紹休祖宗同德天地常體道以為用故萬物曲成不求備而與人故小材無棄致兹孤拙常冒寵靈敢不激昂大忠奮厲懦志庶有一得以補萬分上太皇太后謝尚書左丞表進位一等自訟於無功詔班十行趣使之就列恭於承命惕然為憂伏念臣足以謏聞暗於大體親逢聖運濫跡天臺出於流離孤塞之餘任以左右弼諧之責斷斷自守略無他竒落落難成空嗟懦志位髙祿厚功少過多方近輔之惟人坐期汰礫㑹左綱之虛次乃使續貂進其爵封益以户賦控辭勿固祗服若驚此蓋伏遇太皇太后陛下以任姒之聖仁即唐虞之休治知臣有忠於所事之節察臣無善自為謀之私容之以底其成進之以厲其志臣敢不以禮以義惟幾惟康庶收塵向之勞仰報生成之造辭免門下侍郎表勞能不聞名品益進懼必投於顛仆敢冒貢於誠情臣進德不强造道甚近逡巡尺寸之守遭㑹聖神之知久負丘山莫報之恩初無絲毫可紀之善粵參天政乃令驟至於四遷升置東臺所厯遂周於三省益髙股肱之任况備喉舌之句爵視上公邑增真食倘罔功而濫處實纍國以起羞伏望皇帝陛下如日燭幽體天成物察臣底裏之既盡矜臣器量之已盈特收誤恩以允清議上太皇太后辭免門下侍郎表發政西臺無禆於聖治升班東省忽霈於恩書揣分未安控詞自列惟先王制爵祿之等以待賢能而君子謹進退之方必循禮義臣起於寒晚躐至顒嚴獨恃聖明特達之知不緣黨友更相之助厯塵近輔更涉纍年愚於直者人情之易暌公而固者衆怨之所聚每幸仰䝉於善貸保此孤危豈敢更冒於誤恩遷其位叙上乖朝廷陟明黜幽之典下致臣子見得忘義之譏伏望太皇太后陛下慎名器以申大公明勸懲以厲百辟收還成命改授有勞謝門下侍郎表輔政備員久無功於右省冒恩進次預出令於東臺懇至傴牆終無反汗臣資藴不足拙方有餘雖心危而慮之深然力小而任己重謂之事道而有愧乎聖賢之方至於徇公或以負於天地之鑒士無可述聖有所姑保全已費於至仁叙擢更頒於異數况夙夜出納之地以侍從駮正為官授之非人凜若無地此蓋伏遇皇帝陛下明見萬物道御四海體貌之以厲其心馴致之以底其績敢不䆒事君之大義庶以報含物之異恩上太皇太后謝門下侍郎表才屢試而已窮位每遷而逾重弗容懇避徒積憂危臣力不逮心名常浮實猥以口耳之學遂玷股肱之司初不自量實拳拳於謀國迄無所就徒碌碌以因人此宜清朝汰斥之必加豈復要地褒升之敢冀矧今左省乃古納言審王命之允而復行受國事之成而不作均為執政尤號近司夫豈孱愚所宜叨冒此蓋伏遇太皇太后陛下躬任姒之德御成康之朝忘已之聖而資於愚取人之長而略其短吹噓成就至哉造物之難酬寤寐勤勞惟以捐軀而自誓辭免右僕射表揆席久虛治廷敷號猥及非才之録久驚羣聽之公敢冒至恩輒忘素守臣愚竊以論相雖人上之職得賢乃太平之基必先含德之老成或待逺方之特起伏念臣本由疏賤叨置顒嚴備數邇臣獲進帝王之說預聞大政顧慙禮樂之文堯作章而繼成漢分府以方重謂宜簡斥更辱延登夫褒德者天下之大公而竭節者人臣之常分念蚤塵於機要已久席於高華奚事屢遷乃能畢力威望匪重將取侮於四夷智略更疏無可言之十事苟從昧進曷慰具瞻儻選於衆而求之多出於臣之右者伏望皇帝陛下慎名與器以尊朝廷紹德選勞以勸臣下俯徇富平之懇曲成考父之名收還過恩庶允清議上太皇太后辭免右僕射表敷告於廷疇咨以位愓然驚汗浹於愧顔竊以師長百司位隆於端揆權輿大政地重於西臺進德則朝廷尊當賢則臣下服而臣學不足以斷國論才不足以達事經孤奉恩私稽留嵗叙處非其據者已久受過其量而莫勝方興引分之言冀逭妨賢之責敢期含垢更使代工倘懷苟得之圖妄作自賢之行公器不嫌於多取豈曰知難髙位必致於疾顚安能圖報上則詒盛朝之纍下則躐衆正之資伏望太皇太后陛下别擇臯䕫改圖丙魏登置宰路使秉國成大明庶物之情不奪匹夫之志亟收渙渥以息煩言冉辭免右僕射表辭受匪輕殫愚誠而自列訓詞申敕邈天聽之逾髙敢授稽命之誠冀鑒由衷之請恭以皇帝陛下以盛德紹天地以至孝承祖宗恭默無為方在持盈守成之日左右同體宜得秉道明義之臣如臣學術甚疏智謀弗競雖事君之義固守不移之愚然陳力以來初無可紀之善久尸官而謗積蚤多病而志銷當返田廬遽躋鼎鉉無楊綰之德必不足以化在位非臯陶之舉必不足以逺不仁徒召煩譏上孤渙渥伏望皇帝陛下念輔臣之當否繫國體之重輕特照孤忠曲全晚節敢還成命改授真賢冉上太皇太后辭免右僕射表微志未伸誠言難止倘獲安於名分其敢逭於典刑恭以國家之輔相難其人臣子之進退必以道蓋治忽之所由繫而榮辱之於是生臣遭㑹四朝周旋三禁感慨忠義常見古人白璧不為之非風采功名愧乏大臣巖石具瞻之望略無報效久俟譴訶遽聞猷告之音擢置宰司之重力不勝任實憂代斫之必傷傴而非髙將有指頂而見笑下招覆餗之辱上玷知人之明况有廟堂之耆明而多中外之俊乂改疇公望乃協師言伏望太皇太后陛下昭鑒至誠保全晚節使器盈者不至於溢植躬者亦足以支特反誤知庶無虛授謝右僕射表恭以周王之慎令不反惟行雖如安世之自量深辭弗得竟塵非據伏積內憂竊惟命相之難為邦所重粵五帝三代而後逮兩漢有唐之隆蔚然多賢昭於方冊惟皇盛世尤慎此官君臣賡歌今百三十載勳業繼踵裁五十二人上之職在理三光而調四時下之責以鎮百姓而遂萬物苟非選道德髙世之望何以紹今古得人之光如臣至愚於世孤進先朝過聽擢臺閣省府之華二聖誤恩置輔弼疑丞之地位髙徒聞於播惡德薄不足以尊朝功少過多怨叢謗積未詔士師之議遽咨端右之遷名與器是謂假人負且乘殆將致寇已循牆而至傴終渙汗以難安謂如臣宣為愚莫避漢廷之公議曰俞咨益汝往終非虞帝之命官危不自遑凛無所處此蓋伏遇皇帝陛下保龜鼎之重稽祖宗之謀體堯之在知人本湯之不求備臣敢不䆒事君之義厲報國之忠雖爝火無補於大明然駑馬可勤於十駕庶收塵露仰答乾坤上太皇太后謝右僕射表使節皇皇臨門而慰寵詔詞噩噩申命之丁寧雖考父之益恭慙富平之竟拜竊以百揆之任師長於中臺萬事之幾本源於右省用道德之望則可以總方略而廣教化非賢明之選則何以制號令而平典章臣可與小知無他大略㑹兩宫之識拔允三府之推移勞不足以償罪尤譽不足以除譏謗黃霸見謂功名之已損貢禹徒以質直而見嘉區區其間録録何有請避賢路嘗投劾以自言終貪國恩復尸官而未去敢意非常之寵遽膺爰立之求並進秩勳益敦封食三篇納誨遠慙傅說之來十事可行近愧姚崇之進顧視圭組若臨氷淵此蓋伏遇太皇太后陛下躬任姒之徽音翼成康之嗣聖敷求忠直保人成平臣敢不職思其憂義之與比安社稷為悅期勉慕於前人非堯舜不陳庶答揚於休命忠肅集卷一
