body:
  text: 忠肅集卷十一宋劉摯撰神道碑畢文簡神道碑故丞相文簡畢公既以景德三年葬鄭州管城馬亭盧村之原而隧道之碑未果立後八十餘年公諸曾孫從周仲達等乃相與經治紀刻而使仲遊抵書敘其故以銘見屬某視公之時良已逺然考其事迹有門生故吏之狀幽宮之銘太常有議國史有傳家有譜集又雜見于他書傳記與夫章章在士大夫者類非一事參驗可信皆合不誣于是獨掇大要而論次之惟畢氏出于姬姓周文王之子高封國于畢後以為氏後漢兗州别駕諶之五世孫曰衆慶為宋兗州中正又五世曰憬仕唐至許州刺史憬二子構為户部尚書諡景公栩為鄷王府司馬栩曾孫諴相懿宗構五世孫稹為振武天德營田判官稹生宗昱是為公之曾王父為代州雲中令王父球本州别駕考又琳澶州觀城令及公貴褒贈雲中而下三世為太子太保太傅太師追封曾祖妣吳氏鄧國祖妣史氏韓國妣樂氏代國祝氏鄭國並太夫人上世始居雲中太師既終祝夫人謂公曰學必求良師友乃相與如宋又如鄭得楊丕劉錫楊璞使公與遊而卜居焉今為鄭州人公諱士安字仁叟以學行為名進士乾德四年王晉公祐知貢舉第公甲科辟邠寧募府開寶三年為濟州推官太祖皇帝召對廷授兗州管內觀察推官太平興國初改太理寺丞領三門發運事吳越錢俶入朝選知台州既至言錢氏上圖籍有司皆張侈賦數今湖海新民始得天子命吏宜有安輯且州縣文書具在願一用舊籍以示惠澤詔從之明年以治最遷太子右贊善大夫徙饒州改殿中丞歸朝為監察御史知乾州以便親改監汝州稻田務雍熙中諸王出閣召為左拾遺冀王府記室參軍太宗皇帝延見勞問蕃錫遷尚書考功員外郎端拱中詔王府官各上所為文帝問近臣曰文吾既知之其行孰優皆以公對帝喜曰是也以本官知制誥淳化二年召為翰林學士大臣以張洎言帝曰洎視畢某詞藝踐歷固不減但履行逺在下遂為學士于時宋興四十年中外幾平文學政事言語侍從之臣輻輳朝廷至論德行則常以公為稱首明年知貢舉轉主客郎中以疾請外改諌議大夫知潁州真宗皇帝以壽王尹開封也召充府判官為皇太子以兼右庶子遷給事中及帝踐阼即日拜樞密直學士工部侍郎權知開封府以嚴正稱凡宮府常從授庭職而補外任者必遣至公所受戒飭時近臣有怙勢為不法強買民家定昏子者公請對白其橫奪還之而公亦以禮部侍郎罷府還為翰林學士兼祕書監時契丹謀入寇公首疏五事應詔陳選將餉兵理財之策甚備多常納用于是中書闕宰相乃進公吏部侍郎參知政事入謝帝曰未也行且相公頓首辭謝帝曰朕倚卿以輔相豈特今日然方多事求與卿同進者誰其可公復頓首謝曰宰相者必有其器乃可居其位臣駑朽實不足以勝任寇準兼資忠義善斷大事此宰相才也帝曰聞其剛使氣對曰準資方正慷慨有大節忘身徇國秉道疾邪此其素所蓄積朝臣罕出其右者第不為流俗所喜今天下之民雖蒙休德涵養安佚而西北跳梁為邊境患正若準者所宜用也帝曰然當藉卿宿德鎮之不閲月拜公本官平章事寇公實並命而以公監修國史位在上既而契丹益犯邊北州皆警二公始合議請帝幸澶淵時景德元年九月也契丹統軍順國王撻覽引兵分掠威虜順安北平侵保州攻定武數為官軍所郤益東駐陽城淀遂攻髙陽不得逞轉窺貝冀天雄兵號二十萬帝坐便殿問策安出公與寇公條所以禦備狀且言澶淵之行當在仲冬寇公謂當亟往不可緩卒用公議初咸平六年雲州觀察使王繼忠戰陷敵中至是為敵人奏議請和大臣莫敢如何其事獨公以為可信乃贊帝當羈縻不絶漸許其成帝謂契丹凶悍如此恐不可保公曰臣嘗得降人言今雖深入屢挫不甚得志陰欲引去而恥無名且彼寧不畏人乘虛覆其穴此請殆不妄繼忠之奏臣請任之帝喜乃手詔繼忠許其請和時已詔巡幸而議者猶閧閧二三大臣有進金陵及成都圖者公亟同寇公請對力陳其故堅定前計帝乃幸澶淵軍數十萬契丹大震然猖狂乘衆猶掠德清至澶淵北鄙會官軍伏弩發射撻覽死衆潰遁去而曹利用使還亦具得要領與其使者姚東之俱來講和之計遂定嗚呼朝廷惟無大事也事一動利害繫其中而人蔽所見甲曰如此乙曰如彼方是時非沈幾達識以定其是真忠大器以任其決一反乎為全軀保妻子計則成敗之機亦曰殆哉觀景德之事所以威靈抗于上和好成于下者公本精于策畫排紛決疑力引寇公故也初帝嚴兵將行太白晝見流星出上台北貫斗魁或言兵未宜北或言大臣應之公適臥疾移書寇公曰屢請舁疾從行而手詔固不許今大計已定惟在君勉之某將以身當星變而就國事所願也已而少間追至澶淵見于行在及從還兵罷乃按邊要選良守將易置之雄州以李允則定州馬知節鎮州孫全照保州楊延明他所擇用各得其任令塞上境得外牛馬類者悉還之以示信遂通互市除鐵禁招流亡廣儲蓄未幾夏州趙德明亦款塞內附二方既定中外略安量時制法次第施行如𣙜酤毋得增額平反已決死罪録為勞訟不干已者坐以重至今不易復置賢良方正直言極諫等科以廣取士每對必為帝言崇儉息民近忠直逺諛佞是為政要故未幾天下無事號為至治公素羸多疾歲中求去位章至七八皆不許二年十月十二日將朝至崇政殿廬得疾詔問絡繹帝不俟輦步至公所敕太醫及近侍隨獲肩輿還第而薨年六十八帝即日臨奠哭之慟贈太師中書令廢朝五日制服發哀以皇城使愛州刺史衛紹欽治葬有司給鹵簿大鴻臚持節護葬諡曰文簡公資端重偉儀觀少以名節自厲貫于夷險白首不易平生無一語過差雖貴奉養無異平素未常殖産為子孫計故天下稱其清而其亡也帝謂寇公曰畢某君子人也事朕南府東宮以至輔相飭躬慎行有古人之風晚年益觀書所藏經史字皆方寸手自讐正其文章典雅以古為法集為三十卷平生慎交遊無黨援惟王晉公呂公端見引重王文正公寇萊公楊文公億相友善王翰林禹稱陳彭年皆門人也公既引寇公同政而寇公守正疾惡小人多不便日思所以傾之者布衣申宗古告其交通安王元傑寇公惶恐莫知所自明公力辨其誣下宗古吏具得姧罔斬之寇公乃安禹稱濟州白屋子嘗以事至公官舍陰識其非常童留之教以學誨育奬進學業日顯後遂登科進用更在公前及公繼知制誥其命乃禹稱辭也公去潞州州事連禹稱亦謫黃州公猶厚資其行人稱公知人為有終始者後王文正公為相嘗面奏曰皆下前稱畢某清慎如古人在位聞之感歎仕至輔相而四載無田園居第沒未終喪家用已屈今其妻有貸于臣家者其清可見真不負陛下所知然使其家假貸為生宜有以周之者竊謂當出恩上非臣敢為私惠時也帝聞嘆息賜白金五千兩公娶駱氏封陳國夫人二子曰世長公薨時為太子中舍終于衛尉卿曰慶長時為大理寺丞終于太府卿孫九人從善光祿寺卿從古駕部郎中從厚從誨檢校水部員外郎從蘭惠州博羅令從道殿中丞從範山南西道節度推官從益太常寺太祝並亡從周今為朝散郎知洋州曾孫仲達而下若干人官多至郎大夫入文館省寺或出為郡守使者世以為盛公以雅望耆德被遇三聖出入禁省莊靖慎密及在大位知賢能薦謀慮國事惟幾惟深輔政雖才逾年而克有勳烈中外乂安郡國豐登刑罰衰減忠清之德有始有卒天下至今稱為名相銘曰真宗允文考慎相臣孰以德進畢公其人帝曰畢公文考之錫尹正于京豫曰羽翼束左闈右忠孝余迪景德之始旄頭騰芒戎馬空國塵我北方東來相豫賞罰紀綱公拜稽首臣朽不勝有大忠義以茹斯征協于一德引宮應啇圖上吳蜀彼誰弗臧兩公諤諤駕言觀兵六飛絶河于橋之隂威既逺加乃錫之平帝還曰咨釐我庶治材巨守方審政張弛惠經中國底定四裔公在相位時無幾何有事有勞有成可歌逝也胡亟帝慟而嗟三師正令禭賻有加溱洧之右既葬既久立碑墓旁龜趺螭首鋪張清風以詔不朽孰究孰營公有孫曾清白之祉百世之承唐質肅神道碑公韓介字子方姓唐氏惟唐氏世譜其始逺矣至漢初厲從髙祖起豐為厈邱候後十七世彬仕晉封上庸候又二世輝為前涼臨江將軍始居晉昌稍分徙太原京兆北海北海之後瑾仕周開府儀同三司臨淄公臨為唐禮部尚書天寶之亂子孫又散去有為唐山令曰熊者居餘杭生子曰希顏天復中以明經為建威軍推官是為公之高祖曾祖仁恭為吳越鹽鐵巡官尚書水部員外郎祖渭仕皇朝至尚書職方郎中始自餘杭家江陵遂為江陵人考拱左班殿直公既貴贈曾祖太子太保追封妣盛氏英國太夫人祖太子太傅妣夏氏嘉國太夫人考太子太師妣兩崔氏崇國光國太夫人公十三歲丁太師喪于漳州家故貧州人賻之者泣謝不受侍母夫人護喪歸江陵養親終服無違于禮天聖八年第進士為鼎州武陵尉郡掾鞫獄實既決猥曰驗死不明乃尉之罪私請曰驗罪輕鞫罪重公憐其言為受罰調嶽州沅江令縣民龍氏上書訟分田不均坐不實徙以死其子陳冤更數令不得直公躬至田所按圖契是非立辨遂均其田州民李氏以高資為上下所漁擾或者不厭因告其祠鬼用人守喜擊斷則速繫其家百口極獄之慘情不得奏公治有能名專屬之公考閲實非殺人者守又奏以為未盡詔殿中侍御史方偕移劾于澧州卒用公所具獄不能變以武康軍節度推官知夔州奉節縣寶元二年轉運使應詔舉充三路知縣遷祕書省著作佐郎知鄚州任邱縣縣當信使驛往返誅索繁急其下因緣為姦利異時俯首趣事莫敢有辨公為作區畫預居其物每使至親坐驛門給之一以法令從事應復還而毁失者移文取其償故過者皆戢上下便之塘水嵗浸邑田十一村而塘實中人主之州縣畏其勢無以拒公募民自高陽起堤亘鄚十餘里蔽之其患遂息丁光國太夫人憂服除知相州安陽縣事改祕書丞皇祐初河決其所監司舉公通判德州二年改太常博士徙通判廣信軍未至召為監察御史裏行轉尚書主客員外郎殿中侍御史裏行宗室請買官地公言可豫則賜之不可者勿聽而使輸直非也內侍督作龍鳯車于啓聖院公言此太宗神御所在為後宫輿服故喧黷其中又車飾金玉過制皆非是詔罷之張堯佐以恩澤一日除宣徽節度景靈羣牧四使公言不可因引唐天寶所以致禍敗者既纍疏乃與諌官等七人極論殿上又白御史中丞留百官班將廷議卒奪其景靈宣徽兩使明年賜五品服未幾堯佐復為宣徽使知河陽或謂補外不足論公曰宣徽次二府不分內外獨力爭之仁宗皇帝諭曰除擬初出中書公言是當責執政退請全臺對不許自請罪又不許章十數上遂劾宰相附會堯佐諫官朋比事及宮掖因請采公議别擇用大臣其言堅直帝亟召二府示以疏公面質宰相曰自惟有是事乎君前禮毋得隱者樞密副使麾公下殿猶爭益切遂貶春州别駕明日改英州遣內侍隨之制出人情驚愕于是敕朝堂告諭百官又明日罷宰相黜諫官公怡然南去絶口不為人道當此之時天下士大夫識與不識聞風歎慕聳然有立志往往作為文章以頌詠其美自是言事官以畏默為恥而大臣亦知所鑒戒云四年檢校水部員外郎全州團練副使監彬州稅稍復祕書丞又復主客員外郎通判潭州五年復殿中侍御史知復州未至召充言事御史帝遣中使齎告身就賜乘驛赴朝蓋皆異禮也入見帝曰知卿守節謫官以來無私書至公卿間公頓首謝退就職言事無所避如故假工部員外郎直集賢院開封府判官至和元年知掦州辭日帝復諭曰卿孤立不移所守今雖在外無忘規補賜服三品俄徙江南東路轉運使嘉祐元年侍御史吳中復請還官言路時潞國文公再當國亦言唐某頃為御史所言皆中臣病而責太重願如中復言召之遷工部員外郎河東轉運使戎人侵耕河西經略使令築堡限之麟州守將輕出按視賊奄至與戰而沒朝廷罷易帥臣公攝事即絶其互市盛兵境上戎人懼乃來請議事平多如公策三年徙淮南江浙荆湖都大制置發運使入為三司度支副使四年以本官拜天章閣待制知諫院同提舉萬壽觀帝自至和後御朝淵默公言君臣如天地以交泰為治願時延訪羣下發德音可否政事以幸天下又言賞罰不可以貴賤輕重如孫沔呂溱侈縱宜深責必行則衆信矣論宮禁干丐恩澤其命不由中書此古所謂斜封非盛朝所宜有請裁放後宫冗數罷祈禳齋醮之不經者諸路走馬承受使臣凌擾郡縣可罷勿遣以權歸監司天下配軍至死無救與古律意異宜令有司差其重輕有所縱遣仍著為法又言士節不立願委大臣進敦朴忠厚之士稍抑聚斂文法吏以銷刻薄浮競之風國朝祖陵在保州自楊懷敏廣塘水稍稍侵近議賜錢改卜公言遷久安之神以其地與水非尊祖之道兖國公主夜開皇城門入禁中請重責守者以嚴宫省是年充北朝生辰國信使五年轉禮部郎中權發開封府事時御史中丞劾宰相未報乃自去官號不出宰相亦待罪公與諌官御史連請辨其曲直于是罷御史中丞公亦求外補得知荆南而門下封還制書謂公不宜處外乃留復知諫院言新除樞密副使與內侍通姻不可大任屢疏卒罷之而公亦去知洪州翰林學士胡宿等七人上書懇留不報七年拜龍圖閣直學士河北都轉運使明年英宗皇帝即位遷吏部郎中除樞密直學士高陽關路安撫使知瀛州治平元年召為御史中丞首言先帝在位四十餘年天下樂利惟仁治而已願恢聖度廣恩德則為善繼四海蒙福矣帝重其語公前後三在言職名鯁切無所回忌明年拜龍圖閣學士知太原府河東經略使至則首戒邉將毋生事初代州岢嵐軍西夏數擾邉公遣兵撤其所築境上堡柵又移文諭以利害嚴守以待之遂不復敢動其後冦大順城環慶路帥移檄出兵牽制公曰守邉之䇿莫如自重奈何以小侵故使鄰道勞費非至計也以事上聞詔以諭西帥公雖居外意未嘗不在朝廷于是濮王園廟之議起言者多得罪公憂形于色密疏請還臺諌官之謫者四年神宗皇帝即位遷給事中召拜三司使有司議增官屋僦直公以謂京師狃于恩不喜擾唐稅間架可以為鑒恐所得不當所損奏卒罷之請出汴河運船于江湖轉東南之粟中外為便熙寧元年正月拜參知政事公自以進由直道感慨知遇益致所以事君之義純誠盡公多所獻替用人明言其才否不立恩不避怨與同列論政事反復再三終不屈祖宗法有所更近臣有所進退尤極其慎雖在帝前必究切辨析要是非之歸未嘗反顧帝以是益敬信之而天下翕然想望其風采二年三月告疾帝遣高醫相屬內侍入問狀驛召其子淑問于復州歸侍四月帝幸其第臨問出涕久之某日薨于寢車駕臨奠哭之慟明日遣中使以禁中舊所畫公像付其家傳之輟視朝二日賻恤有加贈禮部尚書官其子孫及外姓通九人喪歸所過治道發卒護送太常議以公正而不阿剛而能斷諡曰質肅以四年二月某日葬于江陵府江陵縣龍山鄉太師之塋次公端徑之質出于天資立朝風格凜然遇事立斷初無留思而邃于學問待人恂恂有禮自奉簡約未嘗問事有無將終屬其子以修身持門戶而已輔政裁逾年年止六十不得究施其志此天下所以歎恨也有文集若干卷奏議二十卷邊防利害五卷娶楊氏諫議大夫生之宗女誥封魏郡夫人子五男淑問朝奉大夫嘗為御史有直聲能世其家風義問某官待問早亡嘉問宣義郎之問承事郎二女長適寶文閣直學士通議大夫謝景溫次承議郎王某孫十七人今上元祐八年將建碑墓上來請文乃論次其實而系之以銘曰謇謇唐公媚于三宗好是正直有言有庸公之于言剛不違義伏奏殿榻面劾大吏引而質之在列汗愧不貶不明瘴荒萬里人于禍福有擇而言則迎則默久酣為安􅊒然大聲震彼惛惛皇思其忠士慶其返乃踐中外乃都休顯公長憲府人無邪譸公總財省民飽而裘乃登輔弼彌論政猷祖宗典則惟帝之求國惟其仁毋變以利物惟其常毋鑿以智有或出此豫曷敢同以劘以守惟理豫從斯道之恃隱然在公天畀公厚胡缺者壽帝咨不憖士民永疚龍山之藏有銘詔之神隧之表次詩在碑百世無斁正直之思墓志銘天章閣待制郭公墓志銘郭公諱申錫字延之太名人天聖八年以進士起家釋褐瀛州河間縣主簿丁父喪服除調蘇州長洲主簿以親嫌易常州晉陵尉邑民告賊殺其弟公案之其哭不哀而色懼械付獄果自殺之民夸為神明移永寧軍博野縣令用薦者改祕書省著作佐郎知深州束鹿縣通判雄州會河決啇胡故相賈魏公薦知博州墊溺之後歲飢盜起獲繫填獄公曰良民失職至此請以輕典從事詔許之因招集拊循流亡來歸妖人王則反貝州調發佐軍為諸郡最璽書褒諭賊平民猶以習妖告訐公謂汙俗未革爾多從末減有卒戍謀亂取其首惡刑之餘置不問仁宗閲奏謂大臣曰小官行事能若此嘉歎久之以尚書屯田員外郎為御史臺推官嘗數上疏論事大臣或不便之會慶州有滯獄遣公就鞫既還復以非職而言戒敕之由是顯名盜發濮州張郭鎮執通判井淵以公知濮州賜五品服至未逾月滅賊徙遂州未行召為侍御史會靈容議復作公上疏曰古者兆四望于四郊山川丘陵各因其方坎壇而無位貌今裒方嶽之神廟食京師非典禮殆天廢之宜勿復未幾充言事御史儂智髙寇廣南帥臣欲藉兵交趾公言小醜竊發不時蕩撲更不須啓四夷輕中國心不可聽遷刑部知雜事判大理寺吏部流內銓貴妃張氏薨贈后議禮如嫡公言位號尊卑死猶生也不容僭瀆請下議者去其非禮由是多所裁正論狄青除樞密副使賜第官二子恩過優曹彬平江南無此賞且智髙尚在邊境未寧宜慎賞以勵有功宰相妾張氏殺其婢開封府鞫治闊略公請移别獄上優大臣弗許爭不已因劾開封撓法宰相竟去位府官吏多罷者翰林學士歐陽修韓絳以論斥時政求補外公曰二人名臣官在左右為重得俱見留至和中契丹欲遣泛使議事公言河朔財匱民困吏苟簡曠職軍旅不練甚非所以建威消萌上嘉之賜三品服明日命為河北體量安撫傳至部閲吏甚無狀者黜數人事所廢置不一歸條備邊大務十餘章多見納用拜三司鹽鐵副使遷右司充契丹國信使嘉祐二年塞六塔河與河北轉運使李參典其事初皇祐中議開六塔河使東行公言其非是後果不成東北被其患至是議塞而參意異詔罷參公因疏參他過坐知濠州丁母喪服除知滑州拜直史館知江寧府轉禮部郎中知滄州英宗即位遷户部未幾復召為三司鹽鐵副使入覲首言滄州北近邊東循海至青州殆千里無障塞之阻節制之統謂宜以州建帥府分河之東六郡隸之為一路下其議識者是之拜天章閣待制知鄧州兼京西南路安撫使今上即位遷左司軍士賞賚或以不足欲貸之民公發封樁錢益給之僚佐以文為言公言有責守臣任之省符至如公畫從河中府召還同紏察在京刑獄判太常寺兼禮儀事知滑州請補北京留司御史臺改左諫議大夫就判二年連請老遂拜給事中以待制致仕熙寧七年五月八日終于私第享年七十七纍升朝散大夫勳柱國爵文水郡侯食邑一千二百戶公資安和而內剛不苟自奮苦有志于當世喜待士推挽廉畯人不可干以私自奉平約雖貴顯不易其度守九郡政明而下肅人不見其所以為者獄之隱微于談笑間得之纍官言路自以遭人主眷納遇事必盡言慮逺而力強無所回忌有大體嘉祐中霪雨詔求直言公言陛下享國久皇嗣未立人望無所屬天下事寧復有大于此者乎願推大公早于宗子有所擇以定國本一雨沴未足以為憂上與論政有焦勞願治意公曰股肱得其人則陛下處于無所為可也願止以擇宰相為事上髙其説嘗諭之曰人臣為小吏時多喜奮擊論事至稍用則緘默是資言以進爾朕所弗取若卿可謂終始不二者公頓首謝雅喜論兵嘗著邊鄙守禦策敘邊外山川風俗為詳种諤取綏州公以謂貪尺寸地使國隳大信邊患將自此始及諒祚死又請捐前故許其子襲爵以示懷柔嘗對上曰二寇賴歲賜金幣以為國數渝盟非其所利必有以致之但得重將守塞不要功生事則無冦患矣即退休與賔客語及邊事慷慨喟歎忘其身之老也曾祖簡祖晉父悅贈工部尚書母李氏封仁壽縣太君娶李氏陳氏吳氏封江夏潁川濮陽郡君子三男仁約大理評事義方太常寺奉禮郎早世禮立守將作監主簿五女専州博平縣令賈行先陵州仁壽主簿李奎永州祁陽縣尉鞏固湖南轉運副使太常丞直集賢院蔡奕興國軍永興主簿宋文虎其壻也孫男三人志經試將作監主簿秉德慎行女二人明年十一月二日葬公于大名府元城縣孝義鄉感義里之先塋三夫人祔銘曰逺矣郭氏出周姫宗武封諸弟虢叔有功地入于鄭至于平王邑以陽曲繼絶存亡轉虢曰郭後所以氏支微𣲖遷大家于魏煌煌代公相唐元勳惟文水侯實其後人侯有志學善飬而用惟精惟深罔擇弗中諌官御史前無強權善善惡惡皇惟其言謂仕不顯論思左右謂志逹乎澤未下究進退直道不辱其身有善有施在其子孫有思在民有譽在士兹謂不朽昭于千祀忠肅集卷十一
