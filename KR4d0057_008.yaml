body:
  text: 忠肅集卷八宋劉摯撰啓謝免省啓比年課藝幸據上遊今日程文復叨優等爰充名于桂籍行待問于楓庭得非所宜愧不能稱竊以先王育材于學本以取人君子修善于身固將從政惟所用出于所教故能言必其能行詩書所稱豈有異志公卿之選悉由此途凡其一時出長入治之庶官固莫非六卿時書季考之多士待以積久取之盡公斯民所以直道而行在昔稱為至治之極降及後世溺于末流以六藝為繁文謂上庠非急務太常受業徒詳平日之空言列郡應書盡出臨時之私意上之所求幾于無用下之所學亦非可行不知操縵之為安烏有畫餅之可食曠矣千載循乎一塗此衰世之軌所以相尋而聖人之道未知能復恭惟國家承百年之積弊恢列聖之大猷泛觀古今洞見根本謂兩漢而下所以失由觀人以一日之長而三代之治所由興蓋入學者中年之考乃闢黌舍以來俊英增弟子之千員頒新書之萬卷春誦夏絃而經以師授月書季考而士由舍升既考之于尋常復試之于倉猝且環橋者億萬不已多乎及揚觶之再三僅有存者故自元豐之肇造迄乎紹聖之纘承雖有求者纍年于兹而所得者數人而已宜獲異材之間出以彰新法之大成如某者智不適時學方為巳徒以雙親孝養未忘干祿之心三舍序升式重興賢之禮俯首百試旅身七年幾成上考之功猶屬中變之法頃造公選再程斐文言實工于前時名亦玷于異等知其非幸許以從新方虞再鼓而衰甘為殿後不謂適矢復沓優入彀中退慙毁瓦之無功進喜望雲之有日迹其所自敢不知歸兹蓋伏遇某官頃膺明命兩董學宫幸升夫子之堂獲就諸生之列參乎未逹方求一道之歸偃也何如或許片言之是待以殊等出于衆人雖華塗寖進于台司而雅意不忘于璧水龍門益峻猶許再登駑馬方疲幸叨一顧繫餘光之下庇使朽質以生榮故于選掄誤備收録力探聖賢之閫域誓窮師友之淵源謝薦啓二首過賜寵嘉特形外舉自反而視內愧以兢惟本朝任官之公得君子舉類之法然取之頗泛濫而不審故進者亦坌至而叢來銓選困于平衡真偽揉于一律今之議論舉患才能之不多考其源流豈非法制之甚弊是故近嵗之講計增損舊令而改為內之貴仕凡文武之人悉止其嵗貢外之使者與守相之薦均殺其常員向舉以親民者且俾之從軍近所謂監郡者皆不得應令雖未足大清乎多士亦庶幾少制其末流顧進退之尤艱亦知人之豈易伏况刺數千里之部察十二州之官人人飭修家家亷茂就而求者當以褒然某昏愚之人孤孑以仕講學不足以瀕道德之畛為文不足以望述作之藩曩常有志于斯民今已無異于羣衆日思投劾以自去慮煩汰礫之不容伏遇某官以經術謨明嘗盡心于御史以忠恕簡重今握節于外臺如陵善養而材無不包下車未幾而聼有所過喜為李君御悵龍門之未登請從郭隗先雖馬骨而猶市是為不德之德應干無求之求敢不迪忠清之大方安性命之常分窮不失義進無尸官庶期終身無辱高誼向者誤采孱愚特形慰薦惕然自視愧以無容某支離之人孤孑以仕學問不足以立己才智不足以合人比遭休明嘗偹任使器非大受進曷補于涓埃恩勸後來退猶逃于鈇質省非無益竊食更優會諸公之有容垂三嵗以自庇深惟過幸常已厚顔敢謂某官以清通簡重之政而綏安一方以公明樂易之德而鎮慰羣下乃兹不肖上辱一言舉不使知仰古風之猶在恩無所謝愧士禮之已隳敢不云云謝館職啓禁林課試辱奏等之不遺册府備員荷詔恩之均備名浮其實寵至為憂竊惟古今建邦率以經籍求治蓋君臣父子之大本而禮樂教化之所興故建府以寶藏且命官而典正漢之石渠天祿别夫中經唐之麗正崇文校夫四部國家之盛宗祖以來大闢儒館而聚搜藝文樂養人材而增置員品上繇畨直下砥校讎小言之則訂正國籍文字之異同大言之則預聞朝廷政事之論議雖清流之可貴亦任責之豈輕故國之用人非以榮之而將以考其實士而居職非以慕之而求以稱其官某也寒生出于下國讀書薄聞乎大道修辭有愧于古人性愚不能以頡頏材樗不可以鐫刻出慕斗粟蓋有為貧其猶雙鳬曽無所補兩河試邑北楚從軍顧常懷功名之心頗亦究義命之説踽踽自守無意于舍龜倀倀何從僅同夫即鹿恭惟治平之特詔並命四輔之大臣俾類求于能儒將器養于文館顧惟一介之在遠乃辱諸公之為言神聖嗣天都俞繼志所舉二十人者無一遐遺不越四三年間以次召進惟時江湖之賤起預鸞鴻之遊鼇禁景長玉堂春晚地近清切方塵觀之坐驚事非故常忽天題之拜賜求之以農桑為政之論䇿之以治亂歷代之原劉蕡忠嘉雖不避誅夷于斧鉞仲舒淺陋而不能别白于文章僅足成言曷副垂聼聞一知十良謝于該通書等入三誤膺于題品奏篇待罪畫可湛恩幾汰礫之不容偶續貂之有取深惟孤進何補斯文雖俗吏服勞一紀始書于六考然選人入館本朝不過于數公足為幸榮良有前地斯蓋某官登翊聖治籲求俊心高誼有加士以為權鑑一言所掖國以為蓍龜如薦清廟而雜用庶羞如成大裘而畢收衆腋致兹孱細曲冒寵靈敢不迪忠清之大方安性命之常分退不失義進無尸官仰酬覆燾之私次答陶鈞之施謝文太師張宫保韓大資范相公啓奉備制書延登宰席循牆以避雖極于深辭反汗為難終成于虛授此蓋某官至仁成物盛德憲朝服膺善人之心能舉其類推轂天下之士先為之容常自愛其弗忘俾馴致于此地據非所稱凛不自安師仰高風庶立懦夫之志瞻馳材館莫陪下客之遊徒感愧之在誠欲名言而莫得謝轉官啓祗應寵命積愧恩榮伏念某諸生陋儒四海孤進學徒知于適道才不足以趨時試邑冀方曽微善狀從軍楚北益乏能名漫浪逾夫十年日月纍夫六考仰繄造化獲保寒微比投銓考之書以就敘遷之課中緣詔試擢預俊遊書林未久乎對讎吏部為言其功狀特蠲常制就鍚寵名佐述史于蘭臺仍校經于儒觀皆所謂文章之選夫豈宜踈野之人此蓋某官弼成治猷敷引士類繩墨一正材各入于輪轅雨露所施物不遺于蕭艾致兹愚品冒進官聨敢不益修厥身仰奉高誼滑州到任謝政府啓比承詔札猥賜守符驅馬過家懷章入部以才能之素薄當責任之匪輕惟感與憂俾夜繼日伏念某降才不腆賦命多竒每遭選掄秪速罪戾免官歸里滿嵗奉朝豈謂聖主推匿瑕之仁諸公篤念舊之義屬補郡之多故使假守以備員當殘廢不完之餘況事工方造之始大非守拙所克堪承此蓋某官因能任才為國造士不遺一介之賤兼聼百官之成儒者遲緩養名願以為戒古人造次集事敢不自強庶酬已知且避官謗辭免右丞上政府啓非常之恩內省而懼竊以廟堂之任世所具瞻丞轄之官今為執政擢置此位詎容匪才某學不高明識惟淺暗幸遭盛治稍玷近班雖殫千慮之愚無有萬分之補日虞汰斥敢意超踰名忽假人驚如墜谷方嗣聖之求助適諸公之在朝聚精會神同德協志固已副仰成而治矣奚取于不肖而參之屢貢懇辭未聞可報伏遇某官朝家之柱石國論之蓍龜願借一言仰逹天高之聼庶回誤寵使逃器滿之傾除右丞謝政府啓比者誤被制檢進丞中臺名器假人循牆而莫避負乘致寇反已以為憂矧惟省轄之官實預政機之論用人當否繫國重輕而某所稟尋常逢辰教育悵古人之不作慕直道之可行漫歷嵗年何禆任使執法憲府愧繩愆糾繆之風侍經帝闈無引古諷今之益方期汰斥乃此超踰斯蓋伏遇某官謀謨信于朝廷德義明于天下蚤嘗借論樂于成人顧駑馬而一言以倍其價器蟠木于萬乘先為之容遂致孱愚叨塵光寵愧感之厚豈易布宣除左丞答謝外路啓蒙被恩書進遷位序辭不獲命方深非據之憂德在成人特枉相先之慶內惟涼瑣仰識謙隆愧荷之懷敷陳莫罄除中書侍郎答謝外路啓左綱承乏方俟于黜幽右省躋榮復叨于遷次惕以自視愧無所容此蓋某官有德以成于人引重而為之地致兹懦品玷冒寵光方具私書遽詒榮問感慙不敏紬繹莫窮除門下侍郎答謝外路啓發政西省無補于毫分出令東臺復遷于位敘辭不獲命榮以為憂此蓋某官引類惟公成人以德務匿瑕而借論常推轂以為容致此衰孱益叨進寵方裁誠以通悃蒙貽問之見先愧懼之深敷敘難罄除尚書右僕射回謝外路啓奉膺制命延置宰司恭極循牆雖自量而懇避令難反汗終虛授而冒居愧不遑安凛無所措此蓋某官至誠與善盛德成人左右以容器輪囷于有用吹揚維力致粳粃之居前上何以塞厚恩重責之所加下無以慰多士大夫之所望深惟兢愧啓處不遑鄆州到任謝政府啓祗膺中詔許錫左符寬尸素之大呵釋顛危之重負開職禁殿相居便藩喬木故存未覺去家之久先楸所在更諧上塜之私獲此叨榮過于自擇實二聖矜憐而善貸亦諸公輔道而曲成遵職之初撫心增感重念疏愚之迹方依陶冶之私屬嵗序之沍寒望門闌而日遠仰祈保衛少副願言答文太師乞政啓薦上囊封懇還公紱方睿眷之增厚宜中懷之莫伸雅詔弗俞羣言允協某官文武具德廟朝宗工風烈贍乎華夷勳勞光于旗鼎方雍容師席以鎮天下之望而逍遙達觀以慕聖人之清蓋唐室尊賢裴令常為之輕重姬王貴老周公不去于朝廷願回遺榮知止之心少副尚齒尊賢之願敢期謙德過賜函書徒敬服于高風念難施于末議感慙之臆敷敘莫窮上歐陽觀文啓一間門墉屢環歲管泰階輔政徒望于昭回大鈞運和隂煩于造化未嘗輒通于懇欵蓋虞自犯于僭踰恭審被命制函均勞方國仰旌車之甫舍宅福祉以日蕃某官學茹古今才張幽渺當今名世孟氏自推于天以道覺民伊尹素為之任泰紫闊步虹霓飛光先諸老以告猷倡斯文而還古憂勤許國之志慷慨得君之忠公府勳勞歌咏于四海賢人事業效見于三朝注意方安露章懇謝秩文昌之正位職祕殿之隆名偃息南邦行奉衮衣之賜歸來東土永諧霖雨之求某賦職遐方瞻風前屏春餘氣潤淮服地清更冀云云賀富丞相啓奉被制書冠居台席聖志先定發于大明天下傾心仰夫舊德休命所及歡誦舉同某官國家宗工文武元老贊襄而陳九德臯陶夙惠于帝謨以道而覺斯民伊尹素為之已任望鎮四裔而不敢侮勳載二府而皆可歌緝熙百工康保萬物向偃藩而得謝比均佚以彌年曰咨多故之時爰即來朝之詔衮衣既襲有光東土之歸巖石所瞻尊據上公之宰宗廟增重泰階以平致君堯舜而賡載乎明良如古房杜而無愧乎禮樂旗常有紀天地無窮某自惟寒微久在陶冶案此下原本缺答北京韓相公乞致政啓薦上囊封懇還公紱屬眷懷之方厚宜沖志之莫伸雅詔弗俞公言允協某官出處安乎一德勳勞被于四海正期衮繡之還亟有軒裳之厭雖心知止足欲退慕聖人之清而國有典型其孰如天下之老願回逹人遺榮之尚以副明主貪賢之勤特辱亟書備形謙德雖髙明之是仰愧末議之何施賀鄆州李太尉啓拜恩闕北易地東藩戎旃十乘之容甫聞弭節鈴閣數人之衛已樂輕裘寵簡上心歡符士論緬惟鎮撫之裕休有福祥之歸某官剛厚稟中輝光燭外旗常有紀功懋于姬庭親賢並隆德毗于漢室均佚勞于右輔統連帥于東方清照兼資長城是倚雕戈金鉞方重専征之權淑旗綏章行光入覲之錫某里族單陋材性䃼疏惟是鄉楸之微實居台曜之庇眷言天幸獲陶沐于至仁尚以州符阻趨承于前屏更祈上為廟社下庇兵民答北京馮太尉啓賜節東吳偃藩全魏已下車而涓日初開府以臨民溽暑方煩福基增厚某官粹和清敏惇大靖深輔政三階休烈銘于宗廟宣勞四國膏澤下于生民為時重輕以道出處乃眷北門之鎮曰咨舊德之賢上將用儒盛齋壇之尊寵離宫有守付留鑰之謹嚴國倚長城人瞻巖石佇被繡裳之錫弗容暖席之休方具慶儀首承榮問感仰之素布敘莫窮答馮太尉免新命啓薦上囊封懇辭帥節方睿懷之所注宜沖尚之莫伸某官學深天人德備文武出處不渝乎一節勳勞先被于四朝惟皇思賢乃眷圖舊倚以北門之留鑰建以南國之將旄詔號有孚師言已穆願回持謙難進之志少副注意分憂之咨乃枉珍函過垂敦諭惟髙風之是仰念輕議之何施感服之心敷敘安究答北京馮太尉啓報成美政孚號大廷就更西鎮之旄仍付北宫之鑰上恩協稱歡議率同某官德在四朝功髙羣辟人思衮繡期政路之調元國倚翰垣尚璽書之增秩忽貽榮教具示沖懷願亟拜于恩輝庶仰符于眷委感仰之素敷敘莫殫答郭太傅謝宫觀啓懇上左符榮膺中詔宸宫列將莫若上衛之崇琳觀奉真莫重養賢之地某官學深文武功在廟堂夷夏相聞其髙風出處不違乎大義殊庭謁欵聊適于曠懷召節走趨佇光于圖舊豈其謙厚特枉緘封感愧之懷敘陳莫悉賀胡少師啓懇還公紱得謝帝庭升拜宫師之崇榮尊國老之重清風迪古賢人究出處之歸全德鎮浮天下無始終之議仰大臣之逹觀均四海之載歡某官統槩蹈中靈襟秉哲誠窮人物之盡學富古今之儲當天聖之開符覽德輝而薦祉泰紫濶步虹霓飛光正議鴻詞倡斯文于禁掖嘉猷亮節運大政于天樞勳烈被于三朝忠勞篤乎四紀爛焉鄉錦仕孰樂于過家確乎囊封禮弗容于賜几沖和天爵鎮拂世風固將安車駟馬以遊乎親賔清泉嘉木以適乎嘯詠逍遙賢者之樂拱揖聖人之清憲而不煩方典型之所在浩然善養宜夀祉之無窮某材稟下中世親幸會昔者先子識寶氣于星津其後諸孤聮榮名于慶閥逮兹勉強以就仕屢辱薦延之大恩賢哉嘆嗟固巳倍都人之慶形于歌頌又將酬國士之知賀王參政啓奉被詔恩進陪政論大臣重國畀自聖人之明賢者得君慰夫天下之望陶鈞所逮歌誦同辭某官業履大醇輝光外燭非今儒者尋常之學有古君子久大之儲言行弗渝求聖賢而允蹈進退有裕適義命之所安禁中甫告于嘉猷天子頗嗟夫見晚故進處四輔而非有左右之助度越諸老而不聞先後之言昔之為國者嘗患賢之不同時士欲致主者或嗟才之不見用深惟求治之日復此逄辰之亨明良一時社稷盛福某預聞休命屬在逺方莫遂龍門之登願為燕廈之賀問候河陽李資政啓懇謝繁機均勞近屛瞻言旌旆悵逺于風徽畏是簡書阻伸于郊餞傾依之戀紬繹難窮上政府啓食浮之久曾何補于涓埃材散而蟠徒隂煩于造化去違台屏淹革嵗筒伏惟平運萬機贊襄九德天相炎厯日擁太和某官誠格天機德符坤厚馴二府之注意迪宗工之大猷稱百官而鎮四夷平三階而遂萬姓發忠定䇿國倚泰山之安熙載亮工民陶元氣之運憂勞逾乎二紀功業被于三朝盟府藏勳方茂皇天之業中書有考永光巖石之瞻某材非敏明志巳衰竭駑馬十駕知致逺之已難鷦鷯一枝祈庇身之有地迎中書侍郎啓祗事西陵言旋北闕適冒風霜之候宜多車馬之勞即遂瞻承預深欣慰上中書吕侍郎奉安神御啓恭扈威神往臨原廟謹輿仗侍承之職御風霜偃薄之勞仰冀保頤以符瞻系問候中書侍郎啓奉軒后之威容即漢陵之别廟扈從于邁夙夜載勤方冬序之始嚴惟福基之增厚蓋祈保衛以副瞻馳賀吕樞密啓祗膺掄檢進二幾廷聖賢同時朝野胥慶某官元精育粹名世應期挺特千載之英危壓四方之雋自結明主雅意本朝鎮靖西州眷倚長城之固經綸北省仰資大計之煩上方纂緒先猷急圖極治顧軍師之重柄繫宗社之大謀權出幾微地居宥密參議乃事誠難其人惟公勳閥之高為國老成之選注意所在具瞻已歸行傳丙魏之聲即慶韋平之拜賀宋舍人啓奉膺詔制榮步掖垣賢能進升遠近欽悅國家號令上應于五星朝廷文章遠同于三代王言至重國論所關奉之以嫓夫絲綸施之以示乎威福誓敕軍旅而齊其勇誥命四方而等其功總為贊書其任乃古之內史觀諸上象其文猶天之紫微職重而清地高而近精求文學之老能達訓詞之深發揮帝謨如開日月之照鼓舞神化以肅雷霆之威惟今得人與古同盛某官言高壇宇道濬淵源研摩六藝之歸慱極九流之要校文册府克家素重于劉歆視草禁塗繼世雅同于賈至實聖賢之盛際增臺省之榮光典贍應機宜有五王之册清修素履早探二酉之醇欽聞寵章曷勝歡誦答韓左丞免新命啓伏承詔綍進總臺綱四輔得人多士相慶某官高才應世一節承家論議有經推丙侯之寬大險阻不撓抱胡公之中庸亶世德之逢辰偉聖朝之求輔遂膺帝簡入秉國成顧枉誨音具形沖尚願亟承于渙渥庶仰俯于虛懷感頌之深敷宣罔悉答蘇左丞免新命啓側承明詔登用舊儒四輔得人多士交慶某官治行高妙誼藴粹深蚤以繼世兼人之能蔚有先生長者之望白首一節清明四朝士心所居上簡攸在玉堂典誥極將明之功幃幄待經多道義之益肆疇賢譽來秉國成顧枉誨音具形沖尚願即承于渙澤庸仰副于虛懷答胡右丞免新命啓光被詔綸入司臺轄寵章誕布歡議率同某官學足以洞先王之微知足以經當世之務心兩忘于出處節一致乎險夷時然後言天下服其忠諒義形于色朝廷為之尊嚴果奉眷圖進承幾政士相為慶民用具瞻惟聖主得賢方側聼諸生之頌而君子難進尚未承三揖之求特辱誨音具形沖尚願亟膺于渙渥庶上副于虛懷答王右丞免新命啓丕承帝簡參秉國均成命式頒輿情交慶某官德業致位方正立朝文為儒者之宗望出廷臣之右周旋國器揚歷禁途京兆考功德威夙著文昌典政績用有成果膺綸綍之音入拜丞疑之任至公所屬枚卜已從佇觀久業之施以副具瞻之意豈期沖旨特示巽詞願即拜于寵章庶上符于睿眷其于感服紬繹奚殫答陳州傅待制啓拜職延閣請符近藩亦既下車云初開府某官誼藴閎博德名光華弗渝之誠貫于金石後凋之操見于雪霜以奧學侍經幃以大節專憲席國所倚以立邪正之辨士所賴以識是非之歸凛然清明無所吐茹出處有道佚勞斯均即被安車之還豈容坐席之暖敢期謙眷特枉誨函答河北都運顧待制啓升華延閣杖節北陲涓日之剛下車云始方暑序之煩鬱惟福基之靖康某官學誼本經文華貫道險夷一致義無愧于神明出處兩忘節不渝于風雨輟東臺之獻納付朔部之澄清行以節趨豈容席暖方斯誠懇遽辱貽書感仰之懷敷敘安究答永興李待制啓被寵制書升華延閣兼提請詔就帥全秦某官學通古今材適正變名實高于士論術業著于吏師以從官之嚴盡護諸將以元戎之重外總十連坐收靜勝之功行被節趨之召下車云始縢翰見詒慶仰之深布宣難悉答江寧蔡待制到任啓更賜左符徙臨近屏涓辰受事視履介祥某官望重士林學優聖域禁塗陟降日告于嘉猷南國蕃宣勤敷于惠政兹惟易地益便均勞恐席暖之未遑以節趨而來起豈圖謙德遠貺書音慶感之深布敘奚究忠肅集卷八
