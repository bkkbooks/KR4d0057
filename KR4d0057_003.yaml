body:
  text: 忠肅集卷三宋劉摰撰奏議乞結絶亳州獄奏臣伏見亳州官吏昨以往滯俵散青苖本錢朝旨下本路轉運司差官取勘及今纍月尚未結絶訪聞命官及干繫人等在禁者其數甚衆遂成大獄驚駭物聽臣愚以謂本州官吏所犯止于不依限支散青苖錢其罪可以一言而定非有晦隱難窮之狀而起獄不止有司未測朝廷風旨張皇事勢連逮證佐當此暑月追呼淹繫殊可矜恤欲望陛下連降指揮嚴責勘司須令日近完結其證佐人逐旋先次疏放所貴盛夏不至淹延取進止論役奏臣伏見近日有畿縣百姓數百人就宰相居第告助役新法不便及詣開封府山頭又赴御史臺陳訴稱係東民稅户今來令出錢助役各係貧戶生業微薄每年賦稅并諸色官債已是供輸不前難于更出助役錢數及稱提點司升起逐户等第已蒙曉示起納期限數百人往來街市京師喧然臣竊以畿向者天下根本之地常宜安輯之而愛養其財力使有豐佚間暇之樂故可與為善而不可與為非義所以重都下根本之勢昨者團結保甲是時西邊用兵法令一出民間驚騷至今憂惑而未寧今又作法使人均出緡錢非時升立户等期會急迫所以人情惶駭無所赴訴恐非所以強幹內重愛人寬役之意實由有司未能奉宣陛下大均之意以立法度乃為此等紛擾臣伏願先降指揮告示逐縣今來新法未得施行别聽朝旨以安衆心然後乞根究昨來承準是何條制輒有升降户等及如何出榜依理施行所在役法臣愚欲望陛下深求民情博采中外之論再行講求其要不至重斂動衆而可以經久者而後行之繫民休戚此最大難惟陛下謹慮而審取之天下幸甚貼黃臣聞王庭老張靚將兩浙差役合用錢數增起一倍科在民間本路人情嗟怨不安今來府文又敢擅升户等此等皆是妄意朝廷欲以羡餘為功臣竊慮諸路亦有似此擅升等第多配役錢去處乞速降指揮嚴為約束論用人疏君子小人之分在義利而已小人才非不足用特心之所向不在于義故希賞之志每在事先奉公之心每在私後陛下有勸農之意今變而為煩擾陛下有均役之意今倚而為聚斂其有愛君之心憂國之意皆無以容于其間今天下有喜于敢為有樂于無事彼以此為流俗此以彼為亂常畏義者以進取為可耻嗜利者以守道為無能此風寖成漢唐黨禍必起矣惟君子為能通天下之志臣願陛下虛心平聽審察好惡前日意以為是者今更察其非前日意以為短者今更用其長稍抑虛夸輕偽志迫忘逺幸于苟合之人漸察忠厚慎重難進易退可與有為之士收過與不及之俗使會于大中之道則施設變化惟陛下號令之而已案本傳摯為監察御史時入見神宗面賜褒諭因問摰從王安石學耶安石極稱器識摰對以少孤獨學不識安石退而上此疏今永樂大典本闕謹據宋史補入論助役十害疏臣聞孟子曰徒善不足以為政言人君雖有仁心仁聞苟不因先王之道為良法度以行之亦不免于民不得被其澤恭惟陛下至誠好治憂念元元謂天下役法久失其平故慨然有意其大均之也然有司建議立法頗無以上副詔旨而下協人情者臣請言之其法曰率錢助役官自雇人臣謂其勢有不可勝言而略陳其害天下户籍均為五等然十七路三百餘州軍千二百餘縣凡人之虛實役之重輕類皆不同今斂錢用等以為率則所謂不同者非一法之所能齊若隨其田業腴瘠因其所宜一州一縣一鄉一家各自立法則紛錯散殊何所總統非所謂畫一者其害一也新法患舊籍之不得其實故令品量物力别立等第以定錢數然舊籍既不可信則品物品量何以得其無失不獨搔擾生弊亦使富者或輸少貧者或輸多其害二也上户常少中下之户常多上户之役數而重故或以今之助錢為幸中户之役簡而輕下户役所不及故皆以今之助錢為不幸優富苦貧非法之意其害三也新法所以令品量立等不取舊簿者意欲多得雇錢而患上户之寡故臨時登降升補高等以充足配錢之數疲匱之人何以堪命近日府界其事已驗其害四也嵗有豐凶而役人有定數助不可闕則是助錢非若賦稅有倚閣減放之期其害五也夏秋二熟農人惟有絲絹麥粟之類而助法欲用現錢故須隨時貨易逼于期會價必大賤借使許令以物代錢亦復有退揀壅塞及夤緣乞索之患其害六也兩稅及科買貸債色目巳多使常無凶災猶病不能又起庸錢竭其所有恐斯人無悅而願為農者天下户口日當耗失則去為商賈為客戶為惰遊或父母兄弟不相保抵冒法禁折而入下户大而聚而為盜賊其害七也徼幸之人又能夤緣法意虛收大計如近日兩浙科起一倍錢數欲自以為功而使國家受聚斂之謗其害八也夫既為之民而服役于公家乃所謂治于人者事人天下之通義也況鄉縣定差循環相代上等大役至速者猶須十餘年而一及之至于下役則動須一二十年乃復一差今使槩出緡錢官自召雇蓋雇之之直不重則不足以募不輕則不足以給輕之則法或不行重之則民不堪命其害九也夫役人必用鄉户蓋以其有常産則必知于自重性愚實則罕至于欺公舊法雖有替名鄉人自任其責今既雇募恐止得輕猾浮浪姧偽之人則所謂帑庾場務綱運凡所以生財者不惟不盡心于幹守亦恐縣官之物不勝其盜用而抵冒法令罪獄日報至于弓手耆狀承符散從手力胥力之類職在捕察盜賊發行文書追督公事者則恐遇冦有畏逸之患因事有騷擾之姧而舞文鬻無日有虛偽其害十也夫民可安而不可動財可通而不可竭以臣之淺聞寡見而所列如此其沸于民口有大于此而臣未敢有言者其又何窮然臣嘗為陛下博訪而深計之蓋天下差役莫重于衙前今司農新法一項云鄉户衙前更不抽差其長民人等並聽依舊將天下官自出賣到酒稅坊場並州縣坊郭一户助役錢數以酬其重難臣謂此法有若可行然坊郭一等戶自來巳是承應官中配價之物及飢饉盜賊河防城壘緩急科率郡縣賴之今亦難為使之均出助錢外舊來官中將場務給與市前對折役過分數然多是估價不盡虧郤官中實數今既官自拍收用私價召賣則所入固多又應係衙前當役去處事件官為裁省使無舊日麋費而支酬之際稍優其數則人情必當樂為可寬鄉户重役而似無害民之事臣乞陛下將此一法詔有司講求其詳逐路坊場錢户可以了得本路召雇衙前酬奬則詳其條目行而觀之以二三年間若見其利則其他役法更革無難矣所在助錢之法伏望早賜睿斷一切寢議以幸天下夫更令創制可以漸而不可以暴況欲內自畿甸外至海隅一槩率錢可謂重斂又欲迫急而成之使生靈不得以自全陛下安得不慎重其事哉論助役法分析疏臣近曾上言論助役之法其害有十今奉聖旨批送下司農寺曾布劄一條件詰難奉聖旨令臣分析者竊以助役之法有大臣主之于中書有中書之屬官及御史知畫者講畫于司農寺有大寺所選擇監司舉官官行之于諸路上下布置其勢若此可謂易行矣然曠日彌年未有定論可以為法者其故何也不順乎民心而已矣民之所不欲古今未有可以勢力強而成者也故雖命使者奔馳道路稟之于內而劫之于外然其擬議參差條制殊異衆情紛然不知其可行之計則此法利害明若觀大矣臣有言責故前日采中外士民之説敷告于陛下今司農之辨説既如此陛下以臣言為是耶則事盡于前奏可以覆視陛下以臣言為非耶則貶黜之而已雖復使臣言之亦不過所謂十害者不惟費辭文過煩紊天聽而風憲之官豈與有司較是非勝負交口相置如市人之交競者則無乃辱陛下耳目之任哉有司謂臣等險詖欺誕則上有陛下之聰察而下有中外之公議所謂中外向背則臣所向者公所背者私所向者義所背者利所向者君父所背者權臣今方辨助法之利害而無故立向背之論以朋黨之意教誘天下此可駭也所謂曾無忌憚則陛下之法臣所畏也陛下容受忠直臣為御史實不敢隱情自為忌諱今司農欲使臣畏忌權臣則誠臣之所不能者也伏望陛下將臣前後所論助役章奏與司農之言宣示二府大臣中外百官以考是非若臣言有所取乞速罷之奏議以安天下之心若稍有欺罔則乞重行竄逐以謝専權之人而戒妄言者分析第二疏臣昨日準聖旨批下司農曾布劄子為詰臣所言助役事尋已具分析奏聞去訖臣竊以耳目之于人也事物過者必見必聞以赴其心而心必受之末有不信其耳目而反以其能視聽為疑者先王以言置官代天下耳目內外相信無以異于一體之相為用也其言雖直必容雖多必受則國家安治不然則反此故謗木諫鼓不設危亂之國鼎鑊斧鑕不在聖明之朝恭以陛下躬上聖之德好問樂善凡延見臣下雖賤官小吏必溫恭和容以訪逮之此堯舜之盛也然至于臣等以職事為言則使之分析者中外皆知非陛下意乃司農挾寵以護改作大臣設法以蔽聰明爾因事獻忠敢一言之今天下之勢陛下以為安耶治耶抑未耶苟以為未安未治也則以陛下之睿智言動起居躬蹈德禮夙夜厲精以親庶政而天下未至於安治者將誰致之耶陛下即位以來注意責成以倚望太平而日以太平為巳任得君専政安石是也二三年間開闔動搖舉天地之內無一民一物得安其所者蓋自青苗之議起而天下始有聚斂之疑青苗之議未竟而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之禍未父而漳河之役作漳河之害未平而助役之事興其間又求水利也則民勞而無功又鑿淤田也則廢大而不效又省州縣也則諸路莫不強民以應令人起東西府也則大困財力禁門之側斧斤不絶者將一年而未巳其議財也則商賈市井屠販之人皆召而登政事其徵利也則下至于厯年日而官自鬻之推此而往不可究言古之賢人事君行道必馴致之有漸持久而後成至于設施皆有次序今數十百事交舉並作欲以嵗月變化天下使者旁午牽合于州縣小人挾附佐佑于中外至于輕用名器混淆賢否忠厚老成者擯之為無能俠少儇辨者取之為可用守道憂國者謂之流俗敗常鑿民者謂之通變能附已者不次而進之曰吾方擢才不可招者為名而斥之曰吾方行法凡政府謀議所以措置經畫除用進退獨與一屬掾曾布者論定然後落筆同列預聞乃在布後故奔走丐乞者布門如市雖然猶有繫國家之體而大于此者祖宗纍朝之舊臣則鐫刻鄙棄去者殆盡國家百姓之成法則剗除廢亂存者無幾天下所謂賢士大夫比嵗相引而去者凡幾人矣陛下亦嘗察此乎去舊臣則勢位無有軋巳者而權可保也去異已者則凡要路皆可以用門下之人也去舊法則曰今所以治馭天下者是已之所為而陛下必將久任以聽其伸縮也嗟夫此事之實也其名則曰革弊而興治是以陛下樂聞其名而然察其實也夫賞罰號令乃陛下所以砥礪天下而鼓動四方以為勸信者今有人焉能舞公事以傾勳舊能興大獄以逐官吏其事是耶乃其職爾何至超任以為職司耶趙濟是也又有人焉以渭山欺罔之始既以此得罪而終始以此增秩王韶是也程昉事漳水以興大役困一方而無成功趙子幾挾情以違法禁按史以防民言則皆置而不問乃是賞反施于聖人之所當罰罰不及于王法之所當誅也畿色之民以助錢為訴也陛下聖旨令召情願東明知縣以不能禁民有訴而被劾也陛下聖旨止令劾擅升戶等之事二者皆獨斷之善政而中書皆格而不下此則陛下之號令不行也西師無功而曰非朝廷之本謀天下但見給軍之費輦出于京師空名之語馳下于西路又命一知制誥于將幕使専代天下之言報復號令絡繹于道苟以為非耶何不止之逮其事敗則曰非政府謀也捐費緡錢以千萬計秦晉之人肝腦塗地日增軍士之怨結邊疆之釁而不自謀咎乃致陛下發中詔以責躬抑徽號而不受忠義之士誰不痛心而疾首至如助役之法臣嘗言之矣其條制纎悉臣雖未能究見然終以為使天下百姓賦稅貸債公私息利之外無故作法升進戶等使之概出緡錢皆非為人父母愛養基本之所宜為者故臣謂之聚斂非妄言也陛下任遇輔臣如此其重而致主之術乃用此道是皆大臣之誤陛下而大臣所誤者誤諸臣也今既顛謬乖錯敗亂綱紀知天下之不容懼宸衷之回悟以謂雖中外之士畏避無敢言者然其尚敢言者獨御史有職爾故又使司農熒惑天聽作為偏辭令臣等分析以摧沮風憲之體艱梗言路欲其憂懼苟容而緘默或欲撩其危言從而擠逐不知忠臣節士雖戮辱不懼所以盡事君之義爾今羌夷之欵未入反側之兵未安三邊瘡痍疲潰未瘳河北大旱諸路大水民困財力縣官匱竭聖君恭勤思治萬方之所知而在輔弼者方欲蔽天聰明使下情不得而上達其何心耶臣願陛下思祖宗基業之艱難念天下生靈之危苦少回幾慮收還威柄深恐異時專權肆志將有陛下所不能堪者則必至于虧失臣君之恩是今日養之適所以害之也若夫馮京王圭同列預政皆依違自固不扶顚危雖心悟其非而無所救正已之進退又媕婀而不決皆非所謂輔臣之體臣四海之內孤立獨進陛下過聽任以風憲嘗竊思之近嵗臺諫官疊以言事罷免豈其言皆無補于事歟豈皆願為訐激險直之語以自為名而去歟嘗以為欲言政府之事者其譬如治湍暴之水可以循理而漸導之不可以隄防激鬭而發其怒不惟難為功亦為患滋大故臣自就職以來竊慕君子之中道欲其言直而不違于理辭順而不屈其志庶幾愚衷少悟天聽而亦不敢婞婞然如賤丈夫以一言一事輕決去就致聖朝數數逐去言事而無所禆補思以上全國家體而下亦能久其職業而成功名兩月之間才十餘疏其言及助法者止三疏耳當天下多事之時而臣言簡緩又不足以感悟則其負陛下亦多矣不意大臣之怒已至如此令臣等分析分析之事前代無之祖宗無之近年已來乃為此法以摧言者之氣方陛下孜孜聽治嘉于納諫而大臣所為則不得正目而視此所以發臣之狂言而不能默也伏願陛下深察其事物之變安靖之治以休生民有所措置以大小緩急為先後之序以義利經權為本末之辨自兹凡有獻替于陛下者乞有以誘掖奬厲之罷分析之命以尊嚴朝廷而養多士敢言之氣臣不勝惓惓憤悶愛君待罪之至代留守張方平留閼伯微子張許三廟奏伏見司農寺奏請降制應天下祠廟並依坊場河渡例召人承買狀取淨利本府管下所管祠廟五十餘處各已施行內有閼伯宋公微子廟閼伯廟嵗納錢四十六貫微子廟十三貫並三年為一略臣竊以閼伯逺自唐堯遷此商丘之地主祀大火而火為國家盛德所乘而王本廟厯世尊為大祀微子宋之始封君開國于此亦為本朝受命建號所因載之祀典垂之甲令所當虔潔以時奉祀又有雙廟乃是唐張巡許逺以孤城死賊所謂能捍大患有功于民者今既許承買日後小人以利為事必于其間營求招聚紛雜冗褻何所不至慢神瀆祀莫此為甚嵗收甚微實損大體其餘利害不敢盡言欲乞朝廷詳酌留此三廟特免出賣以稱國家寅恭典祀崇尚前烈之志乞愼擇講讀官奏臣竊以聖人之德其聰睿神智固天性之所自有然孔子曰吾非生而知之好古敏以求之者也孟子亦謂人皆有四端是猶火之始然泉之始達在乎充之而巳苟不充之將失其本然之性則雖聖人方其始也學問以達之範圍以成之者其可少哉昔有周成王幼沖踐阼其師保之臣傅之德誼道之教訓者周公召公太公其人也夫左右之人既如此則成王雖幼其耳目所入蓋無有不正者矣我仁宗之初亦以盛年嗣服用李維晏殊為侍讀馮元孫奭為侍講惟兹數人皆名儒宿德極天下之選是時方親庶政聽斷之暇每于雙日召使入侍講説經典或讀柤宗故事盛明之政慶澤無窮恭惟皇帝陛下紹膺天命傅序統命夫以異稟之資夙成之善而又上有太皇太后陛下之至仁厚德保護開祐所以成就者罔不備至矣然方春秋鼎盛在所資養左右前後宜正人與居語默見聞宜正事是接所以起善養源保微愼始尊德美而長智習致廣大而熙光明則勸講進讀輔道之官其可不愼擇也哉伏見兼侍講給事中陸佃蔡卞皆新進少年越次暴起論德業則未試語分望則素輕使在此官衆謂不宜伏請罷其兼職以允公議仍欲望聖慈于內外兩制以上官內别選通經術有行義忠信孝弟淳茂老成之人以充其任遇非聽政之日便殿燕坐時賜廷對使之執經誦説陳天下之義理古今君臣父子之道以廣睿志仰副繼善求治之意臣不勝愚欵取進止請依程頤所乞奏臣伏覩制命以布衣程頤為通直郎崇政殿説書者恭以尊儒重道振舉遺逸使天下歸心固聖朝之所宜為也然臣竊惟進退者臣子之大節爵祿者天下之公心進退不失其義則人道立爵祿不輕所與則士心勸二者蓋不可不愼也頤始則節行自守陛下高其風故以州推官西京教授起之頤既力辭從而赴召而陛下又以宣德郎祕書省校書郎待之頤既至未即受命而陛下又賜之廷對官之以通籍置之于經筵蓋頤之遜避不已而陛下恩命每有加焉臣恐頤于出處辭受之際義有難安者也孔子曰如有所譽其有所試矣孟子曰仕有時乎為貧辭尊居卑辭富居貧頤好學求志有君子之行遭際盛世其心豈徒欲以聲名自售哉固願有所未就也頤親老家貧兄皓有賢行官不達而死在頤之義當仕也為貧而仕則若孟子所謂居卑者可也今有譽而不試每辭而加進臣于是知頤之不敢受也若夫紛紛之論致疑于頤者非獨如臣之言也直以謂自古以來先生處士皆盜虛名無益于用若頤者特以迂闊之學邀君索價而已天下節義之士樂道不出如頤等輩蓋亦不少彼無所援乎上故不聞爾又以謂頤辭免爵命之日曰前朝召舉布衣故事具在是頤之志欲為仕之常秩而亟欲得臺諌侍從者爾臣固知論者之或過也然而是非疑似陛下亦不可以不察也聖人自有中道過之則偏天下自有常理背之則亂伏望陛下審真偽重名器聞頤方辭恩制乞降指揮依頤所乞成就其節止授以初命之官既使得以祿養其親又使授之有義免于似是之謗後日見其可用而進擢之蓋未晚也于陛下尊德舉賢之道無過不及者不亦休哉取進止貼黃聞頤有所建請數事如欲令經筵侍臣坐講之類又有非所宜言者衆傳以為笑不知有是事乎惟望速降聖旨依頤辭免但命之以初官試之以西京教授庶幾成頤之志完頤之節以息羣議而亦不害異日擢用也夫亷恥不立于天下久矣今幸而有一人焉若授受不當于義則使天下靡然益不以亷恥為事豈不重哉乞增諫員及許察官言奏事臣蒙恩過聽使備員御史固將竭盡愚論知無不及而竊惟陛下即阼聽政之始其所先者宜莫若廣言路故臣今就職之日首獻其説蓋聖人以一心御萬事而無遺慮以一視周四海而無遺照非能身親而目得之也為能資諏訪度致之人言開闢其塗使無壅蔽上之公卿大夫百執事下之雖工瞽執技之賤芻蕘負薪之陋皆得輸意自竭雜然至前而聽吾之所擇惟懼乎言者之不能如祖宗以來諫官御史張設員品罕不備足凡在職者皆有言之責臣今伏見計官止大夫官一員御史臺自中丞而下雖十員然止于中丞侍御史兩殿中法得言事外監察御史六員專于察治官司公事文事之稽違者而不預于言則是在朝廷以一言官而任其責者裁此五人而已天下之大臣工之衆權強之漸朋比之萌民之休戚政之利病其于獻納伺察誠恐耳目之未廣事或有不得盡聞于聖聽者此非帝王明四目達四聰開衆正屈羣策者也臣欲于諫院增置諫官數員本臺監察御史並許言事其所領察耳目不廢如故所貴共盡忠力交輔聖政臣不勝惓惓取進止依旨推擇監察御史奏準尚書省劄子節文臣僚上言近降指揮御史臺察官並許言事臺官共置六員則在臺八員之中當減二員莫若指揮長二察視本臺除言事官外某可使者某可罷奉聖旨依奏續準尚書省劄子朝散郎試御史中丞黃履奏現今監察御史六員除劉拯外其五人並係臣論薦伏念臣既嘗稱其材以進之又擇其不材而退之在臣私義實恐未安欲望聖慈指揮止令侍御史劉某推擇奉聖旨依奏並劄付臣者右謹件如前臣契勘本臺監察御史六員舊來專領察按近制並許言事逐官皆係臣僚保薦堪充御史之人今除陳次升一人現今奉使差出臣未之職外有劉拯安惇二員劉任久次可以減罷伏望聖慈量才别加任使其餘合依近降朝旨指揮施行乞依舊令封駮司關報差除奏檢會準元豐五年五月七日門下省劄子門下省奏據給事中廰狀封駮房勘會昨會封駮司準元豐五年七月十八日中書劄子節文御史中丞李定狀奏乞應有差除並令封駮司限當日關報本臺奉聖旨依奉續準當年九月二日中書劄子節文同知諫院蔡卞奏乞應有差除及改更事件並令封駮司抄録關報奉聖旨應差除及改更事件到封駮司者並令抄録關報者勘會近準新制撥封駮司歸門下省為封駮房其舊封駮司準朝旨廢罷又準官制新條諫院已廢諫官係中書門下官外即不言舊條合與不合行使所有本房承受差除及改更事件今來未敢依舊關報亦未敢便行住關白帖子稱如合依舊關報未審以何司存為名如以本房緣以𨽻門下省若以本省又恐內省無關報外司之理及檢會式令即無門下省關牒外司條式奉聖旨更不關報臣竊以朝廷愼于出令故使官司更為檢察內之則門下侍以封駮外之則臺諫許其論列然朝省之上事有漏泄禁罪不輕人誰敢傳若非門下以司關移則臺諫所聞常在命令已行之後此定與卞之所以有請而先帝所以從之也其後給事中徒以封駮改司為房人疑內省不敢關報外司遂作申稟致有續降指揮釐革今來惟是敕命巳至六曹已作奉行方始隨事關報苟理有未安給事中失于駮正或雖駮而失當其差除之告命政令改更之制往往已授受施行矣而臺諫官方從其後論之雖以聖慈優容聽納必無難于追改若或者以為號令已行不可反汗則是雖設之官而無補于事也故臣愚欲乞且用元豐三年指揮凡差除及改更事件並令門下封駮官依舊于當日關報諫官御史臺所貴成命未下先事裨補而朝廷亦易于施行貼黃封駮司改為房名號雖亦小異而事任不殊若謂不可用關恐合以給事中移牒逐處乞詳酌乞令臺諫先次上殿奏臣昨于十一月十日曽具狀奏乞先次令言事官上殿不蒙施行後來竊聞恐候開年降指揮以此不敢頻有申請今來已是嵗盡伏望早賜聖旨先次許令臺諫官上殿奏事所貴公議人情不至隔塞得以詳悉開陳上達天聽論三省樞密院差除奏臣唯吏部牒十月十六日三省樞密院同奉聖旨唐淑問除左司諌等事又牒十月二十八日三省樞密院同奉聖旨陸佃等罷侍講事臣竊睹自來朝制及近降官制格凡差除有中書進擬者有樞密院者有三省者有三省樞密院同進者蓋建官分職各有所治法無相參也三省樞密院同取旨者似止于差除帥臣邊鎮大吏內臣近上差遣而已今來差諫官罷侍講不識樞密何為而預也外言籍籍皆以三省容縱密院侵紊政體莫不疑異臣竊以國家所可恃者在綱紀大臣所宜守者在名分綱紀正于上則下無邪志名分治于下則政無多門一有奪移何患不起况朝廷今日正當尊強君道謹守祖宗法制嚴臣下之分以消壓權僣之心今廢置官吏陛下大政而三省之事也樞密院非其職逾法出位橫造議論公然犯分臣恐積微至著交亂官守漸行私意以害政事上則陛亷之等慢下則傾奪之患生杜漸防微實繫國體望聖慈特降諭旨戒諭三省樞密院臣僚凡以差除擬進者各依自來條制班次取旨所貴正名定分事無侵逾以尊朝廷以正在位取進止貼黃臣又慮上件差除諫官等事曾降聖旨特許樞密院同進借有特旨乃是聖恩優禮報政欲合同衆論之意而大臣之節自當引義辭免惜朝廷綱紀以安分守不應乘便冒進漸隳失體制忠肅集卷三
