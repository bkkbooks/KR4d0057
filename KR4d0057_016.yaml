body:
  text: 忠肅集卷十六宋劉摰撰七言古詩汶上送黃任道遊吳屑霜飛空木葉脫長河波光碧玉滑江南仙客厭塵埃歸夢寥寥向吳越故溪時到春未還正是梅花弄香雪太湖寺下吟新詩姑蘇臺邊醉寒月江橙甘熟霜夜酣吳酬香醇凍醅撥遼東歸鶴悲是非鍾阜曉猿驚契闊嗟豫不得從之行兀若孤鷹歎韝紲東南山水遊子多航深屐險無時絶去非賈道百不一寂無風詠十常八君提吟筆尋鄉邦詞源浩若天潢決形容物象空鼇峯搜摛祕怪窮禹穴人生難足惟勝遊意適何勞計窮逹崢嶸歲律南浦寒早晚歸艎櫓聲軋不獨孤陋勤所思雙白應須念親髮秋收農家之富秋始見十色田利皆豐登擔贏車載上場圃環舍隱積如高陵園蔬林果不足數山雉野兔霜未增連村簫鼓謝神貺穀黍換酒無斗升田家之樂豈不好胡為不歸邀我朋榜舟梁澤家汶北咄哉反此如韝鷹社日陪祀渚宫退作長句呈聖鄰屯田楚鄉地薄氣不密寒燠開閉無春冬盛陽不效二月尾日夜霰雪雨以風社壇汙潦害展祀奠獻蕝席移渚宫層臺大廈禮少變餼羊不去精享通須臾巳事雲解駮象緯落落天曈曨起憑危欗久顧望肅然羽翼開愁胸恍疑身世此何地蓬瀛岌岌三山宫平湖無波萬籟息但見橋影僵雙虹豈無林花與嘉木蕩搖摧折今一空枝頭尖纖卷寒緑水面狼藉浮殘紅荆州獨此號勝地經年未始來其中夤緣陪祀幸一至豈期端值青春窮嗟吾老去少歡緒況乃人事多匆匆與君卻作避暑約解衣岸幘看雲峯攜壺挾策無不可此樂豈特春遊同送客渚宫歸至學舍覽君佩獨登城樓詩次韻奉和淵明田蕪猶未歸胡為簿領甘沈迷樂時選勝豈無意政值一春風雨淒但宜夜几守黃卷酸寒擁鼻燈火低盛陽充發破隂沴幾日天氣回慘悽朝來送客過楚渚平湖緑淨凝玻璃乍驚物象豁塵眼亦有亭榭堪攀躋草光浮浮古岸北花氣靄靄層臺西杯盤共坐蔭清樾歌笑起行循大堤鳧雛鷺子漾淺曲絶勝乳燕巢深閨幽尋踽踽不自覺城陰步滑猶春泥心間漫隨流水逺境靜卻憎幽鳥啼何時短艇弄明月安得巨筆凌長霓歸來學舍坐搔首外物何足干天倪闊疏但愧事業淺剛褊分與時俗暌如君年少喜學問青雲萬里端可梯城頭新篇真自得豈假朋友相招攜我亦林泉偶尋勝因君成詠初無題登高能賦子之職敢以城闕譏挑兮承牒荆門呈諸友方城道中詩墨新原注澤民近沿牒方城有詩荆門山下有行人同盟邇來無髣佛傍馬欲去尚逡巡荆門西行一百里玉泉之境天下聞諸君不能伴康樂請賦黃鵠飛秋雲次韻王潛江馬上長句因招之雙鳧飛下王喬縣别後緒言談未遍君能有意齊是非吾久無心恥貧賤青袍塵滿高情倦急索歸鞭重增眷陶家池榭雖所懷楚渚林亭應未見題致政朱郎中適園林南宫仙郎緑髮翁歸來甲第荆城中翁家祖世有名德至今孫子傳清風園亭繼繼事營治增華到此窮智工鋪張百物各有職崢嶸一界疑壺宫清明過去春事老林叢暗緑陰相通朱欄曲檻巧暉映曉風夜露香溟濛溪魚野鳥樂晴昊碧蘿怪石依長松方城清泚雖可濯主人纓上塵久空年年三日縱士女觀遊思與鄉人同及時娛樂日月邁肯使蟋蟀悲晉公閣書深藏一萬軸牙籖錦帶嚴編封脫巾解屨遊覽倦燕坐自有黃卷功三年羇客偶幸至歸來搔首嗟蒿蓬生涯適意最難事安用勳業銘鼎鐘鄉人勿笑翁不出門外勢利方憧憧贈穆道士離石道士心迹間學行已老猶少年昔遊京師友豪貴聲名成就來淮山恬然頗已厭俗纍靖館嚴密諧新安朝真香火儼晝殿步虛聲謠鏗夜壇六甲星辰逆禍福一爐龍虎誰神仙北州有客性疏野誤為世網相拘牽時來與子款談晤間心慰愜愁病蠲曾將出處大計説聞吾至論頷曰然東風滿江春瀲灔孤帆曉挂荆州船他年會合未可約訪子應在蓬萊顛次韻晉陵吳秀才傳見貺道卿詩思清如水披衣霜夜吟寒星意深調苦悲萬古平明寄與鍾子聽北窗病客爽心骨若飲甘露枯腸盈嗟夫世故玩形器智者營役奔風霆區畛大小各爾志不可慕者鴻冥冥吾于世珍粗有覺未逢燭理瘖不鳴短篇講好聊寫意弱趙安敢當秦兵小孤山萬山逶迤起彭澤齊驅擁立江東隅水西平地曠千里惟此一峯高且孤氣嚴勢峭鬱獨立意不與彼為朋徒夾水對峙寡當衆衆色愧慘驚頑粗天公結融若有意以此壯我淮甸無青天長劍倚千丈碧玉大筍巍一株古今畫工昧好惡峨眉鴈蕩爭為圖方言訛傳楚俗鬼立廟更以孤為姑我行不暇諭父老正是北風吹舳艫自福嚴至後洞記柳書彌陀碑一盂僧粥三鳴雞漸望天角生晴曦積陰凝靄不得肆蕩滉破散爭紛披清明物象各有職如再開闢平艱危遊人襟韻廓以喜曉指後洞都忘疲小楚亭北望明滅宛宛一徑微如絲問云般舟道場路從此亭背無險巇寺久荒寂無足往念有子厚彌陀碑獨趨一里轉巖腹剝粉敗赤逢門楣村童門關語嘲􅑜似云乞米僧未歸亭亭故碑立青玉覆以老屋疏且攲常嗟古人不可見尚喜書法存于斯世言書字出心畫體制類彼人所為子厚少年頗疏雋字合飄逸狂不羈胡為氣質反端厚至今觀者多有疑或云彼以竄逐久氣志軟熟非前時又云高才尚薄世故獨立法無所師吾嗟世俗日無理好惡不正論苦畀臆決萬事豈獨此此書何愧人不知碑陰三百四十字疏瘦徑麗何精竒九十三人姓名具陳纘寶歷元年題云此柳書一碑者元和三年刋厥辭至是二月始建立都其事者楊與倪塵蒙壁礙世未見自我訪尋初愛之嗟物晦顯似有數恨不從事氈與槌巉巖西山邃無數行及二寺方晨炊東南溪磴斗孤絶下及平壑如懸梯南朝佛子謂慧海卜庵于此存遺基鬼神饋食以車運石崖轍迹如在泥智不足以盡萬物敢決真偽論是非老僧夜語亦有理明發䇿杖猶遲遲代書寄文瑩道人白雲孤起飛杳冥光如片玉輕如冰出山歸山兩何意行止偶然無滯凝故人浮舟數百里得得訪我湘江稜二十年間四相遇童顛疏鬢霜各增寒齋笑語極微妙共以身世均鷃鵬瞥然去矣不我告振錫忽借南風乘聊一徘徊駐衡嶽遂能放意窮臨登崔嵬老骸不知倦軟輿蠟屐勤躋升窮巖險谷訪祕怪往往清嘯猿鳥驚長泉落石響寒玉故意寫在朱絲繩仰揮雲煙斂羽翼俯聽譽毁真蚊蠅書來所説謂如此而惜攜手無友朋又云吾廬已堪睡況彼城市尤足憎意若欺我在遷謫故以勝事用夸矜嗟如豫者安足道進退大計兩未能平生雅志在林壑誤落世紛親繳矰悲吟黃鵠慕越客謝病高居思茂陵羡子徜徉類雲鶴顧我拘窘如韝鷹故應題詩遍崖壁曷若寄我勤緘縢山童癡立索書去寫此安足傾愁膺春日述懷祥風靈雨過二月陳根新種苖爭抽早蠶生齊漸如蟻溫飽指此無歲憂春酒未盡社已過節物又近清明頭茜裙纈袖事來往方盤小榼相餉酬田家之樂世皆慕貴仕難去賤易謀行矣請謝茂陵病一廛一耒歸先疇崔仲嶽鶴舟緑髯滿頷光且修紫石雙眼寒鋩浮茫然襟韻自軒豁見于聲貌非懦柔昔隨羣衆退禮部歸來便作滄浪遊笑買漁艇出巧思飾以丹白名鶴舟長鬚赤腳分相與鱸魚美酒他何求高吟清風洞庭晚一笛明月吳江秋白雲無心伴疏散丹經有訣窮祕幽志非謗國慕處士性欲避俗追浮丘不山不淵隱無迹時時飛棹來皇州保康橋前艤清夢峩冠爛醉都城樓胸中有物齊出處天下無方隨去留太平取士有階陛幾人年少能公侯公侯未有君所樂一時外物為贅疣束之簪紳豈其性軋以利害仍相矛媕婀稻粱效雞騖馳逐羶穢爭蚍蜉相逢感慨慕黃鵠嗟我方以斗祿囚賤官綬藍誰不爾應書隨俗卑可羞鶴舟之樂慎勿棄勸君起者非良謀原注諸公詩勸君棄鶴舟以就舉故云云虞城早起道中寄公秉幕府諸友屋角一夜羣枯號曉來曠野風如刀峩峩殘雪路摧馬格格寒氣冰生袍四支僵痺非我有況彼鞭鞚難持操天東朝日凍應澀亦戀暘谷猶深韜居常誰不事行役我行適此時令遭因思都府盛僚友人物一一皆賢豪想今酣寢夢方足初離密幄驚寒朝左承右侍各以職氣語蘭臭顔如桃奉持巾匜事盥櫛傅唇澤面供香膏不容髮緑一點變亟以寶鑷爭除薅炎爐卻坐日當卯進酒為壽傾葡萄捋鬚束帶欲出戶問訊分付猶忉忉體舒意適自穩暖洋然盛氣虹霓高此時豈復念寒旅嗟我勞佚何相遼入趨留守退幕府坐據大案臨諸曹曹司進若魚在貫文書盈抱紛牛毛爭前鬭敏請蒞職研磨濃墨揮長毫左手鈐前右摘尾落紙葉葉如翻濤逢姓書字且不給何暇可否知根巢坐中耳目已煩困庭下敲撲仍喧囂伏膺胝手腕疑脫退食筆硯方能櫜乘除賴有此事在庶幾可以均吾勞人生誤落世網內區區係纍安足逃要之虛中日自靜不使內外相鈎膠無窮來物彼千萬坐任變化無吾騷崢嶸年華已遒暮不日春意生蘭蒿一樽相與莫相放天下萬事從滔滔還郭祥正詩卷李杜酒死詩不作風雅三百年來窮世儒未必甘汩沒才不逮志終無功汾陽有人字功甫歘然聲價來江東當時未冠人已識知音第一惟梅翁翁主詩盟世少可一見旗鼓欣相逢當友不敢當師禮呼以謫仙名甚隆原注聖俞以君為李白後身故諸公皆以謫仙稱之君亦自謂太白出世姓雖異精靈同姑蘇江水瑩寒鑑江上碧玉排羣峯壯吟豪醉售佳境日題百紙傾千鍾折腰藍綬豈所樂養親斗粟曾未充蓬萊幽夢挂寒月青山歸思隨飛鴻書來寄我三巨軸華緘開破溪雲封駭然按劍覽珠璧悸若赤手勍蛟龍長吟千言短數百造語險怪神為工四明賀老忽去世伯牙悲愴間焦桐嗟豫逢子衆人後今其所得何最豐前日過我北池上正是清露沾高松涼軒坐聽哆宏辨瀑布千丈懸秋風謫仙有此願自重世俗酣尚惟纖穠彼其耳目不自信滔滔誰樂聞鼓鐘太上雅意興禮樂一日鑒賞期至公煌煌帝業子當頌勿歎憔悴空山中送蔡景繁赴淮南運使新堤洛水東風峭下入長淮春浩渺淮南使者蓬萊仙疊鼓鳴鐃畫船曉旦時契闊慕聲名晚嵗綢繆親紵縞磨鉛並直登瀛州對案同廳佐京兆青蒿長松慙異質流水高山喜同調雖當倥偬喧囂中不廢樽罍與吟嘯嵗月撲面來紛紛冠蓋送客聲擾擾北園去嵗賦紅梅南浦今春歌碧草黃金龍節使光華白面書生才縹眇世高臺閣與省府偏歷從容譽清劭投虛餘刃無足為澄清百城付談笑時行有命又有義所遇何多亦何少未應刻意懷軒裳知有高情在魚鳥黃鵠千嵗凌長風奈此沙邊老鶬鴇朝廷羽儀重人物行聞追鋒賜嚴召玉音寄我其無忘時有歸鴻下雲表酬寄趙郎趁我弛擔初為寄肘後楊炎書盈編專備瘴嶺病仁及來世功誰如城南老廬有别舍我來掃榻成燕居坐忘不復一念起寸田自治何須鉏養生防患不知此從事方藥亦已疏飛鳶未妨隨溪水黃茅正使侵庭除玄膺晨潄已可飽脯膳況復餘米魚聊將此書一過讀寄語庶不憂鄉閭跋覽前此唱和詩卷有詩次其韻窮不廢詩真技癢筆研風雲日相向聖賢發憤乃有作三千餘篇自古上荒城誰我同此聲惟有哀猿嘯青嶂窮人所作誠已難平淡豐腴乃嘉唱橫槊壯氣雖蕭蕭擊鉢爭先猶行行敢懷修門成怨騷亦防飯顆嘲苦相江湖千里山千重朝夕供吟紛萬狀間適非以娛時人可口甘酸勞醖釀案後詩韻此處缺兩句大兒歸不開卷軸喜我窮通心已忘種瓜頗欲學東陵醉尉亦從呵故將古人能輕萬戶侯為有千篇相等量再作何事勞心四愁望側身泰山日東向君子九夷猶可居已謀築室金溪上距江藍輿才兩舍繞郭屛風列千嶂門中翰墨傅風流自為師友相賡唱曹氏聲名父子間謝家文章弟兄行古人至樂蓋在斯得意未肯博公相頓挫萬象歸毫端雕刻丹青盡名狀古風嚴重周廟鼎小律軟美楚人釀居人惻惻盈錦囊遊子篇篇出驚浪苦心頗恨語不工故實仍嗟老多忘憊休矍鑠空據鞍鋭勇終輸少年將主盟定霸益勉旃少陵勳名何可量長句送跂之官蘄水前年東秦夏六月望日拜恩初賜玦降秩削職遷黃州倉皇束裝三日發故國東平不入城北山一夜辭松栝親朋問訊若夢寐骨肉分留作胡越論罪豈合有民社抵讞正欲加鈇鉞仇家之議不盡用天地寬仁日月察才令分司置之蘄上表謝恩秋已末以御魑魅乃其分欲居蠻夷聖猶屑蘄也雖僻自善地回環山溪富林樾平生雅志在江湖頗與蘄人相締結收拾孥屬已團聚南北無心更分别白魚煮玉粳炊珠佐以秋菘與春蕨築室求田雖未就典衣賣裝略無闕大謬不然心已忘笑人非工已愈拙人生端若夢栩栩事去何庸書咄咄大兒調邑換江南要雖分房無逺别地劣兩舍不宿舂晨起為書午可逹邑四萬戶號難治民雜江閩吏貪猾鋤強洗惡勿著意魚逃至清人忌潔化以誠心磨以久教而後刑不怨殺得聞無毁亦無譽以慰蕭蕭雙白髮易元吉畫猿槲林秋葉青玉繁枝間倒挂秋山猿古面睢盱露瘦月氄毛勻膩舒玄雲老猿顧子稍留滯小猿引臂勞攀援坐疑跳躑避人去倣佛悲嘯生壁間巴山楚峽幾千里寒巖數丈移秋軒渺然獨起林壑志平生願得與彼羣吾知畫者古有説神鬼為易犬馬難物之有象衆所識難以偽筆淆其真傳聞易生近已死此筆遂絶無幾存安得千金買遺紙真偽常與識者論案此詩據聲畫集補入五言律詩秋日縣齋節物秋將半疏慵日益加不為投劾去徒有折腰嗟味酒懷江鱖乘風憶海槎東籬滿涼露已約伴黃花九日再招趙湜夜露感庭鶴秋風吹海槎相思悲歲月寂坐望雲霞終夕孤蟾魄重陽近落花君無鄙貧令金蘂遍陶家和移居二首作邑風流在新居卜築完清歡橐書入小隱奉親安日淡城樓曉霜深囿樹寒吏塗何所得試向靜中看境物生新趣蒿榛失舊墟避塵深戶牖待月廣階除醉夢飛鴻外吟懷晚雪餘相思歲將晏誰叩草玄居登徐州城樓彭城樓上望曠然今古懷山形東負岱河勢下通淮白鳥孤雲並荒煙萬木排吾觀兹有得興欲拍洪崖山口古渡倚雙棹蕭蕭秋色殘山川南去逺風雨北來寒極望銷魂易清吟得句難依稀故園夢千里下雲端送曾繹松滋令粹行完圭璞談經得聖真青袍尚腰折素藴喜民親友益豫孤陋官間子隱淪風騷應賦古亭下蜀江春次韻耒陽鄒明府庸初作南冠至隨聞墨綬來猶憐百里逺時見兩鳧回江日披梅雪春陽動琯灰論文須太白還憶一樽開泊漢口大别山前晚維舟望古津孤煙漢川樹長笛武昌人珠曲今何地蘭洲欲暮春文王嘗美化無復見遺民舟次胡陵中秋不見月舟泊古城下重雲埋桂宫舊期今夕負清賞一年空逺浦依微笛陰崖斷續蟲篷窗強樽酒聊更約秋風秋泊寂寞將軍港船頭撞岸蘆寒濤能灌口幽鳥勸提壺水漲江魚絶秋深野菜無如何晉張翰歸思為蓴鱸梁澤雨中點細波鱗淺聲繁客袂涼山煙藏晚翠水荇濯秋香帆槳無聊國蓑輪自在鄉風騷已多感更欲上瀟湘次韻楊郎中洙早春病客疏慵甚江城節物新東風驚柳思暖雪鬬梅春老信來雙鬢間愁著一身賤貧非士恥漉酒有陶巾次韻吕書記堤上見梅花多病逢多事窮年負物華探春輸野客騎馬看新花南國稀江信東風恨笛家瓊枝心願見行亦下堤沙潭州湘陰縣萬氏積慶堂原注堂在塋旁以歲時祀享慶自前人積堂因孝子成惟時傳有後于此事如生喬木風煙老佳城氣象明謝庭蘭玉盛知不負家聲送永州黃判官並寄丁郎中零陵古佳郡山水楚南竒太守逢康樂佳賓得杲之翩翩漸高陸逐逐就新羈别子東歸去長沙風雨時唐誦甥二首唐生四方志投筆慕前人此日免魚腹異時觀虎臣茅柴酒亦美玉縷鱠應珍莫恨衣都典歸來是早春因滯江州久謂為千里遐欣曾逢漂母幾欲賣朱家癡坐瞻雙櫓東行負九華歸須談旅瑣勿作勝遊誇次韻聖和秋夜對月緑桂西風老金波玉氣明清霜酣夜色羣籟息秋聲毛骨無遺照關河共逺情十年吟塞曲畫角厭悲鳴病起酬聖和安佚失于恃病邪乘所虛遂嬰漳浦卧便憶茂陵居幸爾筋骸立頽然鬢髮疏煩君山柏句慰此不材樗留符離待鄉信未至先隴封楸後羈臣賜玦時放舟初草草去國合遲遲珠滑新粳粒金酣早蟹脂南遷真不負屈子獨何知豐齊道中路逺程難計人慵馬自遲草蛛橫布網桑蠖亂垂絲村落黃梁飯牆籬紫菊枝時豐物皆好客思在青旗送王子正寺祥斷君仕本儒雅故宜京國遊官趨廷尉府心異法家流白草侵寒驛清霜拂曉裘行行句應好雲日望神州小駟送錢中道老馬久勞力主人真寡情知非換妾去頗作戀軒鳴楚豆不為薄江芻無限生誠能懷舊德時借爾山行次韻王仲逹龍圖常慕詩之學今逢將者才諷吟真嘬炙畏默若銜枚天地秋風老江湖醉夢回韶英方合奏難使擊轅陪早行寄田七鞍馬三更夢江湖萬里心辨途聽犬吠占曉望橫參浩露濡衰鬢微風動醉襟輸君正酣寢鼾鼻沸雷音原注君善鼾簡定國原注時以目疾在告原子貧非病張生心不肓興隨緣自足懶與拙相成竹葉疑無分金徽尚有聲幽懷誰晤語空此望東城送席汝明得子固已晚嗟豫材滯頑義合乃朋友不在疏密間江闊東風冷梅披臘雪慳扁舟共春色相約到淮山送計希顔翩翩逺遊子驅馬亂山岑丹穴飛鳴處高堂日夜心春風巴峽曉晝霧楚城陰家世文章事仙臺紫桂林題貴池亭次蹈韻二首一夜山南雪清寒江上州年華隨水去客興為魚留聞鴈思湖表看梅寄隴頭檣烏風信好紞鼓洞庭舟魚味年年美何須問舊池江山清不改陵谷變難知節物驚冬至蕭條使客悲謫仙遊賞地空有白猿詩丙子元日三首瑞歷開三朔祥風驗八方年華恨催老節物喜隨鄉鬱壘須時設屠蘇獨後嘗佳辰誰與醉夢繞故溪傍爆竹驚山鬼雕幡戴楚冠祝延千歲酒練氣五辛盤江冷東風外天回北斗端羌城霖雨甚從此看春寒遙想千冠佩朝元太極天鳴鞘開殿戶索扇起爐煙慶事通祥表和聲入樂懸江湖祝堯意仁壽萬斯年和吳端甫書懷舊學驚心在窮居惜鬢華詩書憑淨几水竹抱鄰家霜雪巴西夢風波楚北嗟知君厭留滯我亦正塵沙二月二日江鄉春值閏二月似深冬雪濕妨挑菜雷寒未起龍雞蟲間得失蠻觸小交攻稍覺雲天霽西山上翠峯送僧懷善獨鶴翩無纍孤雲晚倦飛羣山帶江處一錫背塵歸妙學窮神祕高懷熟世機漳濱多病客空此望巖扉過桑八墓夫子能詩者寒吟四十年于今傳好句無處訪遺編古意哀東野窮愁死玉川惟餘北山塜松柏鎖秋煙寄長吉孫二首别爾忽經歲言歸欣好音神清率更瘦學苦鄭玄心竹徑依山逺沙溪過雨深世科思汝父即已御祥琴賞罷盧溪菊來尋楚澤春蘭舟逾百日椒酒值佳辰勉爾青箱學寬吾白髮人小園遊息地松竹更相親次長庚孫自汶寄詩韻近就陶家舍扶疏草木周頗移蘭就水巳計竹為樓飲食隨宜足光陰任自流爾曹來伴老日問下江舟挽慈聖光獻皇后二首四紀坤儀正三宫册號尊蚤還明辟子坐見太平孫治誥遺神几廞衣出寢門如何天下養難駐白雲軒聖孝心崇報宫庭詔屢頒喪期逾易月陵兆改因山已想天人樂猶睎藥使還蟠桃舊亭上時節壽觴間挽濮安懿王任夫人二首自昔商任貴于金慶裔光來嬪周季歷有子漢宣皇柙玉輝幽竁車雲擁畫裳哀榮無所憾新廟五陵旁鹵簿三川晚佳城一品尊翟衣新襚命神寢舊王園淒斷風鈴逺青蒼霧蓋昏從今知聖作大義稱私思挽大行太皇太后三首四裔柔懷外羣生惠澤中簾闈九年政覆載一心公馬鄧徒聞儉薑任詎有功風雲黃道靜杲日上天東典禮辭先后恩私杜外門虛心延衆正損上益羣元仙路山川近徽音四諡尊賓天去何恨聖孝託神孫夕月沈金殿秋風冷玉衣臨當復明辟忽自厭繁機藥使來何暮嵩呼數已非孤臣恩未報泣望國西畿挽中書侍郎懿獻傅公二首里閈推前輩臣鄰接近班深心語默外大節險夷間付託龜趺字哀榮馬鬛山遙知濟源第風月草堂間公昨初移疾豫方丐一麾尋聞升屋告適是出關時零落孤龍友原注公與豫及故孫莘老最善約為三友綢繆記鳳池白頭懷抱事西望不勝悲挽右光祿大夫知樞密院事贈開府儀同三司孫公二首岑令神情竭裴公柱石衰國貪黃髮舊身負赤松期人也將安仰天乎不憗遺延和聽詔語深見兩宫悲樞極元豐議人猶記話言載來籌廟幄遂見偃戎軒一品哀儀重三司錫命尊綢繆承晚契揮涕望西原挽司空文定張公二首德業文章事公乎取數多雖驚壞梁夢會有望門歌人贖心徒爾舟移古奈何青編如可託後世看巍峩淡泊環中妙超遙物外仙百年從委蛻一匶戢彌天晚契承知已遺風在象賢東橋松柏路不得望新阡挽司空贈太師申國吕公四首元祐飛龍日淮南卓馬歸周人瞻赤舄鄭國賦緇衣曠度銷羣異清言析萬微方依泰山重俯仰失巍巍衡鏡公多士蓍龜信兩宫羣生遂耕織四海戢戈弓奪去天何速藏深壑已空潭潭新府第東閣閉春風玉輦躬臨奠金錢詔治喪襚宫周尚父世爵漢扶陽位席虛羣望松阡竁舊藏門中蘭玉盛有以慰思皇歲有懸車表新聞曳杖嗟風雲四朝仕公相百年家故國山川近西郊鼓吹譁旗常難盡記膏澤遍幽遐哀魯國宣靖曾公三首柱石三朝重軒裳五紀榮忠勳等張霍善慶似韋平光氣收辰象儀型失老成易名宣合靖千古詔幽明鼎鉉調元久貂冠就第間朝廷方憲老夢寐忽頽山白日佳城啓東園祕器頒深宫那可見桃李在人間不憗天何理云亡國所嗟還應騎列宿但説去流沙清廟陪蒸享鴻樞見世家悲風溱洧路哀咽滿簫笳哀光祿王卿二首天驥騰長坂秋鴻御順風俄從絳衣使不待黑頭公志藴留家集光華掩竁宫惟餘善人報流慶在無窮義直中能恕才高氣不矜衆人疑白璧吾道信朱繩勳業無天命文章有子興冥冥何可詰萬古一丘陵哀太尉惠穆公三首奕世承圭衮三朝侍冕旒臨邊晉羊祐坐幄漢留侯樂易門多士幾深廟有謀那知天不憗俯仰一山丘四塞宣皇武殊庭逺世機如何梁木夢不待衮衣歸門戶傳蘭玉忠勳載鼎旗空餘殿楹字鸞鳯五雲飛望履鴻樞府熙寧始識公容無高位氣語有大臣風感慨方山仰驚悲已壑空緇衣國人意轉入薤歌中哀應真李先生三首名教心為樂逍遙志自求遂成君子隱初異道家流風月間三楚巾裳付一丘空餘清泰院雲蘚舊巖秋節行幽人正林泉隱者居忽歌東魯夢未上茂陵書世變還舟壑門宏待駟車衆哀無以致為託挽聲紓生死心先逹康寧壽亦遐令威成白鶴老子去流沙妙意傳琴祖徴言補易家試觀餘慶後簪紱已光華挽秦國夫人三首原注安厚卿母久被三宫眷誰知五福純脂田天府國綵服斗樞人枕夢華堂晚仙期碧海春尋常居養地悄悄繡簾塵賻襚來中禁簫笳去國門素冠空列鼎白髮但歌盆彤管音徽盛甘泉像貌尊所傳天下勸豈獨慰兒孫夫榮子方貴全慶獨乖離晝靜蘭羞歇秋高薤曲悲晴雲縈夀隴霜日照銘旗無復升堂拜空餘執紼詞忠肅集卷十六
