body:
  text: 御題劉摯忠肅集六韻散篇裒集還全璧世久湮淪傳始今劉摯文集四十卷見於宋史藝文志及馬端臨經籍考世久無傳本今從永樂大典各韻中裒集編綴各體具備共得文二百八十五首詩四百四十三首以原書卷目相校尚可存十之六七云必有鬼神來呵護自然天地佑忠忱未嘗釋卷於經邃卻匪空言見理深出處一身守直亮是非兩字辨僉壬明陳十害邪辭闢分析二章正氣森六百載餘惜悃篤裕陵見擯獨何心欽定四庫全書集部三忠肅集别集類二宋提要臣等謹案忠肅集二十卷宋劉摯撰摯字萃老東光人家於東平登嘉祐四年甲科神宗朝纍遷禮部侍郎哲宗即位歷官門下侍郎尚書右僕射以觀文殿學士罷知鄆州紹聖初坐黨籍纍貶鼎州團練副使新州安置卒紹興中追贈少師諡忠肅事蹟具宋史本傳其文集四十卷見於宋史藝文志久無傳本今從永樂大典各韻中裒輯編綴以原書卷目相較尚可存十之六七除青詞齊疏等文十七篇謹稟承聖訓刪削不録各以類排纂釐為二十卷而仍以劉安世原序冠之於首摰忠亮骨鯁於邪正是非之介辨之甚嚴終以見愠羣小貶死荒裔其為御史時論率錢助役之害至王安石設難相詰而摯反覆條辨侃侃不撓今其疏並在集中他若劾蔡確章惇諸疏見於宋史者亦並存無闕其所謂修嚴憲法辨别淄澠者言論風采猶可想見固不獨文詞暢達能曲鬯情事已也至集中有訟韓琦定策功疏論王同老攘功冒賞之罪而道山清話遂謂文彥博再相摯於簾前言王同老劄子皆彥博教之乞下史官改正宣仁不從彥博因力求退今考此事史所不載而集中有請彥博平章重事疏其推重之者甚至尤足以證小說之誣蓋當時黨論交訌好惡是非率難憑據幸遺集具在得以訂正其是非於論世知人之學亦不為無補矣乾隆四十九年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序宣和六年七月六日宣教郎知開封府臨河縣丞劉跂寓書於元城劉安世曰先人平生為文方棄諸孤僅存一篋類次之已成編集念當有序引以信於後晚年遷謫事同諸公身後怨家誣謗又䝉朝廷核實已賜昭雪然而元祐大臣不幸亡殁者類皆不敢納銘於壙植碑於隧始終大節不應無聞於後也願因集序并載一二使他日有考焉顧惟衰拙自少受知於先丞相素叨國士之遇中荷薦引寖階禁從晚嵗遷謫復同憂患而又被譴以來行三十年固窮守道俯仰無愧似不為知己之辱雖懷自顧不足之羞而莫敢辭者蓋義之所在不可得而避也公諱摰字莘老永靜軍東光人也幼而敏悟有成人風年未弱冠被薦於渤海聲譽籍甚凡四預鄉貢禮部奏名為第一復中甲科初始南宫已著風績英宗詔二府各薦士充閣館忠獻韓公琦以應詔補公館閣校勘王文公安石初秉政搜擇人材擢為中書校正居月餘議論多不合㑹除監察御史欣然就職語家人曰趣裝無為安居計即上疏論亳州獄起不止小臣意在傾故相富弼以市進今弼已責願寬州縣之罪神宗皇帝勵精求治奬進臣下公既對面賜褒諭且問從學士安石耶安石稱卿器識公對曰臣東北人少孤獨不識安石也因論人物邪正奏對移時上意嚮納公退益感遇思所以稱因上疏論率錢助役官自顧人其事有不可勝言者略陳十害切中時病㑹御史中丞楊公繪亦論新政并公章下司農司農條件疏校遂劾繪與公險詖中懷向背有㫖分析公奏曰臣有言責采士民之說敷告於陛下是臣之職也今有司駮奏遂令分析交口相直無乃辱陛下耳目之任哉所謂向背則臣所向者義所背者利所向者君父所背者權臣願以臣章及司農所奏宣示百官者定當否奏入不報明日復上疏極論時政遂罷御史落館職擬竄嶺外上不暇乃貶衡州哲宗皇帝嗣位宣仁聖烈太皇太后以祖母共政見連年水旱西鄙未寧百姓勞敝而國有大故當務休息遂散遣京城役夫減皇城司覘者廢物貨場罷戶馬等事皆從中出又戒敕內外無敢苛刻擾民已而進退大臣選用臺諫擢公為御史公受命之始即具以熙寧告神考之語復陳於哲廟之前兩宫聽納盡行其言曽未期月人情於變使天下有泰山之安而無一朝之患者公之力也公既被遇知無不言姧佞刻薄之吏事狀顯著者公皆正色彈劾多所貶出中外肅然時人以此包希仁吕獻可上察其忠義誠信可屬事任未幾遂大用焉公在中書一日內降畫可二狀其一裁節宗室冗費其一減定六曹吏額房吏請封送尚書省公曰常時文書録黃過門今封送何也對曰尚書省以吏額事每奏入必徑下本名已久今誤至此公曰中書不知其他當如法令遂作録黃初尚書令史任永壽精悍而猾與三省吏不能相數以姧弊告諸宰執吕丞相大防信任之時户部裁節浮費後省裁定吏額皆論年未就吕丞相專權狠愎盡取其事置吏額房於都省以司空府為局召永壽輩領之未嘗謀及同列也永壽見録黃愕曰兩省初不與今乃有此即禀丞相命兩省各選吏赴局同領其事以是白公公曰中書行録黃法也豈有意與吏為道地今乃使就都省分功何耶他日又持奏稿以丞相㫖禀公曰吏額事今欲慎密而速故請徑下然未經立法欲三省同奏依致仕官文書法公曰他非其類也更當聚議明日吕相又袖槀厲色示公曰勢不可不爾公不欲立異勉應曰諾其後事畢永壽以勞進官時忱蘇安靜時惲皆遷秩有差於是外議喧然不平臺諫交章論列以為事在後者成就已十八九永壽等攘去才兩月而都司不用司勳格擅擬優例冒賞徇私章數十上時公已遷門下每於上前開陳吏額本末此皆被省者鼓怨言章風聞適實不足深言吕丞相亦以語客曰使上意曉然者劉門下力也然自此忌公益甚隂謀去之遂引楊畏在言路諫官疏其姧邪反覆章十餘上竟不能回士大夫趨利者洶洶交訌其事於是朋黨之論起矣公語丞相曰吾曹心知無他然外議如此非朝廷所宜有願少引避丞相曰行亦有請是嵗八月一日奏事畢少留奏曰臣入處近列器滿必覆願賜骸骨避賢者路上遣中使召公入對太皇太后諭曰侍郎未可去須官家親政然後可去使者數輩趨入視事公不得已受命頃之吕丞相亦求退不許明年公繼為丞相不滿嵗前日洶洶者在言路詆公竟去位朋黨之論遂不可破其本末如此公輔政纍年剛明重厚逹於治道朝廷賴之及為相益總大體務守法度輔佐人主於無過之地其於用人先器識後才藝進擬之際必察其人性行厚薄終不輕授以職任故才名之士或多怨公公知之不恤也取人不問識與不識或多南士有以蕭望之鄭明事諌公曰楚士奈何笑而不答論者謂元祐相以來能以人物為意知所先後而無適莫者公為之首奏事上前言直事核不為緣飾多見聽用與同列語公平不欺未嘗以私屬人人有所欲多憚公聞之公聞之亦為盡力然終不以語也精力絶人逺甚一見賓客及聞其語終身不忘事無劇易臨之曉然省吏每以事試公不以久近區處如一言皆可復故三省事經公所裁定者後皆遵用莫能改云趙彥若子敗官下獄彥若奏與監司有嫌乞移獄他路言者論彥若罔上不實王鞏除知宿州言者論鞏前在揚州不法彥若鞏皆公姻家也語稍及公公請辭位章七八上遂遷就外舍詔遣近侍宣召公入既對諭曰彥若鞏輩事何預也言者皆謂交通邢恕及章惇之子牢籠小人為異日計公心知為言者所中不復自明謝曰臣愚暗招致人言願就貶責既退固請益堅乃罷相以殿學士守鄆給事中駮奏謂劉某忠義自奮力辨邪正有功朝廷擢之大位一旦以疑而罷天下不見其過并給事中罷之於是中外疑駭莫所知謂久之乃知言者雖多專以章邢事為媒孽初公家子弟與章惇之子相識因入都應舉而公家子弟亦遊科場嘗至府第而言者指為交通之迹邢恕謫官至京師以書抵公公答以手簡其末云為國自愛以俟休復茹東濟為東排岸官數有請求而公不之許蓄怨甚久適見公簡隂録其語以示言者言者繳上之且解釋云休復語出周易以俟休復者俟他日太皇太后復辟也劉某所懷如此蓋媒孽之語不一而此最為甚朝野憤之其後楊畏遂升從官搢紳共惡甚於虺蝪東濟亦除提舉常平諫官復論其素行士論不齒不宜任以監司除命遂寢人情更以為快公天性高明不以己長格物既貴恭儉好禮不改平素淳靜嗜書自幼至老未嘗釋卷家藏書多皆自讎校得善本或手抄録孜孜無倦平居不親妾媵家事有無不以經意雖在相府蕭然一室其後南遷不知者謂公不堪其憂親族門人乃知公謫居自奉簡約與在相府無以異也凡有議論惟尚中道不習異說不責苟難務在謹名教而已少好禮學講䆒三禮視諸經尤粹晚好春秋考諸儒異同辨其得失通聖人經意為多公文章雅健清徑如其為人辭達而止不為長語表章書疏未嘗假手凡奏議論說記序銘志詩賦諸文章千餘篇次第著集為四十卷藏於家公自青社罷職和黃州又分司徒蘄州語諸子曰上用章丞相吾勢當得罪若章君顧國事不遷怒百姓但責吾曹死無所恨第恐意在報復法令益峻奈天下何憂形於色初無一言及遷謫也嶺表之謫公拜命即日就道惟從一子家人涕泣願侍皆不聽水陸奔馳見星乃止至貶所屏跡不交人事亦無書自隨宴坐靜默家人具饌告之食則食喜怒不形意淡如也公年未五十即屏嗜欲晚嵗南遷氣貌安强無衰瘁之色居數月得微疾公自謂將終戒飭後事精神不亂安卧而薨公既殁於嶺外所屬為公請歸葬於朝不許己而諸子坐廢家屬冉徙他郡而不著罪於狀又無知其故者雖公亦不知也今上登極大赦天下公既歸葬而文及甫蔡渭皆貶湖州然後人稍知其事起於此初及甫持喪在洛陽邢恕謫永州未赴亦以畏在懷州數通書有怨望語及甫又以公在中司嘗彈罷其左司郎官怨公尤深以書抵恕其略曰改月遂除入朝之計未可必當塗猜怨於鷹揚者益深其徒實司馬昭之心路人所知也大意謂服除必不得京師官當求外補故深詆當路者紹聖初恕以示蔡碩蔡渭渭數上書訟吕丞相及公而下十餘人陷害其父確及謀危宗社引見甫書為驗朝廷駭之委翰林學士蔡京御史中丞安惇䆒治焉遂逮及甫就吏而所通初無事證但託以亡父曽說之䆒治所問司馬昭謂誰及甫對意謂公也問其證據事狀則曰無有但疑其事勢心意如此朝廷照知其妄獄事遂緩㑹公薨聞猶用蔡京奏以不及考驗為辭但坐諸子而已時紹聖五年五月四日也其為諸子叔復護喪還鄉里公嗣子跂徑伏闕下上疏訴其事又持副封詣都堂叩宰相韓忠彥曽布等皆取實封案牘開視知其謬妄明白其以語跂至建中靖國元年二月二十五日有㫖文及甫蔡渭所陳顯無實狀已行貶責紹聖五年五月四日指揮更不施行然復公殁後讒謗所坐皆得解釋渭今改名懋云崇寧元年正月癸酉葬公於蘄州須城縣太谷山之原先塋之東曹國夫人任氏袝焉有詔特依前宰臣例又除公壻通直郎蔡蕃知陽榖縣應副葬事送終之禮極其褒榮四方觀者莫不歎息嗚呼公之厚德髙行追配古人嘉謨偉績播於天下士民者固不可勝數今特取大節載之其餘非公出處所繫皆略而不書八月一日承議郎提舉南京鴻慶宫賜紫金魚袋劉安世序
