body:
  text: 忠肅集巻二宋劉摰撰表謝賜資治通鑑表來事之師莫如稽古作者謂聖嘉此成書思前訓之共由敕有司而申錫敢期孤淺曲被寵榮竊以帝王之道雖同治忽之時不一史惟廣記欲俾後世之多聞書不勝繁常患當年之莫䆒簡則易治統之有綱㳟惟先朝之緝熙遂詔名儒而論次網羅乎數千載之事潔齊於三百篇之中類集羣書劉邵上皇覽之要發明舊典譙周成史考之篇祕以名山之藏進於華光之讀今期傳信更及分頒此葢伏遇皇帝陛下聖學日新孝思善繼亦既省觀於座右又將訓迪於臣工曾是衰愚預叨恩禮學如皇謐方興表借之心能愧班游遂有家藏之幸臣敢不玩篇籍之載求臣子之宜考終始以擇是非因成敗以昭勸戒庶見古人之大致少副盛德之萬分謝生日賜羊酒米麫表七首恩班中禁慶集私門每於生育之辰膺此便蕃之寵義無以避情不自遑臣既齔而孤為貧以仕賦分涼薄逢時盛明遂以斗筲之㣲越承廊廟之任設弧復旦自傷弗逮於親存頒餽示恩敢謂不縁於人廢綸言温厚使節光華將内府之醪牽兼太倉之穱麥禮雖有舊恩實非常此葢皇帝陛下守位曰仁使臣以禮道契兩儀仁函萬類恩爰慶賞槩及疎愚盡鹿鳴之心非徒推飲食之惠効天保之報願以致岡陵之崇璽書將訓玉府班常發為好賜之仁寵及誕彌之日拜嘉興感揣分戴慙伏念臣學本小知器難遠用幸遭聖明才不求備之旦亦玷左右民所具瞻之司惟渉事多艱故易銷於精鋭而尸官既乆徒自積於謗譏留顯絀而未行識包荒之已厚尚矜舊物曲記始生皇乎使節之光華肅傳天語餽以公臺之儀物榮發私門此葢伏遇皇帝陛下謹六聖之典章本二儀之亭育亦既飲食推所以燕嘉賓之心繼之廪庖行所以養君子之道顧惟極陋孤奉至恩誓堅忠義之持仰報生成之施誕育紀辰方起思親之感匪頒鍚福遽瞻遣使之華餐牽有加醪醴惟㫖伏念臣志愚於古材散而蟠越承共政之圖曽乏尊朝之德留連嵗月辱三禁之四遷窮竭技能無萬分之一補竊位之刑未正匿瑕之澤己深㑹析木之集辰實左弧之紀日敢期眷記特沛訓詞馳酒正之上尊綴饔人之厚餼嵗膺慶式幸積私庭此葢伏遇皇帝陛下體貌四鄰興行百禮嘉與四海同忠厚之政惠及臣下得燕樂之心不縁無能而廢故事禄不逮養虚饕推食之恩進思盡忠豈獨屬饜之幸猥以誕辰上紆睿眷敕公臺而發餽賁私室以為光拜受以還兢慙莫喻臣越從羇宂誤被延登徒殫小知無補興運下考清議未免竊位而妨賢仰賴至仁有以包荒而含垢敢謂此日記其始生方懐顧復之恩遽拜匪頒之渥此葢伏遇皇帝陛下體貌近輔勸養衆材飲食已盡其心既冒嘉賓之賜福禄以報其上敢㤀萬壽之歌誓竭忠愚用酬覆燾生育復辰方起思親之感光華遣使遽膺錫福之仁内自省循莫勝慙懼臣志雖慕古慮不極深區區嵗月之間録録弼諧之地上焉萬分之何所補下焉多士之無所稱尚容素飱已愧善貸豈謂門弧之舊旦更頒函詔之深詞餽以餼牽勞之酒醴此葢太皇太后陛下道成萬物公御羣臣推所欲以及其私不以人而廢其禮禄不逮養空饕儀物之豊孝可移忠惟誓捐糜之報使節皇皇詔詞噩噩賁以匪頒之數寵其誕育之辰内惟至愚曷稱優渥臣本非逺業偶玷近司雖葵藿自然知傾於委照而腹背之細何益扵髙飛素飡懐不稼之憂肉食甘無謀之誚未䝉澄汰更辱眷存禄弗及親方感門弧之旦人無廢禮亟䝉臺餽之恩授受以還進退無所此盖伏遇皇帝陛下徳冒萬物政稽二儀欲以盡忠臣之心推此養君子之道予以馭其幸仰戴于至仁忠可移于君誓堅于素節臺之有餽本所以養賢辰及始生誤叨於錫福感深銘骨愧極汗顔臣幸遭異知擢備近輔事君以道福敗取於容容當官而行功不聞於赫赫空饕優廩日懼大詞尚煩推食之恩政及設弧之日兹惠之渥見於訓言餼醴之豐榮於私室此葢伏遇皇帝陛下體天丕冒合日大明道成乎物而不遺禮不為人而或廢欲養不俟常拜賜而念親作忠可移期捐軀而報國謝生日賜器幣鞍馬表析木集辰適及賤生之日細書命使遽推慶賜之仁腆名物以在門撫孱虚而跼地伏念臣本非國器誤玷宰司當路妨賢乆懐於多懼無功報禄更積於内憂徒依末光未詒嚴譴斗筲之器既盈而將傾雨露之私有加而無已於此誕彌之日曲煩齒及之恩咨内府以班常勅近親以將命氷紈文綺發珍笥之兼衣鞗革鏤鍚解上閑之良駟攻金之器璀璨織文之幣纖華容莫逮於報親力非繇於稽古服乗而拜俛仰以兢此葢伏遇皇帝陛下謹六聖之典章篤四鄰之體貌德薄而禮之厚功少而錫之多以尊隆本朝以風勸在位天高地厚莫知圖報之宜義重命輕更識矢心之所乞外任表臣聞事君必盡其誠故當無隐陳力有時而止葢以不能輒傾底裏之懐仰瀆髙明之鑒伏念臣所學昧陋禀生拙艱敢希當世之功名徒慕古人之節行逮四朝而竊仕遭二聖之誤知濫廁羣材遂預初政遷進厯塵於三省首尾已及於四年不繫去來無能軒輊匪惟智慮淺而已竭加以憂患多而早衰兩目頻昏百骸多疾遲徊戀寵出入靦顔内招竊禄之災外坐妨賢之罪與其待人言而後去上煩典刑不若揣已分以自陳猶全出處輒傾孤懇願丐一州伏望皇帝陛下廓日月之明廣乾坤之度矜此已疲之犬馬貸其無補於涓塵特推從欲之仁不惜分符之寵使有民社宣惠澤而下流庶於桑榆收微勞以自効再乞外任表臣聞不備而惟其人故輔臣必用賢者無功而在其位則詩人所以刺之輒控籲天之誠冀逃累國之責伏念臣越從羇逺擢寘顒嚴才不足以達政經學不足以㫁國論無嘉猷以副虚佇之託無重望以慰具瞻之心顧慕留連逡巡俯仰雖皇慈之善貸豈清議之所容夫物理之常器滿則必覆古人之戒位髙者疾顛加之多懼而積憂足以早衰而易病外雖強而中涸目常眊而髪童日迫傾危上孤任使再殫螻螘之志敢避鈇鉞之威伏望皇帝陛下大明燭幽至道成物察臣今日進退之計本無他腸貸臣累年尸素之愆俾全晚節庶㡬稍循于禮義以免大玷于生成藩宣倘畀于一州報効敢辭以九隕叩閽俯伏得請是期再乞外任表近上封章願辭職任㳟承批答尚祕俞音輙再冐於譴誅非敢輕於出處臣誤膺奬㧞本乏器能一預政幾四更嵗籥有妨賢之積愧無事道之顯名毎驚弱稙之漂摇常賴至仁之掩覆滿溢必殆盈虚有時非不知聖神之運難逢天地之恩未報然材智止於如此疎謬見於已然用之易窮如鼠之五技去不為少若鳧之雙飛况爵禄者天下之至公難貪而乆處進退者人臣之大節竊冀於少完儻可効於涓埃顧何分於内外伏望皇帝陛下惻其懇款賜以始終大譴大訶稍骫黜幽之憲有民有社願膺共治之咨誓將勤養於小民尚得仰酬於洪造謝鄆州到任表上書歸相知政路之㒺功出守分符荷天仁之從欲仍以仲連之節臨兹故社之邦内省幸榮曷勝感懼伏念臣起身一介竊禄四朝比辱使令擢從孤遠初由蓬萊道山之府載服柱後惠文之冠以横榻之散郎正中司之報法無為容於左右不自意其感通遂預政機繼塵宰枋然而據非其所者危之道技多而短者易以窮空精鋭之坐銷曽分毫之未報罪多而功不見誓至而毁亦隨思其所安去猶有補章哀祈者六七詔敦諭而再三不求所窮惜東野之御將敗敢釋其位察次孺之辭以誠祕殿清切以寵其名東方浩大以為之部張良㣲志止願得封於留漢帝重恩乃使歸侯於絳以時去國不日到州示以印章人生榮觀識其城郭心喜來歸既見一方所部之吏民具道二聖愛人之恩德感嗟頓首鼓舞瞻天已獲逢白髪之故人又得拜先楸於舊隴書生之幸仕路幾希此葢伏遇陛下純仁厚義以康保萬方至公大明以照臨百辟事叢至而有是非之辨人雜進而識邪正之情使肆戅愚獲全出處臣敢不謹進退之義厲始終之成孑孑藩方身雖在外惓惓王室心不謂遐更期宣化之餘益誓納忠之報賀南郊禮成表聖人能饗熙事備成皇矣顧懐隤擁肇禋之福沛然敷錫肆均大賚之恩㳟惟皇帝陛下凝命乾剛重熙離照西清訪道學緝於光明東朝致㳟孝通乎上下以小毖之心求助以鳧鷖之道守成謂大祀之重五經謹始郊以見上帝朝薦真館祼告太宫侯長日以道迎肅圓丘而陟䧏百神之靈受記諸福之物致祥宣室儲精既逆釐於三極端闈渙號俾作解於羣方仁入有生歡通無外臣叨蕃宣之任布寛大之書執玉甘泉莫効駿奔之力馳心魏闕獲同慶賚之私鼓舞昌辰百倍常品上太皇太后賀表精意以享昭格天人之休敷鍚厥民丕宣雷雨之慶車書所底蹈舞同榮㳟以太皇太后陛下全德在躬大公御政夏塗山之教化周太姒之勤勞聲氣淵嘿而賞罰行堂闈天髙而夷夏治扶維重器自置於安平擁佑清躬益躋於聖教吉禮咸秩肇禋告成寒暑正而風雨時福禄來而菑害去反始報本丕鍚福於洪禧蕩垢滌瑕與更新於庶域有生茂豫嘉氣横流臣幸守藩方親承惠澤雲天在望跡類於周南玉帛侍祠心馳於漢畤謝青州到任表東方大國莫如鄆青愚臣何人繼命帥守莅官兹始揣已不遑伏念臣器藴至淺智靈弗競遭㑹繼明之始越膺共政之圖三俯空逮於六朝千慮蔑聞於一得雖進退必由其道常願學乎聖人而功烈如此其卑終雖收於士論寛典刑於司敗假丘隴之便藩報政稽期實愧三年之魯改符易地猶叨四履之齊惟時東秦號一都㑹士知禮義境控海山厥民富饒少敓攘之舊習其俗舒緩有平易之餘風謹於承流可以無事曽是迂愚之品獲塵寄委之憂此葢伏遇皇帝陛下乾健而粹純豊中而光大沈機以觀變化定鑑以御妍媸人無遐遺材以器使臣敢不振厲衰境激昂至恩簡禮去煩稍䆒前修之治推仁宣澤庶求遠俗之安儻集涓㣲仰酬覆燾乞致仕表事君主於無隐誠必自通陳力至於不能勢宜知止輙露引年之請仰祈從欲之仁伏念臣親際盛明蚤塵華顯文章不足以潤色才業有愧於經綸厯事三朝殆踰四紀内之清塗嚴闥極侍從之榮外之名城大都徧藩守之選乏嘉猷以告於后無膏澤之下於民徒以忠義愚直之心期於弗變至於得失利害之故初不自謀縁兹誤被於聖知嘗亦預聞於國論士儒至此幸遇已多比奉對於清閒頗自陳於衰晏出保留宫之鑰坐安喬木之邦惟厚禄不可以乆叨顧良時忽焉而如失年齡寖邁疾疹交乘神明潰虚難支於外慮筋骸摧薾頓異於前時榮敢尚貪福知已過非特招滿盈之禍懼將累覆幬之恩迫此憂危敢祈引謝伏望皇帝陛下曲矜舊物深燭至誠貸其無補於涓埃哀此已疲之犬馬許上還於印綬俾退養於丘園順服經生儻保完於餘喘顧陪鄉老永歌頌於太平上以成君父始終之仁下以全臣子進退之節伏望聖慈許臣致仕第二表敢期睿眷未賜俞音懼汗雖濡危誠難止伏念臣材質極陋跡援至孤夤縁三聖之知簡㧞衆人之上事功何有禄位過盈雖愛君之心死然後已而從公之力耄矣無能向被恩憐許叨居守厲衰殘而振迅不免曠官懐寵遇以留連又將滿嵗災釁乗時而或至疾病攻老而日深形神之勞兩皆敝竭外内之敵紛莫支持臣非不知聖明之治難逢天地之恩未報迫兹頺朽無以勉强况今時不乏人物皆遂性自惟出處無所重輕曲煩優詔之丁寧益重孤忠之感涕伏望皇帝陛下測其底裏保以始終俾解組以去歸獲全生而退養逍遥漳浦之卧休息茂陵之居既以免鐘鳴不止之譏又以脱器滿則傾之禍陶然歌聖樂以自終則於君父之仁豈特丘山之重第三表未賜允俞倍深感涕在念舊之恩雖厚顧籲天之願未從敢瀝肺膺冄干鈇鉞臣蚤縁一介獲際三朝出入恩榮周旋幸遇積嵗時而徒乆曽報稱之蔑聞居懐竊位之慙且困負薪之疾比乗燕見頗嘗懇激於引年貪奉德音乃復逡巡而就次坐持留鑰又浹嵗筩衰齡益頺壯氣益耗精竭形疲而莫之復日改月化而益以深疾相與以侵陵勢無因而勉强倀倀末路犬馬之力無餘奄奄餘輝桑榆之期有幾故抗章告老謝病乞骸敢謂聖度寛大而不㤀其愚訓言惻怛而未容其去雖事君之禮要以承命為㳟然陳力有期至於不能則止苟免貪於厚禄殆自迫於餘生豈獨貪冒以取世譏亦將滿盈而致陰禍上孤覆燾下喪始終敢竭一誠復申三請伏望皇帝陛下廓日月之明而幽無不燭推天地之造而物皆遂生特賜殘年俾還故里奉松楸而躬事完桑苧以裕生釋去軒裳以消災危之數輔近藥石以冀衰疾之康儻形神之可支安畎畆以自樂優游老境歌詠聖辰謝分司蘄州居住表伏讀訓示俯循罪跡理不容於萬死恩猶畀其餘生秪命奔馳悼心隕越伏念臣羇孤無助勤苦自為承家本出章句之儒所望不過州縣之吏偶縁人乏獲預於政機寖以次遷遂塵於宰席以罌缶之器而渡江漢以翾蠕之力而負丘山空竭一心曽無逺慮待罪期月而已固嘗不勝於人言去國三年於兹終至再煩於朝論釁惡暴列彈劾交興擢髪不足以數罪辜伏鑕不足以謝公議敢累好生之德曲推念舊之仁祗令分務於别都更俾安身於善地咎深謫薄感激涕零此葢伏遇皇帝陛下同德昊穹紹休前烈記臣乆侍於帷幄憐臣自蹈於典刑昔常察其所安未忍置之於理如犬馬簪屨之賤猶弗棄之雖天地父母之慈不過如此臣敢不省非内訟劾意自新往咎莫追長負誤朝之愧來日無幾尚堅糜骨之忠謝新州安置表上負國恩自干罪憲悔心追悼感涕莫收伏念臣以一介之微叨四朝之禄當大明之繼照由外服而賜歸厯塵近司實奉初政心貪榮利乆竊位而無慙識闇事幾日播惡而不悟仰累任人之哲自貽誤國之愆置散投閒固公言之未厭後咎餘責謂顯戮之必申前䝉異恩聊復逺斥此葢伏遇皇帝陛下好生以奉天地任德以法祖宗載加震曜之威備示存全之澤譬父母之譴其子或賜矜憐然瘴癘之逼於身何能淹乆儻厚徳之可報誓孤忠而弗渝代張安道南京謝表天近威顔初違於咫尺地興王業叨任於保釐已見吏民奉宣恩德戀榮兼甚感愧内并伏念臣奮出諸生馴致膴仕惟兩朝奬遇寖階文武之崇資雖一節始終初乏涓塵之小補曩從留務起殿輔藩逮歸覲於路朝旋躋榮於薇省雖時陟降瞻奉於清光曽無謀猷仰裨於願治屢縁頺晏自丐便安圭符之榮恩方頒於俞命車服之賜禮特異於故常洪惟别都是謂大國奉藏衣之原廟謹留鑰之離宫襟帶淮濉左右齊楚當舟車之一㑹列府衛之萬兵閭巷熟錦衣之榮兒童習竹馬之舊嵗時足以展先楸之拜恩禮足以交故老之歡内省欿然其何稱是此葢伏遇皇帝陛下作新大治總厲庶工憐臣之於踐更既勞而乆察臣之於義利粗識所趨特示眷懐寵綏優寄敢不殫犬馬之効庶以報乾坤之仁劄子辭免監察御史劄子竊以御史者朝廷綱紀之所在而天下公議之所出居是官者必得博學多識剛明方重之人然後為稱其任如臣誼藴空疎性智昬塞材亡所長名不著見天聽之過遽此㧞任深恐輕累風憲之地而無以厭服天下之望臣實不敢冒處湏至瀝懇辭免伏望聖慈特賜矜允所有閤門敕命不敢袛受再辭免監察御史劄子聞命震恐㒺知所措竊以臣之事君雖以承命為恭然而不度已之能否貪冒以任事者亦不可謂之忠矣今御史之屬缺員日乆天下皆知陛下慎擇精選思得行誼素重可以表率在位之人以充其任而臣既無學術以明考典故又無素望以取信清議一旦出於過聴强之此職某何以副聖君所以用人之意而允中外之望哉伏念近嵗以來御史補外者雖一時以言事得罪然其人皆有公忠亮直之節竊謂陛下宜賜召還處以舊職必能有補以慰天下如臣之愚不敢冒處所以敕命乞行寢罷辭免御史丞劄子竊以御史府自近世不置大夫而中丞為之長其職在肅正朝廷紀綱繩遏内外姧枉天下之事無不可論非夫有德有言剛明厚重臨義理而知所擇者其誰宜居之臣智疎材下資淺望輕承乏臺端已逾器量雖殫狂瞽無補毫分日懐失職之憂敢意誤恩之及陛下進臣名位不若行臣之言加臣寵榮不若使臣無愧况備官之未乆實揣分以難安伏望矜察愚衷追寢成命再辭免御史中丞劄子臣供職以來為日未乆畧無裨益方俟譴訶恩制横加莫知其故衆人見臣超擢將謂言事有功則恐僥倖生心妄想希効沽激之義傾訐之風爭進紛然郤致多事然則臣雖以能言而進其弊猶且若斯况臣所論之無功乃是當黜而反陟且官為御史本在繩愆苟身冒過恩何以自信此所以夙夜内省踧踖靡遑上繫朝廷懲勸之方下繫臣子進退之分辭免兼侍讀劄子伏念臣孤拙不肖自待罪中執法夙夜憂畏志慮耗竭長恐顛仆孤奉恩奬今復寘之經筵豈敢當此㳟以皇帝陛下春秋富盛嚮意經術講讀輔道正在得人而儒學之士布滿近列猥以屬臣實非其稱伏望追還成命非獨下副公議而使臣安分畢力以守職事獲逃咎責則陛下賜臣厚矣再辭免兼侍讀劄子仰戴寵遇懼不自勝理有未安義難苟止方陛下嗣服之始儲意經藝將以尊所聞而極髙明凡在帷幄左右之臣宜皆博訪宿儒以極天下之選而臣素無資格德義不聞此臣揣分而不敢受也又臣自去冬初備臺職首曾言講讀臣僚宜慎擇經術之人當時頗䝉采納今若冐榮濫處則是前日之言臣自以為己實能堪之此又臣畏議而不敢當也伏望察臣區區非有飾説特賜寢罷辭免尚書右丞劄子恭聞寵命驚隕失次伏念臣淺聞寡識無所肖似昨䝉召自孤外任以風憲愧無古人正色獻替之效莫副陛下虚已聴納之公靦顔尸官日俟罪譴敢冀誤寵擢寘近司今二轄之官為四輔之任用人當否繫國重輕况舊德老成布在要近其聞望皆出臣之右其踐歴皆在臣之前舍而不求乃在虚受苟輒冒處必致顛危伏望追寢以安愚分再辭免尚書右丞劄子天聴甚髙愚誠不達典頒訓敕益用震惶臣竊以士平居時常歎無位以行其道臣今幸仁聖在上好善求材長短畢用遭遇斯時而擢於可為之地自人情觀之宜若可以奮迅而進也臣所以逡巡不敢受者葢逢時愛日雖當汲汲而審已揆分又有義存焉臣愚而多艱或可以小用不可以大受苟力不能自量學未能自信而遽務謀猷國事是所謂苟得者其於國體為累甚大臣一身顛仆安足道哉伏念中執法其任已重常憂不勝今願得因此并解言責别除一閒局庶可以自効伏望察其誠心哀而憐之再辭免尚書右丞劄子使車光華里閈榮歎拜制詞之深厚聴口敕之丁寧恩渥有加兢慙無地臣非敢偽為亷退以邀譽於流俗亦非肯故自違慢以千誅於憲典實以陛下今日之勢於左右政事之臣必當純用徳望乃可以重朝廷而鎮羣下臣材質駑下自度不可大任故不避再三稽命之戮實愧玷聖明知人之鑒伏望追罷恩制改任賢傑庶允公議以全螻蟻之命伏聞御史中丞已差人訖敢乞别賜一差遣亦足以自効辭免中書侍郎劄子伏念臣出於孤平驟遭識㧞備員省轄漫已逾年雖矢心畢力圖報萬分而畧無善狀日俟嚴譴方欲自為投劾之請豈敢更冐遷次之榮况中書之地幾政所出其所付任尤須得人臣自揣量實難稱副辭免門下侍郎劄子臣才質空陋乆玷近列徒以國恩未報不敢引身退避而累䝉遷擢職位愈髙退自揣量實不遑處况東臺出納制命其任尤重伏望察臣不逮收寢新命以允公議忠肅集巻二
