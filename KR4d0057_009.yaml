body:
  text: 忠肅集卷九宋劉摯撰啓回鄭學士啓試可榮庭進明儒館伏惟慶慰某官樂道深造修辭大醇覽皇德之光輝收士科之高妙儒雅政事羽儀朝閨惟蓬萊幽祕之廬蓋賢傑萃升之地尚書給劄獨善於奏篇廣內校文寵躋於華貫盛兹得士實繫斯文雅意不遺嘉音為貺顧馳誠之獨後荷推禮以見先云云回孫學士啓賜命帝庭升華册府郵音遠布士列榮觀某官識貫天元才為國器文章純簡雅得聖賢之歸議論深閎能通古今之變洪惟上德崇右道真垂精藝文留意儒館專賞不靳乎金幣遺編具積於邱山嘗謂久於寶藏慮或殘于魚蠧以簡編之脫爛則義理不屬以文字之重復則句讀可疑務得人而删修將垂世於永久登用豪傑整齊缺訛鉛槧功施是非堅定劉歆經術總七略以諭人班固史才别九流而原道寵遷廣內位正清塗逖聞休命之行增喜賢才之進賀鄭內翰啓拜命黼軒躋榮鼇禁仰聖賢之盛際發中外之歡言某官性德淵靈文章英發當今名世孟子自信於天以道覺民伊尹素為之任忱明足以御萬變恬靖可以敦薄夫氣莊而仁有古大臣之體節安乎義非今進者之心仰聖旦之右文闢玉堂而宅俊職備顧問地親禁嚴陟降夙夜以奉乎清光言語學術以謀乎密命惟時授受繫國重輕亶惟天下之才增大朝廷之任五直一儤方視草於鑾扉泰階六符期亮工於天秩斯文所主於道大光某椎然賤生晚出門下菁莪長育常費阿陵之仁大厦穹隆不無燕雀之賀坐縻吏狀跡遠台廷答計內翰啓被恩宸檢入直禁林朝盛得賢士相為慶某官誼蘊通博文章秀醇出處有古人之風勤勞得多士之譽簮筆持槖豈惟求論思夙夜之功論道經邦遂將副左右弼諧之託無緣慶謁特辱誨函感頌之私敷敘難罄回趙內翰啓榮趨使節召直禁林進德則朝廷尊大孚於士議承家以儒學顯尤重於世官某官文章秀醇誼蘊浩博立朝方格得多士之望以道出處有古人之風潤色論思豈獨求語言之妙弼諧左右遂將膺公輔之圗枉飛蓋以見臨辱緘箋而申貺寵綏無似感佩難名賀崔直講啓已奉恩書入趨召命得人之盛有光朝廷逢辰之亨下勸士類某官敏識好古純履蹈中學誼造夫經綸文章砥乎述作綽然廣譽之弗願而有大臣之為言幕府賔筵階榮於賢路廣文師席傳暢乎道真出處是宜名寵相得不遺遐外見枉緘縢佩風誼之相先極懦𠂻而增愧上揚州王密諫啓近赴山城獲趨藩府籍龍門出入之舊拜台曜熒煌之文未遺疏愚見遇優厚嘗枉事而臨寵繼加豆以從容銜德重深以心銘鏤朅來敝邑恭承簿領之初託在下風有意光休之被矧敝封之密邇繫帥節之統總炎序方蒸福基增厚某官傑然望實華於盛明文章天下之宗道德禁中之老十連有帥聊故國以均勞四輔為鄰竚嘉猷之入告更冀為國自重副人所望賀馬諫議啓被恩宸詔進職諫廷寵簡上心歡符士論某官清通迪哲儒雅蹈方覽盛德之光輝進由直道奮大賢之事業見於四方惟時諫諍之員上繫國家之體樊侯將明於周德望之謇諤於漢廷人物之難古今為重惟高誼之甚盛協寵明之所歸臣有七人寧久外臺之寄召以三節竚陪近輔之鄰方具私書先承教幅云云問候長沙燕諫議啓越去台垣洊更嵗管瑣然羇賤困南北之無歸仰止光塵徒昭回之在望比審輟班漢省分節楚都下車逾時已洽宣於治效臥閣緩帶惟日擁於天祥某官質方而清樂易以正善行足以帥世恬節可以鎮浮山甫將明內裨於衮職望之謇諤世補於郡條國優宗工士望元老南邦是式雖樂於均勞小毖有求方隆於舊德行趨召節入輔大猷某早以無庸獲出門下方賤官之有守叩前屏以無階伏冀云云問候唐殿中丞啓輟從憲臺分符藩治下車周月視事協辰獲藉餘光之依實深私懇之附惟始夏之清暑仰休履之考祥某官奮覽德輝出華王國以富文典學羽儀於朝閨以純概大忠擢倚於御史論議聳聞於天下剛方能世其家風故事避親聊二方州之治清衷思治行膺召節之還某椎然孤生且出門下雖登龍之願未獲賤私而賀厦之心幸依鄰庇答西京留守啓申畫郊圻地隆於京邑保釐宫鑰禮重於居留某官勳績著於本朝威聲憺乎殊俗賢輔繼世克有扶陽之風德化同時復居大馮之後使節戾止民謠藹然行且詠衮衣之歸於以增巖石之重方修慶牘首祝華緘荷德意之相先撫愚𠂻而增忭答西京留守到任啓奉被中檢保釐西郊涓辰之剛視政兹始伏惟慶慰某官功施宗廟澤被生民方注意於太平俄均勞於近輔上眷東洛地嚴别都守橋寢之山川謹漢宫之管鑰非夫勳德之重曷稱居留之崇方厚顧懷行膺召拜傾頌之懇布敘難周答外州前宰執啓拜恩中檢移節名邦亦既下車云初開府方暑時之蒸鬱惟福履之清嘉某官德被華夷功施廟社上之泰階平而六氣正下之萬物遂而四民康比偃息以均勞繼盤桓而易地恩隆於義周公之過親親時止而安孟子之心綽綽日佇衮裳之眷來還鈞軸之尊永綏斯人益究遠業方裁誠而修問䝉過顧而貽書感仰之懷敷陳難喻答永興安府啓二首分閫偃藩下車開府周以上公分陜外率十連唐以宰相臨戎總護諸將某官變通而裁以義剛厚而本乎仁賢業著於三階膏澤加於四海出處以道逸勞是均金鉞專征聊寬於西顧繡裳入署即處於東歸益峻具瞻永綏全盛方裁愚訥首枉誨函感仰之深敘陳莫盡論本朝屏翰之勢莫重關中推元帥統馭之才誰出公右某官厚德世矩高文國華勳勞昔著於秉均風烈今高於分閫撰辰開府闔境嚮風雖上無西顧之憂而人有東歸之詠方圗修問首沐貺音佩荷之誠布宣難究回運使趙司業啓輟自成均按臨東夏凡居庇賴孰不欣瞻某官風節著於南臺名實高於東觀虞庠教育樂於得才漢節觀風慨然攬轡皇華在望黎庶傾瞻欣忭之私敘陳莫盡賀吳省副啓奉膺恩檢榮二計廷伏惟慶慰某官業蘊端閎風微敏裕唐學士之清選望重士林漢使者之觀風才高課等惟時司㑹之府實制中邦之財調度盈虛聊煩於鈎畫弼諧侍從行賴於謨明慶頌方深音封首及良荷相先之顧第增不敏之慙問候宣州宋少卿啓報政中宸解符大國秉圭入覲趨節還臺久叨鄰庇之餘深極歡誠之附某官民物先覺國家宗工忱明之才素高於吏表清重之德雅鎮於世浮三年小謝之邦雙闕子牟之志治有異等既奏於計書入補三公行光於故事某限兹云云開封府迎國信使啓奉將聘節來㑹慶辰涉春夏之清和勤川涂之跋歷茂惟嘉祉休有善祥聖德開誠時紀露囊之節寶鄰修睦嵗瞻軺傳之華首夏在辰修途久御伏承飛蓋已次近畿深惟徒御之勤小展餼羞之勞伏審慶禮迄成歸轅載御居官有守出祖無從已具菲儀庶伸餞禮上張安道啓過聽庸虛特有論薦褒辭浮實愧汗溢顔某官文武宗工廟朝大老謀猶本正深簡於清𠂻出處惟時不渝於直道生民所望以惠綏而康保君子所恃以宗主而依歸繫時安危同上心德夫人而立於世也其重如此則士之出其門者將誰為宜如某性資滯冥學術淺陋不為枉尺雖緬慕於古人未可與權故難諧於世用比從謫籍復被恩書俾脫跡於荒遐獲備員於左右區區自效願竭於斗筲泛泛無裨終同於鳬鴈矧以憂患孤危之跡立於得失利害之途非由藏垢之深安得庇身之久永惟過幸已不自勝敢謂高明而有容忠恕以行道察其所履未至於小人之歸疑有可收遽屈以國士之遇欲使孤進辱借一言馬骨本駑顧眄以倍其價鐘聲既啞調審以發其音敢不迪忠清之方慎義理之嚮退不失志進無尸官上蘇子容啓某罪戾之跡沈廢已甘誤䝉國恩既還其職任又得門下以為之依歸內自省循曷勝感幸某性學中下材資闊疏早游書林旋備憲府不佞薄聞於大道竊思有補於斯民無益聖辰自投謫籍官趨三楚地近五溪冒險風波幾於萬里庇身管庫及此四年敢興去國之嗟但積素餐之愧豈期霈宥不遂棄遺某官道德深造文章大醇非今儒者尋常之為有古君子逺大之識周旋獨立義無愧于神明出處兩忘節不渝於風雨輟承明之近直保留鑰之别都泰然忘勞恬以臥治念昔龍門之峻蓋嘗許登於今燕厦之成敢無自賀上王潭啓一暌門坂幾易嵗元奉緘縢之私曠時而禮不講懷通德之重愈久而心益勤律中春陽氣暄澤國茂惟福履之相休有天祺之繁某官明敏中和淵忱莊厚善政師乎當世高行鎮夫末流潁水再來有次公之寬惠南邦是式如申伯之蕃宣久矣佚勞之均隱然中外之望某忝恩中檢二計外臺望大國之匪賖冀餘光之可託良深幸㑹尚遠參依書謝舉薦書伏䝉知聽之誤辱賜慰薦自視愚陋感愧曷已某聞古聖人如堯者以知人為難當二帝時其民淳以直機僞不作其內外厭然如一以堯之聖哲而其民且若是宜若易知也然其猶曰難者豈堯不以知人自任歟世降三代士尚名譽乃始矯性徇物申僞情立竒節以求聞於天下浸淫習俗靡然以至今今天下教化益不行士生不知禮義榮辱之大分日益惕迫於外物而失其性命之守作於外者或不可求之於其中見於頃者或不可覆之於其久出彼入此以竒合正欲左而右求白問黑傴僂而希合似和拒閉而為我似介默然而無能似德皎然而屬物似才風俗世變君子日少世之職在進退士者頗不敢以風鑒自任時時援堯以藉其口而國家之意亦不以聖人所難者求人於必能故官人保任之法無大賞罰惟受賕者同坐舍是一切不恤嗚呼人遂不可知歟夫大人君子能養諸己故有以待於外明吾之性以觀人充吾之誠以知類物來而應情至而格以一迎萬以虛觀動如鑑燭物如機釋括守之以至信繼之以無吝真僞千百雜然前陳將自我而變化烏有有難知者耶孔子曰聽其言而信其行孟子亦曰吾善於知言某不肖貧無以生勉强而仕其性頑懦不可鐫刻顧自知已審矣而無所望於當世明公下車遽收齒於門下之録豈疑其有可取而取之歟是特矜其孤立察其所為不至為小人之行遂欲挈而使之有以自振歟推聖人不求備之心故不深責以吏效知易象失前禽之吝故不顯比於所應若兹無譽之地或當雅意之取敢不守忠信之大節安性命之大分進無愧於祿窮不失乎義某之所欲無辱於門下以為報者在此記楊氏樂養軒記巴陵楊君總公元尉江陵之石首治東軒於其廨中以奉二親而名之曰樂養楊君修身力學為名進士起而中科選其祿雖約蓋無欿然於義者斯固足以為親之喜由邑以望其鄉閭才百里而遠伯仲六人皆服儒其已仕者又皆在夫左州右邑之近安否之問日交至於庭闈而君方以勤毖外服於公家以恬正事其上以和信得其朋友無一可為親憂者入於閨門怡聲妥節先意以候親之所嚮而恭順之至婦子侍御化君誠孝相與以給其力故凡以佚氣體而遜心志者非有三牲八珍撞鐘列鼎之富與夫金玉文繡之麗而後然也隱冠靚服慈顔壽髮軒堂之上對几而居儷杖而游其色辭笑貌油然而順適祺然而夷豫以安饗乎子職之奉嗚呼養之道不在乎物惟盡誠以得其親斯天下之深樂雖富貴遂其欲有不能以致之而君子所自得也人知楊氏之慶而不知君之樂於心知君之樂矣或不知君之所以致其樂君於是以屬府從事劉某曰願有述乃推其心之所以然而序之既又歌之以詩曰孟軻有至樂父母兄弟間曽參稱能養豈謂口體然二者在君家寓意名東軒啜菽盡於道綵服承慈顔潑潑水中魚采采江上蘭誠至物則腆君子得親歡南嶽御書閣記南嶽釋文政於其所居勝業寺建大閣置太宗皇帝御書其上來請文為之記竊嘗讀國史恭惟太宗皇帝以神武聖謀嗣太祖開基撥亂之後薅洗四方殘餘之孽曽不數年天地清明兵革偃而法度修嘉與天下同休息乎無事文武二者思有以張弛之於是嚮用儒學尊尚經術觀書稽古多所述作於其閒暇則又玩意於翰墨之間凡所謂退朝之樂皆不以易此至真宗始聚其書詔儒臣章别次第著定為一百二十卷刻之金石副在有司又以分藏於天下之名山凡道官佛寺往往得被其賜每嵗推恩度其守藏之學者一人至於今且八十年矣嘗得即其書而觀之蓋其所自論著為世謨訓者固皆原於道德之意而其餘書帖亦多雜取六經諸子之要言正論至或選摘衆流異傳佛老之說說雖不同要皆有益於修身治心為天下國家者以是私嘗推求聖人之意於道德教化其心蓋未嘗須臾離也故雖當閒宴猶從容發見於揮毫之際然則又知其所以勤勤於文墨者豈獨以為娛樂而已哉自書之頒布其藏之者或以旁廡庳室禮事不謹徒知䝉被其澤而不知尊安振顯之甚非所以報盛德之賜揚萬世之休間有知此者矣或未知聖人之為是書其心之所存蓋如此於是既嘉文政能有所建立以致臣子之奉又嘗與之論是書之所以然故書其本末俾刻石於閣下熙寧七年二月太子中允監衡州鹽倉臣劉某記臨湘縣閲武亭記祕書丞衛君孰字文叔治嶽州臨湘之二年以書謂余曰使天下不如古吾知其有人焉謀已而偷者固漫不省利害及夸而高言又曰吾方志逺大彼細務瑣琑焉足為是二人者相與從事積微寖著天下頽政何可勝數吾則不敢吾之邑右帶長江東南地大倚山民剽猾輕為盜既慙古人不能使民不為盜又不能禁其已然尚曰為政耶縣所賴以索盜有所謂弓手者今在吾籍八十人前時聼其便私散居㕓閭呼調不一難以應猝及去而擾平民今吾能不取官與民作區屋以萃之凡若干統以大亭榜曰閲武以時臨視其藝衆既團𨽻有地稍稍就律其材漸若可用而無里巷譁競犯法之患此縣令小事非以為功然願有記告來者使勿廢而已嗚呼余知君不好小事名也雖然罔忽諸小然後可以任夫大俾天下得縣令皆用心如此循而望古有路矣即以其所以謂余者書之亭上壽州學記今上臨御四年詔有司始以經義取士增太學郡國學官設三舍既十年閔學者之未大成法雖立而教養之意未盡宣乃慨然更新之自大學始其法損益可論定者著之書曰敇曰令曰式選建官推之其弗可者使輒言上天下之士於是益曉識上指至者輻湊視舊所增蓋以千數方是時膠西韓君晉卿守壽州一年矣君材强敏至州閲月視州之學歎其庳隘無以承明詔乃得轉運判官廢廨請於朝遷焉日與通判州事新昌石君麟之躬自臨治經地度材新故相參公無調費人不知力凡為屋百一十楹孔子廟居其中師堂生舍列其旁賔有次射有圃樓廡庖湢罔不具邦人既享學之成皆大說喜君曰未也為具道天子所以養士意勸掖率厲使及時進於學又請建官為之師遂以其事屬余記之蓋吏不得良法而行法立而淺聞弗能究宣皆甚所悼也以上所建立且十年而太學猶以故未就緒郡國尤闊不聞問私嘗疑其說今太學更令幸親睹其始而壽州之請亦適至故樂道其實記二君首能不失職以告凡吏之忽此者嘗聞之天下之事有甚盛極利特以施設盩其本而效不著者可以條數而其一學校是也學之論曰置生欲多賦廩欲豐課業欲勤糾禁欲嚴如是以為盛此言可爾尚所謂見其末而忘其本也恭惟上之教士始於一好惡明是非嚮經術俾士知所趨而後申法令以輔焉其法之詳又使論者無不厭此所謂末與本稱本末具而猶曰效不著則尚誰任其咎是惟吏不奉宣故也抑聞之道可言而不盡可言也故六經而下傳載不可盡則古人固以待後世之自得也今士以經進裒然待舉聞其言矣卓然有得乎古人之所待者豈嘗有人乎而未之見也夫本所求者士士志於道而不加力乎所自得則雖侈廟學嚴法令坐聖賢而師之猶為觀美而已豈上所望者耶然則咎非特在吏而學者其可以不思是故並以告焉元豐三年十月記家廟記元祐六年議者謂河間劉公殁於衡州槀葬僧寺因以其地所在其後汶上之葬招魂而已此議既興聞者無以明其不然或以問其孤某某曰此事未嘗有也然此言必有所起以今觀之實狀可按驗者四事理可察見者三而議論所從起者一昔公以祕書丞治道之江華子男某未冠而公夫人之季弟進士陳孝若實同行踰年公鞫獄於衡得疾不起訃聞孝若走衡與郡所委官吏菆於花藥山僧舍事畢孝若返江華挈其孤而夫人陳氏前亡權厝在縣至是議以其喪北歸經由取道復俱至衡㑹公伯兄鄉貢學究允恭率其子鄉貢進士延年自鄉里亦奔訃而至衆與其孤定議火化為兩函致其喪使孝若延年扶護陸走而允恭買舟載其孤以歸允恭父子與孝若今雖死其妻若子若孫若族屬皆在悉見其事實狀可按驗者一也允恭與其孤既至汶上而外氏祕書監陳公希古尚無恙遂留諸孤鞠養於家而延年獨護喪陸抵永靜安厝於僧寺經藏院其主僧曰某僧判官曰永善小師曰文昌及其徒甚衆某嵗時自鄉而往展省祭祀凡永靜之親屬故舊無不見之者自康定戊寅至熙寧庚戌凡三十餘年嵗月久遠不容僞為實狀可按驗者二也熙寧庚戌既卜葬於鄆某躬至永靜迎公與夫人之喪抵鄆權厝於僧寺四禪院僧崇賢及其徒亦甚衆今多存者實狀可按驗者三也熙寧辛亥八月某舉葬公與夫人之喪於鄆之須城縣大谷山之原親族故舊鄉人送葬者先後凡數百人改造棺槨增易衣衾與凡送之事人人為助初無招魂之事借令人有不幸旅櫬亡失則招魂變禮亦古今所有不必遷就以諱其事自須明設招魂之儀顧豈能隱於鄉閭親族故舊之間若一有此意人誰不知者凡今汶上之人皆可詰問實狀可驗者四也實狀如此然聞之者難使人人往按其事則又有事理灼然可以一言而虛實立見者初公之亡在寶元二年八月上旬若聞訃而至復走江華猶在是月某及鄉里親屬皆㑹於衡在是年冬孝若以數日之間權菆僧舍以待復來其勢安肯遽然卜地殯葬遂為久逺之計某與親屬既至三數月間又安得遽已失其地之所在況郡委官吏實預其事事理可察見者一也熙寧辛亥七月某由御史謫官衡州八月賜告於朝許葬訖之官明年二月到貶所誠如議者之言謂心知留殯於彼而未獲則得官於衡正訪求之時也豈有身將往而不少俟先為招魂虛僞之計既葬而又往返訪求參之人情殊無此理事理可察見者二也某與伯父從兄舅氏之在衡也夫人之喪先自江華焚化扶護而至豈有夫人之喪則扶護以行而公獨留殯於經由羇旅之地謂貧不能舉喪而歸則卜地殯葬與舉喪而化之其費孰多謂皆留殯則江華何獨無夫人之殯且陸走兩喪何自而得之事理可察見者三也雖然議論如此必有所因而起某之官於衡凡州郡召宴於花藥寺常以舊經菆厝辭不敢往或曰位次非一惟所菆之舍則宜避一槩避之非也故嘗究尋菆舍之所在衆曰菆寓之日不多而歲月經歷已逺莫能記矣訪求之議其殆起於此乎知之審者謂所以訪求之意如此知之略者與展轉相傳而知者遂皆以為訪求殯葬之地而不獲也然某在衡三年有餘以及元祐幾二十年初不聞有此言逮䝉恩任使責望既重始有藉此言而至者元祐五年有僧某至京師自云花藥僧也山前近得一墳林木甚盛指以為劉公所葬願得奏賜紫衣始聞之駭然徐令詢問考其證驗本末皆無所有知其為誤妄明白矣欲延見之則其言無實欲言於有司治之則干求希望之情類此者非一因使人諭以本末謝遣之愧怍而去其後不復見之然人遂多傳其事者或信或不信大抵皆自寺僧發之此議論所從起者一也某不孝所以顯揚其親者不著而使此言在人某之罪大矣不可以有加矣雖然言在人而欲人人曉之力不能也存其實以待察則可得而勉焉故私載其事蹟本末與公及夫人之志銘並藏於廟元祐六年十二月嗣子觀文殿學士大中大夫知鄆州充京東西路安撫使某謹記鄆州賜書閣記元祐七年正月乙未臣某言臣所治鄆州有學學有師生廩食而經籍弗具非所以訓道德厲人材願下有司頒焉詔可州乃選於學遣二生聽命粵十月甲申得書二千七百卷至自京師州人學子頓首幸甚請紀其事某昔者結髮就師從先生長老姜潛劉述龔鼎臣輩治經藝習文辭上下凡十餘年實在是學於時少長嚮勸程課甚密而書籍殊尚缺然至嘗外假榖梁春秋傳范蔚宗漢書手寫讀之其後出入仕宦又餘三十年假守復來覽觀廟學雖舍宇有更徙而風致宛然如故學生三倍於昔振振焉洋洋焉甚可觀也顧太守老矣無益學者又不能勸駕隱約之士顯之朝廷徒幸遭遇天子崇儒右文加惠學校又以某常待罪左右素憐其愚所請或不忍輒報聞罷以是故能為諸生獲此賜書事雖適然而上之所假寵有在乎是且學興於景祐戊寅實在慶厯立學詔令前歷年最久盛冠東方而未有是賜如有待者是誠不可以不紀乃即學之中構為層樓棲書其上而經傳百家篇帙之名數與典領禁戒之法皆揭之使以時考之若夫身與諸生從事講誦識其大者母為書羞則有學官在而探討勤怠有得無得則又在諸生自為之某也尚欲何言歟夫閣之工費細故皆置弗論獨敘其本末以告凡在學之士與後之人使勤守焉八年正月癸巳觀文殿學士大中大夫知鄆州事劉莘老記忠肅集卷九
