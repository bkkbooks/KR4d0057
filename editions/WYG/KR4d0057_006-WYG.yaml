body:
  text: 忠肅集巻六宋劉摯撰奏議論保甲奏伏覩近制保甲罷團教朝廷所以恵綏疲氓恩施甚厚民得去其所苦就其所安逺近承風莫不鼔舞然臣竊有私憂過計者夫鄉野之民其性易于轉習臣徃見農人或被差役一為弓手手力耆壯之類及罷滿而歸則拱手閒惰已不復能反業于農蓋出入公門㳺集市井有所誘導之使然也今之保甲則又甚焉者衣必華細食必酒肉固己變其向者布麻麤糲之習矣羣聚而笑喧奮臂而矜勇固已移其向者椎魯勞苦之性矣其家質田賣屋出錢以濟其所用官司嵗時教試與之金帛寵之名目以養其欲故凡保甲之父母兄弟妻子一家憔悴終嵗困擾而身為保甲者未必不自喜以為樂也今既嵗教止于一月罷其團集省其監督去其覊縻勞費之患則保甲之父母兄弟妻子欣歡休息復有生理而身為保甲又未必不自失以為戚也彼有自失之意而欲使人俛首甘心盡如平日肯復從事于耕勢蓋難矣惡少而失其欲悍强以成其性又挾素所教弓刀刺擊之技以為之資臣懼其非獨不能于耕而己也亦恐其得為陛下之良民者少也臣愚以謂有法以歛制之蓋保甲之技藝强弱髙下州縣皆有等籍今按取優等之人召其情願列以為本州正軍若舊係正長等名色則比類軍中之階級隨其等差對換補之自餘中下藝等亦召願充公人者依近制募為弓手手力耆戸長之役所貴在軍者既團𨽻部督束之有法又使得伸其素習之技能其在役者既不失服職于公家比之召雇浮浪乃得熟事鄉民必頼其用為多伏望詳酌保甲既有換充軍者若本保階級闕人或一有闕數即乞遇冬教日推擇排連填補則不損保甲之額若換充他役則自不廢教習馭進止論盗賊疏臣竊以天下雖有極治之政而不能使民不為盗也然要能禁其為盗而己厯世以來法嚴則盗衰法寛則盗熾國朝自近嵗差役用募法而官弛捕盗之禁保甲行教法而民滋為盗之心前來滑州之單安啇州之王沖以村野之人逃亡之卒一有呼嘯遂能横行蹂踐鄉縣殺害官吏以至煩遣兵將重為騷擾大勞大費僅能散撲皆由防禁寛縱賞罰不明而寒飢猖狂之人附之者衆故也近日制旨既薄歛輕賦稍還其衣食之路又復置弓手及縣尉廵檢而捕察賞罰並從舊典所以防備姧惡安飬善良之意可謂甚厚然訪州縣不甚究心召募弓手至今殊未就緒廵檢兵級多未差填現今河北陜西京東京西所在常有盗賊攘刼抄竊殆無虗日鄉野閭井人頗不安蓋自來保甲廵檢指使既有更不管指揮則其意固已不在于捕盗而新復官吏又未就職此盗之所以乘間而作累嵗以來民間豐稔今尚如此自去冬大旱二麥失望積榖之家觀望不發人已艱食臣慮將來㓂盜更有甚于今日欲乞指揮逐路監司為備盜之計督促州縣速招弓手及差撥廵檢兵級嚴責近限早令數足以時訓齊准備緩急及再乞指揮吏部所差注廵檢縣尉略加選擇催遣赴任近制新復弓手所用器甲營房令所屬應副臣伏見諸處廵檢自更改後來其廨舍營房往往闕少或止于鄉縣寺舍安泊欲乞一就下所屬移挪营葺仍委轉運提刑司候招募弓手差填兵級及應副事件了畢節次具數足及巳了月日申奏若州縣明有稽違乖方便仰提刑司取勘聞奏臣近論役法乞除衙前依熙寧法用坊場錢召募外其餘弓手等役人並乞用祖宗差法今來雇召又湏候七分方行勾抽竊慮妨闕伏乞檢詳前奏早賜指揮論捕盜奏臣伏見去年京西路賊人王沖作過出入啇虢數州傷害官吏殺擄軍民今王沖雖死餘黨猶在而成俊者為之首自近日于杜管鎮刼略嘯聚漸盛討撲愈難臣訪聞啇虢等州舊有禁軍一指揮自置將以來將逐州禁軍𨽻延州治下􅀆蕃出戍以致逐處守禦之人反怠緩捕賊時欲乞將逐州禁軍權免延州勾抽且令在本處防守及准備出入所在就糧土人可用使之捕盜易得其力仍乞指揮明立信賞購募務令早得捕獲取進止貼黄訪聞京畿近日盗賊不少欲乞指揮開封府及府界提㸃司嚴切督責應令捕盗官吏仍檢㸃諸縣弓手及廵檢兵級差填足與未足論捕盗法奏臣伏見舊制賊盗地方應職在捕察之人皆給百日以為三限毎限不獲抵罪有差蓋使身任其責必有所畏然後肯出方略張耳目求賊以自免自募役法既行捕盗不獲者雖亦有罪然乃將両限科較聽各罰錢以充捕賞其次仍許收贖及保甲之法行則保内被盗止出賞錢更無認限决罰之法小人之情不以刑懼而勢驅之使有不得巳者則何事肯為公家索賊耶比年以來盗㓂稍多者殆有此飬之耳近日敇命巳復差役諸色役人並依熙寧以前指揮則捕盗之法自當皆依舊制然臣訪聞諸路役人雖以差定其應縁差役條件尚多疑惑方聽候詳定役法所畫一指揮如捕盗之法亦其一事也今所在時有盗賊欲乞聖旨下詳定所將捕盗立限科較等舊法先次申明施行取進止論賊賞稽違疏臣竊以聖人之運天下也其政事大要在于賞罰賞罰之令堅于金石信如四時使有功者不逾時而䝉賞失職者不旋日而被罰故天下凡待賞罰而後勸沮者莫不奔走從事趨上之令此天下所以治也然則賞罰之施于天下不可以不信而臣以謂施于捕盗者尤不可以緩也方民之被盗也田里閭巷晝夜惴恐縣官惻然開告捕之科不愛厚賞提官爵抱金帛恨不得有功者付之幸而賊得矣而有司不能推奉詔㫖乃苛以文法敇誥稽留使人不得亟䝉有勞之利臣竊以為後日憂也伏見元豐七年澶滑之間保甲有為刼盜者其首曰單安曰王乞驢又曰張謝留􅄐合出入凡數十人往來二州間擄掠平民焚蕩村落殺人取財以至傷殺官吏屠害軍兵又嘗入衞州界一方不安朝廷督責捕盜官司至于自京遣使募衆而州郡調發將兵及降専賞指揮是年逐賊皆于澶滑次苐掩獲各正其罪而推賞之典至今逐司不為報明首尾二年矣夫奮不顧死冒矢石以與亾命者格雖莫不有職然要之趨賞之意多也今失信而後時誠恐緩急不足以率厲此其為患不可勝言伏乞指揮根究住滯官司時賜詳酌重行黜責以明賞罰以戒違慢臣勘㑹下項一元降指揮單安等令河北東路提刑吕仲應得功人疾速保明聞奏一元豐七年九月指揮令開封府界提舉賊盗范元取索捉殺到韋城縣刼賊王乞驢等廵檢下兵級報明聞奏前䧏保明指揮更不施行一元豐八年五月奉聖㫖令河北東路京西北路提㸃刑獄官限半年同共根究得功人具指實報明聞奏前䧏范元報明指揮更不施行一元豐八年七月京西北路提刑司根究得本路殺獲單安合該酬賞人所得自及専賞關牒河北東路提刑司修寫以憑同書申發去訖一河北東路提刑司十月申吏稱元勘獲賊公案累牒范元封取内有澶州元勘張謝留浄案其范皇城稱去年送到在本司房内失去依限來該不見去年十一月公案稱已累牒檢尋臣看詳范元于元豐七年九月承准朝旨報明至八年五月首尾九個月日並不結絶報明郤將取到公案恣縱吏人失去縁賞典至重當時甚有爭功害能之人縱是吏人别受情弊毁匿或致竊取事理重害其河北東路提刑司亦至去年五月承准朝旨元限半月報明至今將一年並不専心疾速定奪兼范元既稱失去公案限滿不見亦合别作擘畫既見京西北路提刑司根究本路單安功賞自合先次報明申奏郤因范元失去張謝留公案遂將别案事一連住滯致朝廷賞典稽遲無以取信于天下皆范元及河北東路提㸃刑獄官弛慢不職被受聖旨公然不以為事經隔嵗月不務結絶欲乞詳酌重行黜責乞選監司澄汰州縣疏臣准尚書省劄子准十月十八日聖旨指揮節文比者詔令屢下以寛民力便安公私官或致廢格自今州縣悉心奉行監司㸃檢御史䑓覺察彈奏者臣有以見陛下誠心愛民慎重政令天下幸甚臣竊謂州縣之政廢舉得失其責宜在監司夫監司之任亦重矣人有一賢不肖則環地數千里休戚係之曩時朝廷大更法度選建推行之人故不以資任務得果健强鋭猋厲風生之才蓋規以就事倚辦于一時及法行事立矣而其後用人猶復因襲未曽權量時宜有所張弛之也是以至今使者之政刻覈褊廹相師成風郡縣承望亦莫敢不然使民不見徳與義而惟刑是覿惟利是聞者蓋亦乆矣斯豈政令之本意然哉奉宣繆戾積習至此故也比䝉聖明哀念元元取監司罪惡已甚者既去之矣然其餘人材頗尚駮雜情志未一各懐所私蓋其隂有觀望者則必習常而慢令以致恵澤之壅其淺中覬利者則又將矯枉而過正或廢其所宜治之事二者不可不察也惟得其人庻懲此患臣欲望聖慈詳酌河北河東陜西素號􅇵郡向來所用使者出于暴進多非更厯民事人微望輕雖自過為威刻而下終不服今宜稍復祖宗故事于三路各置都轉運使用両制臣僚充職以重其任自餘諸路亦望推擇資任稍髙練逹民政識治體近中道之人分補監司之任明授之以教令使忠厚安民而不失之寛弛肅給應務而不失之淺薄部使者誠如此州縣之政随之則先朝之仁政陛下之㤙徳庻幾下究而與民休息無難矣攷察現任之無状者一切澄汰罷之被罷之人苟非有顯過宜還其資攷别為任使要令不至于失職無聊而已方今先務恐實在此伏望詳酌施行論監司奏臣自待罪風憲屢曽以天下監司為言乞澄汰選擇誠以朝廷政令使監司得其人則推行布宣可以諭上指而究恵澤苟非其人則所謂徒善而已終于民不得被其利夫上之所好下必有甚朝廷以名實為事行總覈之政而下乃為刻急淺廹之行朝廷以教化為意行寛厚之政而下乃為舒緩苟簡之事皆習俗懷利迎意而作故所謂近似而非上之意本然也今雖因革之政有殊而觀望之俗故在但所迎之意有不同耳其為患一也昨差役之法初行監司巳有迎合争先不量可否不度利害一㮣定差騷動一路者朝廷察其意固已罪之矣推此以觀人情大約類此且天下之事散在諸州總制于監司其大者治財賦察官吏平獄訟攷疾病為使者皆務為和緩寛縱苟於安静則事之委靡不振法之受敝不勝言也向來黜責數人者皆以其非法掊歛意在市進害民甚者亦非欲使之慢然不省其職廢所宜治之事謂之寛厚也昧者不逹故矯枉或過其正臣謂此俗不可滋長要湏大為之禁伏乞聖慈詔執事申立監司攷績之制以常賦之登耗郡縣之勤惰刑獄之當否民俗之休戚為之殿最毎嵗終以詔誅賞仍自今嵗始焉庻㡬有所檃括裁制之使循良者不及于弛肅給者不入于薄然後上副聖明制治用中之意夫察時之寛猛緩急觀俗之過與不及而張弛其政正今日事也取進止論政令奏臣聞之銜策不調雖造父不能善御法令不一雖有虞不能善治故曰慎乃出令言慎始也又曰令出惟行弗惟反言慎終也聖人制法造令于堂奥之上熟復兢慎若不得已者故其出也天下信之以命則行以禁則止所謂信如四時堅如金石若始之不慎既出而反之則何以示信出而勿反則又將有受其敝者由此言之始既不慎雖欲慎終不可得矣恭惟陛下即位逾年加恵海宇修完政事大要専以便人天下幸甚然累月以來法令寡信議者竊有疑焉夫法非不善而施行之際使議者致疑此亦不可不察臣謹條列一二以㮣見其餘乃者朝廷患免役之弊下詔改復差法天下知之乆矣置局設官以議施行之政天下望之又乆矣造法不慎其始施之倉猝故改而立雇募之議繼又為招募之法而法至今不能成也朝廷患常平之敝並用舊制施行曽未累月復變為青苖之法其後又下詔切責首議之臣而歛散之事至今行之如初此二事大事也四方傾耳拭目以觀盛徳之舉而反覆二三雖近侍謀議之巨曽不敢必知法將安出尚何以使天下信之挾銅之禁行之未幾復限以五斤勿禁一開其端則輕重多寡誰復可辯官司固末易家至而數之禁而不能止與不禁同大河職事河北轉運司言之則屬轉運司都水言之則歸都水夫二者必有一得則亦必有一失矣此其小事然推此類言之則議者之論安可不察且改之易之誠是耶君子猶以為反令况改易而未必是徒以暴過舉于天下則曷若慎之于始乎今朝廷建一事命一官令已行矣議者必曰此未也且將改之曽未淹乆而議者之言果信臣愚未識朝廷知其不可而姑為之以待改耶不知而偶為之耶始議既粗行之必有牴牾拾遺補過之臣以言為職知而不言則為廢職言而易之則為反令故臣願陛下深詔執政大臣逺慮熟計慎重出令其始既慎度可以必行而後行之則至其終也不可反矣惟陛下加恵留神思之毋忽上以嚴政令下以示信四方又以杜塞異議使無所幸其失今日之治宜莫先此臣不勝拳拳取進止乞修敇令疏臣竊以法者天下之大命也先王制法其意使人易避而難犯故至簡至直而以足盡天下之理後世制法惟恐有罪者之或失也故多張綱目而民于是無所措手足矣世輕世重惟聖人為能變通之祖宗之初法令至約而行之可乆其後大較不過十年一變法豈天下之大民物之衆事日益滋則法不可以不宻歟臣竊以謂非事多而後法宻也殆法繁而後姧生也祖宗皇帝逹因革之妙慎重憲禁元豐中命有司編修敇令凡舊載于敇者多移之于令蓋違敇之法重違令之罪輕此足以見神宗皇帝仁厚之徳哀矜萬方欲寛斯人之所犯㤙施甚大也而所司不能究宣主徳推廣其間乃増多條目􅄐析舊制用一言之偏而立一法因一事之變而生一條其意煩苛其文晦隠不足以該萬物之理逹天下之情行之㡬時蓋以屢變今所謂續降者毎半年一頒毎次不减數帙矣夫法者天下之至公也造之而不能通故行之而不能乆其理然也又續降多不顯言其所以衝改故官司州縣承用從事參差牴牾本末不應非所謂講明畫一通天下之志者也臣愚以謂宜有所加損潤澤之去其繁宻合其􅄐散要在簡易明白使民有所避而知所謂遷善逺罪之意伏望聖慈酌時之宜究法之用選擇儒臣一二有經術明于治體練逹民政者將慶厯嘉祐以來舊敇與新敕參照去取略行刪正以成一代之典施之無窮取進止貼黄常平差役法及罪人就配法今已更改于敇内關渉不少以此湏至刪修正刺史以上致仕于嘉祐録令料錢衣物依分司官吏現任官例支給至熙寧四年五月聖旨指揮致仕正任給金吾衞大將軍俸則是巳衝改嘉祐録令今來元豐敇郤依嘉祐録令即不知熙寧七年及元豐六年編敇日因何漏落熙寧四年續䧏指揮訪聞在京支正官致仕俸料並依熙寧四年指揮其外路多依嘉祐令支給内外法令如此不同慮其間更有此類不可不行修完乞留杜紘編敇奏伏聞詳定敕令格式刑部郎中杜紘已䧏敇命同黄亷相度茶法臣等竊見自來編修官差移不定難得成書蓋前官雖已盡心後官豈敢慿信郤須盡究本末使若創行編修兼所見異同屢有移易不惟嵗月淹乆亦致議論難合今來重修元豐敇令格式方始置局杜紘職在詳定朝廷許令權罷刑部簽書蓋是欲其専一忽差逺使秦蜀臣等深所未諭况紘曉習法令同軰少比如或改差必難得如紘稱職臣等欲乞朝廷别差官相度茶法令紘得盡詳定之效庻㡬編敇早見成書薦人才疏臣今月四日奏事延和殿因論人才伏䝉聖語詢問臣即具奏自待罪言路亦嘗求訪内外人物但助職非薦舉未敢奏上又䝉聖慈嘉納許令具姓名進入臣退而自念乆䝉陛下㧞擢之㤙思竭盡愚力圖報萬一凡下有所見必欲上聞况今人才尤為急務雖薦士之路自有常法然既荷陛下至誠大信降問不疑豈敢更為形迹避嫌自外若無有所補獲罪無限謹具所知姓名并其才之所宜如左梁燾徳性方正顧臨長于謀議范育深有器略盛陶文行純粹孔文仲學識髙逺上五人可充両制侍從之任丁騭恬正守道顔復學問該洽劉載文行兼茂吳安詩氣識深静趙挺之博學有守上五人可充䑓諫之任林旦風力彊明何琬才識疏通胡宗炎詳練吏事温致敦厚明敏羅適公直勤亷上五人可充卿監省曹監繁􅇵之任楊國寳劉㮣朱彦劉安世孫諤上五人皆文學優長士論所推可偹館閣之任右謹件如前伏望聖慈赦臣僭逾特賜攷察稍加采録庻幾少助聽政得人之闕取進止薦本州儒士周希孟奏右件人躭樂墳素棲遲丘園檢身足法于人為學毎先于禮屢貧不易其節講解以飬其親本州两次近臣論薦再䝉朝廷束帛之賜臣自慶厯中知福州至今十五年備悉希孟履行去年曽講周易座下嘗及三五百人委實經義精通文詞深厚今來年及强仕迹齒編氓至寳遐遺衆所共惜伏乞朝廷嘉其退静優與收録以勸學者臣不勝勤勤之至謹具狀奏聞伏候敇旨論禁中修造奏臣竊聞禁中計料修飾福寧殿彩繪制度極于藻麗惟人主之奉以文為稱而一殿一飾亦無大費然而敦樸素者所以為天下先卑宫室者前聖人之盛徳方今生靈靡敝財用耗竭居飬服用僭儗無節陛下正宜躬率儉徳以淳風俗示之彌文下必有甚伏念藝祖遺訓宫中止用赤白為餙仁宗故事欄楯徹去朱緑之采陛下纂服所宜守之又聞慈壽長樂二宫殿宇華侈金碧朱丹窮人力之巧豈非誠心孝徳尊事两宫故極所以奉飬之觀然逾禮過制不可以訓今外論籍籍以謂左右諛說之人進讒陛下指二宫以為法使論出于臆度不過臣為妄言萬有一實則于聖徳不為有益臣所以先事為言伏冀寛其狂瞽而采其誠時賜寢罷以解天下之疑取進止論備契丹奏臣竊以北敵之為中國患自詩書以來世常有之方今之勢雖効順惇睦服威徳而利金幣然其驕貪之情常能窺伺中國動静一見間隙則造端興謀起事以撼我昔者寳元康定問國家問西夏之罪而遣使肆嫚有非理之侮中外憂恐至倍増嵗幣而後巳臣愚不足以論事勢然竊有私憂過計以玩日之故有可以動驕貪之窺伺者臣謹言之昨者某州用師連三嵗皆由議臣失計理曲而無名契丹之于西夏自以為甥舅之國此一事也今髙麗遣使朝貢將至闕下髙麗自天聖中嘗以事請于朝廷朝廷不從遂附庸契丹自是方貢不入王府者數十年矣夫既已臣屬于彼而一旦面内中國則恐彼不能無疑此二事也臣以謂此二者彼皆足以藉口而為請于朝廷者也伏念大河之北自戊申以來地大震水大溢民大失職􅄐鄉内徙空虗塞下至于今三年而地震未已此何祥也今嵗漳河春役財力並竭中路夏旱二麥不登災變因仍人不寧處夫彼既有以為藉口又乘民心皇皇公私疾匱禦備百廢朝廷厭聞邉患之時臣恐契丹見利投隙而區區之盟誓豈足以保其心而恃以為安乎彼固不至敢有狂謀假令遣一使持尺書援二事以請朝廷其用何辭以杜其口臣恐勞人以繕城郭倍估以儲庾廩更易將帥輕用名器張皇擾擾大勞大費而巳爾康定寳元之事蓋可以鍳也又議者籍籍皆謂髙麗之至有徼倖希功之人誘而召之者使無此理也不過臣為妄言使誠如議者之論則釁自我始西兵之禍覆車未逺安得不先事而言哉伏乞陛下宻詔二府大臣使日夜謀畫以求防微杜變之理而伐其心且河北重地㨿天下安危之勢願陛下寢食以為念而無㤀北顧常務勞來其人民安輯其田里薄征歛之數省煩急之令恤其凋憊足其衣食使樂守生涯而維持其心凡所謂邉備軍政調度之數皆宜因事稍稍經畫蔵其用而隠其跡兵法所謂恃吾有以待之者惟陛下留神毋忽以消連年地震之異夫無事而言其言若狂而人皆易之有事而言其言雖足以取信而事已無補臣寧以狂得罪不敢後事而為無益之言以負陛下耳目之任論應西夏奏臣伏見元豐中出兵西界増創城壘議者講求利害乆矣臣亦嘗具三䇿上于朝今夏所遣使者巳到邸累日其勢必有邀請雖廟議黙定而區區不能自已謹復條一二補前奏之未備以待采擇議者之論臣嘗詢訪本末備得其説為棄地之議者曰往年興師本以弔民伐罪既取地自利其勢必争傷財害民以争非其地其勢不得不棄困而後棄不如一捐空城予之以示㤙恵此言是也然難者謂予地所以息争若虎狼亾厭争求不巳得地㨿險益擾近郡其能保不為患乎為守地之議者曰頓儲設阻増募土兵逺斥近援何地不守且先皇帝之所得而以予人非是此言亦是也然難者謂夏人不得地兵難不觧日引月長邉釁益大其能保終守此地乎故議者之論非不曲盡事理至于弭未然之患如難者所憂則雖好謀之人莫敢任責竊料朝廷深計逺慮未欲􅃍決亦必以此臣愚不佞獨謂用兵以終守其地誠難保也棄地而使不為患臣雖老矣願保沒齒不見邉境之憂惟陛下赦其愚使行其説臣聞向所得地在熙河為蘭州在鄜延為五寨蘭州本西蕃故地而五寨本西夏所有也其地道里迂直産利厚薄所湏守兵多寡轉餉勞逸皆朝廷所熱究臣不復道而自夏人視之為必争之地彼將以誓約為請而固不予彼將獸困而鬬借兵契丹以逞其忿朝廷且有西顧之憂使我師毎戰毎勝臣猶以為非國之利又况殺傷相當成敗未可知皇帝陛下諒隂之際太皇太后埀簾稱制正思與民休息而顧欲戮力血戰以争尺寸無用之地所謂以隋侯之珠彈千仞之雀由此言之終守其地是臣之所以不敢保也國朝自祖宗以來嵗捐金幣數十萬遣使修約而二方稽首順命數十百年矣其好争無厭固天性也然且如此則思深利厚足以覊縻其心故也今乘先帝討擊之威因其屈服之勢曠然推恵歸侵地復嵗賜丁寧戒敇分棄前患復謹舊約彼雖有傑黠睚眦之意既一杜塞其欲無所復發則亦感激退聽復如前日何苦必欲動衆犯順以自魚肉其民雖彼之國寧獨利乎古之飬虎者時其饑飽適其怒心虎或可飬而况人乎由此言之弭患息爭非獨臣以死保之自祖宗以來馭二敵者用此道也臣願采議者之論觀異日之勢而斷以此意大計既決其論措置纎悉施行次苐在朝廷裁之而已雖然臣有拳拳之愚不敢不盡今夫請地在彼予地在我是以主制客以逸待勞之勢也為彼計則不得不急為我計則正宜從容閒暇鎮以無事臣竊怪近日議者皇皇汲汲視此地如金城湯池惟恐不守不然如附贅懸疣惟速去之為快異議紛起先自惑亂又何其廹􅃍無大體也今使者雖在邸臣願且毋􅃍許以地而厚禮答之善詞遣之或先復嵗賜而微示以不愛地之意度其効順堅決至于再至于三然後以嵗月予之所謂敵人不一而足夫豈晚乎臣愚不知大計惟陛下裁擇忠肅集巻六
