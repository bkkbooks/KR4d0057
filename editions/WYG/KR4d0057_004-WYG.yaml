body:
  text: 忠肅集卷四宋劉摯撰奏議歳旱乞修政事奏臣伏見自入冬以來並無雨雪亢陽為厲被災甚廣羣情嗸嗸驚憂四顧攷原經典可謂大異夫人之氣與天地隂陽之氣相為出入流通而徃來者也人情和于下則天道順于上人事乖于此則天變效于彼是謂天人相與之際也故聖人之事天也知其在上不逺應以類至則凢祈禳消伏以謂末節小數而専修政事以應之竊以陛下委國仰成與之均休戚同榮辱者不在三省樞宻院執政之臣乎今廟堂之上大臣八人情志乖暌謀謨不一無同心同徳之節有分曹懷二之意故議政之際排抵依違相激相鬭其語徃往播在中外所以政令壅隔而不下文書稽滯而不行官爵濫于無名而不應于典故公道屈于貴近而獨施于疎逺私邪朋比上下隔絶况當皇帝陛下淵黙諒闇之日太皇太后陛下制出房闥之時朝廷政權盡在大臣而大臣不咸如此故天下但聞頗僻之事而不見和善之政政不和則人情不和人情不和則天地之氣繆沴而生此變也書曰肅時雨若五行傳以謂冬旱政舒緩之所致也今上下可謂不肅朝廷之政可謂驕慢廢弛號令可謂二三不振矣古者災異水旱咎在燮理隂陽之官故䇿免三公以塞其譴今來歳已窮盡旱暵如此宿麥在野無潤澤之入春氣相乘有疫癘之變生民一嵗之大命豈可不念之哉又一月以來日青無光風霾昬翳攷之占騐皆非小變而上之人恬不以為怪此中外之所以恐懼而不寕也伏望聖慈深省上天警告之意俯察朝廷乖戾之變特詔大臣修飭政事凢賦斂之害人者法令之未安者大改而更張之至于决獄訟之私枉趣諸司之稽違進忠良退阿諛通蔽塞去疑貳務以至誠實事上塞天譴下救生民則和氣之應將不旋日而得之矣臣不勝惓惓之心取進止貼黄今外議皆謂朝廷自升祔以來政事懈弛不及日前此蓋有以召之非虚言也乞禱雨疏臣伏見近日都城之中火災頻起人情惶懼轉相驚訛蓋自冬春以來久旱所致今晝夜暴風氣候乾燥故易以致火必得雨澤乃可消伏欲望聖慈命官精潔祈禱以安人心以致天澤兼已近四月中氣春麥方實夏麥將結正渴雨之時也伏乞速降指揮取進止貼黄臣按五行傳曰賢佞分别官人有序率由舊章則火得其性若信道不篤或讒夫昌邪勝正則火失其性㳟惟陛下聖政英斷其于辨别賢佞固已至矣然更願陛下常以此事留心勿使讒言可進邪或勝正則天人之際應如影響一雨不難致而濫焰息矣嵗旱待罪奏臣等伏睹春夏以來旱沴深廣徧走羣望雨澤未應上煩聖慮焦勞惻怛奉今月九日詔書避殿損膳深自退抑臣等伏惟災異之應必由政事政事失當咎在臣等今乃致陛下降刻責之言裁居養之節則是歸過君父臣等夙夜悚惕伏望特賜罷黜以懲不職或先次依故事各降官職庶幾少謝天戒臣等以三省闕人不敢閤門待罪各且在職聽命伏乞早賜處分論政事稽滯疏蓋聞傳曰朝廷正則百姓理又曰衆賢和于朝則萬物和于野今夫上之人誠能同德一心盡公憂國則必有和善之政而下無朋比之士苟人有異意轉相非疑則必有僻違之政而下有向背之俗于是民被其害矣臣伏見昨者皇帝陛下太皇太后陛下聽治之初惠綏天下去民之所同患更法之所不安至于振淹滯絀貪刻發政施命無有虛日故近自畿甸至于海隅莫不鼓舞承風傾耳以聽太平而近者一両月以來政事號令之見于施行者曠然希闊中外顒顒無所聞見深求其故皆以謂執政大臣情志不同議論不一之所由致也有隂拱以坐觀者有陽合而内暌者有强横以肆制者有忍恥以懷咎者滯事積前相顧而不發故仁澤屯于上而不下庻事壅于朝而不行以至文書稽留人情隔塞聖人之化雖曰久于其道而後成然固有緩急之事今事至輕小明有比例或止于一法令之増損一官吏之廢置猶不肯倡端主論則方今邉鄙之大利害賦役之大是非天下百姓之困苦如在倒垂而望解者當誰任其責何時而議也幸遭聖明哀愍元元為廟朝大計而謀國之人方身是䘏方私是圖坐玩嵗月亦可謂不仁矣况今皇帝陛下以盛年居諒闇太皇太后陛下以垂簾而稱制于此時也而輔弼不咸相擅相激非獨政事壅積而已誠恐疑貳漸深分曹固黨使傾險之士煽于其間上下乖戾何事不生此又臣之所為深憂也伏望聖慈深察事變防微杜漸特詔輔臣當務同寅協㳟相與以信去其貳志以濟國家之事今來政事之稽滯未决者趣令條上取㫖則望聖明發自睿斷别白施行以幸天下論景靈宮帝后同殿乞下近臣疏臣伏見神宗皇帝神主既祔太廟竊計于景靈宮當依祖宗神御别建朝殿伏緣宮中地歩今已隘逼若或開展民區則理有未安臣惟原廟之説始見于西漢而其制度蓋不傳而無聞今景靈宮之聚神御也固有祖于原廟之意然帝之與后各建殿室蓋緣舊來神御㪚在諸寺故亦各殿乃出于一時規畫别無義據臣愚竊謂既尊曰廟當倣于宗廟之制帝后宜同御一殿如此則今日神宗所御遂可無事于興作矣奉遷昭憲皇后于宣祖殿合配而復以太始殿易名為神宗之殿非徒簡節勞費便于時而已也攷之禮典則無違質之人情則為順此大事也伏望聖慈詔三省両制禮官雜議以處其當聽陛下聖斷焉臣淺陋妄議合即罪誅竊謂如此自與廟制相合逐時酌獻行香亦無妨礙取進止論降詔疏臣聞朝廷議欲降詔中外慰安人情傳聞二三臣不敢信儻果如此臣實未喻伏見陛下即位以來修先朝政事損益法令進退臣吏大要専以安民四方曉知上指坦然明白矣至于懷私負釁貴近不赦而忠信之言雖小必錄此又人人皆能道之臣獨不知國家尚安所疑欲家至而户曉也若謂日者黜責一二臣僚恐附離黨與不無反側故以詔書安之臣謂人情無甚相逺不從上令而從其意動民以言不若示之以行事自古而然朝廷果將吹毛洗垢搜抉宿過則詔令隨行人亦不信但令朝廷罰罪之意出于公議惟責大體不問其餘則雖無所言何患人不知之近者朝廷法令方具功罪明白吏民安堵自如正宜鎮静無事何故自生疑貳猥欲以言語區區過自分説以勝士大夫之心臣恐中外有以窺陛下也前世漢唐以來因誅鉏叛逆或尅復僭偽危疑之始慮有動摇故亟下詔令慰撫未萌今升黜官吏何時無之何至張皇自生不安之意臣竊以為過矣抑臣聞之人才實難自非大姧大猾懷邪怙終此外安有終身棄置之理古人以功贖過所謂使功不如使過良以此爾前以罪退後以功進是乃國家所以公天下者見之一二則中外將不待言而信矣臣謂安反側之計無以尚此何必空言哉伏望睿斷寢降詔之議免四方疑惑以幸天下臣不勝惓惓取進止再論降詔疏臣近聞朝廷議欲降詔中外得于傳聞未見本末然竊謂朝廷舉動不可不慎昨已具狀論列今者外議籍籍又異于前大意謂陛下即位以來増損法令進退官吏今已改意自悔故欲下詔委曲解説又深厭臺諫言事故欲止約多士轉相告語且謂自此臣僚雖有罪犯無復憂畏臺諫雖有聞見無復敢言詔令未下人已非議臣備位言路所聞如此不敢不論臣竊謂刑賞予奪天下公噐非苟順人情惟當而已日者朝廷加惠元元取官吏蠧國賊民之尤無狀者顯黜一二以勵其餘此甚大惠陛下其以為當耶未當耶誠以為當則足矣何必家至户曉自起疑貳之意使忠義自失奸罔幸免臣所未喻也臺諫臣僚􅁼皆疏賤孤寒之人而使以譏切主上彈治貴近為職其勢固已不勝若稍加沮抑且使有誅夷之憂則人人顧私自便誰肯盡言又况聽與不聽上繫朝廷去取大抵欲言十事退思反顧已去五六其言雖上又經裁擇則言而聽者率不過十一二然則朝廷聽言可謂審慎議論雖多言者何罪且臺誎以言為職今若明出詔令戒使勿言則是予之官而奪其職為小人之所脾腉輕誚必不能自立相率引去然則言路塞絶誰復以利害之計上聞此又臣所未諭也臣思慮累畫夜其事甚易見不知為陛下建此計者誰乎臣願陛下深思臣言無忽速賜寢罷降詔之議以安士論若本無此議臣聞之誤妄罪當萬死臣不勝拳拳取進止三論降詔疏臣近兩具狀奏乞寢罷降詔指揮未知聖意賜與不賜省察朝士大夫億度風㫖轉相傳誦不無非議臣謂降詔本欲安人情而詔令未下事已宣露反使人情疑惑則利害固已可見甚非陛下鎮静中外之意臣備員言路此而不論臣則有罪是以不避煩紊願畢其説臣謹按齊桓公與管仲謀伐莒謀未發而聞于國人國人曰君子善謀小人善意臣下竊意之也故朝廷之人不為則已苟有所為雖祕謀宻計人且意而知之况陛下以修政事清人物遂欲闊略細故含垢匿瑕示天下以寛大誠大惠也但此意一定何患人之不知若更施于行事一二則中外諭意坦然洞逹矣何必空言喋喋過自分辨急于取信無乃害國家大體哉詔書大意不過以謂罪惡者已治欲使其餘改行自新恭惟先皇帝養育人材布滿内外其中邪慝不能無之今已行懲勸則是乃所以成就先帝之意若必形于詔書示蕩滌之惠使之自新則似分别前日政事虧損治道無大于此然則人情安與不安乃在陛下立意行事其實何如耳不在降詔詔下之後事體窒礙其害乃至如此臣願陛下深賜省照特罷降詔以全大體臣不勝拳拳取進止論韓琦定策功疏臣等去月二十六日奏事延和殿論韓琦等定䇿以立英祖勲烈顯著近年為人掩奪其功乞賜明辨方懼僭冐俯聽罪誅伏蒙聖慈開納宣示本末不待臣言而自巳曉然見是非之正臣等退而感歎因竊思念自至和以後臣子以國本末建為言者蓋不可勝數或泛乞早定儲貳或願擇宗室之賢者至于請立誰何有所主名則萬一無敢及之者至嘉祐六年琦與歐陽修同司馬光疏日日叩請開導引翼天意感悟大議始有主名而英祖皇子之詔遂下矣言之者雖多而為之者琦也憂之者雖衆而任其責者琦也此四海之所共聞天地祖宗之所照鑒而今日莫如太皇太后陛下之所詳而知也琦等有社稷之功而不能自保于存没之際王同老為殳貪功上其私室所藏之文引中書同列竊議之語乃云至和已有定議神宗以為賞疑從子恩過寕僭于是進官錄子所以襃顯之者傾動一時而詔㫖直謂嘉祐立子之詔但宣至和已定之命而已嗟夫大忠元勲移彼而就此有所與奪矣此公議之所不服而是非之際不可以不辨也循蹟攷理皆有證佐臣已列九事具之前疏同老乗琦與同時執政皆亡而慈聖光獻皇后上仙之後謂無有知其事者乃出而振之而不虞太皇太后陛下之知之也臣等區區非為琦修等家横冀恩澤亦非欲追革同老等賞典但乞降一詔書辨正定䇿大功所在布之天下付之實錄院以昭信史以伸公論以慰士大夫心為萬世忠義之勸伏望早賜指揮取進止貼黄前後臣僚乞建嗣者雖多然琦等嘉祐未定䇿之日止用誎官司馬光章疏琦等日持其疏懇請于前其功業皆相濟以成之也伏望于今來詔書中明賜别白襃顯以示天下其與元豊旌賞之事自無相妨追訟呂誨疏臣伏以辨大姧而䆒未萌人臣之先識襃遺忠而發潛德國家之令典臣嘗觀熙寕之初王安石以道義文學起而輔政先帝舉天下聽之天下士民亦罔不指期以望太平上下向之無異辭當此之時故諫議大夫呂誨為御史中丞獨以為不然屢有奏論其略曰安石居廟堂天下必無安静之理又曰誤天下蒼生必此人誨坐是貶官于外未幾已殁其後安石與其朋黨變亂祖宗法度専以聚斂為事顛倒邪正進退失其當廢民之所同欲興民之所同害欺㒺朝廷天下被其患者十七八年其間雖有踵事増虐之人然要之權輿造端實自安石始四海困擾皆如誨言誨可謂有前知之明矣誨名臣之後為人忠信剛正立朝行已有古人之節大臣之風在言路前後三黜皆以擊姧邪忤權勢最後尤以直道大義為公論所高誨之死于㪚地在熙寕四年官至侍從而朝廷未嘗有所贈䘏誨之妻今在生事微薄有子皆碌碌小官恭惟陛下臨御以來惠綏生民修完庻政以成就先帝求治本指昭顯于世而開奬言者孜孜聽納凡臣子在前日輸忠獻直嘗有一言于朝者莫不収拾襃用之而誨不幸既亡未見遇于今日此天下有志之士所以歎惜而不能已臣不勝愚慮欲望聖慈嘉誨之有識敢言言不獲用利不得及于世哀其志節特賜襃贈及賜諡以表顯之錄其諸孤稍賜任使非獨以慰幽壤蓋亦以勸天下之忠義而愧人臣之為姧諛者非小補也取進止貼黄臣不識呂誨然實慕其為人其讜論直節近世在言路者少及焉而又逆知安石為政之害使其言用豈不有補于天下此朝野之所同知也請文彦博平章重事疏臣伏見陛下降詔遣使詔太師文彦博赴闕惟彦博以勲名之重翊亮四朝可謂社稷元臣宜乎陛下思見其人而加禮起之甚盛事也臣竊觀自古以來莫不貴德而尚齒然宗工大老遇之必以禮而處之必以道故或尊之以為師保或養之以為三老五更或使之朔望一朝或間趨朝廷平章重事或有大政就而咨决攷于前載故事具存今彦博之來在聖謀神慮必有以處之將一見其儀形而已耶又將有所咨訪耶將留之朝廷以自輔耶又將任之以政耶今外議但見宰相虛位久未除人皆以謂陛下必將以三省長官命彦博矣雖臣愚意亦不免出于此然臣竊謂誠若議者所料付以三省之政有官則有職有職則有事四海之大萬務之繁大小無所不總日夕裁决朝㑹陟降殆恐非八十餘年老臣之聰明筋力所能宜也有職事則不能無得失使任其責則傷恩釋而不問則廢法又非所以養元勲而尊舊老也彦博雖老矣然忠厚敦大足以慰士大夫之心其氣略足以彈壓强悍其威望足以鎮服外裔誠宜今日優游佐佑以為朝廷重古之人以老成有過于典型蓋為是也臣欲望聖慈詔彦博以本官朝朔望遇有軍國大事特賜宣召詢以籌䇿不須以官政嬰之夫以三師之尊獨承天子清問獻納以决大議而不勞以事此陛下之所以尊禮舊德者至矣不親于權以進勉君道不疲于職以休養老臣而無累于出處之際此亦君子之可以處而安也恩協義稱無以易此伏望决自聖心使天下無異辭臣不勝區區取進止論太學獄奏臣先准朝㫖看詳訴理熙寕以來罪犯并元豊後來探報斷遣公事渉寃抑情可矜憫並許上聞數内一件制勘太學公事龔原等二十二人已具看詳事理奏聽指揮去訖伏縁事有未盡須至論列臣謹按太學公事本因學生虞蕃就試不中狂妄躁忿上書告論學官隂事自此起獄又因勘官何正臣迎合傅㑹將赦前及狀元于法不該推治之事奏乞皆行推治親畫特㫖依奏自此獄遂大熾上自朝廷侍從下及州縣舉子逺至閩呉皆被追逮根株證佐無慮數百千人無罪之人例遭箠楚號呼之聲外皆股栗臣聞論者謂近年慘辱冤濫無如此獄其所坐贜大率師弟子摯見之禮茶藥紙筆好用之物皆從來學校常事雖經有司立法而人情踵故未能遽革盡以監臨枉法當之終身放廢可謂已甚其間雖有賞負罪犯之人終以下訐其上事發不正獄官希合拷虐太過故雖得其罪論者猶不以為直又况學士大夫不堪困辱類多引虚自誣並坐重責深可嗟憫臣所看詳緣止是據按攷事而獄吏等從來鍛錬文案惟恐平反故首尾牢宻曲直莫辨况此獄出于正臣希功用意尤極巧詆今雖已具案内事狀奏聞然在于實情天下之所知者有所未盡若不曠然加惠一切昭洗止用有司看詳之文誠恐冤抑不伸不足上副聖仁矜恤之意臣愚不勝拳拳欲望陛下特出睿斷將太學制勘命官舉人等優賜恩㫖等第除落罪名取進止貼黄現今看詳訴理所若于公案内見得冤抑或可矜事狀即本所自可陳奏其雖有寃抑可憫之情衆所共知而案内文致完宻非看詳所能見之如此獄者若有司不以事實上聞則冤者無由可伸臣待罪言路義不可以避嫌自黙惟陛下酌情制事毋拘常法特與優加除雪以示寛大仍乞作特㫖施行乞重修太學條制疏臣竊以學校之制主于教育人材非行法之地也羣居衆聚帥而齊之則誠不可以無法然而法之為學校設者宜有禮義存焉何也比嵗太學屢起大獄其事一出于誣枉于是有司緣此造為法禁煩苛凝宻士之學其間者轉身舉足輙蹈憲網束濕愈于治獄條目多于防盗上下疑貳求于苟免先王之意禮義科㫖逝已盡矣法有大可怪者博士諸生禁不相見教諭無所施質問無所從但博士月巡所隸之齋而已謂如此則請問者封衆足以為證佐以防私請以杜賄謝嗟夫學之政令豈不大繆先王意哉私請賄謝如是真可以絶之乎而又齋數不一不可以隨經分隸也故使之兼巡如周易博士或巡治禮之齋禮學博士復巡治詩之舍往徃所至備禮請問相與揖諾至或不交一言而退昔之設學校教養之法師生問對憤悱開發相與曲折反復諄諄善誘蓋其意不如是之踈也其道不如是之觳也先王之于天下遇人以長者君子之道則下必有長者君子之行而報乎上者斯有禮也遇人以小人犬豕之道則彼將以小人犬豕自為而報乎上者不能有義也况夫學校之間哉太學自置三舍之法寥寥至今未嘗應令成就一人豈真無人也主司懲前日之祸畏罪辟謗士雖有豪傑㧞萃之才誰敢品題以人物自任而置之上第哉則是先帝有興賢造士之美意而有司以法害之也臣愚欲望聖慈詳酌罷博士諸生不許相見之禁教誨請益聼其在學往還即私有干求饋受自依律敕仍乞先次施行外應太學現行條制委本監長貳與其屬看詳省其煩宻太甚取其可行便于今者有所増損著為科條上禮部再行詳定上之三省以聽聖斷論取士并乞復賢良科疏今有建明貢舉條制謹具下項臣伏見國朝以來取士設科循用唐制進士所試詩賦論䇿行之百餘嵗號為得人熙寕初神宗皇帝崇尚儒術訓發義理以新人才謂章句破碎大道乃罷詩賦試以經義士儒一變皆至于道夫勸士以經可謂知本然古人治經無慕乎外故其所自得者内足以美己而外足以為政今之治經以應科舉則與古異矣以隂陽性命為之説以泛濫荒誕為之辭専誦熙寕所頒新經字説而佐以莊列佛氏之書不可詰之論争相夸髙塲屋之間雖羣輩百千而混用一律主司臨之珉玉朱紫困于眩惑其中雖有真知聖人本指該通先儒舊説苟不合于所謂新經字説之學者一切皆在所棄之列而已至于蹈襲他人剽竊舊作主司猝然亦莫可辨蓋其無所統紀無所櫽括非若詩賦之有聲律法度其是非工拙一披巻而盡得之也詩賦命題雜出于六經諸子歴代史記故重複者寡經義之題出于所治一經一經之中可為題者舉子皆能類聚裒括其類豫為義説左右逢之才十餘年數牓之間所在命題往往相犯然則文章之體貢舉之法于此其敝極矣詩賦之與經義要之其實皆曰取人以言而巳也人之賢與不肖正之與邪終不在詩賦經義之異取于詩賦不害其為賢取于經義不害其為邪自唐以來至于今日名臣鉅人致君安人功業軒天地者磊落相望不可一二數而皆出于詩賦則詩賦亦何負于天下或取以詩賦或取以經義無異道也但有司攷言之法有難有易有難易故有利害有利害故去取或失其實而所繫者大矣然則法不可以不改也臣愚欲乞試復詩賦與經義兼用之進士第一場試經義第二場試詩賦第三場試論第四場試䇿經義以觀其學詩賦以觀其文論以觀其識䇿以觀其材前二場為去留後二塲為名次其解經應于通用先儒傳注或己之説而禁不得引用字解及釋典庻可以救文章之敝而適乎用革貢舉之敝而得其人亦使學者兼通他書稍至博洽一臣伏見漢唐之制因天見災異或政有闕失則詔郡國及在位舉賢良文學之士天子親䇿以求其言至于國朝沿襲故事于是設為賢良茂材科目隨貢舉召試其于得人視古為盛近時之制遂罷此科臣竊以為國之道得士欲廣故取之非一塗謂常選不足以致異人故設制科以収超絶之才而毎舉中等不過一二人而已今夫官人之法入流門户日益増多未有澄汰而于三年取一二非常之人則廢其科不用此何謂也臣愚欲乞復置賢良方正及茂材異等科目毎遇貢舉詔近臣仍依舊制舉試所以廣言路求人材繼祖宗之制也一臣伏見近制明法律舉人試以律令刑統大義及斷案謂之新科吏部將司法員闕先次差注在進士及第人上臣竊以先王之治天下以禮義為本而刑法所以助之者也惟君子用法必先之以經術法之所以治理之所在也故惡有所懲而常不失忠恕之道舊制明法最為下科然其所試必有兼經雖不知其義止于誦數而先王之意猶在也今新科罷其兼經専于刑書則意若止欲得淺陋刻害之人固滯深險之士而己又所取之數比舊猥多調擬之法失其次序臣以謂宜有更張欲乞新科明法并加論語孝經大義登科之額裁减其半及注官之日並依科目資次所貴從事于法者稍不逺義而士之流品不失其分右謹條件如前伏望聖慈裁酌如賜開允即乞今年降詔並自元祐五年秋試為始忠肅集巻四
