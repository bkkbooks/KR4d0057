body:
  text: 忠肅集巻十二宋劉摯撰墓誌銘東上閤門使康州團練使陶公墓誌銘公諱弼字商翁少孤慷慨有氣節儀幹偉然刻苦好學經傳無所不讀尤喜兵家書從諸生科舉不能投世俗所好去而安貧事母以經術教授鄉里若無意于世者慶厯中莫猺諸唐冦略州縣提㸃刑獄楊略被詔督捕以禮奉幣致公幕下公喜幡然以起為盡謀畫俄率所募士破賊于桃油平以功補衡州司户參軍又破太平峒調桂州陽朔主簿皇祐中徙栁州司理參軍嵗饑多盜繫者滿獄公謂良民失職至此多以傅生議儂智高反詔略安撫復辟公參軍謀公自曲江下㑹諸將議救廣州賊既解圍而西公至太平場會蔣偕軍覆于賊餘衆潰走山林公慮其與賊合亟以便宜取白旗數靣大書曰招安散遣人持徇悉收千餘人所在貸糧以食之送帥司略大喜以公為知權略還朝語人曰吾平賊湖外所得者一陶某而已用舉者移陽朔令為治有本用號循良勸民植木夾道以庇暑暍使者下其法他邑桂之靈渠水自秦開導下逹江湖嵗久堙廢不通公因攝興安抵書安撫使蕭固請加浚治轉給邊食可無勞民固不省後轉運使李師中用其言果大利熙寧安南之役移粟百萬實由此渠嘉祐初改大理寺丞監潭州糧料院六年師中時為提㸃刑獄薦公知賔州未幾詔換崇儀副使以本路安撫都監知容州明年改六宅副使知欽州數以母長沙縣張夫人太君年老乞歸養不許八年遂丁䘮乞解官終服又不許治平元年英宗即位遷内藏庫副使明年拜崇儀使知邕州熙寧元年神宗即位轉六宅使招納訓利等六州蠻獠萬餘口撫定廣源會千餘衆之内附者加右騏驥使再任邕自經皇祐兵火守將數易百綱頽紊一以苟簡從事公至罅者苴補之窒者疏剔之磨以嵗月遂為治府左右江州峒五十餘酋率强虐漁利其下苦之公為作約束曉以禍福違者一繩以法莫不帖然畏服嵗滿以請知鼎州初熙寧初廣源賊酋劉紀請太平寨置和市使華夷貿易公測紀言葢交人之謀將出入省地窺虛實屢郤不聽至是安撫司不深惟利害輒上其事公亟為書數千言馳告于樞密院曰邕有土人十數類無他材幹造邊事為市至右職猶賴諸守土者嘗斥逺之未嘗聽其言故疆境幸按堵者凡七年今聞桂管惑紀姧謀實由此曹助成之決非所以安邊將産患無疑既而和市議行無幾何交人以劉彞沈起戰艦陣圖事為辭冦䧟欽廉宜三州人服公精識六年朝廷遣察訪使處置南江諸蠻舉公知辰州且言公恬不上吏課者二十年特遷皇城使奉詔措置北江北江溪州彭師晏桀黠難制公用間使其黨為仇相攻師晏因以衆數千來降羈首領十有九人致闕下取其地建五城堡詔加忠州刺史王師問罪安南以康州團練使知邕州于時邕人之不死于賊者往往逃匿山谷人情恟恟不敢進單騎先入左江峒民聞公再至欣然次第來歸乃籍丁壯得二萬七千分隸諸將凡大軍所謂蹋白開道及致輜重皆峒丁濟之方此時元帥大兵壓賊境以公兵精鋭忌專有功乃使之殿然軍中亊舉以咨訪其禮遇之隆他將不敢輩也富良之役賊請降以款我師元帥召公計之公曰明公來時陛受聖算云何而棄垂成乎元帥不之對然竟納降諸將入賀公拂衣去坐帳中拊髀歎曰三州之民無辜屠死者數萬今舉士馬十萬衆則己在手而縱不取以遂賊使國威靈不暢三州寃不復沮一方之心有可痛無可賀者聲氣奮厲聞者感動師至宵還既無前令中軍先一夜引去衆大擾相蹈藉賊夾對壘隂伺我隙公居後安坐下令休士遲明整衆按行賊不敢動元帥于是請城劉紀所棄廣源地為順州以藉口擇守者皆憚行乃以屬公公無難色未幾賊取我桄榔縣意圖廣源然其民懐公恩信賊一動靜必以告公故每先事遏其萌賊終無能為者乃躬督板築上冐氛癘下涉榛莽撫士卒疾苦恤其死亡閲嵗順州之城成而公亦病矣猶日飭將校以守禦計詔加東上閤門使因辭之一夕大星隕于庭公曰吾死于職得其所矣無一語及其私遂卒實元豐元年十一月十二日也享年六十四公資性莊重篤學能文尤長于詩年三十起從軍善御士與同甘苦得其死力處倉猝若無事守邊務簡靜謹斥堠最不喜疆吏生事徼功賞故所至蠻落畏懐無敢侵竊者忠義亮直白首一節賢士大夫皆譽之謂古名將無以加然公以習知嶺粤情偽人安之故每滿嵗輒増秩見留曽不得内徙嗚呼如公之志業使得馳騁西北援服鞭笞必有軒然可觀者而終老于一方瘴癘之域材不得盡其用此議者之所惜也有文集十八巻卒後十年十月𦵏于零陵金釡山之原惟陶氏世家潯陽靖節先生之後有避地湖湘者公之高祖矩至祁陽樂其山水而居之今為永州人曽祖蠲祖鈞贈殿中丞父岳以儒學有名仕為尚書職方員外郎累贈刑部侍郎初丁晉公一見公器賞之妻以先兄之子封錢塘縣君生一子通早世取兄之孫同為通後為臨桂縣尉又卒六女子其二人亡其次適邵通裴彦英呉括鄧良臣朝廷以公勤勞南方恩録其遺皆以異等四人並補三班奉職後數年又以同之子世延為借職所以褒勸有功于是不亡銘曰暨暨陶公將以儒術方嚴而仁敦大而栗公在軍旅謀定其㣲出竒制勝釋括于機公在邊圉罇俎談笑民嬉于生士勁而飽蠻戴父母恩信則然有政九郡邕至七年始時邊人取功以鑿公不可欺縮手誰作釋賊富良亦何賀為落落竒語人今誦之惟公之才兼具文武施之四夷霍衛方虎云何弗契一生炎荒瘴谿險徼摧此堂堂天命在上人為在下靈喜煙閣彼獨何者公也不朽有譽有功有詩千篇厥聲無窮直龍圖閣蔡君墓誌銘君諱奕字如晦蔡氏宋人也曽大父陟仕為國子博士贈太子太保大父希言軍事推官贈太師父挺由樞密副使拜資政殿學士判南京留司御史臺贈工部尚書諡敏肅母王氏追封汝南郡夫人君幼端重與常兒異世父故吏部侍郎抗心竒之以之為子補太廟齋郎進士及第除常州無錫縣主簿以侍親嶺外不赴丁母張氏夫人憂服除守將作監主簿罷簽書成徳軍判官侍親知秦州上即位遷大理評事通判乾州服侍郎䘮終制勾當在京步軍糧料院熙寧三年詔置審官院主簿君以薦補東院西院吏列房曰闗陞曰磨勘曰差遣一官攷擬房相參互而案牘首尾離異稽留墜散至縁為姧君乃各析為三房隨官品分屬之人大便建言門䕃初調試詩不若試經若律義為有補于政諸路薦舉宜裁限員數資序所謂親民者必厯知縣議皆施行四年青苖助役法出選建諸路使者推行之曰提舉常平倉兼農田水利差役亊君得湖南既對語當上指遷太子中允改轉運判官領其事是時所置遣多不深惟法意奉宣或繆盭君能親行州縣視其人物地宜度出而賦之入公私曰便明年賫其書來朝上滋喜使議司農無以易君者遷轉運副使賜五品服頗采其議可通行者下他路潭邵間所謂上下梅山其地千里馬氏以來猺人據之號莫猺國朝有厲禁制其耕墾出入然嵗久公然冐法又稍招萃流浪君曰省地養此後日為大患今變猺為漢無難也開其酋以禍福使為土民口授其田略為貸助使業其生建邑置吏使知有政如此而己于是靣敷其説及區畫之序上嘉納其䇿會今門下侍郎章公惇察訪本路即付其事同君經之檄入其境果大歡從授冠帶畫田畝分保伍列鄉里築二邑隸之籍其田以畝計者二十四萬増賦數十萬遂招懷邵之武岡峒蠻三百餘族户數萬嵗輸米以萬計納其所畜兵仗以其地建二寨六年五月上遣使者勞君賜名邑曰新化安化寨曰武陽闗峽遷君太常丞直集賢院敏肅時在政府辭其命手詔不許又撫納邵徽誠等州鎭蠻族之歸附者皆以補吏因言治新民法宜有張弛願假臣便宜詔可長沙諸邑負茶租田税積為緡錢四萬請如赦蠲除議全州不可廢乞行保甲法以防盜置錢冶衡州以權物輕泉重之敝皆從之敏肅以疾去位乞還君君亦以侍郎後有二子矣數自言遂歸其宗八年再任十二月交趾入冦徙廣南西路轉運副使權桂州經略安撫司事時賊已䧟欽廉邕三州内地城皆晝闔吏民多逃散君至開門日會賔僚棊酒鎭以暇豫人恃以安去者來歸簡料丁壯戒期自將擊賊賊聞不敢内窺引去乃請蠲復三州完其傷痍老弱皆有所養更軍制之不便者除械峙糧以待王師問罪遂城邕州鑿井三十師至無需不充時九年九月也已而隨軍南行方廣西財力乏而轉餉流衍出境所支尚足數月十一月軍駐思明寨聞母濉陽王夫人䘮去官其後四十日班師于富良江而主將以縱賊無功猥曰糧乏坐是奪君太常丞直集賢院未幾忠愍公徐禧來會軍費上君狀實于是朝廷知君爲有勞無罪也元豐二年猶監曹州倉米赴軍丁敏肅䘮服除換通直郎兵出西鄙河東餉運不繼使者皆得罪上特起君管河東轉運判官事徑如鄜延㑹王師治運事還部條前運七失遂上因糧摺運法運夫皆以親民官親督故無遁散分屯軍還或扇搖以再出稍避匿至聚為盜亟出牓開諭以道安定之城石州二寨具舟通道紆阻以濟議河外五堡小而密徒分形勢有警不足守可留平時戍望而已遂大省儲饋轉運使陳安石入對上曰事一委蔡某耶因屢稱奬五年十一月以本官直龍圖閣權發遣秦州兼都總管經略司事儲威積粟休養民力治綱領簡節目而肅于軍政嚴于治盜階州及甘谷城蕃部間出没窺抄君授方略諸將使以竒捕逐皆懼遁去聲實隠然完重一面州南河匯他水嵗敗北堤久受其患君増築大堤民不聞役後雨大水安居無虞秦人徳之六年閏六月二十二日晨出黄堂坐僚屬奄忽感疾遂卒中外之人言人才者莫不失聲痛歎為朝廷惜之君天資沈明而彊于自修多識事變有父之風烈嘗言天下事無不可為者遭上識拔感發奮厲于其造為省而後釋物迎所投節開理解無迕其間當煩潰艱劇跋谿莽冐暑瘴皆夙夜祗力以身臨之招攜開拓未嘗張皇勞費而妥妥就功享年止四十四自少慕親側又四服大䘮計其在事職裁數年而其所立如此外莊峻若不可即而中寛容與下論亊曲折往返能聼其盡事親至孝與朋友有義與族姻有愛教育侍郎二子所以成就之者曲有恩意内外皆與之俱為秦州奏其長潛管勾機宜文字初登科與兄昕天申同年敏肅位樞密時君使湖南又與兄朦天申分領三路漕事及秦州實繼侍郎之治士大夫夸榮之其配郭氏女封壽昌縣君子二男曰蕃曰芝皆承務郎一女嫁蔡州西平縣令趙伯通孫女一人文集十巻明年十月七日葬于應天府宋城縣七里村先塋太傅之兆某視君實從母妹之婿而又女歸其子蕃故為之銘曰逺矣蔡宗肇侯自周以國為氏著于陳留君七世祖稍從宋邱遂有顯人以衍厥流肅肅秦州克紹世緒適時之逄涵藴弗茹天子曰材濟予時汝有疇必咨罔擇夷阻方盗跳南輙使自楚本根西師往率秦府士飽千巇羌攝吾圉中以誣斥恬無一語亦既昭之天子之明以右以陟肆厎其成車流馬舞方駕而傾槩乎善惡不在死生刻詩竁石以慰諸冥右司郎中李公墓誌銘宋忠義憂國之臣李公在仁皇帝時天下平治人習靖佚公固已慨然論事書屢奏及由小吏至大官所厯見四方利弊輒條上經畫大計與他有司議率常公所議可最以國儲未建為慮天下君子小人不辨為憂其言懇至而未始以安危計其身朝廷一時知公為有經世才逮神皇帝擢士以不次超遷從官更帥西北遇事益發憤顧卒以上書論高坐廢嗟夫公之才無不可尤長于應變其于治道自以為曉然遭世用事未大振顯而落落不偶至老且死豈非命歟初公為世父龍圖閣直學士紘所愛遺奏以官而推與其孤弟其孤弟詣闕上書下宰相問狀復官之又不受既再辭官益刻厲好學中進士第厯官十八遷所至必見稱述在洛川縣原鄉教大意條著為令屬民讀之民歎曰前時令治我以法耳今令乃幸教我相戒以無違安撫使調諸郡税輸邊己而返之盛冬大雪勞費不能返者賤直于兼并家公曰他州亦吾民也令過邑願輸者聼躬坐庾門執契以待數日得粟萬石使者下其法他縣在延州夏人以嵗次金帛後時移文願毋逾嵗暮詔邊吏牒報從之公筆改曰如故事因奏言許西夏者不一而足今聼之啟僥倖傷威重或劾擅改制書公曰郡牒非制也朝廷是公議而猶坐贖在三司㑹河數決公上河䇿百餘事異時州郡類以河清卒應他役嵗更調夫若客軍代從事以不習亡溺者叵計公請増募河清立宂占法遂以不擾平民請繕治曹村隄防謂河必決此後不二年果決如公言在廣南儂智高特納款而邕守將蕭注玩冦要賞不以時撫定公檄注詣府詰責注自詭以功贖罪㑹蠻人申紹泰並邊追亡者而廵檢使宋士堯擊之反遇害注遂為駭奏以聞天子旰食遣使公馳奏無足憂願一屬臣因條上邊計宜施行十二亊劾注奉使亡狀當斬注坐再貶官頗采漢李固議上宜栁州土丁法因及他州自是得勝兵數萬以時練習戍卒大減蠻賈入乘舟貿易多抵欽廉等州公隂察疑有姧戒所在善伺之公去未幾交人冦邊果以舟入自欽廉興安有靈渠自秦以來通漕嵗久石積淺隘設斗門十八里至三十六所命焚石鑿之才留十門舟檝以通邕州置馬軍五百馬不能夏多死芻秣不給又折取税米他部公以地皆險阻無所亊騎奏罷之建復置和市埸以懐逺人實邊廪募民墾曠土薅草蒯疏瘴癘之氣攝官差選慮法吏肆為姧公第其名使待除于家毋輒詣臺人大便之方經略府饗士諜言冦至公飲自若中起更衣自草為六牓馳揭境上己而飲如初民吏始囂恐竄匿羣不逞隂洶洶公鎭以無事遂定賊見牓亦以公且得其情逡廵莫敢動即日遣貢方物請命使者至公弗見為草惡具俾將吏接之且諭前害士堯罪未治也紹泰聞之大恐委巢穴逺去初智高平其子宗旦及黨聚保有火峒或出入省地尚猥衆無所屬前將規討擊幸賞賊遂固守公揣其情移書諭禍福皆泣即遣其子曰新率孥族三百并酋長六十九人以地内屬其後安平州古萬等峒爭効順公因請以恩拊納使受命為國捍蔽在陜西詔以班超傳賜之而公亦雅慕李牧馬援為將故持重總大體前此重兵盡屯極塞冦至與戰則當其盛鋭勝未易決不戰則内無重勢以遏其入公謂本末失其應且兵惟戰守而己乃以善守者列塞上要害悉廢諸小堡而料善戰者頓内地為援増繕伏羌城令曰冦至守兵深溝高壘勿與鬭冦去戰兵裹糧襲擊之軍中熟公約束常以取勝威望隱然建言弓箭手雖土著而惰于耕宜倣古屯田法率百人為屯聚一堡頗立勤惰賞罰之格使人人加厲自好則視公戰為私鬭計莫此便王韶既以招懐邊羌為事而其族叛攻渭川堡射傷守吏公責韶失計因進兵掩破之嘗奉手詔列攻守方略十餘事其後朝廷所施多公計䇿太凡公之行事章章在人耳目者如此至其遇事明逹灼見理間危疑繁潰沛然迎解無有留處退而察公聲氣怡怡如不能人莫測也公貎不逾中人志尚高甚前後所上奏及間召見顧問多陳天人之際君臣大節闊略細故稽古自漢以下不道請以進賢退不肖為宰相攷課法謂古者有命然後為士故士貴今人自為士故士賤宜倣古先命士而後命官在官不遺罰務以信服人至明而恕嘗言曰為帥有體立功有時愼重當如泰山見幾不俟終日其將邊大指如此去官百姓遮泣不得行如施予趨人之急甚已事買田數千畝刋名為表給宗族貧乏者至今號義莊與廣南轉運判官劉牧友善牧死後公論邊事盡以功歸之求官其後又以女妻其㓜子稱薦山東儒者王建中姜潛以身下之皆至召用杜正獻公范文正公富文忠公同時薦公有王佐才退治居汶陽園池松竹蕭然有勝槩日與賔友飲酒賦詩其文章落落憂思深逺尤喜章奏世多傳誦之葢晩節雖屢黜而志不以故少衰輒忘朝廷將終猶語客以大河宋塞為憂士大夫識不識皆咨嗟感慨以不究用公為朝廷恨嗚呼然則所謂命在天者又奚道哉公諱師中字誠之上世趙人唐丞相吉甫有孫煴為宋州城令遂家楚邱自煴七世為楚邱人至公徙鄆為鄆人曽祖壽太子中舍致仕妣鹿氏繼妣張氏福昌清河兩縣太君祖某贈吏部尚書妣朱氏金城郡太君考某贈户部尚書妣何氏繼妣張氏嘉興清河兩縣太君公閥閲自并州推官以龐丞相薦知鄜州洛川縣事又薦除太子中允知延州鄜政興元府褒城兩縣改管幹鄜延路經略機宜事由太常丞遷博士通判澶州繼丁内外艱除䘮知臨江軍為三司渠司幹當公事拜尚書屯田員外郎提㸃廣南西路刑獄權經略事就除轉運使轉度支丐使郡知濟州英宗即位遷司封祠部郎中辭疾提舉兖州仙源縣靈宫太極觀遂知州事神宗即位轉度支直史館知鳯翔府拜天章閣待制河東郡轉運使改秦鳯路經略安撫使知秦州遷右司郎中坐與韶意異奪職降度支知舒州復右司厯知洪登齊三州復待制天章高陽闗路安撫使知瀛州應詔上書貶和州團練副使本州安置稍徙單州復右司郎中分司南京再提舉仙源宫觀遂以疾終實元豐元年四月七日享年六十六夫人王氏樂安縣君四男修登封縣尉卒价左班殿直偁濟州推官伉將作監主簿三女長嫁供奉官宋玠次許嫁進士劉澤次幼孫男㡬人公文集三十巻奏議二十巻以某年某月日葬于鄆州須城縣某鄉某里銘曰李實顯姓肇祥自聃牧君武安膺尹河南太尉相唐徳修有子八世至公文武是似仁祖烝哉感格以言神考烝哉顧倚于藩公蓄不窮仕也孔構而以才屈于是歸咎汶山巘巘其水洋洋委蜕在是公則不亡宫苑使閤門通事舍人王公墓誌銘公諱易字悌卿姓王氏開封人曽祖知緒贈左武衛上將軍祖繼凝皇祐騏驥使宜州刺史贈左監門衛上將軍皇父元慶内殿崇班贈左武衛大將軍公乾興初以祖任為三班借職十五遷官至宫苑使其四以泛恩一以功拜初廵雍邱襄邑河秦州催綱已有能名為麟州兵馬監押塞上無事官吏多宴集公每閒起登樓堞省防備或以為過公曰並邊其敢亡警戒乎康定初召試䇿藝以本官授閣門祗候為鄭州原武三縣廵檢河中府八州都廵檢使未行改涇州駐泊康定中夏人來冦與官軍遇于好水川公逆䇿成敗謂宜持重主者不省廹使出戰公以二千人當萬衆而伏兵起其後臂靣交中流矢俄休其衆據小山身先趣戰横㦸疾呼人競致死敵騎遂郤多所斬獲是時大將失律故公之功不復明宣撫使忠獻韓公言之除儀州制勝寨主知乾寧軍慶厯末嵗大饑河決商胡軍當下流前無隄防水暴猥至環壘幾没公親慰恤其人與同休戚晝夜督吏卒防塞約以軍法既免墊溺遂奏發粟以哺困餓濟活甚衆因起大堤城南至今頼之使者言狀遷西頭供奉官再任俄充契丹國信副使以益利路兵馬都監知利州皇祐初廣源儂獠初平逸其酋智高或言轉刼雲南將寇兩川人大驚譁公泰如平時綏輯慰勞兩路恃以安而密飭所部嚴繕守禦未幾文州蕃部王仰東掠邊地以備素具民不知警賊誅就移河東沿邊安撫契丹侵爭失地公詢耆俗按圖記得其實移文核明之契丹詞屈服奏弛府州酒禁用安撫使故相龐公薦除閤門通亊舍人改河北沿邊安撫前時疆臣類喜生事得細故輒張之徼倖以市㓛敵出巨舟數十往來界河欲造端爭産公但授方略將吏使謹備之徐遣人諭以利害逡廵皆引去以高陽闗路鈐轄知冀州會英廟登極大蒐兵伍故亊三司用未足率假民以應卒旁郡有立威將誅豪右以竭私藏公能第次其力隨所羨入之冀人尤徳公以此也嵗滿歸高陽又知廣信軍俄選為益利路兵馬鈐轄特遷皇城使以母長壽太君郭氏高年並辭之改定州路坐前任獄失移滑州鈐轄未幾改知趙州丁長壽䘮解官卜居衡州服除遂不復出仕元豐四年十月四日以疾卒于河南澠池縣令其子冐之官舍享年七十八公篤于忠義而恬和簡重居官明以燭理寛以盡下志在寧人利物而己不樂為皎然近名者故所至人安樂之尤審知人凡薦者三百餘員間聞流言而恥自訟竟未嘗有為累者諸公前後薦其才者數十百人博知書史尤喜莊老能用其説以自治至于吐納導引得養生之妙晚節間居益淡泊不屑世故十餘年間蕭散閭里自適以享壽考臨終恬然無怛化之變嗚呼公之所自得者豈少哉其可以無憾矣公娶劉氏封仁和安吉縣君先公亡一子冐也孫男女七人遂以卒之明年正月乙酉𦵏于衛州共城縣處賢鄉之原公之爲冀州某其屬邑令也于是前𦵏冐來請銘爲之銘曰或于功名鑿取以竒公在疆埸人無憂危厯政有惠所去輒思不累乎物亷靖粹夷保和貴眞以正壽命後將求公斯文有訂忠肅集巻十二
