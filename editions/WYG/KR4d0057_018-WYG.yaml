body:
  text: 忠肅集巻十八宋劉摯撰七言律詩春日小雪崢嶸變曉寒舊年殘臘破新年明生月魄初三夜氣動春灰五九天蓼甲韭黄隨緑酒綵幡羅勝上華顛故園欲告西疇事思我楓林楚木邊游白雲山二首籃轝微風迎曉涼細碎草木無數香千巖雲歸雨未足幾衝水淺禾難秧原注山中之田毎一水所溉謂之一衝如曰一溜也松下陰森石橋冷竹邊曲折溪路長西家又得避暑地翠微亭在山中央行窮葱蒨坐清涼隱几川原一炷香小雨徑從前嶺去高禾移就下田秧禽聲不見山情悄江影新生客思長政使歸期猶逺在白雲游樂未渠央原注二月七日與客游白雲山二子傳行路有詩次韻一首次韻跂蹈山行舟伏盤渦傍淺沙北風寒日氣清嘉初從磯口詢漁舍漸入雲林問酒家萬里欲飛愁若絮小爐危坐眼生花筋骸養作衡山力坐擁肩輿聽譟譁二子訪酒家不遇次其韻作青斾不見山雲深何以慰此二子心阮修杖頭故應在黄公舊壚無處尋求有不得事當戒興盡必返愁難任仙家竹葉未必美舟尾茅柴還可斟賞心亭佳山逶迤抱故國危觀突兀凌長波仰憑飛景赤霄近下瞰萬木蒼烟多三閣繁華芳草在七朝風物一禽過後人未見興亡本秪笑陳家玉樹歌涵輝閣碧波瀰漫起春湖草色黄深岸四隅新謝小桃雙燕至從南微雨好風俱暫來秪是林泉客長見須憑水墨圖無數鳧鷗記相識近人浮泛滿青蒲王母池阿母宫前阿母池池光清滑㵼玻璃岸擎黼座涵佳氣影上仙衣潤彩霓靈液發源來海谷飛花隨泛出桃谿羽車鳯葢無消息寒月沈沈寳殿西次韻王太博闗太丞同遊石鼓山禮局仙人兩俊流高才相敵異商周北溟風水初登化南楚江山晚並遊契闊歳華歸大笑留連騷雅入冥搜江邊一醉驚離散應有功名約白頭次韻陳秀才胄遊石鼔山書院山頭雲木鬱青蒼山下江流淨鑑光亭閣瞰臨慙舊句巖溪開築想前良心甘水石忘羇宦耳冷絃歌歎土鄉寂寞先生與叢竹相看孤節幾秋霜元日寄耒陽元日江湖萬里身四方南北等埃塵莫悲天地如行客還喜瀟湘見故人渌酒桂盤催獻歳小花羅勝冩宜春淵明秖向東風醉應笑窮吟浪苦辛次韻耒陽鄒明府庸夢比光陰一鳥過四年江渚負長哦逄君舊眼青猶在驚我寒鬚白已多言偃政聲方浹洽茂陵歸思獨蹉跎何時又見揮吟筆快若輕丸下峻坡原注君詩思敏㨗承以舊韻示喜霽詩次和楚雪飄殘四望間江山晴氣撲衣冠曉餘霜日明崑嶺清極人家在廣寒賸琢瓊瑶君句巧相當旗鼓我才難青天寂寞浮雲盡最愛春風幾鶴盤簡提刑朱仲隱初玉學士當年蓬館近儲胥紅璧東西對直廬綿蕝同參臺曲議芸籖分校御前書朅來憔悴騷人國隨見光華使者車莊舄有吟皆病思賞音徒欲慰頑疎原注君訽索近詩次韻朱仲隱寄鄭寺丞猛脫塵勞厭競馳歸來不著楚騷辭江家有宅能依竹陶令臨流秖賦詩簷北嶽雲供顧望水西州市隔喧卑康强八十人難者此外窮通各一時送吕雅寺丞玉府文華異俗氓丹山毛羽盡祥珍伊臯相業光前史王謝家風世有人好學少年忘貴胄摛詞竒藻敵陽春如今四海皆桃李曽見槎通萬里津路虞部得代還東風楊柳認春天轣轆車音向郢山乆客不知游宦樂五年方喜取書還邊兵近日屯湟水漢將何時入玉闗自古詩人多慷慨功名無使壯圖間次韻聖和還自京師途中見寄郊原新雨静纖埃路下霏煙白玉臺遼鶴應悲里中舊仙鳬今自日邊廻雲端心望髙堂喜馬上詩尋故社來牢落不才疎世者尚貪斗粟變蒿萊次韻李聖和寒食郊居二首春郊寒食歎淹留巧映鞦韆樹色柔杏蕚離披翻白雪柳花輕薄聚圓毬風光無賴撩歸思節物相逄眷昔遊塞下塵埃侵夢想何時仙袂揖浮丘林梢黄緑野禽鳴泱漭春陽泛地平禁火人家甘冷淡浴蠶天氣趁清明誰将馬絡尋春去獨佩詩囊傍水行稚女弄花田叟醉笑歌真是太平聲次韻李沖聖和秋懐燕鴈南來乆客驚寥寥風色試寒輕吟殘紅葉詩無味歸識滄洲夢有情歳晚壯懐同劍冷樓高愁思共雲生淵明無酒重陽近幾日東籬繞竹行聖和受代枉尺誠非聖賢事守道固與時俗違難哉仕者行已志况復儒生疎世機喜聞傳告令尹政應歸湔拂塵土衣快君高舉歎留滯把酒為歌黄鵠飛次韻王太傅同陳長史訪僧不遇陳君先歸林雨幽深止秀竒中間寧有大顛師漫勞雪客乘舟去郤是雲僧採藥時歸興忽同分嶺水餘懐誰共一枰棋故應重作春游約已覺東風傍柳枝謁金鑾瑩襌師西城十里入溪林頓覺塵埃脱醉襟淺渚敗荷縈白曉淡雲疎木抱清隂陶潛但有思歸賦韓愈殊無善吏心遺照主人應念我試將秋思寫瑶琴原注進照堂名次韻王太傅答周郎中寄酒子雲寂寞歳將囘門静因逄載酒開白雪雅歌郵置去紅泥仙榼印封來親闈即日先稱夀賔席何人伴倒罍莫作獨醒孤逺意杜郎親撥凍膠醅再酬王太傅曲臺仙客苦能詩思入風雲學有師楚國大夫吟澤日江州司馬愛山時年華悄悄還杯酒塵事紛紛付奕棋想得懐歸心似我越禽常自記南枝次韻王弱翁借書錢君錢家書橐盛儒林禹穴時容探萬尋嗜好自同皇甫癖寫傳應慰獻王心此于取與無傷義盍以幽竒付賞音猶説冬官未通借覽之安得有千金次韻弱翁早春病起換骨欣逄九轉丹東風迎歳雪梅殘玉良試火増虹氣鶴老經春怯露寒詩就越聲驚惻惻夢囘天樂記珊珊故應有徳神明相寧事祈禳叩夜壇次韻弱翁春中乆雨楚雨亷纖無盡時園亭惟有草菲菲桃花泛水飄紅去燕子貪泥帶濕飛潤徹玉琴春氣弱聲侵羅幕夜寒微東陽病骨疎慵甚留取清樽待霽暉次韻王弱翁題承天寺萃景亭二首左右青林抱邃深徑隨蒼蘚上煙岑陵遷漸失三湘事春逺閒傷萬里心我愛白雲親鳥道誰臨滄海較蹄涔北欄曽指鴻歸處杳邈鄉山不可尋四臨千里一危軒灑脫塵中兩耳喧隱几風波隨客棹對江金碧露僧門數峯煙老靈妃國三月花殘杜宇村不得相從嗟筦庫新詩猶喜慰冥昬次韻孫景修題萃景亭公遊何似拙翁巖原注公守桂陽開鹿頭山名其巖曰拙翁盤磴先經釋子庵視聽稍遺塵種種高名聊換府潭潭時驅萬象歸吟几盡洗叢荒破暝嵐更有風華入春望名園都在面東南又次韻四首于此登臨稱謝公湘南竒觀欲吟窮天沈暮鳥煙氛外山抱春城霧雨中陂岸放車看宛轉寺簷飄鐸送玲瓏老僧已許炎蒸日為借清風解簟筒縹緲飛亭倚半空景來酬對不知窮天開雲嶂輪環外地蹙林丘尺寸中時有桂花飄馥烈恨無泉玉㵼玲瓏楚人不識靈均意江上年年費粽筒背倚叢岡面佛宫登臨酸足喜途窮白紅花意生洲曲紫翠山姿落酒中寒鷺見魚行厯刺珍禽驚客語玲瓏亭前雨足農知歳免卜靈龜灼腐筒隱几憑虛萬景空浯溪能使決山窮于今川隴民歌處曽是干戈覇業中蘋末起風香細碎水光浮日影玲瓏苟能適意茅簷足何必鴛鴦碧瓦筒送衡州王仲和郎中代還鐃鼓催船下洞庭幾灘冰澁滯雙旌崢嶸霰雪暮寒重早晚瀟湘春水生君意喜先湖鴈去我懐方共夜烏驚明年奏課趨雲陛拜罷當如漢仲卿寄湖北運使孫景修朝議曽伴籃輿入翠微杪齋終日醉春暉親烹林筍班犀大旋膾溪魴白玉肥歳月幾經鴻北去風雲應有夢南歸猶令猿鶴無驚怨聞說頻年見錦衣原注公雖在北路時以使事過之秋日即事湘城風物向秋新興入羮蓴與鱠鱗葉舞霽紅楓映寺蓓含霜紫菊迎人瞻望河漢乘槎客歌詠倉箱擊壤民欲放幽懐到滄海徘徊黄鵠更傷神偶吟平昔名場氣吐虹青袍霜鬢老湘東舊交半在雲霄上壯志都銷水石中樓上買魚乗酒熟舍邊秧稻指年豐清風令徳人胥化合使鄉閭號鄭公被㫖還闕訓答諸公韻三首楚雪三經橘柚天君恩新許出湘川雖非殿席虚中夜且勝臺郎謫九年歳晚病懐孤劔外江寒歸思亂雲邊妻兒莫恨歸裝薄賸得諸公錦繡篇湘南竊食漢鹽官長記靈煙魏闕端隙過白駒三歳月萍漂滄海一孤寒九重寛宥環初賜萬里歸心斗欲干常媿主恩深未報慨然真喜脱囚冠幾年南楚聽哀猿自昔江湖憶帝閽粉骨何禆天下事賜環難報聖君恩餘光乆記仁人里引重仍慙長者言安得新官來棹速更隨春色到鄉園喜跂蹈登科注官原注餘姚鳥程祖門儔子又詒孫善慶儒科燕後人雁塔繼題三世字桂林仍見兩枝春稽山照邑天如畫霅水浮州地絶塵我亦浩然歸思起明年雙棹趁吳蓴倚舟崇福寺寄臨湘衡文叔祕丞相逢相别立湖邊幾見罇罍換歳年簿領初離仲宣幕政聲猶屈武城弦歸舟落晚惟荒寺病枕驚秋聽早蟬咫尺松風亭下路可憐雲霧隔青天原注縣舍有松風亭行虞城縣早起寄公秉一夜風聲海沸騰束衣寒屋赴晨興雲吹惨澹天西月馬踏玲瓏雪底冰吏事不堪年老大歸懐那復病侵凌遥知宴息庵中夢正在仙門第八層寄公秉李郎中二月晴霜冷逼人深紅桃蕚爛繽紛寒中悄悄春强半湖上悠悠水十分心厭留書期謝病跡疎罇酒憶論文東風留著芳華在何日仙鳧下白雲次韻王定國湖上君來惟有岸蒲青落寞羇懐獨此行逺浦自迷眷草色緑陰初變夏禽聲龜毛角知何物鵬海鷦枝各有情且共論文一樽酒吳霜從向鬢間生和王定國地逺城東得得來正如湖畔共含杯眼中故舊青常在鬢上光陰緑不廻歸去汴橋三鼓月相思梁苑一枝梅我閒時欲尋君醉為備芎醪更滿罍原注病目君為置芎酒次韻定國約過李氏園池年來高興滿蓴絲寒薄春風駘蕩時稍愛燕脂開杏蕚已驚香雪爛梅枝老于樂事心猶壯病得新詩和獨遲何日華鑣向金谷擬追仙翼到瑶池次韻答王定國江州居士赴東城旬月相忘不寄聲閉戸邇來能避謗求田何處欲歸耕筆端浩蕩詞逾壯胷次崔嵬氣未平我有白羊新賜酒澆愁聊可一杯傾次韻王定國懐南都上元九陌無塵夜霽天兩都風物故依然車馳馬逐燈方閙地静人閒月自妍佛館醉談懐舊歳齋宫詩思鎖今年傳聞公子微行處門外驊騮立繡韉原注去年上元南都同李公秉三四軰游静覺遂飲上生院今年致齊太常聞定國游相國同孫推官廸李郎中鈞督役河上叙懐三首時哉風物媚郊原無賴禽聲對客喧山色帶煙屏依漢春陽凝日浪浮坤河功田利兹為重士賤民勞豈足論仙老不妨持道氣朝餐華景望朝暾平湖勝勢抱南城花氣濛濛馥近坰黄變柳條歸老緑紅殘桃葉换尖青春乘病後成多感事向閒中見未形日日攜茶喚賔友吳泉烹盡惠山缻原注來詩問南湖事車馬傳聞漸欲還河邊陳迹棄春灣暌離心恨三秋月積累功成九仭山從事獨賢公弗歎散材無用我宜閒放夫急趁蘭洲賞寒食光陰俛仰間送許敏修使二浙二首大夫才業帝都俞清潔寒冰在玉壺流馬阜財求八使鑄龍班節重三吳海門曉日迎飛鷁笠澤秋風趁鱠鱸亦欲東遊聞米賤行臺還可庇疎愚蒹葭曽愧倚瑶瓊京兆經年共左㕔屢喜足音臨病几原注臥病日乆屢䝉訪問獨何才力致虚囹原注君治聞封有能名比以獄空被賞亦及不省閩山近部榮鄉繡越客何人識使星隨看鋒車下江海歸來人物重朝廷題泰定小雒亭名花多自洛城傳物色春工十指間漸買姚黄并左紫恨無伊水對嵩山主人妥妥多材藝俗客悠悠幾徃還惟有萬竿亭背竹霜青偏解照衰顔八月十二日同楊誠之馬全玉王似之泛舟至􅃇州塔下作秋水瀰漫山翠微西風恰好坐吹衣濃雲將雨東西去白鳥窺人下上飛陵谷是非詢野老滄浪懐抱負魚磯遲留莫聽嚴城鼓待得雙橈弄月歸次韻趙伯堅令鑠郎中憶南都牡丹兼寄子由芳叢百朶爛紅雲曽倚西軒醉兩春夢雨一驚巫峽曲佩香常記漢江濵病懐日負杯中物花意今看檐上塵囘首東風君自問欄邊更有後來人城北寒門秋色陣雲飛雉堞烟青畫角悲河坼波濤含趙魏星分畢昴半華夷太原玁狁當征日瀚海單于欲戰時六十萬兵閒飽死誰憐山後八州兒喜王彦祖新居今見黄州慶有餘侍郎門戸已容車風流地望烏衣巷瀟灑仙人碧落居三畝江家須種竹一區揚子獨藏書東平我乆猶如客何日菟裘近里閭北山道中隨馬盧泉碧玉流野林春鳥語鈎輈桃飄殘蕚紅堆水麥換新苗緑滿疇世味淺深聊爾爾生涯消息强悠悠不如收拾詩千首要似張家萬戸侯題所居圓明庵茅剪幽廬小圃東葛巾藜杖稱高風守方固恐形為累内照應知色即空出入有虚還有實輝光無外亦無中世人欲識圓明事盍問名庵隱几翁還句龍緯化文詩卷誰識斯文乆寂寥希聲杳杳思滔滔氣無外物纖毫累才有靈光萬丈高誤借鼓鐘娛海鳥自堪奴僕命離騷啞鐘亦欲煩君手能為孤音解鬱陶贈汪汾同年徃歳仙遊白玉臺拍肩曽喜得洪厓高門已覺陰功在古獄猶嗟寳氣埋風竹夜聲清醉枕雨峯秋色滴吟齋大夫未老無多嘆㑹見勲名與願諧祕閣曝書畫次韻宋次道帝所圖書歳一開及時冠葢滿蓬萊發函鈿軸輝唐府散帙芸香馥漢臺地富祕真疑海藏坐傾人物盡仙才獨憐典校來空乆始得今年盛事陪病起次和何温甫祕丞雪琬中見寄士譽民謳楚粤間相逄傾葢問南冠吟餘候館春風峭病後湖天霰雪寒應喜白雲瞻望近原注君迎親至此獨憐滄海去歸難雅歌贈我琅玕意欲報慙無兩玉盤聞東園諸學生雪飲寄之大雪填虚翻海波袁安門戸可張羅寒驚春絮因風早病覺空花向眼多梁苑喜開陳桂酒郢人誰已唱蘭歌少年撫景應須醉莫學衰翁著睡魔元日示彭器資御史天厯開祥歳屢登命元頒號繼熙寧春風寒色猶燒臘北斗杓端已轉星初退賀班東上閣郤觀郊樂太常㕔便期節物尋樽酒莫問吳霜換鬢青再和大禘新元詔太平萬方承慶日神寧夀觴别殿稱山嶽治象端門燦日星放伏暫騎歸舍馬束衣還就致齋㕔史官不用占風瑞從此豐年紀汗青次林御史次中韻一鶚将從北海飛豈如窮翼老差池方嗟簿領迷公幹尚喜琴音得子期别思俄聞賦南浦殘花猶可醉東籬留連且此同罇酒歸去鱸魚未過時原注時揚州陳丞相辟君幕府再次韻昔歳相從向此都重來風物變南湖莊生達觀嘗齊鷃張翰歸懐豈為鱸世事不窮勞强勉官期猶逺盍躊躇新詩易得皆精好真似元和咳唾珠次和次中簡留守蘇子容濉園文雅乆湮淪居守今逄紫禁臣右客游梁似司馬主人開閣等平津不才亦預門生舊承乏來趨幕府新共喜風騷壇将在簫韶時許擊轅親次韻次中喜子容還朝公歸真足慰儒林雲日重瞻帝闕金聚散可驚陳跡事行藏誰見古人心春還漢省苔新舊霜逼吳船水淺深坐憶茂陵猶未去悠悠徒有病中吟次韻次中題雙廟凛凛英風數百齡舍生知與義相形莓苔老澀穹碑暗雲木疎寒古殿扃自許孤城摧虎兕至今遺事炳丹青二公死所真難處獨恨臨淮有遁刑次和次中乆雨阻行而聞浙中旱乾積雨亷纖氣已淒暝雲凌亂四天低吟懐摵摵聲侵竹歸思澐澐水拍堤東海可能均霽日北風曽未逆陰霓應須更問淮南米莫厭留連鷁首西忠肅集巻十八
