body:
  text: 忠肅集巻十五宋劉摯撰五言古詩讀書西風入梧桐白露下雲漢灑灑晩秋色清凉復神觀嵗月不我與料理前日慢念此平生心所樂在黄巻太羮與𤣥酒梨樝及俎䉵滋味要足口更復恨未見燈火夜可親巾箱字甚憚紛紛事是非碌碌世治亂千古守糟粕未免斵輪歎聖賢有堂奥大道堪夷坦是為名教樂足以了衰晏惜日營珠金投身醟歌管彼志各自言難以一理貫老子畫象敝周僿于文老子談大道仁義已末流體法固行潦虛無抱𤣥珠清淨為至寶掊斗息羣競死聖止大盜謂可愚斯民狂瀾復既倒不知世大變萬偽火就燥欲以區區言反俗入羲昊渾淪五千言道徳何浩浩漢嘗求其説施用未深造衣食已有滋煩苛以能埽惜哉衰世士學術失探討流而為刑名慘礉極枯槁但見多申韓舉皆罪黄老聖人無常師有善取輿皁問禮固有然誰謂孔徒小遺貌知是非君無論醜好雜詩六首四序若轉轂萬物變秋風蕭騷簷邊月赫赤江上楓寒鴟坐晴屋隂蟲凄暮叢靈鳯杳何許寂寂朝陽桐咬咬籠中鳥食飽勤好音誰懷主人意豈不思上林出處謬前算老大故谿心秋衾耿寒夢玉露曉如淋古人有髙志妙與天地通讀騷飲美酒揮弦送飛鴻杖藜歩梧竹閉户閑僕僮禍福有倚伏念當守蒿蓬我思彭江州行已有風績與善忘畛畦麾邪立崖壁堂堂生民望奄奄斯道寂何時持鷄酒就子墳上瀝播州遷劉郎夜郎放太白秀木風所仇人情有欣戚嚴霆無終朝斯文豈遂厄我願蘇與黄夀命等金石至人有神遊坐凌八荒邈一息如鵬圖萬里御羊角蒿萊彼頻頻晨夕自喔喔仙人喬與松誰云不可學西齋觀雨長庚謝餘炎大火躔西極開軒對朝雨拭目看秋色雲空相晦明風縷乍斜直聲繁自飄蕭勢急勿淙激方塘潛浪潮萬瓦亂珠射巢燕倦翩翩庭蕪長紛籍閒花洗幽素秀木舞涼碧清氣醒筋骸餘爽入几席跡希蔣詡徑興髙陶令宅繞郭聽懽聲登秋飽豐澤良辰感孤宦念我久行客窮年不自樂心跡雨何益功名羞詭奇嵗月易類斥聖人堂有奥大道坦可適胡為世俗間區區較尋尺縣齋秋日雨後寄李聖和置閏嵗八月祝融冒秋權當代不肯歸滯暑歊以延金行奮剛義天令懲驕愆一雨惡氣死百物疲瘵痊隂陽戰既定灝氣蘇天淵􅀢斂物得性豐給民有年小軒占幽寂危坐涼翛然身如赦炮烙蓬山弄飛泉冷風嘯梧竹清響搖碧鮮淨几少喧蠅髙簷除嘒蟬煩心爽已蜕塵觀清疑仙于兹飭前懈圖書獵陳編晤言隔朋類披巻盟聖賢樂此懷髙風北望心悁悁縣北馬上五月暑雨過緩轡來城隂朝暉粲林莽涼風弄衣襟敢辭鞭策勞邂逅得幽尋斯人勤嵗事樂此膏澤深芃芃黍稷壟藹藹桑柘林田翁可指食蠶婦期織絍稇儲與衣褐卒嵗無崎嶔陶民帝有力養物天之心忘言樂其樂此意良自諶紓為馬上句比和擊壤吟答黄莘任道代書見寄吾生本放浪自比林壑人謬此紲官組試邑漳水濱疆田占㵼鹵户俗籍羸貧驛涂搔左臂河流齧西漘役者動淪産居者無儲稇科求困府調期會嚴吏文儒生仕學古志在膏斯民慨歎適于此踸踔徒自勤亦嘗紓厚斂粗自窮褐温原注南宫夏税折色視他郡最重前嵗特為申請乞隨市直估折不用諸色得㫖蠲三分之二勞心米鹽屑秉筆朱墨紛尚賴厥俗古椎然猶朴淳因時罕訟訴得以親舊聞瞻言君子治百里相依瀕厨傳候使介南北交歡忻議和六十年中國勞耡耘脂膏瘠黔首嵗月如轉輪寸金比寸土石晉真自焚祖宗赫大業此願嘗經綸遺憤鬱未泄壯士常云云天運無盛衰吾民繫康屯逺御在廊廟勿憚躬觴飱小官惠不耻委吏孔所伸原注君為清河令當信使驛路時有供饋送迎勞困之嘆故云我亦走除道折腰邊馬塵縁茲有境會每得言笑親代去各匪逺木落秋風辰知倦黎侯寓來卜子騫鄰原注君始寓衛州今見詢欲謀居汶上東平我客久蕃阜誠罕倫齊魯儒學地遺風今尚存禮讓行比屋弦誦傳里門玉京輦路近霏煙望氤氲梁岑聳秀概回源號通津炊玉北陂稻鱠霜南浦鱗名園富夏果冬山下寒薪滋味閩越足物色呉楚賓人物盛著録衣冠若雲屯交朋三數子英英鸞鶴羣文章與言行玉潔芝蘭薰方舟洞庭雨載酒樂郊春羡君此謀吉不必龜筮詢我馬固已秣君車亦宜巾瑶音枉嘉問凌紙天葩芬聊兹締里社愧匪金玉珍中秋招趙湜浩然天地秋涼風日蕭索憲也固非病回焉不改樂公秫已堪釀兵厨有近約以此邀子車主禮豈云薄送趙湜遊邊風霜日夜肅闗寒塞草白之子倦蓬蒿結束逺行役尺劒有壯懷短褐無寒色禮臺多黄金義橐富白璧河山數千里趙魏繚遺跡大事今在邊為我盡覽歴威懐用表餌是非入奇策豈如滎陽秀出以屢空迫白鷺亭危亭跨城巔因洲名白鷺開軒二水上寓目萬景赴風濤豢魚龍煙雲變汀渚孤禽㸃鍾山片席下呉浦閒人得閒愁憑欄歎今古脈脈臨長江寒潮自來去過彭澤孤舟倚彭澤髙節懷淵明缾粟曾幾許忽歸無留情士生于内外貴識所重輕山高暮寒聳江闊春風平弦歌絶遺響秫田今誰耕我方事奔走嗚呼愧先生庾信宅南都號多士庾信乃辭客承家富縑緗摛文爛組織應教來春坊日坐學士席翩翩宫體謠江左變風格巨盜掀臺城狂飈鎩孤翮南飛江陵宫杖策赴王繹經綸投中興感憤補天隙大厦豈一士終此陽九厄陸機趨洛陽夷吾入齊國濯足聊委蛇懷邦已悲惻惜哉不遭時淟涊無偉績王室與身世淪離兩何益暮齒哀江南聊將賦心跡楚郡故城隂或云此遺宅寥寥舊山川莽莾新黍稷是非不可求秋風暮烟白馬融綘帳臺東京尚經術人皆挾師才惜乎章句間門户各異開馬融號耆舊太守南郡來横經坐綘帳自處何崔嵬帳前列徒弟帳後歌絃陪書生貧賤志遽以聲色回于今數百年巋然但髙臺舊址半傾圮欄檻生莓苔溪光貯襟袂南風熏樽罍髙簷日向暮燕雀亦徘徊題公安知縣柳應辰屯田黙庵語黙本無常此道知者寡君子黙諸心志氣納陶冶至神所安潛可使萬物化精微與道契密不見纖罅世俗黙在口鈐若偶人者至其中所騖逐逐㪚萬馬我來觀黙庵虚白非外假天地冥毫芒今古一晝夜物至紛無窮酬酢甚閒暇清淨老􅅨燭寂寞揚氏駕養此將有行性命妙天下相對坐終日心愜如嘬炙賦詩尚何言聊為默庵謝寄題栁郎中留客潏主人真愛客留客徹歸路清溪環醉堂客起驚四顧人生異智愚所急隨所慕僕僕聲利徒晝夜無息慮雖有此不樂身留意已騖惟同主人心乃知此中趣主人韻瀟洒恬不役世故對物心有忘簡言理自悟清風元紫芝令徳黄叔度即之久益親不知變朝暮況復樽有酒琴奕左右布魚鳥馴不驚孰與醉妖嫭主人意于客可謂甚無負速應架溪流坦坦堂下歩客至不須留聽客自來去次韻王潛江見索近詩與子一睽索俄經百朝昬塵勞觸新累病懶荒舊聞強之旋放失殆若溝澮源新吟妙思致天葩發靈根澹然體大雅理惬如忘言鼓旗締友社壯志壓僅存譬以趙魏弱仰闗支秦軍君無疑敝橐薏苡非珠琨送鄒澤民還灃陽人生寡會合世路多穽機吾得二三友老鈍諧所依澤民氣閎侈詞筆如戈揮狂鶚但思擊生馬不可鞿彦修韻寒苦獨以經史肥捩眼鄙俗調攘臂談聖微直夫名流子學性無愆違冰玉瑩表裏芝蘭自芳菲嗟吾實款段騏驥安可希清樽寫江海日獲從西圻吟鋒互矜軋醉笑相嘲譏方懐青蒿愧忽見黄鵠飛明哲慎所蹈勿與矰繳幾秋風病池榭苦雨沾裳衣行矣嵗華晏重感人事非玉音儻無斁時有北鴻歸次韻晉陵呉秀才傳見貺予本疎野人出處心已果孔患四未能嵇慵二不可長年足憂勞中懷幸安妥風瘍臥疲軀手足困攣跛思君淳乎淳處俗我為我玉軫黄金徽手開萬古鎖天地自然聲聽者不敢惰君有元氣舟微風以為柂我亦薄外機庶不攖世禍儻伴荆州行春江醉輕舸荆門軍惠泉呈李使君舜卿蒼山抱西城䝉泉發山麓一泓養虚淨大石坼巖澳源脤潗潗來星珠沸相續何人瀦方池不使聲瀑瀑四圍疊琳琅百丈䕃雲木波底金蓮花萬葉緑綺縟畏清無魚蝦因亦遠鷗鵠俯視洞五臟安敢濯兩足循池隅西南漸見泄泉滀怒聲始可聽勢如脱桎梏涎沫巻飛練潨鳴射碎玉曲折谿路長幽響遠連屬安得朱絲絃為寫滄浪曲派澤山下田嵗常稔麰榖憧憧負缾盎清入郡人腹惠名由此歟圖牒曾不錄崔碣鑱文章無數不暇讀亦欲有佳句恐為惠泉辱使君心自清舘宫泉上宿一勺蜕塵軒豈比樽酒淥磅礴壯士氣常為山水伏天下幾林泉無金買卜築空兹嚼屠門野人真碌碌煎茶飯後開都籃旋烹今嵗茶雙龍碾圓餅一槍磨新芽石鼎沸蟹眼玉甌浮乳花詩思一坐爽睡魔千里遐茂陵病解渴頓覺肺氣嘉玉川風腋興直欲凌煙霞論功著為經宜得鴻漸誇膏梁麯糵士此物無與賒石生煎茶石生蘭溪來手提溪泉缾謂言長官政如此泉水清歡然展北焙小鼎親煎烹一杯酌官夀雲腴浮乳英慙非百壺餞真意不自輕澗沼蘋藻細王公享其誠冠葢豈不至紛紛空涕横珍重石子者端有古人情游白雲山西山矜霽色林嶺遡晨光萬象露榮秀熙然數盛陽扶笻喜暄暖更得春日長迴阡互虧蔽叢薄紛青黄溪橋覺飛動漲水起連航杳杳巖壑歩翛翛松桂香道人誦所聞坐使身世忘誰我共出處閒人澹徊翔風鈴有妙想天樂浮圖傍非徒愛石壁行將營草堂彼哉楚人子記恨擷幽芳馬當山馬當天下險崔嵬大江邊翠碧倚千丈峭立萬仞淵其背領羣岫其麓匯飛漩欎葱巖間桂窮冬華葉鮮豈無神仙人縹緲居其巔猿猱肆健捷攀躋到雲烟揚帆過其下瞥若飛鳥然仰觀動精魄但見􅀢青天吾生媿仁智而于山水便終日叩舷坐無暇窺塵編有嗜固為累觸險不自憐湖溪道中夜雨聲緜緜朝雨勢未歇行役良間闗炎歊暫祛遏蘋藻香幽幽陂池水活活咫尺迷見聞淋漓徹衣褐坎泥甚膠凝塍路無尺闊饑僮與羸驂十歩九顛蹷攲鞍髀欲僵風葢手屢脱驚目不暇瞬危魂亦已怛處險貴能安欲速或未達聖禹嘗輴行文公尚胡拔彼勤事業大吾勞簿書末香城到長堤軒眉解蹙頞大道吾所歸寧為險途奪久雨次路韻江國多隂霖雲氣所儲積貫月仍彌旬窮朝復竟夕太陽暗經天莫見黄道迹風霏淋牀帷簷溜穴砌石春澤農之瑞太甚豈其益人言雨有數四時合均適前多後將少物理固明白我居苦湫陋安得爽塏易棟梁生菌苔書藥漬汗液塞漏除泥塗紛紛課奴獲凌虚逃重膇頗思兩鳧舄坐觀久溟濛風伯豈無責慰彼望嵗人私我窮居客茲事但置之一觴聊自釋富池口順風雖宜帆顛暴亦難用浪擁江逆流雲狂日昬霧天公容飛廉橐籥大開弄蛟鯨快乘時驤首出洪洞舟檝多深藏灣浦投缺空我行斯可時要當審静動況復舟弊鈍羸師困僵凍時止聖所藏欲速禍或中坐期天清明連檣欣所縱且傾淥酒樽慰此清夜夢泛舟湖光漾碧霄飄然一方舟緑􅀈屢還復檀槳雙夷猶雨色芰荷晚風香蘋藻秋鳧鷗解相信隨橈過前洲落落二三子載酒相與遊清言愜素尚大笑忘幽憂洞庭醉淵明剡溪浮子猷人生似飄瓦所願非所求濯纓漁父達佩蘭騷人愁不須呉姬婉蓮間聴淫謳鄙哉遁功業方為五湖遊吾曹詩酒中此樂為最優憶山昔者氣少鋭狂走登泰山東峰候海日危磴躋天闗上攷秦漢事遺文大碑頑南浮九江會廬阜㡬往還雙林到如家瀑布聲潺潺扁舟上湘水南衡若屛環巍閣坐杳靄祝融費躋攀幽尋恣所適曾不虞辛艱其餘林壑趣可數皆班班逮今嵗十改志氣日已孱前時兩河吏風埃走青綸荆州乃澤國自昔登臨慳佳山到郢盡平地千里閒塵耳憶猿嘯屐齒生苔斑安得蒼翠姿下落樽酒間平生林丘志未去心如瘝去就不勇決將見移文訕送呉雍平凉令洞庭葉微脱衡陽鴈未歸秋雲招客思偏向隴頭飛風霜過商郢飄泊遊子衣行邁豈不遠在彼渭水沂早寒闗草白九月邊馬肥西州風俗厚長官民政稀洪河繚勢勝大山四蟠圍登臨賦今古壯志相發揮宦遊子誠樂孤陋予何依念此性疎朴動輒觸世機相逢幸燭理義愜不謂非扶持失其直曲逢嗟願為朋友日已削道義誰與幾離騷黙自慰但寄黄金徽寄潁州顧子敦念君去南州嵗月忽已掃豈無肺腑言難為音書道客來自汝隂盡説太守好黄堂曰無事仁政浹稚老承顔奉親歡甘旨富魚稻時時過西湖樽酒媚花鳥兒童爭拍手共笑玉山倒都城亦何為風塵驚昬曉投身非所謀養氣安能浩思君便便腹中有無價寶昔者定交分我已愧枯槁豈知鴻鵠飛翩然異鶬鴇人生出處間得失不在早君看松與桂俱有嵗寒操何時臨清觴為子傾懐抱送僧常䕃吾師來曲江落落偉丈夫靈標峙松雪清韻輝氷壺談高文字間欲趨仁義途飄然跡無累青天白雲孤振衣下懷楚遂欲游京都京都貴人多駢門耀金朱仁義卜知已誰不顧子廬況子兼外學妙達性命樞言隨禍福應名利惟所呼一出玩世故應憶舊山隅庖婢病跂自臨鼎俎有詩塘頭買鮮鱗戢戢楊栁貫不憂一日饑遂可支兩膳北方貴􅀈魚豈異此中􅀈但求杯盌充焉問名實眩芼之薑芥蔬雜以紫蓴綫雖非梁肉豪鄉思已過半甘芳漬蒙茸軟熟分片段佐我新炊秔珠琲光粲粲春羮遠無慙枯鮝不足羡吾于饕餮衰安此軟煖燕昔人意不佳多縁噉脯麵聖賢親鼎俎毋庸厭烹饌夜發白碑畫行苦炎蒸秣馬戒夜發清夢失歸路微風弄纖葛星疎天無雲獨有亭午月太空生白煙浩蕩萬里闊細碎草木香淋漓露氣滑戚戚寒蟲聲逐馬不暫歇我行何區區無乃害慵拙傳聞猛虎多宵路時出沒四顧林莽中精靈動毛髪求全得憂虞禍毎乘所忽君子審重輕無勞避途暍冬日遊蔡氏園次孫元忠韻偶來梁宋遊得子共閒冷杖藜古城隂邂逅塵外境怳思闤闠中喧卑真坎井晴霜蔽隂崖朝暉潤陽嶺田翁醉年豐曉夕不知醒園逕迎幽尋林屋到深静凍禽時自驚古木坐移影憶雪指寒荄占春驗枯梗求田計良難旅食飽已幸暫得酒中趣詎須求酩酊短景忽催歸何時後期請次韻呉户曹師道秋雨西風日已肅涼雨霏層隂豐澤飽嵗事徂節驚壯心寒蟲攪夜思滄浪夢秋衾欲謝茂陵病誰憐莊舄吟題句龍緯職方海棠軒使君西州客慣見海棠紅彯纓出故里揚馬來漢宫醉當坐乖隔年年夢春風荆州蜀門户脈脈風氣通此花何從來根本移化工使君有新第幽寓如山中小軒面城麓交柯植雙叢年光錦官逺顔色故園同想當春苞麗無日樽酒空繁豔燒醉眼顧眄增冶容地勝不在大意適物易充雙輪粲兩朱行將指炎封寄題定州楊君園亭隱不在山壑名園抱南城梧竹有逺韻泉石非世聲林花品莫數野鳥馴不驚主人堂其間對境心已清舉遺笑錄錄放言獨冥冥新詩寫閒逸其聲自和平吾嘗攷風俗燕趙義而誠自古志慷慨其人尚功名苟非勝絶地烏可奪其行士于内與外罕能權重輕主人不待識定無俗世情御史臺柏下有叢竹久荒雜殿中劉中叟洗之監察孫君孚有詩知雜事劉某次韻老柏寒昻藏叢篠下紛列未須論晦明均敢犯霜雪塵埃深蔽埋蕪蔓困籠結槁悴屈子容饑癯伯夷節殿中秉髙義利刃勇分别病榖除蒿稂蝕月救吞齧還君嵗寒姿清風自交徹念昔繞荒欄三嘆生慕悦重來十五年笑我壯心折幽懷耿相對欲語不得説觀音院餞送章子平出守鄭州探得近字大梁三尺雪冰泥變塵坌千騶國西門儼若鐘在簨使君御之行往殿股肱郡玉符佩祥麟車旟舞飛隼去國雖所懷而在百里近朝方背象魏暮已跨封畛滎陽介兩京左右事控引咽㗋半天下客車日交軫閉闗非人情飾傳古所哂使君錦幖仙才業苦清敏故人毁譽忘要使仁義盡昔賢此為政遺愛浹微隱國人賦緇衣千載聲亦泯二者在君興無嗟設施窘送文與可同出守湖州東蜀老儒者呉興新使君前更四州守風政超古人歸來天禄閣袖手隨衆羣一毫不染指世味從甘辛謂柔未易招謂剛可以親渾然鎮冒器承以繅率文詞章謝剞劂天葩出靈根冥冥古咸池衆聽所臥聞外物了無累獨愛霜中筠應憐歲寒節落筆收天真七賢與六逸林下仍溪濱對之浪狂醉顧豈知此君比年不多寫造化慳至珍而我得二紙毫素餘清芬留當雪霜展可慰思慕勤煌煌鐘鼎具未許刋名勲聊復詠黄鵠南國垂朱輪拔足出埃壒投身當水雲人與境相得長鯨臥天津冰壺地千里雲屏山四鄰醉月若下酒芼羮沼渚蓴仕宦子雖適孤陋予何伸曲蓬誰與直坐遠蘭蕙熏臨風寫高興願寄江南春天蘇酒成次路韻粤嶺酒萬户醖者無刑章以茲于釀事家家致其祥羇人亦隨喜聊自慰空觴頗收諸家法曹髙及張王不復使鄰舍更笑甕下狂軟熟秋穤潔芬烈呉秫香堈頭沸珠螘斚面燈玉漿人情喜自譽謂可官法當方時見初菊熠爚浮冷黄頽然此中趣不覺鄉路長格髙氣淳聖何至腸腐傷區區美芹意欲以酌后皇餘醺到郡郭恨無嘉賓將增釀更加數從今百憂忘食鱠知幾張季鷹歸懷託江鱠鱸魚今不數未若魴鯽最橙韲𢷬椒蘭蘆菔碎珠貝盈盤玉葉鋪千縷紅雲碎佐以晚菘羮玉飯香藹藹飽行慙素餐捫腹放衣帶昨來溪夏乾市空無可奈徒有彈鋏吟何能飽幼艾安得東海鯨不憚生物害揮刀滿金盤對列酒池外植菊春花悦時人賞玩紛僕僕南園一夜風地上紅盈掬我似鹿皮翁秖愛晩秋菊團團緑玉叢移趁煙雨斸願言早芬敷重陽日已促煌煌想金葩況此風露足豈止插滿頭服之明兩目滋養溉清泉圍䕶編翠竹多開萬鈴奇勿變桃花俗酒熟落㡌天不作牛山曲菱角洪池富水物擘波收紫菱春華雜青黄夏蔓相牽仍迨彼風露足芒角秋實登剛銛事利觜扶挾如有朋雙鋒尚可嘬四出尤足憎昌歜固有嗜蒺莉非所憑外觀乏婉軟中質韜玉冰取物取諸内惟彼識者能朱李珍果繁西園登盤得朱李白雪凋春花縹丸結夏子肉理漿包寒膚衣粉凝紫細碎輕菱芡甘軟異瓜柿不須論投報聊復冰寒水伯陽指仙宗房陵詫遺美鑽核乃獨善王氏亦已鄙味苦吾所幸道旁豈云恥君看齊物人無用乃天理行藥行年將七十衰病乃其時矧兹地氣沴州在大澤陂憶昨度炎暑林莽居舍卑山色不到眼地無清泉滋晴暘則鑪冶隂濁則蒸炊氣脘疲嘔洩軀骸醉支離節氣近寒露生意稍可支故人在秦晉知我窮至斯奩封衆藥品皆自州土宜形味紫團寶苗􅀈西岳奇靈如雪山草秀比商嶺芝是身本無有疾病何用治自愛聊爾爾道人母我蚩丸膏或㕮咀何復求良醫策杖行東圃運動疎通之收復我沖粹驅㪚彼邪疵養生固有道一溉非難為千年鮑昭後復有城東詩焚香清泉黳石餅南海寶洲香下簾隱几坐煙霏㪚央央春雲乍凝聚玉穗忽纖長瑞鴨戲歕吐雙臥不肯翔佛國寶芬鬱仙圃花氣芳真靈格杳冥邪厲敺幽荒安得逍遙人肯顧來此堂説我無上道徳音斯不忘虎枕耒陽得奇枕狀比猛獸姿呀吻目睛轉中有機紐施持鬚世所戒羊質還可嗤莫作邯鄲想曲肱吾所師忠肅集巻十五
