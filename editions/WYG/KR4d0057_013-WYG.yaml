body:
  text: 忠肅集巻十三宋劉摯撰墓誌銘贈諫議大夫西門公墓誌銘公諱某字某姓西門氏其先魏令豹有善政于鄴厯戰國秦漢子孫遷散其譜不叙公六代祖自邯鄲以其家避唐亂于滄州之無棣稍徙棣州之厭次今為厭次人曽祖某祖某隠居鄉里父某以經行為鄉人所尊公皇朝景徳中明法起家萊州司法參軍再遷儀州華亭尉丁父喪服除以勞遷商州商洛縣令瀛州景城縣令丁母喪服除為冀州南宫縣令以疾去官明道元年某月某日卒於家享年七十三公以法進而寛平母害萊守苛深嘗有强盗欲寘之死使髙贓估公閲案請估依犯時持議甚堅㑹使者在郡守語先入交以責公公益不屈二囚遂不死華亭極塞蕃漢雜居多盗公部督追胥教以捕法賞募惡少使與出入致其情雖劇盗必得之終公去邑人無警啇洛有兄弟訟財引其父為左公戚曰所貴乎人者為其有㤙也今何以自别于異類雖然豈天性本然哉利蔽亾之耳姑歸推吾言思之于是相與泣于庭曰某曹小人今而後知利心不足以移親愛實自長官賜之拜而去一邑感動前日之父子異居若親在别産者于是皆合渭水經邑可溉而民不知用公親相地形率並水居人為圩堰溝塍使之殖稻教以灌引蓄泄之法刻其法于石田嵗増溉皆為沃野民頼以無飢景城地平而素無水防天聖初大霖雨公曰前幸河安流今偶有一決吾民其為魚乃白州預為堤上下諠曰無故勞民非是公曰請三思遂調夫二萬横起大堤二甫半水已大至躬晝夜趣成之邑頼以免南宫既疾或勸以致事可得叙官于朝公曰病不能事又意于利是欺也亟移告以歸公資淳茂其利人之事出于誠心故所至有恵政人愛之及更代往往遮馬乆而得去仕三十年當官行已不問人之知不知所謂通塞末嘗以經意徘徊小官無不足色其行事雖古所稱循良吏者不過如此以子故贈左諫議大夫初娶王氏再娶髙氏封渤海縣太君後公十年卒子長男傲次介累官尚書屯田郎中及二女並亾孫曽男女若干人公沒後若干年諸孫塟公于某所為之銘曰有以愛人有以直已誠故能化忠故弗詭世所觀慕雖不熠煒有政積善施于孫子刻詩幽宫令聞曷已正議大夫致仕龔公墓誌銘公諱鼎臣字輔之姓龔氏世為淄州髙苑人至公改塟其先于鄆今為鄆州湏城人曾祖倫祖凝皆潛晦不出考誘𠂻鼎州武陵縣令累贈特進妣羅氏穆氏贈淄川千乘両郡太君公實穆夫人出㓜孤自立擢景祐元年進士第為鄆州平隂縣主簿始至決田訟之乆不決者疏泄瀦水得良田數百千頃調孟州司法參軍以舉為泰寜軍節度掌書記故相梁莊肅公杜正獻公繼為州事皆大愛重薦之遷秘書省著作佐郎知萊蕪縣兼冶事前時賦民車運鐡人大勞費公至罷之正獻嘗語江休復曰龔萊蕪氣和而直宜深交之徙彭州濛陽縣轉祕書丞丁母憂服除知宻州安邱縣轉太常慱士賜五品服知渠州拜尚書屯田員外郎州故僻陋無學者公請于朝建廟學躬率邑子為生以時釋奠退而講説立課肄之法人大勸化始有登科者郡人繪像事公召還編校史館書籍轉都官始在萊蕪大臣薦試館職以善石介不召及安邱秩滿上䇿二十篇以賢良方正召試秘閣又以不合報聞議者大為公恨然朝廷寖知公遂擢起居舍人知諫院公亦感遇自奮以言任責搢紳翕然推重論奏中人鄧保信罪狀言蘓安静年未五十不可為押班董淑妃賜諡非是三司開封請法外斷獄率直可之願先付執政參審禀畫凡大禮赦請准太平興國詔書前期下禁約後有犯不原以杜指赦為姧者宜著為令兖國公主與駙馬都尉李瑋忿争瑋坐謫外仁宗臨朝不適公引睽上九義勸上少鎮安之待其疑亾則志適矣已而杲復和如故上喜曰如卿所言嘗請遣親信近侍以君臣父子大義趣諭皇子入侍尋兼管國子監判登聞檢院詳定寛恤民力奏議淮南災以公體量安撫蠲逋振貸全活甚衆除北朝正旦使公奏昔契丹犯淄青祖父母兄姊皆見略義不忍往許之詔後子孫并免焉俄拜户部員外郎兼侍御史知雜事賜三品服轉吏部禮部郎中論宗室宜嵗試補外官請汰濫官銷冗兵蕃財用禁奢靡連劾薛向姧暴鬻鹽市馬皆㒺上謂昭陵宜儉塟景靈神御殿不宜増侈以稱先帝意屢請英宗延訪臣下親決政事上疏勸皇太后捲簾還政是皆人所難言者蓋公前後在言路濶略細故至大事無顧忌必言之其言優游不亟不緩平心㩀理務使人主易聽而巳恥為表表買直近名退亦未嘗以語人故其事多施行而世頗不知自公發也改集賢殿修撰知應天府兼南京留守徙江寧府轉户部召還判太常寺兼禮儀事判吏部流内銓選人得官待班謝辭率留滯公奏易為門謝辭至今便之其後議明堂配享及王丞相荆公坐講事益不合求補外以知兖州是時遣使方田其法物色土宜為十等以均地税而使者所辟置意倖功賞田既不得其實而概取税之虗名詭額及常所蠲者加入舊籍刼制州縣上下騷然公曰嵗有重輕均固可爾今増之非朝廷本指也獨不肯増人危公公卒以州籍常數均定兖人至今徳公或論公八年不遷官特改吏部又求閒地提舉西京崇福宫魏國公忠獻韓公曰端良之人皆喜静處龔君心不营禄禄亦不及秩滿再判太常寺再留守南京轉太常少卿陛辭神宗顧語移時喜甚曰人言卿憊而精明如此行用卿矣公頓首謝時河決曹村流民無所屬殍死道路公勞來賑拊歸者不可計使者奏狀拜諫議大夫京東東路安撫使知青州又遭北方嵗飢活流餓視南京滋多官制行改大中大夫請老提舉亳州太清宫今上即位轉通議大夫遂以正議大夫致仕公道學文義内外絶羙事上應物一以不欺及退居里舍著書講誦澹然自樂門生弟子造請質問從容相對日以為常鄉人有善孜孜稱述惟恐不聞其有不善則召而告之矜戚見于顔色其人至感泣自新以是鄉里無貴賤少長歸心焉公好學出于天性既以經行顯名朝廷雖有任用涖劇煩亦未嘗輒廢書至老學益深行益粹可謂一徳有始卒者元祐元年十二月二十七日以夀終享年七十七两夫人李氏都官郎中之女追封贊皇郡君某氏光禄卿希仲女長樂郡君子十一人男祥權濰州昌邑縣令先亾羣開封府攷城縣主簿羲林州録事參軍女嫁宣義郎張仲适殿直張景山餘早卒孫男女十五人公有東原集五十巻諫草三巻周易補注三巻中説注十巻編年官制圖各一巻某少以諸生從公學又以應天府官在公幕下公之見知甚厚而諸孤出公遺命來請銘將以二年三月二十一日塟公須城之登賢鄉特進公之兆次義其可以辭乎為之銘曰侃侃龔公令徳之世光禄耆老水衡循吏公言正直皇則好之紏䋲左右是是非非以天行止疇尼吾志歸善一鄉士知法義魯两先生徂徠泰山門人逹者公得其傳惟深斯水惟厚斯岡凡我鄉人敬公之藏朝奉大夫致仕梁公墓誌銘君諱師孟字醇之菑川人曽大父昭懿大父邈試秘書省校書郎父肅大理寺丞贈中大夫有恵政于閩閩人思之至今生兒有以梁為名者君方童時吳文肅公一見竒其秀頴使為詩頃刻輒成大異之年十八冠鄉舉名聲籍甚諸老先生喜為推引嘉祐二年擢進士第調沂州費縣主簿遷邢州龍岡縣令丁母憂起為相州湯隂令文肅薦其才擢國子監直講熙寧二年改秘書省著作佐郎太學䇿諸生有對語病新法在髙第者大臣怒盡出學官補外君簽書淮南節度判官事轉秘書丞太常博士元豐改官制換承議郎通判隰州賜緋服轉朝奉郎今上即位㤙遷朝散郎遂致仕以子登朝經两郊㤙為朝奉大夫階䕶軍元祐六年十月十八日以疾終夀七十二君彊毅篤實少刻勵于學老不輒廢慱知古今論議以忠義為主其文詞雄深有氣樂善疾惡出其天資視世事有弗可于意者慼嗟痛嘆至或流涕不能浮湛俯仰故與世齟齬而世亦卒不得君用雖有窮塞恥以一毫近人居京師七年未嘗造請初天下轉運司辟置管勾文字官河北以君名聞于格不應詔特從之而當路者亦頗欲因是近君君不願也其後中執法有聞君之名欲一見之薦以為屬者朋友更勸往見君曰士而自鬻何義也卒不往方時天子慨然求治更造法令㧞蒐人才宰相大進退天下士士皆奮待同争前恐後君獨顧慮逡廵依流隊牒碌碌以老暨二聖在御振用淹滯而知君者六七要人皆同時在顯處争欲薦用之或抵書勉其出人亦謂君且得志無疑而君笑曰吾與世不諧老矣此而進是持平生為今日資也亟謝事而去時年六十四于是識者知君非苟為異以取髙當世者晚節居鄉里自號般陽居士觀書賦詩蕭散自得鄉人親敬之前夫人李氏竇氏故尚書都官郎中丁職方司員外郎緘之女追封真定中都縣君今夫人仙源縣君王氏比部員外郎孝和之女子三男先朝奉郎兖青州臨淄縣尉􅁢舉進士二女嫁隰州永和主簿董昱沂州司理參軍李翔孫男女六人文集二十巻卒之明年十一月十七日塟于萬年鄉零召村之原二夫人祔予故善君也先于是來請銘為之銘曰嗚呼梁君學無所不知也行無所不修也謂無心于世乎服膺䧏色其見善也挼手齚齒其聞惡也謂有心于仕乎不攙乎上未老而歸也嗚呼士之于世合則從不合則去進退之正也然是猶為在人者也乃若時可以行而自止招之以道而不來非在我者重蓋不能也嗚呼梁君剛不屈者也能行其志者也侍御史黄君墓誌銘君諱照字晦甫曽祖餘慶祖深皆不仕考禰贈尚書職方員外郎黄氏世家長沙益陽縣其後徙江陵今為郡人君登慶厯六年進士第除歸州司理參軍移岳州華容縣令至之日遭嵗大飢亟諭富人出米繼發官廪以哺流餓蓋活人以萬計邑西有田數千百頃皆腴田也而夏燥秋潦民棄不耕君築堤置閘以時啟閉之遂常為豐嵗楚俗死者焚而委其骨于野君為訪諭使收瘞至輟俸以濟之小吏敏秀可教者授以經業多至成士民之輸賦于府者有洞庭之阻囘險淹費君請受之于縣于是上疑下誹而君亦自信不易其後遂以着令改著作佐郎知道州江華縣事静民成物益用愷悌以祕書丞通判桂州遷太常慱士嘉祐六年詔遣使人分行天下以寛民力而君當使廣南受命明日即行奏蠲偽劉以來丁米民始不以多男為患父子始不以避重就輕相去廣州増外城人驚不寜君疏曰無故起大役非所以綏邉且城議有三臣請詰之其欲依海者海旁之地不能尺則及泉矣欲撤室廬者城本以保衆而顧可先毁其居欲即于城東劉氏故城者其地荒陋多瘴氣豈便民之意皆非是詔為罷其役朝廷第使者之状君為諸路最英宗即位拜尚書員外郎故唐質肅公辟從太原機宜府改都管福建轉運判官治平三年用今參知政事王公珪馮公京致政范公鎮故侍郎彭公思永前後薦召以為侍御史行次衢州五月二十六日以疾終享年五十四君性端敏治身立事皎皎不妄以才遭時其小者略巳有試而已能如此其大者朝廷方將聞之世方待其有軒然可觀者而君既亾矣豈非所謂命歟疾革猶扶力占疏以極論當世事嗚呼斯可以見其志焉爾仕二十年不為私計賙族人之孤窶不能嫁娶者十餘人好文嗜詩類數百篇曰漫為集初娶陸氏再娶王氏封徳安縣君子六男友端友聞友顔友益友諒友直皆舉進士一女歸殿直桞棨某先人嘗從政于江華後二十年而君至事經先人所畫者一皆循用吏民莫不以便安徳君而至今歌思之有前劉後黄之語今上熙寧四年友端使來乞銘遂以七月十二月初九日塟君江陵縣龍山鄉水青里銘曰士難者才時或不以二物之㑹十百一爾亦既有之亦又􅃍止方驅而顛胡自不俟嗚呼艱哉誰詰斯理刻詩幽宫以慰干祀職方員外郎李君墓誌銘君諱樞字應機咸平四年進士及第除蜀州推官逾年丁父憂服除再為案原本缺州推官真宗東封君督治道視他州為謹辦車駕過有褒言因詔使扈從及還京師特改大理寺丞又五遷為尚書職方員外郎厯知越州蕭山縣滑州韋城縣用舉者監在京百萬倉坐不謹火禁謫監真定府酒税通判鄆州知雅州以天聖五年十二月十七日卒于官享年三十八祥符景徳間四方争奏瑞物被賞蕭山芝生縣庭吏民讙夸願以聞君曰吾方嫉世之因縁偽欺以徼倖者顧忍自為哉因謝止之方是時宰相晉國丁公權傾天下雅知君嘗薦君才數欲提之皆逡廵以故引避其後所附者多得罪遣嗚呼臨義利視禍福不以動其心而不失其所擇非明識信道疇克卓立有是哉君之配張氏封清河縣君鄭氏滎陽縣君六男子曰察曰宇曰寀曰寘曰實曰寅察舒州望江令寘舉進士授河南府助教四子皆服儒五女嫁士人其六子亾者五人矣君卒後五十九年當元祐之丙寅寘始克塟君于鄆州須城縣登庸鄉之原實閏二月十有四日壬寅也李氏上世為趙郡著姓攷其譜緒蓋趙之廣武君後也仕唐末為殿中丞曰稹者于君為曽祖殿中生廷韞任石州刺史石州生君之考曰戩贈尚書刑部侍郎自五代之亂遷徙居鄆今為鄆人銘曰仕不顯志則彊夀雖嗇名不亾歸矣新阡萬世之蔵兵部員外郎直史館梁公墓誌銘公諱舊字夢符姓梁氏其先襄陽人曽祖諱處厚以髙貲雄鄉里好義致客賢士大夫多賔友之祖諱湛并州録事參軍考諱錫巴州軍事推官贈職方郎中妣沈氏仙源縣太君公天聖五年以名進士起為慱州軍事推官守貪政不善公告以理又告以福禍皆不用後守果敗再調鼎州團練推官江上夜覆舟提家人投舍民家明日主人出百金為公装卒不取至自裂衫裹赤兒懐去縁牒旁州還偶重獄將決覆之有疑亟白州為上其狀得不死與司理參軍雍規攷同滿皆缺一薦者使者薦公公曰規同年進士而其母老願先規以故復為武勝軍節度推官秩滿改著作佐郎知河南府長水縣取豪猾一人抵法邑大安治慶厯中契丹每入邉以選通判雍州事守者欲大新城櫓賦之民公曰乃先擾吾民乎持不可未㡬契丹泛使至用故事以通判䕶其行素狂嫚難肅以公體制嚴重皆帖帖進止無輒敢譁已而徐示以㤙因盡得敵所以遣使指飛奏之接伴者既交使是夕其衆遂大肆從有司需索百端郡邑困之皆服公以為不可及敵使入朝進其國書仁宗顧宰相曰一如梁某言使愕并開所欲言不敢發徐曰小臣妄刺臣國事于是言者以雄州用通判非是而接伴使後不戢敵恚公形已亦曰不當先入其私所問朝廷規安其心乃徙其守滄州公徳州改秘書丞居數月通判大名府程文簡公琳方居尹與轉運使張公昷之以氣權相睨不安以公張所辟疑隂為其用公以誠心事二人無所左右循事議理是非必盡乆之通其所閡二人卒相歡以公為長者騎士缺馬乆或匿名以書告反狀文簡驚莫能如何公曰是不足慮小人意在馬爾退如平時稍因事籍馬盡補之果無事用安撫轉運使薦知深州遷太常博士知雜事御史言公才堪御史上曰是嘗接蕭階者吾知之矣階前曰契丹使者即召為監察御史中外以為得人俄出使制獄以疾力請補外知磁州是時兵臨貝州調發聲援毎先期㑹優詔褒之前此在大名轉運使以冀州妖人李生獄屬公李生既前死獨刑其餘有差號稱詳平至是李氏怒怨生父覃妄言生不死有中人故仇轉運使頗居中訌其事遂付御史獄鉤按雖力卒不能變然皆以吏議挂之宰相畫時旨奪官同列奏留以為太重中丞翰林亦更為論辨猶貶秩秘書丞監衡州税未赴改唐州頃之復為慱士通判汝州移襄州皇祐祀明堂㤙拜尚書屯田員外郎復以殿中侍御史召時議開六塔以行大河公言騷民逆水非徒無益且有後患卒如公言奏罷張堯佐宣徽等使唐質肅公介以言事貶嶺南随以中使公言陛下愛介故遣護之不幸介以疾死天下後世能無以殺疑乎上曰誠不思此亟為還中使改三司度支判官又判開折司出為京東轉運使前時類進羡贏䝉遷以故東方財屈公言民困敝不可浚願戒諸路毋淂進羡財凡三司横有取輒還其檄因蝗災請以米募人鑿取其種地中對以斗斛其孽既易殄而方冬春艱食又可以補民其後遂著為令州郡所饋一切不取轉侍御史還䑓請裁任子令謂當自宰相始俄乞解言責改刑部員外郎直史館知襄州賜三品服改邢州轉兵部嘉祐四年五月十三日以疾卒于州之正寢享年七十公性孝悌數嵗失母職方公再室趙氏柴氏公事之皆以謹慎聞而两夫人尤篤愛公凡親疾無晝夜侍側醫雖逺必徒歩自致之後繼居喪哀疾毁棘有以過人學問本六經于文章喜司馬遷班固其落筆必雍容渾灝有作者風致為名軰所推居官以鋤强梗飬善良為政其敏發以静下不見其所以為而吏莫得動故所至民惜其去遮哭不得行去乆猶思之更御史三院彈劾無所顧望姧權歛懼朝廷為尊嚴其言順不迎上直不媚世皆出天下公議尤喜論人物每對從容指别善惡所當用不用未嘗以小是非名目士大夫故其言多見行而世或未有深知者也夫人劉氏魯人封壽安縣君勤儉仁愛治家有禮法與公同寒苦至進顯無愠喜色後公二年十二月一日年六十六以終六男子燾殿中丞集賢校理餘早世五女子適鞏堂張景真范遵道張伯卿席延年孫男女若干初公愛鄆將徙居之于是燾卜熙寧十年舉公夫人之喪以八月某日塟于須城縣某鄉之原銘曰梁公侃侃常厥徳踐取幽眇如今昔有韡其文爛雕織有邕其鳴表羣翼克施有政審則釋物物迎刃莫吾逆蒐㧞良禾善使殖濟明以恕民不亟儀曹御史治百辟有或諼側毅以堲臧謀良言帝嘉得緩而不迂切不廹視大義利正趨擇進斯有禮退以色妥妥陛級循寸尺終民莫得被大澤孝子作龜沒之北泉深壌厚惟墨食公燕順祥兆幽宅詩以詔之㒺窮極屯田員外郎蔡君墓誌銘君諱天球字粹夫世為宋人曽祖贈太子太保諱陟祖贈尚書祠部員外郎諱希顔考尚書屯田員外郎贈都官郎中諱極妣萬年縣君季氏君慶厯六年進士及第為宿州觀察推官㑹嵗荒民飢詔所在選官賑哺君所活數十萬人以功補近地為澶州節度推官數以義理劘正其上官無大小不直不已有能名丁父喪服除調亳州觀察推官時陳恭公罷宰相判州事嚴險少所與獨善君薦其才可用又請越常次改官許之矣俄丁母䘮服除改秘書省著作佐郎監杭州樓店務英宗即位遷省丞知䝉州不鄙其民為立學校開以教化人人嚮勸轉太常博士今上即位拜尚書屯田員外郎通判乾州轉都官熙寧二年九月二十日以疾卒享年五十五夫人張氏故天章閣待制昷之之子封長安縣君九男子皆先君夭一女嫁横海軍節度推官凌浩始君學于徂徠先生石介年雖㓜已卓卓有聞于吏治敏以逹在䝉州躬攷覈版籍得隠税積錢至百萬監司言狀請賞君君曰是固不足言功誠因此得推法天下庻乎為有補爾代還又上書言二廣荒遐州縣蓋有不足置者勞敝逺民而公私亾所利議者方愛虗名甘實患非是未㡬詔諸路併廢州縣以寛役省費而三司亦置帳司立賞罰以専鈞會矣由是以觀君足以知其欲有所為而其智能宜可以為今日用方天下興治以因任為事君之從父既以勲業進樞府或在侍從諸子弟又與士大夫争奮其材以赴功名人樂道其盛而君于是時獨不少待嗟夫其命之不相謀也初仲弟析産君不取以與其兄之孤以故貧而父兄猶在殯每日亷約營積調度方將及塟而亾亡且無子嗟夫君志之不就多矣其可哀也于是以十年五月二十三日并舉君塟于末城縣三陵村先塋之北實其夫人經治之所著易論十巻孝經二巻雜文詩百餘銘曰有輝其實亦厚我期坦坦以御孰僨其馳不在其身或以承之云胡善澤斬焉莫詒萬世共盡夫亦奚悲冥冥可作慰以銘詩刑部詳覆官朱君墓誌銘君諱述字傳道姓朱氏其譜曰七世祖端生鄂岳廵官頤頤生尚書户部郎中起起生比部郎中祕祕生君曽祖江陵府當陽尉葆光贈兵部郎中當陽生翰林學士昻仕真宗為名臣贈吏部尚書翰林生虞部郎中正謩贈兵部侍郎君虞部第四子也初以廕補太廟齋郎皇祐元年舉進士中甲科除荆南節度推官避親嫌換鄂州觀察推官丁母夫人駱氏喪服除調并州推官安撫使故相龐公辟掌機宻文書後徙定州以疾免復用大臣辟為大名府推官俄召為刑部詳覆官治平二年五月十四日年三十五卒于京師君九嵗即喪其父哀慕如成人家故大族君雖㓜而于屬尊每時節當諸姪慶拜能各為禮意以接之有年長數倍者立其前不敢懈性髙明疏逹儀貎秀掦篤志于學好論議讀書不從世入蹊徑務求其精微至于自得之而後已故其疾革神奪矣猶能誦其書累日至有終篇無差者與人交有情文而不失于正視世故若不足以經意察其事至而應之者毎當其理尚氣節臨利義知所擇族人買婢有攜稚子求并售者君疑以詰至再四曰實藥氏華亭尉髙陟妻子也夫亾無以朝夕忍此以苟生君戚曰陟雖不識而吾同年得科名者也亟命留之為具歸貲家人發空橐笑示君君曰有竭吾力而已至質其帯鐶得銀數两及褫家人服物既而今參知政事馮公故翰林學士沈公皆同年相與義之助以錢遂濟其行龐公去定州代者武人不善君故謝病以歸僚友更諫之不肯留或謂數日考滿當改官君曰以此易吾心是謂屈身以徇物豈所謂義哉既去貧乆困甚而處之自如其配王氏故相沂國公之從孫有賢行生一子修平熙寧七年君兄之子提㸃湖南刑獄太常博士集賢校理初平謂某曰吾少孤所以教之學視以為休戚而終始成就之者實吾叔父之徳常懼無以報稱將以今九月某日塟于龍山鄉某里之原子其為之銘某嘗㳺趙魏間又從事江陵得君始末士于生死蓋不足道獨悲君質良材完所以修為厲餙之又如是天生之宜若有意者然不少寛其年使有見于世而死之速何謂也當然而不然不當然而或然古聖賢以為命也朱氏上世有仕唐為治書御史者家京兆之萬年昭宗末避亂其族南徙自翰林顯于本朝而卒塟江陵今為江陵人君能詩清麗有思致集賢君搜類之得百餘篇行于世銘曰學明志傑才揭揭兮薿薿其秀褒以發兮不畀以實遇孰嗇兮詩遺于後慰幽穴兮贈朝請郎楊君墓誌銘京東轉運副使左朝請郎楊君康國狀其先君平生持以來請曰楊氏魏人世澹泊隠居大父以行義教其五子鄉黨皆稱為善士嘗語人曰吾之業所成就孰與金貲多哉先人實中子事父母接兄弟以孝友聞既孤捐其家所有以委兄弟一毫無取出讀三墳書得所謂飬生治病之學精通而善用之喜曰此古聖賢事也樂以其術濟人多有功性仁好施侈于賙人而嗇于自奉有貸取弗償輒折劵不問鄉人益以為長者敬而賴之以大父所以教子者教諸子而康國遂得由進士竊禄以奉榮飬熙寧十年天子親郊以㤙封大理評事致仕其後侍奉衞州以夀終于康國官舍實元豐七年七月十七日也享年七十三康國既免喪奉母氏壽安縣太君吕夫人復出就禄追惟先人啟手足之時語諸子曰鄉里今並河可虞吾于衛也甚樂其土風瞑目後其歸我此地康國奉治命卜衞之共城縣楊吕館某鄉之原將以元祐八年四月日奉大事康國由貧賤輟耕讀書豈自致及此實先人種徳所詒惟先人之徳弗顯亍生矣冀不冺于後者顧不在君子之言以銘其藏乎敢以請嗟夫士之立于朝廷者類得以天子之爵歸荣其親非特以慰其為子之心而天下之為父母者勸矣惟君力于為善隂徳所儲雖弗振耀于世然教子之功卒獲其報而身享之晦之有顯兹孰加焉今其子由御史諫官出奉使指議論政事為朝廷聞人孫曽蕃衍以學為業嶷嶷有立則楊氏之顯可以勸者滋未艾也于是不可以不銘君諱整累贈左朝請郎父諱懐徳康國君仲子康元康民與㓜皆亾孫男十六人挺三班借職餘舉進士女六人曽孫六男十二女銘曰共山淇水土厚俗􅍇人擇其生我擇其死志則無違惟是有子善非期報要毋怠止承務郎李君墓誌銘天章閣待制李公有髙才大志仕先帝時嘗顯矣晚坐言事再奪職死謫中吾誌其墓曰公才無不可尤長于應變其于治道自謂曉然所以深哀其既遭世而不合以死者也沒後十年其子上書闕下追訟其忠章至十數朝廷矜之詔復以待制告第其子即君也君名伉字常武見其父志不就退廢則竭力家事疏園沼植花木究所以為親娛者母王夫人抱沈疾服勤侍藥衣不觧者厯年前後持喪盡禮毋違君既以名臣子篤于忠孝而所上書文義怛惻益知名矣然澹于榮利雅無仕進意㓜以父任得官逾四十嵗家日貧乃始起調單州監酒從辟改鄆州再嵗以疾卒元祐八年五月三日也年四十六妻孫氏二子舉進士曰周南登科為魚臺縣主簿曰召南一女一孫尚㓜君好學博記誦于書通大原不從舉子畦徑生不見喜愠接人無厚薄中所識判然風韶閒逺嗜好古雅學鼓琴書字精于𨽻有法尤工為詩取􅄐騷陶謝古體師之有集十巻先進長老及其父時賓客咸與之交女兄嫁宋玠玠戰死家寓鄜州躬往力致之歸朝廷録玠後及異姓玠家以周南列奏中推㤙既下君辭不受也兄偁死官太原又疾馳䕶喪歸塟哀感道路治家妥妥有法善于兄弟嚴事寡嫂嫁妹及兄之子數人喜賙貧厄即以八月一日塟于鄆州平隂之先原初吾臨其喪二子伏曰先人受知厚願得銘詩以終賜哭甚哀無以辭也惟君嘗有言曰為善行已士之道當然也世之有作以近名惟恐不皎然者竊嘗惡之然則凡今所書在君志皆為不足道念不書無以示後而慰其子也餘所當詳見天章公墓刻云銘曰缺然如不能其德之成頽乎其無競其中之明畀之以完覆之以傾胡牾諸冥付壯子從先人惟永寧清海軍推官吕君墓誌銘治平中予從事江陵僚友吕君者君子人也日羣居幕府人以君寡言不表餙多易君君退然坐自如獨予察君非苟然者居乆之與人益有意事不譁而治使抱文書次至君則摘閲及覆小謾必得之府無失政多君是賴人乃大親服而與予相好至三年先後攷滿蓋無異初相從事也後十八年君之子仲敏抵書于予言先人捐館貧不克塟今始卜塟惟壙中之文敢敬以請昔者雅多君行義今嘉其子之能大事乃論次其終始按君諱昌辰字伯熙起居郎龜圖之曽孫宰相䝉正之孫光禄少卿務簡之子以世父廕調和州厯陽漢州雒縣两主簿徙江寧建寧令父喪不之官服除調萊州推官以舉者死不得磨勘遷荆南推官又補啇州坐州將累免以山南東道推官知金州石泉縣改清海軍推官知桂州修仁縣某年某月日以疾卒年六十一君生長貴家而亷約刻苦甚寒士性静慎好學無競其中善之惡之不可欺而公謹䋲墨不為皎皎吏民宜之上官應謁則往謁不肯問見無意于人之知不知家極貧不以一毫取人人亦不可干以私死也至無以歛蓋其節如此夫人劉氏繼卒于男六人仲敏今為通直郎知鄆州陽榖縣仲履仲棐舉進士第餘早死女一人以某年月日塟某所銘曰不知而愠以得為賢人無異趣君獨不然以節自終遺子清白君子無憾歸此安宅忠肅集巻十三
