body:
  text: 忠肅集巻十四宋劉摯撰墓誌銘潛山黄先生墓誌銘先生諱孝綽字公裕姓黄氏上世為建之浦城人自其考徙居于舒州之太湖今為太湖人舒之望曰潛山其下號丹霞府蓋飬仙之所棲幽人有道之所潛先生遊而樂焉因自號潛山叟而舒人尊之曰先生先生者道徳之號也先生于孝弟有至性事父母竭力至誠而時察其色辭以為憂喜能如古人所謂飬志者侍疾居喪皆有以過人家貧口衆而制之必均飬嫁諸孤女過己之子周人之窮不計有無往往衣不兼食不屬而先生處之自如居鄉與人子言必以孝與人弟言必以順所居人用化之至相詔語曰毋或作非使黄先生知也其子莘居官每歸省必問今日治事何如使條其狀聞其當于義理則歡然為之飲酒嘗謂曰吾所以不仕者為有子仕足以行吾志汝視義利是非可不慎所蹈歟先生少舉進士两至禮部遂不應其後天子推㤙當特奏名而先生亦不復起也士之不仕蓋有之矣或厭濁以逺引或異學以􅄐世或求焉而不得既去而徜徉懟嗟超脱禮法誦誕宕之言以為歸如先生皆不然仕之志以其子行之仕之道以其身行之恭順于父母兄弟行誼信于鄉黨朋友以為是足以盡吾職而恂恂于名教不知仕不仕之異非孔子所謂孝乎惟孝友于兄弟是亦為政者歟嗚呼先生可謂純厚知徳君子也熙寧三年二月十日卒享年七十四曽祖鄖祖元吉嘗仕江南李氏非其好去之有詩名後贈大理丞考覺任殿中丞仕以清直聞詩益有名翰林楊文公劉子儀章郇公宋宣獻公皆稱之多與之唱和先生遂世其家尤善書其法本二王顔桞其配裴氏屯田員外郎求己之女有賢行後二年亦卒子五男莘著作佐郎蘍藝荀蘧皆服儒能如先生教一女歸國子慱士張慎言早卒六年著作君以書謂予曰黄氏世以仕貧自莘祖不克歸閩而塟太湖今莘又以仕來北方川路險逺不孝不敢以柩行于是卜之地得鄆州須城望山而日得十二月之壬申吉將合塟焉幸畀之銘某乆與著作君游而未及見先生也然觀其子之賢則先生可知也已于是論次而為之銘曰孝哉先生徳成諸身施于其家及其鄉人所性在是進退两㤀以至于命曰壽而康汶水北原安此新宫刻詩幽石以昭無窮朝奉郎致仕黄君墓誌銘君諱莘字任道姓黄氏自少竒頴有器識以文行知名一時皇祐五年登進士第為掦州天長主簿徙㤙州清河令前時黄河在州境而縣並河嵗輸芻茭後河去猶賦之至是積逋十四萬于數十貧户都水督責鞭笞不巳六年無可入君條列于朝悉蠲之時遣使寛恤民力欲一切罷河北驛傳之須于民者君言騷民故當禁而事繫國信往來者亦何得廢獨可具民所勞費以其數當税􅃥朝廷行之至今公私為便使者吏卒過境少有夤縁為擾必按以法嵗饑部使者不肯賑遂發寧化鎮倉人頼以活秩滿改祕書省著作佐郎知曹州濟隂縣事神宗即位遷祕書丞廣濟河決勢慼乃詢邑人議破南堤以分水水去病鄰邑君曰此于法甚重其可以累他人亟自劾韓魏忠獻公吳正憲公暨御史臺吏有論捄知冤句縣事張復禮至請納官以贖之朝廷亦嘉君意止奪一官免邑人繪君事之魏公留守北都薦教授國子監丁内外艱服除復前官直進奏院召對上猶以濟隂事奬勞之除提舉河北常平倉改東路轉運判官徙西路水沴糓貴奏罷市易司増價以糴免民艱食繼又賑之遂無轉流遷陜西提㸃刑獄駕部員外郎汲逢坐市易事繫秦州詔獄逮三百人乆未決主者幸有功慘覈巧詆先紿移逢病于州君方攝事亟遣醫得逢無恙狀乃檄問所以為不實者主者情見趣竟獄不敢少出入逢得無寃坐徑詣君位謝曰獲更生實君賜也官制行換階奉議郎召入尚書省為職方員外郎轉承議賜緋衣銀魚乆之求補外知汝州元豐八年今上嗣位遷朝奉郎以足疾請致仕十二月四日卒于州舍享年六十五前娶皇甫氏追封永安縣君後章氏封武寧縣君子三材婺源主簿樞睦州司法參軍杞興化主簿女二長適朝奉郎王續次進士蔡居厚君事親至孝友愛諸弟與人交有終始性諒直勇于為義而亷于進退臨事不惑所謂禍福利害不以動其心聞人善喜切切稱道其不善亦不能隠必面告之使改常謂天下大分惟是非黒白爾要不可使淆見小不明則咄嗟憤歎其為治倣此故所至大有聲而亦或以不得于人政事本于仁厚愛民為監司不事邉幅未嘗置人于法布衣時聞舒州望江令豐有孚能吏以孚繫獄即馳見轉運使王素白其寃素立釋之君故不識有孚有孚亦不知也晩年亦喜論事憂深思逺過于在位者嘗上疏論免後錢不當及下戸大臣不禁賓謁與人語簡雅有風致文章豪健潔齊源逺而氣正自集四十巻藏于家曽祖元吉仕江南祖覺仕皇朝為殿中丞父孝綽號潛山先生以君仕于朝贈朝奉郎元祐八年十月辛酉塟君于鄆州須城之望山其父墓次某識君三十餘年潛山之塟實銘之于是諸子復以為請乃作銘曰黄氏著姓江夏其初有避唐亂閩浦城居逮君皇祖爰徙于舒既沒而窶遂塟大湖潛山子仕奉親北方終飬又卜汶山之陽神靈安之遷徙何常有羙惟君志大氣剛學以澤之蔚有辭章力善狥義其身可㤀謂逢文明騰凌頡頏誰斯所儲屯悶弗張間出一二已韡其光老以一郡止于散郎才之不契由古則然有城有室附于潛山刻詩譔實以詒後傳太常博士彭君墓誌銘君諱慥字公謹世為潭之湘隂人祖晃考皆以輕財樂施稱于鄉里君第皇祐元年進士除復州景陵尉丁母喪服除調復州司里舉為江州彭澤令丁父喪服除入祕書省為著作佐郎知澧州石門縣今上即位㤙遷省丞移知南儀州事改太常博士熙寧四年七月十三日以疾卒于官享年四十六君莊重而可親樂易而有守心無曲思面無徇笑居鄉有行義仕宦二十年有清槩未嘗問其家有無至和中辰州起事蠻溪調諸州兵議所以窮討君獻策任事者以謂中國能使邉夷服者為有㤙信爾險穴莾谷其民類禽獸不可使而其土不可耕使吾得志正所謂石田者何事以為我勞今獨宜有以綏懐之而已方是時喜事功名者皆以為擊之是已而師老財困朝廷屢遣使者卒如君策彭澤有修山觀唐狄梁公買田千畆與之于是觀有堂以祠公大吏欲移其田他觀君請留半奉公祠屢爭不得至以其議聞于朝卒從之石門得民偽為印者法可以死情可以生死則得之者免逺官君戚曰殺人以自利歟遂傅生議交趾嵗貢所過郡皆以鄉兵䕶送民病其騷獨君南儀罷之君平生不樂為皎然者而厯宦多在偏州荒邑無事處故逡巡不大振作而其因物有作間見而時出之者蓋如此嗟夫君之不得其壽也君升朝贈其考大理評事妣許氏孝感縣太君娶戴氏封永安縣君子男二子民子中皆舉進士二女末嫁以六年二月甲申塟君于歸政鄉永寧里土塘之原子民嘗從予㳺于荆州也于是來請銘廼為之銘曰有幽斯宫􅑆崇阜兮萬古一化孰夭壽兮不瑕其徳義不疚兮斯于博士為不朽兮范聖涂墓誌銘君范氏諱遵道聖涂其字也士仕而不知其道也乆矣苟焉者固漫不省可否惟利之故及狷者又頗亢激以輕去就為事如聖涂㓜已得官不肯輕進方且博學深飬有以自得而後起既仕矣有所不合終不詭隨從容潔身以去夫必欲自信其所飬吾知其非無志于仕者也不枉已以合人吾知其非有求于仕者也進不為苟得去不為矯亢豈不賢矣哉雖然抱其所有不少見于功用又不得壽而亾此古之人于天道報施所以致疑嗚呼是可哀也聖涂康宣二年用從叔祖祕書監諷廕補郊社齋郎嵗十一而孤二兄故已夭獨端飭自立事母李氏以孝謹聞飬孀姑于家而與其子㳺出處友愛人不見其為外兄弟也聚書延師友以名教為樂賙人之急親朋多賴以濟嘉祐二年始調鄆州須城尉隨改徐州司户參軍未赴丁母喪服除調青州千乘縣主簿令之政多不善君以忠道之又劘以理又争以義皆不聽州察其然因從君刺令事君謝不知退而笑曰此豈我事而我亦安能狥物乎有去而已因鎻其廰舉進士遂不復出鄉里益治所居闕圉圃築室廬水上超然孤往臨流坐石吟嘯其間世故一不以掛齒熙寧三年十二月十四日以疾終享年三十八君性寛厚静重寡言精識曠度有過人者讀書不為蹊徑務致其極為文章嚴簡有趣嘗两試禮部喜事多學至星厯氣數皆通其術篤于朋友忠信樂易乆而不渝而與予相好也故其卒也姜先生潛自魯來與其姑之子張君褒經治其喪而使來趣銘君之先自髙平徙河南後有官東平者今為東平人此部員外郎諱正顔者君曽祖也君娶故兵部員外郎直史館梁公舊之女生二男徳方于是始十嵗徳恭三嵗二女長許歸姜氏次㓜遂以明年二月甲申塟君于鄆州平隂縣安樂鄉樊山原先塋之左銘曰大車六轡載鸞載斿不可以徑寧柅而留往既艱矣又薪其輈嗟惟聖涂誰司諸幽北山磻固君卜先邱聖涂歸哉閟此千秋劉子中墓誌銘君諱常字子中嘉祐八年進士及第補祁州司理參軍治平改元君上書言天下平治由先朝臨御乆徳澤法度所以馴致之以遺今日今命元之意非是宜于本功所自來慎始昭孝若曰承之而已時韙其説治獄明以恕多所平宥數與上官相可否事未嘗屈二年七月十七日享年三十八以疾卒君㓜喜讀書長益自刻苦沈酣出入非若世俗口誦而膚取之者于寢食造次不輒廢書以為天下之至樂在是而世所謂樂無以易其發為辭章清㧞有思尤長于引古以視今性和静而疏逹與人交忠信不渝鄉人有過誤者輒不較居官閒則與士子講學所以教誘之甚厚人大向之以名節痛自砥礪欲求天下之善以身蹈之冀有見于世而志不就蚤死其不可悲也哉劉氏濱州渤海人曽祖諱應圖祖諱為濰州昌邑主簿父諱庚河中永樂主簿世貧業儒至永樂滋貧流寓四方時為名公大人邀客之博學多識善教諸子而君弟䝉有文行故門内講習自相為師友其後䝉被召試校書郎知唐州湖陽縣以不合投劾去君既沒十二年永樂及母夫人相繼以逝又一年并䝉亦亾嗚呼其不重可悲也哉自永樂徙河陽之温縣于是君季弟頤復晉與君之配李氏及其孤弼直遂舉諸喪并塟于王屋縣玉陽鄉之北原實元豐二年七月七日也君所著文三百篇一女前亾矣銘曰嗟惟劉君其士之良涵茹探履學敏以彊騤騤天驥志騰八方踠足跬歩孰有而亾將槩諸理君乎何傷國博陳㡬道墓誌銘公諱修古字㡬道姓陳氏自太丘徙東平曽祖某祖咸卿考肅贈吏部侍郎公少嘗舉進士以兄任為郊社齋郎調瀛州樂壽縣主簿改潤州司理參軍丁母喪服除舉監大名府酒遷定武軍節度推官治平中用薦者改大理寺丞知䖍州安逺縣以親嫌自陳徙監海州税今上登極㤙遷太子中舍賜五品服監開封考城縣酒轉殿中丞知博州聊城縣事未滿罷乂知劒州尤溪縣事不行轉國子博士糶在京常平米坐法免歸居七年以元豐四年六月十二日卒享年七十一公性孝謹少孤事母夫人無違及執喪鄉人穪之精敏善治事在樂夀民大饑州委公賑之活者十九在大名課溢緡錢三十萬在武定鞫正疑獄之乆不決者自聊城罷縣人遮道乆不得去前後當路争薦之晩節失官退處里舍和易寛静以酒自娛親戚故舊相對怡然無不足色雖老精力强壯絶過人臨終授治命其子如無疾者嗚呼公尚何所慊哉初娶梁氏封仙居縣君生子二人男丙服儒女嫁國子博士聶伯堅而亾再娶何氏封福昌縣君遂以其年七月十一日塟于鄆州須城縣南留村先塋之西某祖妣仙源夫人實公兄祕書監諱希古之子以是知公之詳無若某者丙前塟又以狀來謹序次而為之銘曰物有得喪人用笑嘻彼自來去胡轉而隨公以是故失也安之既康既壽世考所詒國博陳長孺墓誌銘公諱孝標字長孺姓陳氏曽祖諱咸卿祖諱肅贈吏部侍郎考諱希古贈祕書監公以廕補太廟齋郎調保州保塞縣主簿光州司法以處州龍泉縣令舉監汾州永利西鹽得眼疾所謂内障者求醫以歸又二年致其事除太子中舍英宗即位改殿中丞賜緋衣銀魚今上即位進國子博士熙寧五年六月五日以疾卒享年五十有九公性至孝㓜失母實鞠于祖母永安太君方氏及長而祕書公分務南都退居東平其所以奉親自養禮賓友内外晏然無所不樂而㤀其身之疾者由公于子職盡也于是凡十餘年既居喪而方夫人猶在寢及事二季父益以謹順聞與諸弟友愛相與以安貧服禮為事嵗時㳟慎祀饗自始事迨卒祭朝服以俟酌酒饋食有數有序毎獻再拜興俯屏息于几筵如親其聲容而有所受命者至婦子侍御率以祗恪無敢跛倚與朋友乆而不渝和易以愛人雖賤夫遇之有禮自祕書公之亾于是三十年鄉里之亟盛亟替朝譽而暮毁者凡幾家至論清白有常能持其門户則人必指陳氏而稱公曰吉徳君子也雖然臨之以義利蓋有不可動者保塞上官或屬以私公謹對曰不可僚友誚之曰以是居卑非身謀也公曰士窮逹得失不有命乎而道固若是議法有守不可撓而本之以恕疑者必傅輕多所平宥汾洲課增衍于格當賞矣俄以疾廢而至于亾鄉人莫不咨嗟以善人不得報為惜公少舉進士有聲名善作詩晩讀佛老書信事頗篤夫人李氏故崇儀使榮州刺史緯之女生四男昭早世熙煦黙皆服儒一女歸鄭儒繼室夫人之妹封金華縣君先三年亾生一女不育十年四月二十四日塟公于鄆州須城縣盧泉鄉酅上里先塋之甲穴公某長舅也方不幸㓜孤實公字之又教之以俾成人于塟也其可以不銘銘曰洵惟博士孝悌有儀惟蓄不施惟善不耆惟其命之是以順之惟徳不疵何公之悲陳仲明墓誌銘君諱孝嘗字仲明某生十年而考妣棄其孤實鞠于外祖父贈祕書監陳公是時公以疾退居東平里第將沒以劉氏孤屬其五子某當時竊自惟念親既不得而見之終乃幸得諸舅從之其庻矣乎其後長立竊食乎仕出處二十年間舅氏之相次亾者四人獨君一人者在而以風痺臥家雖然毎以事若告假過鄉里時得拜其左右瞻候其安否語言相問訊尚足以自慰其念母㒺極之意而今又亾矣當時之所從吾母之同氣于是遂盡嗚呼其不可悲也哉君秘書公第二子性謹孝侍疾執喪能盡其志與兄弟相友愛交人有信義少時讀書作文辭尤刻苦為詩旁治醫藥隂陽之學將塟患塟師多拘因自究其書有所去取以從事無違于禮尤喜佛書通性宗蓋有自悟者其論雖禪學老師往往為屈故恬夷安分無蟇乎外初祕書公為尚書屯田郎中年六十得疾求致仕以㤙任君君曰大人小疾輕去而為其子計某未安也公遂分司南都曽祖諱咸卿祖諱肅贈尚書吏部侍郎祕書公諱希古君娶馮氏龐氏子男五人曰浩曰湜曰沖曰淳曰洵皆舉進士浩沖嘗舉計偕七女子二女嫁四㓜亾一在室君之亾實元豐五年七月三日享年六十八遂以其年九月二十八日塟于鄆之須城縣盧泉鄉先塋之原合以馮氏銘曰嗚呼陳氏逺有徳祉中嘗振顯報施未侈逮君之世寖微弗興而以孝弟鄉里滋稱學行恂恂視其諸子徳後必昌庻將在此陳行先墓誌銘君諱孝若字行先姓陳氏東平人曽祖咸卿祖肅贈吏部侍郎考希古贈祕書監君資夷謹持重有志識祕書公仕有清節為尚書郎以疾分務南都居里舍教諸子以學君嘗讀書自刻勵矣已而幡然曰親疾而飬不足吾于子職將擇其力易而功近者廼獨以治産自任服勤勞躬纖嗇始于至微粟儲而縷積之闢田桑以植本又有所懋居以化有無蓋其性仁故知所取予智故知所變通信故能交約故能持居乆之遂以富稱鄉里自祕書公捐館乆其叔若兄仕不逹两兄以病臥家食口滋衆緩急皆賴君以濟鞠飬叔兄孤女以禮嫁仕族舉大喪六七塟之人有所謁隨事周給至于自奉飬簡儉不易儒素晚年薄滋味嗜好益澹泊向有所營殖者皆寝不復為故嘗觀君之于財其所以生所以用與所以守者其道蓋出于此則與夫詐力貪刻賤義放欲亾厭以為富者甚異矣喜讀佛書談性命疾革不亂自制棺圖像遺其子而卒元豐三年四月十日也年六十娶楊氏尚書比部員外郎歸一之孫子三人長男女皆亾㓜曰慥孫曰詡説其年七月十一日塟于鄆州須城縣南留村先塋之西某妣陳夫人實祕書公長子方先君官湖南祕書公為遣君從行逾年先君夫人繼棄其孤其孤既㓜喪事皆君治之及某依外氏為學至長立得官所以成之者君之徳居多于是前塟慥來請銘銘曰積惟仁用惟義饗惟吾之力又自居其薄曰毋浮吾徳嗚呼尚哉昭之幽刻宋宗室慈州防禦使宗博故夫人普寧郡君郭氏墓誌銘夫人郭氏曽祖暉贈太子少師祖守文贈尚書令譙王父崇仁贈安國軍節度使夫人㓜失怙恃飬于寡嫂王氏逮成人奉其嫂如所生年十八歸于皇叔慈州防禦使宗博夫人性仁恵端静奉姑舅以孝接宗婣以禮撫羣下以㤙輔贊君子休有令徳累封普寧郡君熙寧三年十一月二十五日感疾殞于寢年四十一一男一女皆早世訃聞上震悼恤禮加等寳慈宫嗟惜為之出涕遣内司賓中貴人庀事殯于京南奉先之佛含明年七月十四日塟河南永安縣之塋有詔詞林為之銘曰展彼夫人柔温静嘉蒿魂奄忽戚里齎嗟西原瀰迤行楸靃靡勒銘幽堂淑聞不已壽安許夫人墓誌銘夀安縣太君許氏贈諫議大夫黄公諱珙之夫人熙寧七年十二月二十一日以壽終明年春其子太常少卿師道泣以謂某曰吾少時被夫人教曰黄氏世積徳善將必有發豈不在我之世爾曹其可以不學即佐先子教訓頗力其後吾仲弟師説早世獨與季弟師旦以進士同時得科名起家就仕獲以禄飬師旦既以都官員外郎終吾日懼衰薄無以奉夫人今不孝夫人既亾將塟矣惟是幽宫之銘以累子其毋辭方是時某譎官衡州且三年因詳得夫人之行夫人世衡陽人其父勝好施有逺識衆以長者尊之天人為女善事其父母為婦又善事其舅姑睦其族姻内外無間言諫議公喜賓客食飲其門者無虗日皆夫人身自供具内治不竒上下安之二子寖貴顯饗封受祉更仙源仁壽長壽三縣君以及今封晩年不樂出鄉里太常公為請近郡又两監南嶽祠遂居里舍以便奉飬晨夕省視竭力致誠察其顔辭以為休戚嵗時率婦子孫曽奉觴執膳為夫人壽夫人顧之喜毎合燕親族笑語酬酢終日無倦閭里于是咨嗟嘆慕凡語門户之慶者莫不指黄氏以夫人為有備福而稱太常公曰孝徳君子也夫人性慈仁尤喜佛事誦其書凡十八萬巻有竒平生少疾將終神明如常時言語不亂召族屬持其手各有所囑安然以逝嗚呼人之所慕而難至者壽既壽矣或眊昬疾若淹淹不支不然嗇其子孫幸而有之不克肖似若夫人享年八十八身終康寧有子甚賢一女歸士人孫曽男女至三十人而補仕者五人皆材良自立嗚呼夫人可以無憾矣是年某月某日塟于某鄉某里諫議之塋銘曰女婦惟孝母也惟仁惟睦惟則以昌其門福施厥徳天畀之年有子惟卿由教則然定省左右綵服華顛及其三世詵詵在前豈無智逹或累死生臨此大故夫人不驚嗚呼賢哉世攷斯銘仁壽趙夫人墓誌銘知㤙州事尚書比部郎中王君諱䓒龍之夫人仁壽縣君趙氏上世洺州人自曽祖羽徙博之聊城祖韜父繼永皆不仕伯父繼昌事太宗祗候閤門任事北邉有威名夫人㓜善事父母既嫁其姑路氏有賢行而嚴正少可惟夫人能得其意及將終語人曰始吾兒早孤求配常危慮無以成王事者今得吾婦死瞑矣後比部君寖顯夫人益以禮自約毎臨居養之華美者未嘗不戚然興言念其姑之不待饗而已乃有此也愛諸子均一人不覺其有異出者比部當任子欲先諸從子夫人欣然成之飬孤族子數人于家㤙意無所間蓋婦人之行于是為甚難而夫人優為之平居寡笑語御家有法事至雖煩而徐應之必中理日誦佛書以為常性寛而正故人或可以欺而不能以妄説之也嫁三十七年年六十一元豐二年十一月三日以疾卒于其夫官舍初封孝義後更今封生三男子長巖叟河陽節度推官監晉州煉礬務好學有節行次濱叟堯叟六女嫁者四人其二與次男皆早亾孫男女七人明年三月日𦵏于濟隂廣武原之先塋銘曰孝至于不㤀其親愛至于不獨其子厥家日興不享禄祉是惟令徳而壽此止貴孰共之欲飬不俟夫哀子慕嗚呼曷已吳郡君墓誌銘濮陽郡君吳氏世家撫州之崇仁縣贈太常少卿諱鍇之孫故都官郎中諱有鄰之子故給事中天章閣待制致仕郭公諱申錫之夫人郭公始娶陳氏實為我妣之妹既蚤亾而再室夫人某以陳夫人故數出入拜夫人今諸子舉公夫人之塟而以銘見屬誼不可辭乃爲銘曰懋惟吳宗篤生夫人其字道卿其名嗣真㓜不戯嬉獨近文字性敏以勤有誦輒記至凡女工不學而能事親克孝善飬善承父母以是賢之篤愛好逑亦多慎擇厥配二十八嵗乃始有家不逮事舅姑壽則遐承顔順辭始終不替藥劑膳羞必躬乃饋陳氏有子六人皆㓜夫人撫之巳子不後陳氏兄弟間至猶昨夫人遇之已族不薄給事立朝侃侃言路不以家卹夫人之助謫官濠梁不以憂戚姑尤安之以時分力居姑之喪哀毁不勝廬居墓下又以孝稱自其為女為婦為母動止有節言語不苟持循家法不以智更諸子自教卒俾有成内外睦婣法度妥妥尤喜事佛晚益不惰治平五年從夫河中九月十八日感疾以終壽五十一弗克永年行豈不淑而報乃愆有男禮立主將作簿女亦一人嫁宋文虎居仁和縣郡封濮陽既歿七年給事亦亾熙寧八年仲冬一日遂合陳氏從夫幽室嗚呼夫人始卒不虧宜詩厥羙以永孝思李夫人墓誌銘夫人李氏東光人贈職方員外郎昭度之孫故崇義使滎州刺史緯之子故祕書監陳公希古之冢婦故國子博士孝標之妻而某之舅母也滎州本以儒者進嘗鈐轄廣東守北邉更數州皆有聲績始與祕書公相友善夫人數嵗嘗使出拜而約之㛰年十八乃歸焉既不逮事姑而祕書公以疾退居里舍者十年凡其食歛夫人非自烹餁藥非親調皆不以進疾甚則出其奩中物以有所祈請無不至及居喪哀毁過人方是時祖姑永安太君方氏在寢祕書公二弟博士之弟四人族屬蕃大而門内之治夫人實主之上事旁接各得其歡心御下雖嚴而人愛之博士于祭祀特兢慎夫人克相成之既恭孔時性聰明曉音樂略知書翰事佛甚謹皇祐五年七月十三日以疾卒于光州其夫之官舍年三十八子男女五人博士既賢夫人而未嘗㤀李氏也故以其妹繼室而仲婦又取其弟之子夫人既塟八年當熙寕五年博士亦亾其子熙以七年某月日合塟而取銘于某某㓜孤蓋依夫人以生者也是宜銘銘曰循法度共祭祀惟夫人克有是徳不愆壽不侈塟從其夫永安此贈刑部侍郎孫公墓表公諱成象字乾曜姓孫氏世家長沙五代末馬氏㨿有湖南將吏皆其所自補公之曽祖全以材武為潭州醴陵縣鎮遏使庇憂捍患當危亂中衆恃以休戚實有徳于一方生匡替始仕皇朝為掦州廣陵主簿以清白著名生雋隠曜潛行治居郡城南輕財樂施教子有方里人以為長者而湖湘衣冠論凡治家可法者至今指城南孫氏是為公考生子五人而公次居長性篤孝事親能竭其誠力而友其弟以愛居父喪致哀謹禮鄉里稱之好學問為文章長于歌詩善書有法有名埸屋間聞善見義篤好而力行之娶夫人李氏家多貲嘗析其屋同門壻以女分毎將有訴公曰婚姻以利末俗事也而又以訟乎是非士人之所為因謝絶之後以事出旁郡而母夫人以疾亾既還伏棺悲摧累日不能飲食忽撫其子曰吾不為無後死當免于聖人乎其從先君遊無所恨語已號頓而終年三十三天聖元年三月二十七日也夫人後公二十四年卒二子頎今為朝議大夫荆湖北路轉運使顒守桂州靈川縣令一女適進士丁咸孫男四人曽孫男六人朝議君以才顯于世自其升朝毎國家有事効廟推㤙其子以及其親于是累贈刑部侍郎鳴呼公雖無所饗于其生也而歿也被名爵燕世緒子榮而孫承之則為善必有報顧遲疾異焉耳公既歿二年十月二十三日塟于郭下鄉露仙里又五十三年當元豐四年三月二十七日開封府推官奉議郎充祕閣校理劉某以文表于墓夫人李氏萬年旌徳縣太君自有誌銘嗚呼公之死可謂過于厚者也古之人制中以為常然亦曰喪過乎哀雖過而不可議者厚故也公視其子足以立知其不為無後而死則公之志可哀也而不可議也夫厚其親而死人莫得以議斯可以無憾矣而猶有可哀焉誠在公有髙于人者未及施而止獨施之其身而已此其命也夫此其可哀也夫祭文滑州祭鄒國公文自夫子沒邪説肆行厯嵗百餘而孟子出以身徇道于是夫子之道明人到今師之厯世緬邈弗知所報國家選講師設科目以其書繼五經後又詔封鄒國公配享夫子廟位兖國公之次學士大夫頓首幸甚以謂是夫子之心也州以詔令從事將擇日置像位焉敢具昭告祭丞相韓儀公文維大觀三年嵗次已丑十月壬申朔初二日癸酉奉議郎武騎尉彭城縣開國男食邑三百户賜紫金魚袋劉某謹以清酌庻羞之奠祭于故丞相儀國韓公之靈惟公氣間堪輿秀鍾嶽瀆來輔昌運協興盛福自結明主孰云夣卜髙陽開府初叨采録及長天樞復備僚屬飲食教誨始終樂育卒議􅊚好不遺寒族逮予南遷仲婦晝哭雖反于室公睠彌篤瘴嶺蠻陬問遺以續髙誼仁心迥出流俗疑丞得謝脱屣寵辱樂道恬飬淡然自足天下具瞻日徯還復衮衣龍節匪暮伊夙天難諶斯云何不淑哲人已萎百身寜贖常水之陽西山之麓鬱鬱佳城吁嗟埋玉棐辭告哀曷展心曲祭沈太常文惟君之生冥孰宰持才髙而莫致蓄大而不施世之人徒愛其外之英華兮曽未見其中之磥砢好之者雖衆莫能以力兮惡之者亦足以顛擠惟古人之莫不爾兮亦惟君之所自知祭趙元考文維某年月日某官某致祭于故翰林趙公元考親家之靈惟公徳行之禀兮清淳而精粹學問之積兮該通而博備自文字以來兮前言之與故事雖幽渺詭祕兮㒺散殊之弗記其中無不有兮人名之曰武庫與物末嘗競兮世推之為國器系靈源之休兮克承厥世覽皇徳之光兮亦華于仕外若可以親疎兮内挺然其志兹俄鎩翼而南飛兮亟輿疾乎灃之涘曾未云更晦朔兮􅃍大故之及止惟死生固自有命兮公已乆明乎此理曰憂患為傷其生兮是世以進退為休戚之言者爾嗚呼哀哉予與公交兮以澹而成三十餘年兮事予以兄館閣各途有並㳺之樂兮㛰姻晩契締深好之情駭書音之來訃兮浩哀涕之如傾胡善人之不淑兮儻所謂天道之誰與明溯沅江兮緬緬望楚雨兮冥冥蘭芷兮香歇猿鳥兮悲鳴慨予方繫跡于蘭溪之濱兮不得祖飛旐之東征聊寓情于斯文兮代望門之歌聲敬致薄奠兮以薦斯誠祭丁上杭文維元祐八年嵗次癸酉二月戊申朔某日某甲子具位劉某奉故友上杭府君公明丁君之喪塟于鄆之北原謹遣隨行指使三班借職王穆致肴醴之品而祭之以文曰嗚呼公明曩時盛年氣狹雲路顧語富貴可以指取千金盡散以交雄豪志願力命不相為謀爛漫醉吟清新窈妙天葩寳璣霏落談笑造次居飬不嗇于窮服必華潔食必珍豐薦進吹颺豈非知已至其得失誰使誰尼晚假貴侯以紆青綸萬里逾嵗亟聞匶還今我東來燕樂故里魁礨軒昻獨不見子想象生平綢繆話言磅礴之氣得于遺編嗚呼公明紛紛古人才不盡偶惟有所傳恃以不朽獨念子世寖微寖艱客骨地上埀三十年為子買田北原龜食土水深厚佳城吉宅以子之考及二妣喪劉氏朱氏庚穴之蔵子及室邢竁于申位左右相望冥豈不慰不易舊歛周以重棺日時協良歸哉惟安嗚呼公明誰語皎皎沒而無知來歆罇酒副此悲思熙寧九年祭先塋文維年月日孝孫男某謹遣新婦任氏長男跂躬詣先塋之次用某日具清酌庻羞致享于三代考妣之靈惟某㓜而孤流􅄐四方弗克踐先王恭信哀三禮得罪于上帝神明不敢逭乃天實悔禍保佑先人緒餘弗俾失墜以活其嗣人猶傷于貧三十年于兹始克大事如是其在某之身何有惟心以率力守視洒埽恪恭于墓次終以報稱先人則曰豈敢如以自竭其愚則曰庻幾哉然方有罪于朝為世大僇志弗克遂又五年于兹雖日哀疚繼之以夜其心惸然而官禁有誅祈天天髙亦㒺克有濟蓋蚤夜惟念古之人有禮祭祀欽承婦子是頼用敢祗承禮意命之從事以代不肖之身明徳加恵尚願歆兹乃若敬念所願則忠心如是終身如是曷云敢㤀曷云敢違祭蹈文祭于亾男奉議二郎之靈惟汝孝于父母善于弟兄行已應物一以至誠横逆不校憂樂不驚少自刻苦以取科名安其所傃克有厥聲士林同詞期以公卿嗚呼哀哉徳吉氣静此壽之理吾謂異時必將賴爾天胡奪之􅃍先吾逝白頭衰年哭爾壯子事之顛左有至于此嗚呼哀哉書來報疾汝批紙尾凡數十言常時無異云偶大病十去八矣醫言無他數日可起本不馳告念非得已地逺思親願遣一弟意緒昭昭有叙有紀但怪所書多不成字中心閔黙憂恍如醉亟遣醫先翊日訃至嗚呼哀哉天之賦汝亦既粹羙反嗇其生使不少俟冥誰宰持必有所以豈曰偶然自生自死殆吾不修釁惡積累罰鍾汝身汝則何罪聞汝臨終妻拏守視汝父汝母汝兄弟妹無一在傍四顧歔欷若有所屬索筆與紙手不能持强語其子曰幸千萬可獨寫此嗚呼哀哉又聞前年赴官邉鄙出門徬徨宻語二季曰此行役忽不自意安得休哉同此庭侍祝勿告吾懼詒親累豈汝自有所知魄兆已至使吾蚤聞必留汝止而不吾告何所牽制鳴呼哀哉又聞初疾風寒為厲頭目痛昬火壯軀體付之庸醫語為腳氣諸所毒藥連投大劑一晝夜中數十下利陽脱隂轖外浮中痞寖以滑泄上益嘔噦才十餘口摧此魁礨至于大故䄂不亂􅀈醫乎不仁殺人何易數雖有定豈無寃者嗚呼哀哉人之有生㑹歸于無浩浩萬古瞬息須臾其間長短何較錙銖古之逹觀宜此萬殊禍福同户彭殤一區㤀情齊物與天為徒吾視斯人豈無愧歟情累纒著若有根株八月庚申見汝喪車慘慘儀象纍纍縗麤聲慟親友歎聞道途天髙神幽吾哀莫呼江盡海竭吾涙有餘髣髴面目嗟何及乎惟有盡心撫汝諸孤松楸之下一室山隅以候嵗月歸汝先􅇕
