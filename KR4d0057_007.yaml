body:
  text: 忠肅集卷七宋劉摯撰奏議劾程昉開漳河臣伏見內臣程昉大理寺丞李宜之于河北開修漳河功力浩大凡九萬夫所用物料本不豫備需索倉猝迫于非時官私應急勞費百倍除轉運司供應稈草梢樁之外又有差官採漳堤榆栁及監牧司地內栁株共十餘萬皆是逐州自管津搬河北難得薪柴村農惟以麥䕸等燒用而昉等妄奏民間已料一萬餘工差本司土兵散就州縣民田內自行收刈所役人夫莫非虐用往往逼使夜役蹂踐田苗發掘墳墓踐壞桑柘不知其數愁怨之聲流播道路傳至京師而昉等妄奏民間樂于工役無不悅喜民夫既散役兵尚衆本路廂軍剗刷都盡諸處不闕事而昉等奏陳不己驅迫州縣凌侮官吏仍乞于洺州調起急夫又欲令役兵不分番次其急功擾攘至于如此本路監司畏昉之勢不敢言其非而上下以目臣不知昉之為是役其利安在或聞欲泄邢州大名等處積水今使此水如昉之意通行而北緣下流狹無所容受不免泛濫乃是移此就彼易地為患今來朝廷既令權罷則利害姑置之如聞昉為現罷役忿恚偃蹇有休退之請朝旨又令總領淤田司事臣謹按程昉李宜之將命興事初不以事之可否實聞于朝貪功幸進擾民殘物前後奏報事皆欺罔而昉又敢邀君肆慢在于典憲可誅無赦若尚令昉以都水丞領事河工伏恐生事興患未有窮已伏乞明布罪狀重行貶竄以慰一方殘敝之民使天下皆知此役之害非朝廷意且以戒徼幸希賞罔上賊民之人謹具彈劾以聞劾河北漕臣論河事反覆臣竊以天下至廣非朝廷視聼之所能及故分建監司以寄耳目凡一方利害休戚惟監司之言是聼也使監司皆忠愼不欺則其言可信一有誕謾輕易邀功狥私之論則朝廷將受其罔而下將有受其禍者矣伏見河北轉運司昨者妄建河議欲為迎陽故道之役以奪大吳新河之勢乞許一靣經畫謂如此則新河下流數十州縣盡免水患叙述果敢其言藹如也及聞朝廷遣使按視而本司遽復變而為孫村之說欲便施工今春可畢既而使者到部情見理得于是李南公范子竒翻然又盡以前所議為非其略曰故道隄岸盡己折去靈平頽岸深占河身上下扼束必為大患又曰迎陽下瞰京師孫村水勢不順兩處回河事節委實不便臣按南公等正月十八日狀稱今來躬親相視乃是前此纍作奏請之時都未嘗親至河上而遽以非常之利害不資之勞費輒爾上聞欲以僥幸有成設使萬一朝廷以監司之言為可信而過聼其計豈不誤大事歟夫臣子之分建䇿進說苟其志在陳獻利便則後遂有當否固無足深咎者然如南公等身任職司其言為朝廷所信今日河事又在所部咫尺之近固宜考見底裏然後為言而乃慣習欺罔妄圖功利及見朝廷選遣近臣知其必究事實自以前議鹵莽恐得罪咎故不待使者同行閲視之畢本司己自奏陳公然反覆輕侮君父轉大議是非如反掌視一方安危如兒戲夫事上之道惟恭與誠故書不足信故人有憂其譴死上書不實敕律明坐以大罪南公等前之言乃出于輕發妄作非恭愼也後之奏乃欲以姧計求免非忠實也不有顯絀何以申明典憲少戒欺謾反覆姧僞之人伏望指揮正南公等罪狀特賜竄謫庶協羣議謹具彈劾以聞伏侯敕㫖貼黃自頃嵗以來天下宦吏習為姧欺以圖功賞如淤田水利濬川回河及邊鄙之事皆罔上希進雖試之無效虛為勞費殘民害物然終不曽坐罪故南公等尚習故態無所忌憚欲起不可為之大役于瘡痍之地而復自為反覆侮玩朝廷不可以不正其罪庶幾有所懲也劾趙子幾臣伏見五月中有開封府東明縣人户就宰臣私第或隨馬披告助法不便并升起户等詣御史臺陳訴臣尋曽具狀及上殿劄子奏陳利害陛下令府界提㸃司體量升降等第因依令竊見趙子幾别舉發到知縣賈蕃在任日代借官錢與手力因同天節沽市村酒創置部夫席屋等事朝廷以其將下本司取勘者臣竊以為過矣朝廷變更役法意欲均民民苟以為有利害也安可禁其所欲言者且畿內人户幸以居近輦轂故可以自陳以近推逺以一求萬則天下之情可知也然四方之人限在遐逺上雖有州縣而安敢言之又有監司提舉司之隔閡其欲赴訴勢固難矣今又因畿民有訴而悍刻之人反怒縣官意謂不能禁遏故攟托他事期置于法不意朝廷不辨付之施行臣恐四逺人情必疑朝廷以謂欲鉗天下之口而職在生民者必皆視蕃以為戒爭務拘民而禁其言然則天下休戚陛下無時而知矣臣伏見編敕節文按察之司所部官屬有犯不得于官屬離任後始行發摘雖實不復受理若犯贓私雖離任有人論告或因事彰露即依法施行方子幾之體量于其縣也審己得替離任矣子幾初求其事于僚佐又誘而鉤之于吏史借令蕃有贓私耶則亦不得謂之論告與因事明矣法之所不當理而子幾肆志敢為者子幾方以諂僞怙寵用事務在力行司農新政而不復顧陛下之法與陛下之民但驅使就令冀自以收功恐因民不服撓動其事是故作威以警衆違法以按吏欲使畿內他邑與天下官吏畏罪避禍閉遏其人民使不得有言以聞于朝廷爾如蕃以司農榜內樁定人户數目使出助錢遂將縣籍下等次第升起者凡一千户以就足榜內之數此其為罪固不赦是以前日聖旨指揮令體量此事臣願陛下治蕃此罪而己自餘替後所按乞依條不問蓋借蕃今日所以解四方人情之疑使知陛下不禁民言之意臣所以區區論之冀少補治體非為蕃計也如子幾領按察之任已久當平日不聞舉摘蕃事乃令挾情違戾敕禁原心考察可見險薄伏請付吏施行劾范峋免應奉山陵臣近准尚書省劄子節文據户部狀為府界提㸃司合應副山陵用度本司官范峋前後申奏異同奉聖㫖令御史根䆒曲直尋據取會文案看詳並係提㸃司虛妄理曲己具狀奏聞去訖臣恭惟山陵興作朝廷之大事中外臣庶莫不願窮心畢力以效萬一況今靈駕經厯七頓皆峋所部正其職事而本司明有應奉慈聖光獻山陵故事未逺峋乃輒敢推免妄引治平年賦額領于三司之事以為辭省司數數移問索以舊例匿而不言巧文飾說一出欺誣及情見理屈方稱備員畿內不避狂僭乞行管認意以為非己之事由為朝廷承乏云耳偃蹇自肆反覆不情忘先帝拔用不次之恩為不義慢陛下崇奉大事之令為不忠臣子之分峋敢如此伏望詳酌量行黜責以厲在位劾蔡確不入宿臣伏見今月六日神宗皇帝靈駕進發准敕前一日五使三省執政官宿于兩省及幕次竊聞宰臣蔡確獨不曽入宿中外莫不疑駭伏以山陵國之大事遷坐發引葬之大節故前夕羣臣宿于內者以陛下是夜躬行祭奠之禮臣子之心同于攀慕不得安寢于其私也下逮執事奔走之衆誰敢不䖍奉期㑹以共厥事而確位冠百辟身充山陵使正當典領一行職務而乃于是夜獨不赴宿慢廢典禮有不恭之心謹具彈劾以聞伏望聖斷特賜詳酌施行貼黃確如曽到禁門遇己鎖閉亦合立具因依奏入别禀處分不當公然便以不入宿為是劾論蔡確十罪臣近具狀乞罷宰臣蔡確至今未䝉施行緣臣備員御史以觸邪指佞為職今宰臣姧險有犯公議臣若失職誰敢言者伏見祖宗以來所用相臣考愼選擇必取天下有德有望之人故內則廟社安外則夷夏畏下則衆庶服其功名事業昭于天下至今稱之未嘗有法獄之吏聚斂之臣詭譎之才隂賊之行天下所嫉而使在相位如確者也臣所以不避再三干冒天聼確之當去其罪非一公違陛下敕命不赴神宗發引內宿為大不恭其當去一也山陵使回明有厯代及國朝故事而略不引罷廢禮貪位其當去者二也皇帝陛下之立乃天人之所助而大皇太后之德也確輒自稱定䇿貪天之功其當去者三也在中書二年不將差除與三省合奏及身遷門下隂使言者申請招權營私其當去者四也其弟犯法蹇周輔承勘兩次皆滅裂平治其事故今日周輔父子有罪言路纍有彈奏而力主之不罷其職任屈公法報私恩其當去者五也執政臣僚己經覃恩遷轉無故又進一官妄引嘉祐治平不可用之故事欺謾聖聼不顧廉恥其當去者六也與章惇死黨相結一柔一剛一合一離欲以銷磨同列牽制善政中外皆知其術其當去者七也自去年十月至今並無雨雪驕陽肆虐天下大旱民情惶惶實由確姧邪所召況位居上相正任其責其當去者八也確在熙寧元豐間鍛鍊冤獄排逐善良引薦姧僞變更祖宗政令以誅求民財確在言路在司農在執政首尾身任其事見法令未便何嘗聞有一言論列禆補惟是阿諛護持以謀進用及至今日自見其非乃稍稍語于人曰在當時豈敢言也此確之意欲于今日固其名位故反將歸曲先帝是可謂大不忠矣朝廷以高爵重祿尊養輔臣欲何用哉豈有可言而不言也假如言之而不聼當以死繼之假如畏懼而不敢言則當辭事而去乃臣子之常分也當時詭隨及時移事故方為自全之計可賣過歸咎是可謂大不忠矣于先帝不忠則安肯盡忠于陛下也哉此其罪惡尤大其當去者九也近者奉使山陵回隨行屬官故事自皆推恩而確乃特薦髙遵惠張璡韓宗文乞從優恩上欲以悅聖意旁欲以餌同列賴陛下至聖至公照其狡計而議遂不行中外聞之莫不欣快陛下觀此用心則確之邪正不難知也此一事尤喧物論而罪尤大者其當去者十也確之罪惡如此羣議沸騰臣愚區區之言略已自竭而聖度包容一切不以為意在聖慈不失恩于確則可也其如朝廷之輕重天下之安危生民之禍福人情之去就在確之罷不罷爾則所繫豈不大也今忠臣義士當盛明之時人人皆願自效而確猶在位誰敢明目張膽盡心于朝廷哉正人不得立則陛下之善政不得行天下之敝法不得改今大旱纍月燥風慘日自冬入春宿麥己槁疾疫將作內外之情驚惶不安皆由大姧在朝廷天示譴告伏望聖慈深察事勢以天下為念早發聖斷罷確職任使之外補以答天變以召和氣以慰公議以新改元之政天下幸甚再劾蔡確臣聞周書君陳曰爾有嘉謀嘉猷入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德此言人臣之義有善則稱其君雖謀出于己亦必曰吾君之德者上下相成忠厚之至也伏見宰臣蔡確辭位求退其所上表無引咎之意有論功之言自陛下臨御以來美政盛事民所歌頌者確皆鋪列條敘以為己功中外傳之靡不怪笑夫收拔耆舊之臣置諸左右乃陛下至明獨見以天下公望用之而確乃以為己之所引罷去有司漁利剝下苛細之法而黜逐汙吏乃陛下仁心惠德以蘇疲民而確又以為己之所請至于申戒邊埸不使生事分遣使者求民疾苦修法令以完先朝之政包同異以行大公之道此中外皆知出于陛下聖謀睿慮實新政之甚善者而確乃一切任之掠為己事貪天之功欺示天下其意謂此數者陛下不能知之因己請而知之陛下不能行之因己請而行之其于輕慢君父欺罔臣庶違道干譽至于如此凡確之所引數事者確果曽有所建請乎蓋不可知也確在言路為執政前後己久不言之于先朝而言之于今日此何意也果有建請固大臣職爾如君陳之歸美于上可也而叙于求退之表又何意也夫不言之于先帝此不忠之罪也言之于今日此取容之計也敘之于表謂我有功則是陽為求去實欲陛下疑以為功而留之因欲求免于公議此持上罔下之謀也古之人進言于上退則削其藁不欲使人知善之出于己所以推逺權焰避掠美千名之議不如此則何足以為大臣乎確無禮不恭朋邪懷二無廉恥之節昧進退之義又自去冬大旱至今確為上相身任其責其罪惡之著無補朝廷今既逼于公論不得已而求去正當痛自咎責踧踖傴僂為懇切必退之詞乃大臣去就之體今確誇功揚己露行行不平之氣為臣如此不謂之大姧大邪則可乎伏望以確表并臣此章付之三省議確之惡重之竄逐以正典憲使天下為人臣者知事上之道劾章惇臣竊以傳曰有德進則朝廷尊又曰仁者宜在髙位不仁而在髙位是播其惡于衆也伏見知樞密院事章惇資性佻薄素無行檢廟堂議政無大臣之體專以驕强輕肆作俳謔之語以凌侮同列夸示左右其語播于都下散及四逺傳以為笑比來聖㫖增捐政令之未完善者惇則必出異意沮持其事方宋用臣驕橫不法惇在政府與之厚善納其所遺酒醪雖更恩宥臣以為大臣不廉犯大義之責不當如小臣論赦令前後也謹按惇夤緣遭遇幸得備位近輔不深惟朝廷髙爵厚祿稍自矜重以忠義圖報而凌轢諧戲不可謂德閉善害政不可謂仁而交非其人又從而以貨取之可謂無廉隅矣可謂播其惡于衆矣方且揚揚髙位人皆指而議之殆非所以尊朝廷厲羣下也伏請聖斷罷惇政事以允公論劾賈昌衡臣伏見敕令差兩浙轉運副使賈昌衡權三司户部副使臣竊以昨者杭州守臣不公相繼犯紀犯法昌衡以轉運使至養二州之惡不能按舉朝廷削其一官降以為副使以示愆責乃夤緣發運使以均輸留之于今未及一年遽此召用中外有疑若以資任則奪官隆差遣日月未久苦以均輸為有功則昨者漕入都下之物如糯米等至今滯積出易不行若以選擢人才不以次序則奉使弛職理財失計如昌衡才蓋可知矣所有今降差命伏請依昌衡所乞特行寢罷劾沈希顔非法聚斂臣伏見京西轉運副使沈希顔昨于本路妄有興作非法聚斂已䝉聖㫖委官究實事皆有狀未聞施行謹按希顔起于常調委以使指前日以不䖍君命坐廢未幾先帝記擢復其職任不深惟補報大義乃欲專以利事國違法欺罔誅求瑣屑無所不至冒昧祈進老叨無恥孤負任使所宜放黜以戒他路臣竊慮朝廷尚以所按事狀下吏勘劾虛為煩擾伏乞即賜指揮貼黃希顔于本路為權鹽之術徒變舊法而食鹽之人與啇賈皆被其害于公家殊無所利至于果蔬日用之物例增征算雖屠販之事皆不屑為之中外具知伏乞速賜施行劾吕惠卿臣竊以國家之患莫大于發政行令而無人敢違人臣之罪莫大於邀功罔上而為國生事記曰不從令者死于律擅興千人者誅蓋自古失御臣之道使其凌上召亂而後患有不勝言者多必由此然則法令不可不嚴而主上不可不察也臣伏覩去年三月六日陛下登極赦書節文應緣邊州郡仰長吏巡檢使臣鈐轄兵士及邊上人户不得侵擾外界靜守疆埸勿令搔擾命令既下邊境之上風塵頓息蕃夷之情感服內靣當此之時知太原府吕惠卿輒于四月中旬被受赦敕之後連遣部將折克行訾虎相次數萬人入西界討蕩蕩所得首級皆退淺邊老弱虛夸以為功而官軍人騎死傷甚衆末幾西人復仇以五月犯塞疆臣戰沒士卒陷亡臣以為勞師動衆奏功不實以至購怨于夏猶皆未足論也而其公違詔敕擅出師徒實無人臣之禮則其罪不可以不治臣謹按惠卿遭遇暴起初不以道幸嘗備位執政不深惟大義報國乃欲造非常之功圖再進用且邊陲本自無事又陛下新即位銜恤愼始故上循祖宗以來踐阼故事加惠邊鄙禁相侵擾丁寧戒諭所以體息軍民慰安夷夏詔號宣布明若日月可謂至恩盛德人情孰不欣戴而惠卿以前兩府居帥守之任所宜與國家同休戚將順至意以鎮方靣乃敢用貪功幸進之志為此亂階夫違棄制詔虧臣子之道其罪一也當陛下諒隂之中謀動干戈其罪二也受神宗遺詔未逾月而忘哀疚之情覬幸功賞為大不忠其罪三也致新天子命令失信于四夷其罪四也開外域之隙至今警備未得安靖其罪五也夫惠卿天下知其為姧人也方命擅兵天下之大惡臣恐防微杜漸朝廷不當涵養而不慮也昔漢之王恢欲徼一時之幸于胸奴故建馬邑之役孝武許之是恢奉詔以從事也然終以謀出于恢故下恢吏不赦使自殺馮奉世使外域以便宜繫莎車立功萬里終以擅命不侯蓋古之御人愼兵法義如此若惠卿則非如恢之請命也又非如奉世之止于擅命也被新詔後敕禁約甚用而廢格不顧是叛命者也方陛下嗣政之始以威福恩義懷寧天下之時而第一命令為强悍之臣叛違而不從若朝廷無所誅詰上下不敢誰何臣知陛下異日有大政號將不足以令天下而信四夷姧臣之逆命心輕國憲者將接迹而動矣臣位中執法職在糾治姧慝伏請以臣章付外議正惠卿罪狀考古之義依律處分以申大公之法為姧確之戒謹具彈劾以聞伏侯敕㫖劾韓縝竊以聖人于天下有一物不安其性命之分則䀌然傷之以謂已使然也一物失所猶引以自任況夫民命之重哉是故先之以仁後之以政彼其有罪而入吾法猶哀矜惻怛不得已而刑之夫以人君之勢其重愛天下猶若此況人臣分憂共治而敢有專殺者哉祖宗仁愛萬方官吏之入人罪者皆法而故入者特深焉夫意雖有故然猶假文法以致之也而己為祖宗之所不容又況專殺無辜者哉臣謹按前知秦州韓縝因飲宴至中夜而罷指揮使傅勍持燭侍縝入于門縝見之怒明日杖勍背一百三日而死其家持血衣以訴于朝廷始者下本路按劾而縝輒自有論述然其大要雖過為詞說亦不能文殺人之罪其後但聞朝廷數數有體量之㫖至于今數月矣臣竊以縝之與勍雖貴賤有間要之分職共事陛下之臣也勍有罪耶則有陛下之法在當置有司閲實而斃之今乃肆一時怒忿捽首鞭背非理踰法杖至一百而死之方太平之世內外莫不畏法令踰繩檢而縝以帥守快私乘恚蔑侮典憲暴殺官吏意輕朝廷不識朝廷尚何所疑而體量委曲如此徐徐耶議者以縝家世其親戚交游多在勢貴根株表裏誰不為力使孤子單平無援助者敢殺一無罪必不優游遲久至於如此將使延及明堂之宥也臣又聞王韶之來頗聲縝冤韶昨以邊地欺朝廷坐降一官而縝乃保蔽以實其事故韶極力游說以惑朝廷姧利相市意在報縝若朝廷萬有一信則恐死冤不伸國法不正非陛下為人父母之意況縝所至暴疾肆為不法殘人害物前後非一今邊隅未靖不重縝責不伸勍枉恐無以感士心而得其死力伏望速賜施行劾黃隱臣伏以國之教化出于學校學之廢興蓋由師長故聖人既建庠序必立之官苟非博通經術而有德行者則不能使學士誠服而心悅之祖宗以來莫不愼其選任而仁宗慶厯中最號得人如胡瑗孫復石介實為之首育材之效後世有考焉神宗崇儒重道大建學制訓發經典以幸多士恩施甚厚今在學學者衆多與古爭盛而師儒之位豈可以非其人伏見國子司業黃隱學不足以教人行不足以服衆于學之政令惟考校課試遷補職掌最繫勸奬不可不公而隱違法徇私事皆有狀以致大喧物論多于生員試卷之末出立詞說榜以示衆變棄義理疑惑學者隂附權要奬進浮薄故使學衆不伏怨猜􅍅􅍅至有騰為嘲謗之詞又議者謂近時學官之肆為私枉無若隱之甚者按隱本無術業使在此官非其所長恐不足以表率士類奉宣教法無以稱陛下首善造士之意伏請罷隱職任除一外官以安學者取進止貼黃故相王安石經訓經㫖視諸家議說得先儒之意亦多故先帝以其書立之于學以啓迪多士而安石晚年溺于字說說典是以近制禁學者毋習此二者而己至其所頒經義蓋與先儒之說並行而兼存未嘗禁也隱猥見安石政事乖謬為衆詆斥遽爾迎合附㑹思欲盡廢安石之學每見生員試卷引用隱輒排斥其說此學者所以疑惑而怨之深也夫安石相業雖有間然至于經術學誼有天下公論在豈隱之所能知也朝廷既立其書又禁學者之習此何理哉伏望速賜罷隱以允清議以一風俗乞不候結案行遣吳居厚臣伏見前京東轉運使吳居厚吕孝廉昨于本路科斂掊刻違法害民朝廷罷逐其職任按正其事及今半年尚未結絶風聞勘司方于本路州縣遍行取索居厚等到任以來逐件緣事在纍年案牘及事情不一檢討齎送重為煩擾謹按居厚孝亷奉使無狀不為陛下愛惜百姓專以朘削為事剝下罔上意在徼幸市進民不堪命愁怨以目自聖明照知二人去任一方始有更生之意其罪惡亦己暴著四方莫不知戾今覆治節次方為此徐徐使外疑惑誠恐所司有所顧望欲乞速賜指揮不須更候完結徒為追擾據己體量到罪狀重行竄黜以明典憲以謝疲氓以戒曉諸路使知二人不法聚斂非朝廷本意乞罷蹇周輔及其子序辰伏見刑部侍郎蹇周輔及其子員外郎序辰昨日以鹽事奉使江西湖南而相繼創增賣額州縣畏懼承奉皆出配抑使人陷罪破産數路愁怨朝廷己遣使按正其事今聞周輔無所忌憚復自論列以飾非文過而父子方雍容侍從出入朝省此豈待罪者之所宜衆人莫不指議臣誠恐周輔等懷患失之意或致别為經營以圖幸免有失公議伏請罷周輔序辰現任職事各令補外詳察治到事狀别聼㫖殿前副都指揮使建武軍節度使賈逵諡武恪諡議賈逵少以氣略雄毅聞及服事邊圉周旋兵間料敵致命嘗為士卒先故所至數有功皇祐中智髙擾南鄙狄青表逵從行歸仁之戰青命于軍曰有輒動者斬及前將孫節覆于賊逵度賊必將乘勝薄我而視地形有便利可據者即不待令引所部疾趨之甫成列賊果至因得乘髙鼓躁大呼馳擊逐之遂潰其衆夷衆以遁方此之時非逵應機達變不以全軀保私為計則勝負殆未可決也至于築堡河外以居蕃户使免西人之所驅掠置軍壁于鄜延以蔽二城杜絶冦兵臨瞰之患在秦州及并代多提輕兵游察境上地雖險絶人空至者亦必深造之或召羌族與之較射藝執其酋領使還所掠得邊民數千人釋而歸之以故戎人懾服疆埸以安大抵其所施為出于忠義果敢奮決雖有浮言流議一不以自恤其周衛王室典治禁旅嚴而不苛寬而不弛使軍士懷上而長己之持法出入二十年無纖毫過失寵䘵倚任克有始終夫諡者所以公善惡之實也按逵之居邊也遇事輒奮果于有為時或脫棄拘攣務以建立事功至在近衛則恂恂謹密舉蹈繩檢外內異迹若非一人所為者蓋亦可謂之勝任矣諡之法有奮其威勇曰武謹居官次曰恪節惠考行伏請諡武恪張康節諡議公德厚而政易簡業隆而心恭愼不匱于惠下不亢于履髙夫惟簡也所以為不匱愼也所以為不亢公之治郡若縣凡十有一寬而信敏而靖與民之所同欲而去民之所同害所至有政民愛之若父母密州績用尤大較著遭嵗凶饉哺活流餓二十餘萬在朝廷侃侃正色其所建明多國之大事如誡寵幸擊姧權申誣罔者其危言正論今落落具在也仁宗未嗣立公力啓自為御史丞雜以及大位蓋三請之卒至天子感悟定䇿受遺遂預有功焉凡皆志立而後發慮定而後蹈以忠報為守不恤身利害故多得其言至于周旋二府不為勢熖門無苞苴客無私謁不以富貴異廉儉之舊不以寵利嬰清方之介脫榮名享眉壽其于成物行己終始出處可以為無愧者矣諡法安樂撫民曰康能固所守曰節以公之行合之法而參之公議于是為稱請諡曰康節忠肅集卷七
